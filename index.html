  async function importBackupJSON(file){
    if(!file) return;
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      if(!data || !data.config || !Array.isArray(data.borrowers)){ alert('File sao lưu không hợp lệ hoặc không đúng định dạng.'); return; }
      if(!confirm(`Khôi phục sẽ GHI ĐÈ toàn bộ dữ liệu hiện tại của ${adminLevelLabel()} "${wardId()}" trên đám mây (hộ vay, chi tiêu, cấu hình, nhật ký, thùng rác) bằng dữ liệu trong file sao lưu. Bạn có chắc chắn muốn tiếp tục?`)) return;
      // "Mã ẩn" (secretId) và Chủ mã (ownerEmail) thuộc về "con trỏ" ĐANG active — TUYỆT ĐỐI không
      // để file sao lưu (vốn có thể được xuất ra từ một mã KHÁC, mang secretId khác) ghi đè mất,
      // nếu không dữ liệu vừa nhập (borrowers/expenses...) sẽ bị lưu lệch sang đúng secretId cũ chứ
      // không phải secretId của mã đang mở, gây "ông nói gà bà nói vịt" giữa con trỏ và dữ liệu thật.
      const importedCfg = { ...data.config, secretId: state.config.secretId, ownerEmail: state.config.ownerEmail };
      await cSet('config', importedCfg);
      await cSet('borrowers', byId(data.borrowers||[]));
      await cSet('expenses', byId(data.expenses||[]));
      await cSet('trash', byId(data.trash||[]));
      await cSet('activityLog', byId(data.activityLog||[]));
      await cSet('collaborators', data.collaborators||{});
      await pushLog('khôi phục', 'toàn bộ dữ liệu từ file sao lưu');
      alert('Khôi phục dữ liệu thành công! Các thiết bị khác đang mở app sẽ tự động cập nhật theo.');
      // dữ liệu trên màn hình sẽ tự cập nhật qua các listener onValue (attachRealtime)
    }catch(e){
      alert('Không đọc được file sao lưu. Vui lòng kiểm tra lại file .json.');
    }
  }

  const CAT_HAMLET = 'CAT_HAMLET_ALLOC';
  const CAT_MEETING = 'CAT_MEETING';
  const CAT_SUPPLIES = 'CAT_SUPPLIES';
  const CAT_TRAINING = 'CAT_TRAINING';
  const CAT_BONUS = 'CAT_BONUS';
  const CAT_OTHER = 'CAT_OTHER';

  // Giá trị chữ Việt CŨ (bản trước khi có danh xưng động) — giữ lại để nhận diện
  // dữ liệu đã lưu từ trước, tránh mất/lệch dữ liệu cũ khi nâng cấp phần mềm.
  const LEGACY_CAT_HAMLET = 'Trích về cho các khu dân cư/Ấp';
  function isCatHamlet(purpose){ return purpose===CAT_HAMLET || purpose===LEGACY_CAT_HAMLET; }
  // Nhãn hiển thị động cho từng mục đích chi — dùng cho giao diện & file xuất
  function categoryLabel(cat){
    if(isCatHamlet(cat)) return `Trích về cho các ${subAdminLabelLower()}`;
    switch(cat){
      case CAT_MEETING: return 'Chi họp hành / Hội nghị';
      case CAT_SUPPLIES: return 'Mua văn phòng phẩm';
      case CAT_TRAINING: return 'Chi công tác tập huấn';
      case CAT_BONUS: return 'Chi bồi dưỡng cán bộ hoạt động quỹ';
      case CAT_OTHER: return 'Chi khác';
      default: return cat;
    }
  }

  // =====================================================================
  // ---------- HỆ PHÂN QUYỀN MỚI (module-based, thay cho collaborators cũ) ----
  // Mỗi mã xã có 2 lớp chia sẻ, lưu trong config:
  //   config.publicPerms = {data,members,strength,internal} -> 'none'|'view'|'edit'
  //     áp dụng cho BẤT KỲ ai vào bằng đúng Mã định danh + mật khẩu (kể cả không đăng nhập Google)
  //   config.grants = { [emailKey]: {email, data,members,strength,internal,settings} }
  //     áp dụng riêng cho MỘT tài khoản Google cụ thể (Loại 2 — chia sẻ đích danh),
  //     override lên trên publicPerms; "settings" chỉ có ở đây, không có ở publicPerms.
  // Chủ mã (config.ownerEmail đúng bằng email đang đăng nhập) luôn full quyền mọi nơi.
  // =====================================================================
  const SHARE_MODULES = [
    {key:'data', label:'Sổ vay vốn'},
    {key:'members', label:'Hồ sơ hội viên'},
    {key:'strength', label:'Thực lực Hội'},
    {key:'internal', label:'Thu – Chi nội bộ'},
    {key:'survey', label:'Biểu mẫu/Khảo sát (Bộ dùng chung)'},
  ];
  const PERM_OPTIONS = [
    {v:'none', label:'Không được xem'},
    {v:'view', label:'Được quyền xem'},
    {v:'edit', label:'Được quyền sửa'},
  ];
  function isOwner(){
    return !!(state.identity && state.identity.email && state.config && state.identity.email === state.config.ownerEmail);
  }
  function myGrant(){
    if(!state.identity || !state.identity.email || !state.config) return null;
    return (state.config.grants||{})[emailToKey(state.identity.email)] || null;
  }
  // Quyền hiệu lực của TÔI với 1 trong 4 module dữ liệu ('data'|'members'|'strength'|'internal')
  function modulePerm(m){
    if(state.previewMode) return 'edit'; // môi trường tham quan: thấy đầy đủ giao diện, nút bấm sẽ bị vô hiệu hoá riêng
    if(isOwner()) return 'edit';
    if(state._adminViewingWard && isAdmin()) return 'view'; // Admin "Xem cơ sở dữ liệu": full quyền XEM, không được Sửa
    if(!state.config) return 'none';
    const g = myGrant();
    if(g && g[m]) return g[m];
    return (state.config.publicPerms && state.config.publicPerms[m]) || 'none';
  }
  function canViewModule(m){ return modulePerm(m)!=='none'; }
  function canEditModule(m){ return modulePerm(m)==='edit'; }
  // Quyền vào/sửa "Cài đặt của mã định danh" — CHỈ cấp được qua Loại 2 (đích danh email), không có ở Loại 1 (công khai)
  function settingsPerm(){
    if(state.previewMode) return 'edit';
    if(isOwner()) return 'edit';
    const g = myGrant();
    return (g && g.settings) || 'none';
  }
  function canEditSettings(){ return isOwner() || settingsPerm()==='edit'; }
  function hasAnyWardAccess(){
    if(state.previewMode) return true;
    if(isOwner()) return true;
    if(settingsPerm()!=='none') return true;
    return SHARE_MODULES.some(m=>modulePerm(m.key)!=='none');
  }
  // "Đang chờ duyệt" CHỈ áp dụng cho khách đã đăng nhập Google & tham gia bằng mã (Loại 2 chưa được cấp gì).
  // Khách qua mã không đăng nhập (codeGuest) hoặc môi trường tham quan dùng riêng hệ publicPerms/preview, không có khái niệm này.
  function isPending(){
    if(state.previewMode) return false;
    if(!state.identity || !state.identity.email) return false;
    if(!wardId() || !state.config) return false;
    return !hasAnyWardAccess();
  }

  // ---------- danh xưng hành chính động (Xã/Phường, Ấp/Khu phố/Thôn...) ----------
  // Mọi nơi trong giao diện, biểu mẫu, và file xuất (Excel/Word/PDF/In) đều PHẢI
  // lấy danh xưng qua các hàm dưới đây — tuyệt đối không viết chết chữ "Xã"/"Ấp".
  const ADMIN_LEVEL_OPTIONS = ['Xã', 'Phường'];
  const SUB_ADMIN_OPTIONS = ['Khu dân cư', 'Ấp', 'Thôn', 'Khu phố', 'Xóm', 'Tổ', 'Khác'];
  // Loại đơn vị hành chính cấp Tỉnh (dùng ở "Thông tin cơ bản bắt buộc" — màn hình thiết lập ban đầu / Cài đặt)
  const PROVINCE_TYPE_OPTIONS = ['Tỉnh', 'Thành phố'];
  // Mốc 4 Quý mặc định — CHỈ ngày/tháng (không năm), áp dụng lặp lại cho MỌI năm quá khứ/hiện tại/
  // tương lai. Quý 1 bắt đầu từ 31/12 năm trước, nên khi "resolve" ra ngày cụ thể phải xét đúng
  // năm liền trước cho mốc bắt đầu của Quý 1.
  const DEFAULT_QUARTERS = {
    q1:{ label:'Quý 1', startMonth:12, startDay:31, endMonth:3, endDay:31 },
    q2:{ label:'Quý 2', startMonth:3, startDay:31, endMonth:6, endDay:30 },
    q3:{ label:'Quý 3', startMonth:6, startDay:30, endMonth:9, endDay:30 },
    q4:{ label:'Quý 4', startMonth:9, startDay:30, endMonth:12, endDay:31 },
  };
  // "Resolve" 1 Quý (theo mẫu ngày/tháng lặp lại) ra khoảng ngày CỤ THỂ (có năm) gần với "hôm nay"
  // nhất — dùng tạm cho các tính năng đang có (kỳ Báo cáo lãi, nhắc hạn quý) trong lúc chờ logic
  // tính lãi suất chính thức (sẽ được bổ sung sau) sử dụng đúng bộ mốc này theo cách khác nếu cần.
  function resolveQuarterDates(qKey){
    const q = (state.config && state.config.quarters && state.config.quarters[qKey]) || DEFAULT_QUARTERS[qKey];
    if(!q || q.startMonth==null || q.endMonth==null) return { from:'', to:'' };
    const pad = n=> String(n).padStart(2,'0');
    const buildRange = (endYear)=>{
      const startYear = (q.startMonth > q.endMonth) ? endYear-1 : endYear;
      return {
        start: `${startYear}-${pad(q.startMonth)}-${pad(q.startDay)}`,
        end: `${endYear}-${pad(q.endMonth)}-${pad(q.endDay)}`,
      };
    };
    const today = new Date(); today.setHours(0,0,0,0);
    const y = today.getFullYear();
    let best = null, bestDist = Infinity;
    [y-1, y, y+1].forEach(ey=>{
      const r = buildRange(ey);
      const s = new Date(r.start+'T00:00:00'), e = new Date(r.end+'T00:00:00');
      if(today>=s && today<=e){ best = r; bestDist = -1; }
      else if(bestDist!==-1){
        const dist = Math.min(Math.abs(today-s), Math.abs(today-e));
        if(dist<bestDist){ bestDist = dist; best = r; }
      }
    });
    return { from: best.start, to: best.end };
  }
  // Quý mà "hôm nay" (theo lịch hiện hành) đang nằm trong đó — dùng làm giá trị MẶC ĐỊNH ban đầu
  // cho bộ lọc Quý ở Sổ vay vốn (dự phòng q1 nếu không khớp quý nào).
  // =====================================================================
  // BỘ LỌC ẤP & PHƯƠNG ÁN VAY — đa chọn kiểu checkbox, có ô "Tất cả": chọn "Tất cả" thì tích hết,
  // bỏ "Tất cả" thì bỏ hết; nếu đang chọn hết mà bỏ 1 cái thì "Tất cả" tự bỏ (không ảnh hưởng các ô khác).
  // =====================================================================
  function ensureFilterHamletsInit(hamlets){
    if(!state.filterHamlets) state.filterHamlets = hamlets.slice();
  }
  function hamletFilterLabel(hamlets){
    ensureFilterHamletsInit(hamlets);
    const sel = state.filterHamlets;
    if(sel.length===0 || sel.length===hamlets.length) return `Tất cả địa phương`;
    if(sel.length===1) return `${subAdminLabel()} ${sel[0]}`;
    return `${sel.length} địa phương được chọn`;
  }
  function toggleHamletAll(hamlets, checked){ state.filterHamlets = checked ? hamlets.slice() : []; }
  function toggleHamletOne(hamlets, name, checked){
    const set = new Set(state.filterHamlets||[]);
    if(checked) set.add(name); else set.delete(name);
    state.filterHamlets = hamlets.filter(h=>set.has(h));
  }
  function ensureFilterProjectsInit(projects){
    if(!state.filterProjectIds) state.filterProjectIds = projects.map(p=>p.id);
  }
  function projectFilterLabel(projects){
    ensureFilterProjectsInit(projects);
    const sel = state.filterProjectIds;
    if(sel.length===0 || sel.length===projects.length) return 'Tất cả phương án vay';
    if(sel.length===1){ const p = projects.find(x=>x.id===sel[0]); return p ? escapeHtml(p.name) : '1 lựa chọn'; }
    return `${sel.length} lựa chọn`;
  }
  function toggleProjectAll(projects, checked){ state.filterProjectIds = checked ? projects.map(p=>p.id) : []; }
  function toggleProjectOne(projects, id, checked){
    const set = new Set(state.filterProjectIds||[]);
    if(checked) set.add(id); else set.delete(id);
    state.filterProjectIds = projects.map(p=>p.id).filter(pid=>set.has(pid));
  }

  // ---- Dựng HTML cho 4 khung dropdown bộ lọc (Ấp/Phương án vay/Quý/Năm) ----
  function buildHamletFilterDropdownHtml(hamlets){
    ensureFilterHamletsInit(hamlets);
    const sel = state.filterHamlets;
    const allChecked = hamlets.length>0 && sel.length===hamlets.length;
    const open = state.openFilterDropdown==='hamlet';
    return `<div class="sv-filter-dropdown">
      <button class="btn btn-ghost btn-sm preview-allow" id="f-hamlet-btn">${escapeHtml(hamletFilterLabel(hamlets))} ▾</button>
      ${open? `<div class="sv-filter-panel">
        <label class="sv-filter-item"><input type="checkbox" class="preview-allow" id="f-hamlet-all" ${allChecked?'checked':''}><span><b>Tất cả địa phương</b></span></label>
        <div class="sv-filter-divider"></div>
        ${hamlets.map(h=>`<label class="sv-filter-item"><input type="checkbox" class="f-hamlet-item preview-allow" data-name="${escapeHtml(h)}" ${sel.includes(h)?'checked':''}><span>${escapeHtml(h)}</span></label>`).join('')}
      </div>` : ''}
    </div>`;
  }
  function buildProjectFilterDropdownHtml(projects){
    ensureFilterProjectsInit(projects);
    const sel = state.filterProjectIds;
    const allChecked = projects.length>0 && sel.length===projects.length;
    const open = state.openFilterDropdown==='project';
    return `<div class="sv-filter-dropdown">
      <button class="btn btn-ghost btn-sm preview-allow" id="f-project-btn">${projectFilterLabel(projects)} ▾</button>
      ${open? `<div class="sv-filter-panel">
        <label class="sv-filter-item"><input type="checkbox" class="preview-allow" id="f-project-all" ${allChecked?'checked':''}><span><b>Tất cả phương án vay</b></span></label>
        <div class="sv-filter-divider"></div>
        ${projects.map(p=>`<label class="sv-filter-item"><input type="checkbox" class="f-project-item preview-allow" data-id="${p.id}" ${sel.includes(p.id)?'checked':''}><span>${escapeHtml(p.name)}</span></label>`).join('')}
      </div>` : ''}
    </div>`;
  }
  function buildQuarterFilterDropdownHtml(){
    ensureFilterQuartersInit();
    const sel = state.filterQuarters;
    const open = state.openFilterDropdown==='quarter';
    return `<div class="sv-filter-dropdown">
      <button class="btn btn-ghost btn-sm preview-allow" id="f-quarter-btn" title="Áp dụng cho cặp cột Tính lãi từ ngày / đến ngày">${escapeHtml(quarterFilterLabel())} ▾</button>
      ${open? `<div class="sv-filter-panel">
        ${QUARTER_FILTER_SEQUENCE.map(key=>{
          const checked = sel.includes(key);
          const isNormalQuarter = ['q1','q2','q3','q4'].includes(key);
          const feasible = isNormalQuarter ? true : quarterCheckboxFeasible(key);
          return `<label class="sv-filter-item ${feasible?'':'disabled'}"><input type="checkbox" class="f-quarter-item preview-allow" data-key="${key}" ${checked?'checked':''} ${feasible?'':'disabled'}><span>${QUARTER_FILTER_LABELS[key]}</span></label>`;
        }).join('')}
      </div>` : ''}
    </div>`;
  }
  function buildYearFilterDropdownHtml(){
    ensureFilterYearsInit();
    const sel = state.filterYears;
    const open = state.openFilterDropdown==='year';
    const cy = new Date().getFullYear();
    let itemsHtml = '';
    for(let y=cy-50; y<=cy+50; y++){
      const checked = sel.includes(y);
      itemsHtml += `<label class="sv-filter-item" ${checked?'data-selected-year="1"':''}><input type="checkbox" class="f-year-item preview-allow" data-year="${y}" ${checked?'checked':''}><span>${y}</span></label>`;
    }
    return `<div class="sv-filter-dropdown">
      <button class="btn btn-ghost btn-sm preview-allow" id="f-year-btn" title="Áp dụng cho cặp cột Tính lãi từ ngày / đến ngày">${escapeHtml(yearFilterLabel())} ▾</button>
      ${open? `<div class="sv-filter-panel" id="f-year-panel">${itemsHtml}</div>` : ''}
    </div>`;
  }

  function todayBasedQuarterKey(){
    const today = new Date(); today.setHours(0,0,0,0);
    for(const qk of ['q1','q2','q3','q4']){
      const r = resolveQuarterDates(qk);
      if(!r.from || !r.to) continue;
      const s = new Date(r.from+'T00:00:00'), e = new Date(r.to+'T00:00:00');
      if(today>=s && today<=e) return qk;
    }
    return 'q1';
  }
  function resolveQuarterDatesForYear(qKey, year){
    const q = (state.config && state.config.quarters && state.config.quarters[qKey]) || DEFAULT_QUARTERS[qKey];
    if(!q || q.startMonth==null || q.endMonth==null) return { from:'', to:'' };
    const pad = n=> String(n).padStart(2,'0');
    const startYear = (q.startMonth > q.endMonth) ? year-1 : year;
    return { from:`${startYear}-${pad(q.startMonth)}-${pad(q.startDay)}`, to:`${year}-${pad(q.endMonth)}-${pad(q.endDay)}` };
  }

  // =====================================================================
  // BỘ LỌC QUÝ — đa chọn nhưng CHỈ được liền kề nhau, theo đúng thứ tự cố định:
  // Quý 2(trước) → Quý 3(trước) → Quý 4(trước) → Quý 1 → Quý 2 → Quý 3 → Quý 4 → Quý 1(sau) →
  // Quý 2(sau) → Quý 3(sau).
  // Mặc định ban đầu: đúng 1 Quý hiện tại (theo hôm nay), CHƯA ở "chế độ nâng cao".
  //   • Nếu Quý hiện tại là Quý 1 và người dùng bấm thêm "Quý 4 (năm trước)" — ĐẶC BIỆT: Quý 1
  //     KHÔNG bị mất tích chọn, kết quả là {Quý 4(trước), Quý 1} cùng được chọn.
  //   • Tương tự nếu Quý hiện tại là Quý 4 và bấm thêm "Quý 1 (năm sau)" — giữ nguyên Quý 4, kết
  //     quả {Quý 4, Quý 1(sau)}.
  //   • Mọi trường hợp khác: bấm 1 Quý thường khác sẽ THAY THẾ hẳn mốc mặc định (mốc cũ mất tích
  //     chọn) và bật "chế độ nâng cao" — từ đó mọi thao tác thêm/bớt đều phải giữ đúng liền kề.
  // =====================================================================
  const QUARTER_FILTER_SEQUENCE = ['q2prev','q3prev','q4prev','q1','q2','q3','q4','q1next','q2next','q3next'];
  const QUARTER_FILTER_LABELS = {
    q2prev:'Quý 2 (năm trước)', q3prev:'Quý 3 (năm trước)', q4prev:'Quý 4 (năm trước)',
    q1:'Quý 1', q2:'Quý 2', q3:'Quý 3', q4:'Quý 4',
    q1next:'Quý 1 (năm sau)', q2next:'Quý 2 (năm sau)', q3next:'Quý 3 (năm sau)',
  };
  const QUARTER_FILTER_SPECIAL_KEYS = ['q2prev','q3prev','q4prev','q1next','q2next','q3next'];
  function quarterSeqIndex(key){ return QUARTER_FILTER_SEQUENCE.indexOf(key); }
  function isContiguousIdxList(indices){
    const sorted = indices.slice().sort((a,b)=>a-b);
    for(let i=1;i<sorted.length;i++) if(sorted[i]!==sorted[i-1]+1) return false;
    return true;
  }
  function ensureFilterQuartersInit(){
    if(!state.filterQuarters){ state.filterQuarters = [todayBasedQuarterKey()]; state.filterQuartersAdvanced = false; }
  }
  function quarterFilterLabel(){
    ensureFilterQuartersInit();
    const sel = state.filterQuarters;
    if(sel.length===1) return QUARTER_FILTER_LABELS[sel[0]];
    return `${sel.length}-quý`;
  }
  function quarterCheckboxFeasible(key){
    ensureFilterQuartersInit();
    const sel = state.filterQuarters;
    if(sel.includes(key)) return true;
    if(!state.filterQuartersAdvanced && sel.length===1){
      const current = sel[0];
      if((current==='q1' && key==='q4prev') || (current==='q4' && key==='q1next')) return true;
      return !QUARTER_FILTER_SPECIAL_KEYS.includes(key);
    }
    const idxs = sel.map(quarterSeqIndex);
    const minI = Math.min(...idxs), maxI = Math.max(...idxs);
    const keyIdx = quarterSeqIndex(key);
    // Yêu cầu mới: cho phép TẤT CẢ 10 lựa chọn (kể cả trộn "năm trước" và "năm sau") cùng chung 1
    // bộ lọc, miễn là vẫn liền kề nhau và đã có ít nhất 1 Quý thường (Q1-4) làm nền trước đó.
    return keyIdx===minI-1 || keyIdx===maxI+1;
  }
  function toggleQuarterFilter(key, checked){
    ensureFilterQuartersInit();
    const sel = state.filterQuarters;
    if(!state.filterQuartersAdvanced && sel.length===1){
      const current = sel[0];
      if(checked){
        // Trường hợp đặc biệt: Quý 1 + Quý 4(trước) hoặc Quý 4 + Quý 1(sau) -> GIỮ NGUYÊN mốc mặc định
        if(current==='q1' && key==='q4prev'){ state.filterQuarters = ['q4prev','q1']; state.filterQuartersAdvanced = true; return true; }
        if(current==='q4' && key==='q1next'){ state.filterQuarters = ['q4','q1next']; state.filterQuartersAdvanced = true; return true; }
        if(QUARTER_FILTER_SPECIAL_KEYS.includes(key)){
          alert('Vui lòng chọn các Quý liền kề (Quý 1, 2, 3, 4) trước khi chọn Quý đặc biệt (năm trước)/(năm sau).');
          return false;
        }
        if(key===current) return false;
        // Mọi Quý thường khác -> THAY THẾ hẳn mốc mặc định
        state.filterQuarters = [key];
        state.filterQuartersAdvanced = true;
        return true;
      }
      return false; // không cho bỏ chọn mốc mặc định duy nhất
    }
    if(checked){
      if(sel.includes(key)) return false;
      const isNormalQuarter = ['q1','q2','q3','q4'].includes(key);
      const newSel = sel.concat([key]);
      if(!isContiguousIdxList(newSel.map(quarterSeqIndex))){
        if(isNormalQuarter){
          // Yêu cầu mới: 4 Quý thường LUÔN cho chọn được — nếu vi phạm liền kề thì reset lại, chỉ
          // còn giữ đúng Quý vừa bấm (các tích chọn khác biến mất), quay về như mốc mặc định mới.
          state.filterQuarters = [key];
          state.filterQuartersAdvanced = false;
          return true;
        }
        alert('Chỉ được chọn các Quý LIỀN KỀ nhau. Vui lòng chọn đúng thứ tự liên tiếp.');
        return false;
      }
      state.filterQuarters = newSel.sort((a,b)=>quarterSeqIndex(a)-quarterSeqIndex(b));
      return true;
    } else {
      if(sel.length<=1) return false;
      // Yêu cầu mới: bỏ chọn 1 Quý bất kỳ -> tự động bỏ chọn LUÔN tất cả các Quý ở TƯƠNG LAI của nó
      // (index lớn hơn trong chuỗi thứ tự cố định) — không cần báo lỗi "liền kề" nữa.
      const keyIdx = quarterSeqIndex(key);
      let newSel = sel.filter(k=> quarterSeqIndex(k) < keyIdx);
      const hasNormal = newSel.some(k=>['q1','q2','q3','q4'].includes(k));
      if(!hasNormal) newSel = []; // còn lại toàn Quý đặc biệt (không được đứng 1 mình) -> dọn sạch
      if(!newSel.length){
        state.filterQuarters = [todayBasedQuarterKey()];
        state.filterQuartersAdvanced = false;
        return true;
      }
      state.filterQuarters = newSel;
      return true;
    }
  }

  // =====================================================================
  // BỘ LỌC NĂM — đa chọn nhưng CHỈ được liền kề nhau, tối đa 25 năm liên tiếp, KHÔNG có "chọn tất
  // cả". Cùng cơ chế mặc định/nâng cao như bộ lọc Quý ở trên.
  // =====================================================================
  const YEAR_FILTER_MAX_SPAN = 25;
  function ensureFilterYearsInit(){
    if(!state.filterYears){ state.filterYears = [new Date().getFullYear()]; state.filterYearsAdvanced = false; }
  }
  function yearFilterLabel(){
    ensureFilterYearsInit();
    const sel = state.filterYears;
    if(sel.length===1) return `Năm ${sel[0]}`;
    return `${sel.length}-năm`;
  }
  function yearCheckboxFeasible(year){
    ensureFilterYearsInit();
    const sel = state.filterYears;
    if(sel.includes(year)) return true;
    if(!state.filterYearsAdvanced && sel.length===1) return true;
    const minY = sel[0], maxY = sel[sel.length-1];
    if(year===minY-1 || year===maxY+1) return sel.length+1 <= YEAR_FILTER_MAX_SPAN;
    return false;
  }
  // Khôi phục CẢ 4 bộ lọc (Ấp/Phương án vay/Quý/Năm) về đúng trạng thái mặc định ban đầu.
  function resetAllBorrowerFilters(hamlets, projects){
    state.filterHamlets = hamlets.slice();
    state.filterProjectIds = projects.map(p=>p.id);
    state.filterQuarters = [todayBasedQuarterKey()];
    state.filterQuartersAdvanced = false;
    state.filterYears = [new Date().getFullYear()];
    state.filterYearsAdvanced = false;
    state.openFilterDropdown = null;
  }
  function toggleYearFilter(year, checked){
    ensureFilterYearsInit();
    const sel = state.filterYears;
    if(!state.filterYearsAdvanced && sel.length===1){
      if(checked){
        if(year===sel[0]) return false;
        state.filterYears = [year];
        state.filterYearsAdvanced = true;
        return true;
      }
      return false;
    }
    if(checked){
      if(sel.includes(year)) return false;
      const newSel = sel.concat([year]).sort((a,b)=>a-b);
      const contiguousOk = newSel[newSel.length-1]-newSel[0]+1 === newSel.length;
      const withinMax = newSel.length <= YEAR_FILTER_MAX_SPAN;
      if(!contiguousOk || !withinMax){
        // Yêu cầu mới: Năm LUÔN cho chọn được — nếu vi phạm liền kề (hoặc vượt tối đa) thì reset
        // lại, chỉ còn giữ đúng Năm vừa bấm (các tích chọn khác biến mất).
        state.filterYears = [year];
        state.filterYearsAdvanced = true;
        return true;
      }
      state.filterYears = newSel;
      return true;
    } else {
      if(sel.length<=1) return false;
      // Yêu cầu mới: bỏ chọn 1 Năm bất kỳ -> tự động bỏ chọn LUÔN tất cả các Năm ở TƯƠNG LAI của nó
      // (các năm lớn hơn) — không cần báo lỗi "liền kề" nữa.
      const newSel = sel.filter(y=> y < year);
      if(!newSel.length){
        state.filterYears = [new Date().getFullYear()];
        state.filterYearsAdvanced = false;
        return true;
      }
      state.filterYears = newSel;
      return true;
    }
  }

  // Ghép bộ lọc Quý + Năm lại thành 1 khoảng ngày LIÊN TỤC duy nhất — Quý đầu tiên (theo thứ tự
  // liền kề) neo vào Năm nhỏ nhất, Quý cuối cùng neo vào Năm lớn nhất; các Quý đặc biệt tự lùi 1
  // năm (nhóm "...prev") hoặc tiến 1 năm (nhóm "...next") so với năm neo.
  function selectedQuarterYearRange(){
    ensureFilterQuartersInit(); ensureFilterYearsInit();
    const selQ = state.filterQuarters.slice().sort((a,b)=>quarterSeqIndex(a)-quarterSeqIndex(b));
    const selY = state.filterYears.slice().sort((a,b)=>a-b);
    const firstQ = selQ[0], lastQ = selQ[selQ.length-1];
    const minY = selY[0], maxY = selY[selY.length-1];
    const realQuarterInfo = (qKey, baseYear)=>{
      if(qKey.endsWith('prev')) return { qk: qKey.replace('prev',''), year: baseYear-1 };
      if(qKey.endsWith('next')) return { qk: qKey.replace('next',''), year: baseYear+1 };
      return { qk:qKey, year: baseYear };
    };
    const startInfo = realQuarterInfo(firstQ, minY);
    const endInfo = realQuarterInfo(lastQ, maxY);
    const startRange = resolveQuarterDatesForYear(startInfo.qk, startInfo.year);
    const endRange = resolveQuarterDatesForYear(endInfo.qk, endInfo.year);
    return { from: startRange.from, to: endRange.to };
  }
  // Yêu cầu mới: cặp cột "Tính lãi từ ngày"/"đến ngày" LUÔN hiển thị đúng Quý HIỆN TẠI THẬT (theo
  // hôm nay) — KHÔNG còn bị ảnh hưởng bởi bộ lọc Quý/Năm nữa (bộ lọc giờ chỉ dùng để ẩn/hiện theo
  // khoảng Ngày vay -> Ngày đến hạn, xem selectedQuarterYearRangeForFilter()).
  // Tổng số ngày của TRỌN 1 chu kỳ năm (Quý 1.Bắt đầu -> Quý 4.Kết thúc) của NĂM cụ thể — dùng
  // chung cho mọi công thức tính lãi (365 ngày năm thường, 366 ngày năm nhuận).
  function annualCycleDaysForYear(Y){
    const cfgQ = (state.config && state.config.quarters) || DEFAULT_QUARTERS;
    const q1 = cfgQ.q1 || DEFAULT_QUARTERS.q1, q4 = cfgQ.q4 || DEFAULT_QUARTERS.q4;
    const pad = n=> String(n).padStart(2,'0');
    // QUAN TRỌNG: Quý 1.Bắt đầu LUÔN đúng bằng Quý 4.Kết thúc (do cơ chế đồng bộ mốc liền kề) — nên
    // so sánh CHỈ bằng "tháng bắt đầu > tháng kết thúc" bị sai khi 2 tháng đó TRÙNG NHAU (ví dụ mặc
    // định đều là tháng 12) mà không xét thêm ngày, khiến hệ thống hiểu nhầm là "không vắt năm" và
    // tính ra tổng chu kỳ chỉ 0-1 ngày thay vì 365/366. Phải so sánh đủ cả tháng LẪN ngày.
    const q1AfterQ4 = (q1.startMonth > q4.endMonth) || (q1.startMonth===q4.endMonth && q1.startDay >= q4.endDay);
    const cycleStartYear = q1AfterQ4 ? Y-1 : Y;
    const start = new Date(`${cycleStartYear}-${pad(q1.startMonth)}-${pad(q1.startDay)}T00:00:00`);
    const end = new Date(`${Y}-${pad(q4.endMonth)}-${pad(q4.endDay)}T00:00:00`);
    return Math.max(1, Math.round((end-start)/86400000));
  }
  // Ngày kết thúc chu kỳ năm Y (= Quý 4 kết thúc năm Y) — dùng làm ranh giới để TÁCH ĐOẠN khi 1
  // khoảng thời gian (vd 1 đợt gia hạn) vắt qua nhiều năm dương lịch khác nhau.
  function annualCycleBoundaryDateForYear(Y){
    const cfgQ = (state.config && state.config.quarters) || DEFAULT_QUARTERS;
    const q4 = cfgQ.q4 || DEFAULT_QUARTERS.q4;
    const pad = n=> String(n).padStart(2,'0');
    return new Date(`${Y}-${pad(q4.endMonth)}-${pad(q4.endDay)}T00:00:00`);
  }
  function currentQuarterRange(){
    const qk = todayBasedQuarterKey();
    const r = resolveQuarterDatesForYear(qk, new Date().getFullYear());
    return { qk, from:r.from, to:r.to };
  }
  // Tổng số ngày của TRỌN 1 chu kỳ năm (Quý 1.Bắt đầu -> Quý 4.Kết thúc) của NĂM HIỆN TẠI THẬT.
  function currentAnnualCycleDays(){ return annualCycleDaysForYear(new Date().getFullYear()); }
  // Tính tiền lãi cho 1 khoảng ngày [from,to] BẤT KỲ theo đúng công thức chuẩn: Gốc × (Lãi suất ÷
  // tổng ngày chu kỳ năm) × số ngày — nhưng nếu khoảng đó VẮT QUA NHIỀU NĂM DƯƠNG LỊCH khác nhau
  // (có năm nhuận có năm không), sẽ tự động TÁCH ĐOẠN tại từng ranh giới năm rồi cộng dồn riêng
  // từng đoạn theo đúng tổng số ngày của NĂM đó — đảm bảo không lấy sai 365/366 khi vắt năm.
  function computeInterestAmountAcrossYears(principal, ratePct, fromStr, toStr){
    if(!fromStr || !toStr || !ratePct) return 0;
    const from = new Date(fromStr+'T00:00:00'), to = new Date(toStr+'T00:00:00');
    if(isNaN(from.getTime()) || isNaN(to.getTime()) || to<=from) return 0;
    let amount = 0, segStart = from, guard = 0;
    while(segStart < to && guard++ < 50){
      let boundary = annualCycleBoundaryDateForYear(segStart.getFullYear());
      if(boundary <= segStart) boundary = annualCycleBoundaryDateForYear(segStart.getFullYear()+1);
      const segEnd = boundary < to ? boundary : to;
      const days = Math.round((segEnd - segStart)/86400000);
      const cycleDays = annualCycleDaysForYear(boundary.getFullYear());
      amount += principal * ((ratePct||0)/100/cycleDays) * days;
      segStart = segEnd;
    }
    return Math.round(amount);
  }
  // Danh sách "hộp chứa" của 1 người vay ĐANG THOẢ MÃN bộ lọc Quý/Năm hiện hành — tức là hộp đó có
  // GIAO THẬT SỰ với khoảng ngày bộ lọc đang chọn (chạm đúng 1 điểm KHÔNG tính là giao nhau, giống
  // hệt quy ước "không trùng" đã dùng khi validate mốc 4 Quý).
  function borrowerMatchingQuarterBoxes(b){
    const range = selectedQuarterYearRange();
    if(!range.from || !range.to) return [];
    const rFrom = new Date(range.from+'T00:00:00'), rTo = new Date(range.to+'T00:00:00');
    return borrowerQuarterBoxes(b).filter(box=>{
      const bf = new Date(box.from+'T00:00:00'), bt = new Date(box.to+'T00:00:00');
      return bf < rTo && bt > rFrom;
    });
  }
  // Yêu cầu mới: bộ lọc Quý/Năm ẩn/hiện Phương án vay (kèm người vay bên trong) dựa theo "hệ thống
  // hộp chứa Quý" — người vay chỉ hiển thị nếu có ÍT NHẤT 1 hộp chứa (trong hạn hoặc bất kỳ lần gia
  // hạn nào) giao thật sự với khoảng bộ lọc đang chọn.
  function borrowerLoanRangeMatchesFilter(b){
    if(!b.loanDate || !b.dueDate) return true;
    return borrowerMatchingQuarterBoxes(b).length > 0;
  }
  // Yêu cầu mới: cặp cột "Tính lãi từ ngày"/"đến ngày" giờ lấy NGÀY SỚM NHẤT trong số các hộp chứa
  // đang khớp bộ lọc làm "Tính lãi từ ngày", và NGÀY MUỘN NHẤT làm "đến ngày" (so sánh chuỗi ISO
  // yyyy-mm-dd là đủ chính xác vì đúng thứ tự thời gian).
  function borrowerCurrentQuarterRange(b){
    const boxes = borrowerMatchingQuarterBoxes(b);
    if(!boxes.length) return { from:'', to:'' };
    let minFrom = boxes[0].from, maxTo = boxes[0].to;
    boxes.forEach(bx=>{ if(bx.from<minFrom) minFrom=bx.from; if(bx.to>maxTo) maxTo=bx.to; });
    return { from:minFrom, to:maxTo };
  }
  function borrowerCurrentQuarterDays(b){
    const { from, to } = borrowerCurrentQuarterRange(b);
    if(!from || !to) return 0;
    return Math.max(0, daysBetween(from, to));
  }
  // Tổng số ngày của các hộp chứa ĐANG KHỚP BỘ LỌC mà thuộc đúng 1 cấp cụ thể — level=0 là "trong
  // hạn" (extLevel gốc), level=1..5 là "gia hạn lần N". Không có hộp nào khớp -> trả về 0.
  function matchingBoxesDaysForLevel(b, level){
    return borrowerMatchingQuarterBoxes(b).filter(bx=>bx.extLevel===level).reduce((s,bx)=>s+bx.days, 0);
  }
  // Số tiền lãi (của đúng 1 cấp: trong hạn hoặc gia hạn lần N) — cộng dồn TỪNG HỘP CHỨA khớp bộ lọc
  // riêng lẻ (mỗi hộp dùng đúng tổng số ngày trong NĂM mà nó thuộc về — annualCycleDaysForYear(box.year)
  // — nên tự động đúng năm nhuận/không nhuận dù các hộp nằm ở nhiều năm khác nhau).
  function matchingBoxesInterestAmountForLevel(b, level, ratePct){
    const principal = parseFloat(b.principal)||0;
    const amount = borrowerMatchingQuarterBoxes(b).filter(bx=>bx.extLevel===level).reduce((sum,bx)=>{
      const cycleDays = annualCycleDaysForYear(bx.year);
      return sum + principal * ((ratePct||0)/100/cycleDays) * bx.days;
    }, 0);
    return Math.round(amount);
  }

  // =====================================================================
  // DỮ LIỆU GIA HẠN NỢ — lưu tại secretdata/{secretId}/loanExtensions/{borrowerId} = mảng các lần
  // gia hạn theo đúng thứ tự (Lần 1 = phần tử 0, Lần 2 = phần tử 1,...). Mỗi lần gồm:
  // { from, to, rateType:'zero'|'current'|'custom', ratePct, allocMode:'wardOnly'|'wardHamlet'|'allTiers',
  //   hamletAllocPercent, splitCentral, splitProvince, splitWard, savedAt, savedBy }
  // =====================================================================
  function getBorrowerExtensions(borrowerId){ return (state.loanExtensions && state.loanExtensions[borrowerId]) || []; }
  function latestBorrowerExtension(borrowerId){ const arr = getBorrowerExtensions(borrowerId); return arr.length? arr[arr.length-1] : null; }
  // Chuỗi đoạn thời gian LIÊN TIẾP của 1 người vay: đoạn gốc (extLevel 0) rồi tới từng lần gia hạn
  // (extLevel 1,2,3... = số dấu #). Đoạn sau LUÔN bắt đầu đúng ngày đoạn trước kết thúc.
  function borrowerTimelineSegments(b){
    const segs = [{ from:b.loanDate, to:b.dueDate, extLevel:0 }];
    getBorrowerExtensions(b.id).forEach((e,i)=> segs.push({ from:e.from, to:e.to, extLevel:i+1 }));
    return segs;
  }

  // =====================================================================
  // "HỆ THỐNG CỘT CHO LẦN GIA HẠN LẦN 1" đến "LẦN 5" — lưu trữ & tính toán ĐẦY ĐỦ tương đương các
  // cột lãi suất/phân bổ đang hiển thị công khai, nhưng cho TỪNG lần gia hạn riêng biệt, và KHÔNG
  // hiển thị ra bất kỳ bảng/khung tuỳ chỉnh cột nào (chờ quyết định cách hiển thị ở lượt sau). Toàn
  // bộ thông tin người dùng thiết lập trong modal "GIA HẠN" đều được đổ đủ vào đây khi lưu, không
  // sót trường nào: Lãi suất (%/năm), lãi tính từ ngày/đến ngày, Phân bổ+Số tiền Trung ương/Tỉnh/
  // Xã, % Xã phân bổ Ấp + Số tiền về Ấp.
  // =====================================================================
  const MAX_LOAN_EXTENSIONS = 5;

  // hoạt động" ở tab Cài đặt & Chia sẻ. Mỗi khi về sau có thêm/bớt cột ẩn ở bất kỳ hệ thống nào
  // (trong hạn, gia hạn lần N, hoặc cột ẩn độc lập), CHỈ CẦN sửa đúng danh sách trong hàm này —
  // trang Cài đặt sẽ tự động hiện đúng, không cần sửa gì thêm ở nơi khác.
  // =====================================================================
  function hiddenColumnSystemsDocs(){
    const systems = [
      {
        title: 'Cấu trúc dữ liệu nền tảng (không phải cột, nhưng là gốc rễ của toàn bộ hệ thống cột ẩn bên dưới)',
        columns: [
          { name:'Các Hộp chứa Quý (borrowerQuarterBoxes)', desc:'Mỗi người vay có 1 chuỗi "hộp chứa Quý" — mỗi hộp là 1 Quý (hoặc 1 mảnh Quý bị cắt bởi ranh giới vay gốc/gia hạn) mà người vay có nghĩa vụ đóng lãi, gồm: tên hộp (vd "Quý 3#* -2026"), ngày bắt đầu/kết thúc, tổng số ngày, lãi suất áp dụng, số tiền lãi của riêng hộp đó. Tính lại HOÀN TOÀN mỗi lần gọi (không lưu trữ cứng) dựa trên Ngày vay + Ngày đến hạn + toàn bộ lịch sử gia hạn + mốc 4 Quý hiện hành — nên luôn tự động đúng theo mọi thay đổi. Là nền tảng của "Tất cả quý của món vay", "Quý chưa/đã đóng lãi", và mọi công thức số ngày/số tiền ở các hệ thống cột ẩn bên dưới.' },

          { name:'Số ngày tính lãi (trong hạn)', desc:'Tổng số ngày của các "hộp chứa Quý" thuộc đoạn vay gốc (extLevel=0) đang KHỚP với bộ lọc Quý/Năm hiện hành (khớp = có giao thật sự, chạm 1 điểm không tính).' },

          { name:'Phân bổ Trung ương/Tỉnh/Xã (%) (trong hạn)', desc:'Lấy y hệt 3 cột phân bổ %/năm công khai (b.splitCentral / b.splitProvince / b.splitWard) — luôn cộng lại đúng bằng Lãi suất (trong hạn).' },
          { name:'Số tiền về Trung ương/Tỉnh/Xã (đ) (trong hạn)', desc:'Công thức y hệt "Số tiền lãi (trong hạn)" nhưng thay Lãi suất bằng đúng tỷ lệ % của cấp đó.' },
          { name:'% Xã phân bổ về Ấp (trong hạn)', desc:'Lấy y hệt cột "% Xã phân bổ về Ấp" công khai (b.hamletAllocPercent).' },
          { name:'Số tiền về Ấp (đ) (trong hạn)', desc:'= Số tiền về Cấp Xã (trong hạn) × % Xã phân bổ về Ấp (trong hạn).' },

    for(let lvl=1; lvl<=MAX_LOAN_EXTENSIONS; lvl++){
      systems.push({
        title: `Hệ thống cột "Gia hạn lần ${lvl}"`,
        columns: [
          { name:`Ngày bắt đầu gia hạn (gia hạn lần ${lvl})`, desc:`"Gia hạn từ ngày" đã lưu khi phê duyệt Lần ${lvl} (= ngày kết thúc của đợt liền trước đó). Để trống nếu người vay chưa từng gia hạn tới lần ${lvl}.` },
          { name:`Ngày kết thúc gia hạn (gia hạn lần ${lvl})`, desc:`"Gia hạn đến ngày" đã lưu khi phê duyệt Lần ${lvl}. Để trống nếu chưa có.` },
          { name:`Lãi suất (%/năm) (gia hạn lần ${lvl})`, desc:`Mức lãi suất quá hạn đã chọn khi phê duyệt Lần ${lvl} (0%, mức lãi suất trong hạn hiện tại, hoặc lãi suất khác tự nhập). Mặc định là số 0 nếu chưa gia hạn tới lần này.` },
          { name:`Số ngày tính lãi (gia hạn lần ${lvl})`, desc:`Tổng số ngày của các "hộp chứa Quý" mang đúng ${lvl} dấu "#" đang khớp bộ lọc Quý/Năm hiện hành.` },
          { name:`Số tiền lãi (gia hạn lần ${lvl})`, desc:`Cộng dồn qua từng hộp chứa khớp bộ lọc: Gốc × Lãi suất (lần ${lvl}) ÷ Tổng số ngày trong năm của từng hộp × Số ngày của hộp đó.` },
          { name:`Phân bổ Trung ương/Tỉnh/Xã (%) (gia hạn lần ${lvl})`, desc:`Là THÀNH PHẦN lãi suất (không phải tỷ lệ chia trên 100%): nếu chọn "100% về Xã" hoặc "Xã + Ấp" thì Xã = TRỌN lãi suất Lần ${lvl}, Trung ương/Tỉnh = 0; nếu chọn "Tất cả các cấp" thì lấy đúng 3 số người dùng đã nhập (luôn cộng lại = Lãi suất Lần ${lvl}).` },
          { name:`Số tiền về Trung ương/Tỉnh/Xã (đ) (gia hạn lần ${lvl})`, desc:`Công thức y hệt "Số tiền lãi (lần ${lvl})" nhưng thay Lãi suất bằng đúng tỷ lệ % của cấp đó.` },
          { name:`% Xã phân bổ về Ấp (gia hạn lần ${lvl})`, desc:`Tỷ lệ % đã chọn khi phê duyệt Lần ${lvl} (áp dụng khi chọn phương án "Xã + Ấp" hoặc "Tất cả các cấp").` },
          { name:`Số tiền về Ấp (đ) (gia hạn lần ${lvl})`, desc:`= Số tiền về Cấp Xã (lần ${lvl}) × % Xã phân bổ về Ấp (lần ${lvl}).` },

    return systems;

  // đặt. Nếu lần gia hạn N CHƯA tồn tại (chưa được phê duyệt) thì: các trường NGÀY trả về rỗng,
  // còn TẤT CẢ các trường số (lãi suất/tỷ lệ %/số tiền) LUÔN mặc định là số 0 tròn trĩnh.
  // Yêu cầu mới: "Số ngày tính lãi (lần N)" và mọi cột SỐ TIỀN của lần N giờ được tính dựa trên
  // TỔNG các "hộp chứa Quý" (thuộc đúng lần gia hạn N) đang KHỚP với bộ lọc Quý/Năm hiện hành —
  // không còn dùng nguyên khối [from,to] của cả đợt gia hạn nữa.
  function getExtensionLevelColumnValue(b, level, field){
    const e = getBorrowerExtensions(b.id)[level-1];
    switch(field){
      // Ngày / tỷ lệ % / lãi suất: đây là DỮ LIỆU NHẬP, chưa có lần gia hạn N thì mặc định thẳng
      // rỗng (ngày) hoặc số 0 (tỷ lệ %, lãi suất) — không có gì để tính.
      case 'extendFrom': return e ? (e.from||'') : ''; // "Ngày bắt đầu gia hạn" — lấy đúng giá trị "Gia hạn từ ngày" đã lưu
      case 'extendTo': return e ? (e.to||'') : '';     // "Ngày kết thúc gia hạn" — lấy đúng giá trị "Gia hạn đến ngày" đã lưu
      case 'rate': return e ? (e.ratePct||0) : 0;
      // LƯU Ý QUAN TRỌNG: các trường "phân bổ ... (%)" là THÀNH PHẦN LÃI SUẤT (%/năm), y hệt bản
      // chất cột "Phân bổ Cấp ... (%)" đang hiển thị công khai (splitCentral+splitProvince+splitWard
      // luôn = Lãi suất chung) — KHÔNG PHẢI tỷ lệ chia trên tổng 100%.
      //   • wardOnly/wardHamlet: Trung ương=0, Tỉnh=0, Xã = TRỌN lãi suất gia hạn (vì 100% lãi đổ về Xã).
      //   • allTiers: lấy ĐÚNG 3 con số người dùng đã nhập (tự đảm bảo cộng lại = lãi suất gia hạn).
      case 'splitCentralPct': return e ? (e.allocMode==='allTiers' ? (e.splitCentral||0) : 0) : 0;
      case 'splitProvincePct': return e ? (e.allocMode==='allTiers' ? (e.splitProvince||0) : 0) : 0;
      case 'splitWardPct': return e ? (e.allocMode==='allTiers' ? (e.splitWard||0) : ((e.allocMode==='wardOnly'||e.allocMode==='wardHamlet') ? (e.ratePct||0) : 0)) : 0;
      case 'hamletAllocPct': return e ? (e.hamletAllocPercent||0) : 0;
      // Số ngày tính lãi / Số tiền lãi / Số tiền phân bổ 4 cấp: KẾT QUẢ CÔNG THỨC, dựa trên tổng
      // các hộp chứa (thuộc đúng lần gia hạn N) đang khớp bộ lọc Quý/Năm — tự ra đúng 0 khi không
      // có hộp chứa nào khớp (kể cả khi chưa có lần gia hạn N).
      case 'interestDays': return matchingBoxesDaysForLevel(b, level);
      case 'interestAmount': return e ? matchingBoxesInterestAmountForLevel(b, level, e.ratePct||0) : 0;
      case 'splitCentralAmt': return e ? matchingBoxesInterestAmountForLevel(b, level, getExtensionLevelColumnValue(b, level, 'splitCentralPct')) : 0;
      case 'splitProvinceAmt': return e ? matchingBoxesInterestAmountForLevel(b, level, getExtensionLevelColumnValue(b, level, 'splitProvincePct')) : 0;
      case 'splitWardAmt': return e ? matchingBoxesInterestAmountForLevel(b, level, getExtensionLevelColumnValue(b, level, 'splitWardPct')) : 0;
      case 'hamletAllocAmt': {
        if(!e) return 0;
        const wardAmt = getExtensionLevelColumnValue(b, level, 'splitWardAmt');
        return Math.round(wardAmt * ((e.hamletAllocPercent||0)/100));
      }
      default: return 0;
    }
  }

  // =====================================================================
  // "HỆ THỐNG CỘT TRONG HẠN" — song song với "hệ thống cột cho lần gia hạn" ở trên, nhưng đại diện
  // cho ĐÚNG khoảng vay gốc (chưa gia hạn lần nào, extLevel=0). KHÔNG hiển thị ra bất kỳ bảng/khung
  // tuỳ chỉnh cột nào (ẩn hoàn toàn, chỉ tồn tại nội bộ — lý do sẽ được giải thích sau).
  // Yêu cầu mới: "Số ngày tính lãi (trong hạn)" và các cột SỐ TIỀN đều dựa trên TỔNG các "hộp chứa
  // Quý" (extLevel=0) đang KHỚP với bộ lọc Quý/Năm hiện hành.
  // =====================================================================
  function getInTermColumnValue(b, field){
    switch(field){
      case 'rate': return parseFloat(b.rate)||0;
      case 'interestDays': return matchingBoxesDaysForLevel(b, 0);
      case 'interestAmount': return matchingBoxesInterestAmountForLevel(b, 0, parseFloat(b.rate)||0);
      case 'splitCentralPct': return parseFloat(b.splitCentral)||0;
      case 'splitCentralAmt': return matchingBoxesInterestAmountForLevel(b, 0, parseFloat(b.splitCentral)||0);
      case 'splitProvincePct': return parseFloat(b.splitProvince)||0;
      case 'splitProvinceAmt': return matchingBoxesInterestAmountForLevel(b, 0, parseFloat(b.splitProvince)||0);
      case 'splitWardPct': return parseFloat(b.splitWard)||0;
      case 'splitWardAmt': return matchingBoxesInterestAmountForLevel(b, 0, parseFloat(b.splitWard)||0);
      case 'hamletAllocPct': return parseFloat(b.hamletAllocPercent)||0;
      case 'hamletAllocAmt': {
        const wardAmt = matchingBoxesInterestAmountForLevel(b, 0, parseFloat(b.splitWard)||0);
        return Math.round(wardAmt * ((parseFloat(b.hamletAllocPercent)||0)/100));
      }
      default: return 0;
    }
  }

  function findQuarterContaining(dateStr){
    if(!dateStr) return null;
    const d = new Date(dateStr+'T00:00:00');
    if(isNaN(d.getTime())) return null;
    const y = d.getFullYear();
    for(const testYear of [y-1, y, y+1]){
      for(const qk of ['q1','q2','q3','q4']){
        const r = resolveQuarterDatesForYear(qk, testYear);
        if(!r.from || !r.to) continue;
        const s = new Date(r.from+'T00:00:00'), e = new Date(r.to+'T00:00:00');
        if(d>=s && d<=e) return { qk, year:testYear };
      }
    }
    return null;
  }
  function nextQuarterCycle(qk, year){
    const order = ['q1','q2','q3','q4'];
    const idx = order.indexOf(qk);
    return idx===3 ? { qk:'q1', year:year+1 } : { qk:order[idx+1], year };
  }
  // Toàn bộ chuỗi Quý (kèm cờ "short": bị cắt ngắn do đầu/cuối đoạn; "extLevel": số dấu # = số lần
  // gia hạn, 0 = đoạn vay gốc) — đi qua LẦN LƯỢT từng đoạn (gốc rồi tới từng lần gia hạn theo thứ
  // tự), dừng lại khi đoạn kế tiếp còn nằm trong tương lai (chưa tới hôm nay).
  // =====================================================================
  // "HỆ THỐNG CÁC HỘP CHỨA THÔNG TIN TỪNG QUÝ CỦA TỪNG NGƯỜI VAY" — mỗi "hộp chứa" đại diện đúng 1
  // Quý (hoặc 1 mảnh Quý bị chia đôi bởi ranh giới giữa vay gốc/gia hạn) mà người vay này có nghĩa
  // vụ đóng lãi, gồm: tên hộp (vd "Quý 3#* -2026"), ngày bắt đầu, ngày kết thúc, tổng số ngày.
  // Tính TOÀN BỘ theo đúng cấu trúc vay gốc + tất cả các lần gia hạn ĐÃ LƯU — KHÔNG bị giới hạn bởi
  // "hôm nay" (kể cả hộp chứa của tương lai, nếu đã có lần gia hạn kéo dài tới đó, vẫn được tính đủ).
  // LUÔN tính động theo đúng cấu hình 4 Quý hiện hành (state.config.quarters) — hễ Chủ mã bấm
  // "Chỉnh thời gian tính lãi suất hàng quý" và đổi mốc, mọi hộp chứa của MỌI người vay sẽ tự động
  // đổi tên/đổi ranh giới theo ngay lập tức (vì được tính lại mỗi lần gọi, không lưu trữ cứng).
  // =====================================================================
  function borrowerQuarterBoxes(b){
    if(!b.loanDate || !b.dueDate) return [];
    const principal = parseFloat(b.principal)||0;
    const segments = borrowerTimelineSegments(b);
    const boxes = [];
    for(const seg of segments){
      if(!seg.from || !seg.to) continue; // đoạn gia hạn chưa lưu đủ ngày (không nên xảy ra) -> bỏ qua
      const segFrom = new Date(seg.from+'T00:00:00'), segTo = new Date(seg.to+'T00:00:00');
      if(isNaN(segFrom.getTime()) || isNaN(segTo.getTime()) || segTo<=segFrom) continue;
      const startInfo = findQuarterContaining(seg.from);
      const endInfo = findQuarterContaining(seg.to);
      if(!startInfo) continue;
      const realEndInfo = endInfo || startInfo;
      let cur = { qk:startInfo.qk, year:startInfo.year };
      let guard = 0;
      // Lãi suất (%/năm) áp dụng cho TOÀN BỘ hộp chứa thuộc đoạn này — lấy y hệt cột ẩn "Lãi suất
      // (%/năm) (trong hạn)" nếu extLevel=0, hoặc "...(gia hạn lần N)" tương ứng nếu extLevel>0.
      const segRatePct = seg.extLevel===0 ? getInTermColumnValue(b,'rate') : getExtensionLevelColumnValue(b, seg.extLevel, 'rate');
      while(guard++ < 400){
        const range = resolveQuarterDatesForYear(cur.qk, cur.year);
        const isStartQ = (cur.qk===startInfo.qk && cur.year===startInfo.year);
        const isEndQ = (cur.qk===realEndInfo.qk && cur.year===realEndInfo.year);
        let boxFrom = range.from, boxTo = range.to, short = false;
        if(isStartQ && seg.from > range.from){ boxFrom = seg.from; short = true; }
        if(isEndQ && seg.to < range.to){ boxTo = seg.to; short = true; }
        const days = Math.max(0, daysBetween(boxFrom, boxTo));
        const cycleDays = annualCycleDaysForYear(cur.year);
        const interestAmount = Math.round(principal * ((segRatePct||0)/100/cycleDays) * days);
        boxes.push({
          key: `${cur.qk}-${cur.year}-${seg.extLevel}`, // định danh ỔN ĐỊNH (không đổi dù tên hiển thị * / # có đổi)
          qk:cur.qk, year:cur.year, short, extLevel:seg.extLevel, from:boxFrom, to:boxTo, days,
          rate: segRatePct||0, interestAmount,
        });
        if(isEndQ) break;
        cur = nextQuarterCycle(cur.qk, cur.year);
      }
    }
    return boxes;
  }
  function quarterOrdinal1to4(qk){ return {q1:1,q2:2,q3:3,q4:4}[qk] || 0; }
  function formatTimelineQuarterLabel(item){
    const hashes = '#'.repeat(item.extLevel||0);
    const star = item.short ? '*' : '';
    return `Quý ${quarterOrdinal1to4(item.qk)}${hashes}${star} -${item.year}`;
  }
  // Dò trong "Tất cả quý của món vay" (TOÀN BỘ hộp chứa, không giới hạn hôm nay) xem có hộp nào
  // mang dấu "#" không — trả về số dấu # NHIỀU NHẤT đang xuất hiện (0 nếu không có hộp nào có #).
  function borrowerHighestActiveExtLevel(b){
    let maxLevel = 0;
    borrowerQuarterBoxes(b).forEach(bx=>{ if((bx.extLevel||0) > maxLevel) maxLevel = bx.extLevel||0; });
    return maxLevel;
  }
  // Hiển thị các cột công khai liên quan lãi suất/phân bổ theo yêu cầu: nếu món vay đang có bất kỳ
  // Quý nào rơi vào diện gia hạn (có dấu #) thì hiện thêm "(lãi suất/tỷ lệ của đúng lần gia hạn
  // NHIỀU DẤU # NHẤT)" tô đỏ, đứng TRƯỚC con số bình thường (trong hạn); nếu không có Quý nào có #
  // thì chỉ hiện đúng con số trong hạn như cũ, không đổi.
  function formatRateWithOverdueHtml(b, field, suffix){
    const normalVal = getInTermColumnValue(b, field);
    const normalStr = String(normalVal).replace('.',',');
    const maxLevel = borrowerHighestActiveExtLevel(b);
    if(maxLevel===0) return `${escapeHtml(normalStr)}${suffix}`;
    const overdueVal = getExtensionLevelColumnValue(b, maxLevel, field);
    const overdueStr = String(overdueVal).replace('.',',');
    return `<span style="color:var(--red); font-weight:700;">(${escapeHtml(overdueStr)})</span> ${escapeHtml(normalStr)}${suffix}`;
  }
  // Bản văn bản THUẦN (không HTML) của hàm trên — dùng cho Xuất Excel / In, nơi không hiển thị được thẻ HTML.
  function formatRateWithOverduePlain(b, field, suffix){
    const normalVal = getInTermColumnValue(b, field);
    const normalStr = String(normalVal).replace('.',',');
    const maxLevel = borrowerHighestActiveExtLevel(b);
    if(maxLevel===0) return `${normalStr}${suffix}`;
    const overdueVal = getExtensionLevelColumnValue(b, maxLevel, field);
    const overdueStr = String(overdueVal).replace('.',',');
    return `(${overdueStr}) ${normalStr}${suffix}`;
  }
  // "Quý chưa/đã đóng lãi" chỉ xét những hộp chứa ĐÃ BẮT ĐẦU tính đến hôm nay (theo lịch hiện hành)
  // — hộp chứa nào còn ở tương lai (chưa bắt đầu) thì CHƯA xuất hiện ở cả 2 cột, đúng như thiết kế:
  // "chỉ tính đến thời điểm hiện tại của lịch hiện tại".
  function borrowerQuarterTimeline(b){
    const today = new Date(); today.setHours(0,0,0,0);
    return borrowerQuarterBoxes(b).filter(box=>{
      const f = new Date(box.from+'T00:00:00');
      return !isNaN(f.getTime()) && f<=today;
    });
  }
  // =====================================================================
  // "HỘP TIỀN ĐÃ ĐÓNG LÃI" — mỗi người vay có đúng 1 hộp, sinh ra ngay khi thêm người vay (mặc định
  // 0đ). Lưu tại secretdata/{secretId}/interestPaymentBoxes/{borrowerId} = {
  //   totalPaid: tổng tất cả số tiền đã từng được "Xác nhận đóng lãi thành công" (kể cả phần dư),
  //   payments: { [boxKey]: amount } — số tiền đã GÁN CỤ THỂ cho từng "hộp chứa Quý" (boxKey =
  //             "qk-year-extLevel", một định danh ỔN ĐỊNH không đổi dù tên hiển thị */# có đổi).
  // }
  // "Số tiền còn thừa lại chưa thuộc về quý nào" = totalPaid − tổng các khoản đã gán cụ thể.
  // =====================================================================
  function getInterestPaymentBoxRaw(borrowerId){
    return (state.interestPaymentBoxes && state.interestPaymentBoxes[borrowerId]) || { totalPaid:0, payments:{} };
  }
  // Tính TOÀN BỘ trạng thái hiện hành của Hộp tiền — luôn tính động từ dữ liệu thô + "hộp chứa Quý"
  // hiện tại, nên tự động đúng theo mọi thay đổi (mốc Quý, lãi suất, gia hạn...).
  function computeInterestPaymentBoxState(b){
    const raw = getInterestPaymentBoxRaw(b.id);
    const totalPaid = raw.totalPaid||0;
    const payments = raw.payments||{};
    const allBoxes = borrowerQuarterBoxes(b);
    const boxByKey = {}; allBoxes.forEach(bx=> boxByKey[bx.key]=bx);
    const paidEntries = Object.keys(payments).map(k=>({ key:k, box:boxByKey[k], amount:payments[k]||0 })).filter(e=>e.box && e.amount>0);
    const paidSum = paidEntries.reduce((s,e)=>s+e.amount, 0);
    const leftover = Math.max(0, Math.round((totalPaid - paidSum)*100)/100);
    return { totalPaid, payments, paidEntries, paidSum, leftover, allBoxes };
  }
  // "Dàn xếp" số tiền thừa: nếu số dư (leftover) đủ trả trọn 1 hay nhiều "hộp chứa Quý" đang CHƯA có
  // khoản trả riêng, thì tự động gán trọn số tiền quý đó vào payments — ƯU TIÊN các Quý "từ QUÁ KHỨ
  // tới HIỆN TẠI" trước (quý cũ nhất trước), CHỈ khi không còn Quý nào thuộc nhóm đó nữa thì mới xét
  // tới các Quý "trong TƯƠNG LAI" (cũng ưu tiên tương lai gần nhất trước). Chạy khi vừa xác nhận
  // thêm 1 khoản đóng lãi mới.
  async function settleInterestPaymentLeftover(b){
    const st = computeInterestPaymentBoxState(b);
    let leftover = st.leftover;
    if(leftover<=0) return;
    const payments = Object.assign({}, st.payments);
    const today = new Date(); today.setHours(0,0,0,0);
    const pastCurrent = st.allBoxes.filter(bx=>{
      const f = new Date(bx.from+'T00:00:00');
      return !isNaN(f.getTime()) && f<=today && bx.interestAmount>0;
    });
    const future = st.allBoxes.filter(bx=>{
      const f = new Date(bx.from+'T00:00:00');
      return !isNaN(f.getTime()) && f>today && bx.interestAmount>0;
    });
    let changed = false;
    for(const bx of pastCurrent){
      if(payments[bx.key]) continue;
      if(leftover >= bx.interestAmount){ payments[bx.key] = bx.interestAmount; leftover = Math.round((leftover-bx.interestAmount)*100)/100; changed = true; }
    }
    const stillHasPastCurrentUnpaid = pastCurrent.some(bx=> !payments[bx.key]);
    if(!stillHasPastCurrentUnpaid){
      // Quý TƯƠNG LAI bắt buộc theo đúng thứ tự gần->xa — hễ gặp 1 quý không đủ tiền trả là DỪNG
      // HẲN, không được nhảy cóc qua trả cho quý xa hơn nó.
      for(const bx of future){
        if(payments[bx.key]) continue;
        if(leftover >= bx.interestAmount){ payments[bx.key] = bx.interestAmount; leftover = Math.round((leftover-bx.interestAmount)*100)/100; changed = true; }
        else break;
      }
    }
    if(changed) await cSet('interestPaymentBoxes/'+b.id, { totalPaid: st.totalPaid, payments });
  }
  // Toàn bộ thông tin hiển thị của Hộp tiền (đúng cấu trúc bạn mô tả) — quý đã đóng (mới->cũ), tổng,
  // số dư thừa, quý chưa đóng TỪ QUÁ KHỨ TỚI HIỆN TẠI (cũ->mới), quý chưa đóng TRONG TƯƠNG LAI
  // (gần->xa), tổng từng loại.
  function computeInterestPaymentBoxDisplay(b){
    const st = computeInterestPaymentBoxState(b);
    const allBoxes = st.allBoxes;
    const indexOf = {}; allBoxes.forEach((bx,i)=> indexOf[bx.key]=i);
    const paidSorted = st.paidEntries.slice().sort((a,c)=> indexOf[c.key]-indexOf[a.key]); // mới trước, cũ sau
    const paidLines = paidSorted.map(e=> ({ name: formatTimelineQuarterLabel(e.box), amount: e.amount }));
    const today = new Date(); today.setHours(0,0,0,0);
    const paidKeys = new Set(st.paidEntries.map(e=>e.key));
    const unpaidBoxes = allBoxes.filter(bx=>{
      const f = new Date(bx.from+'T00:00:00');
      return !isNaN(f.getTime()) && f<=today && !paidKeys.has(bx.key);
    }); // đã theo đúng thứ tự cũ->mới (allBoxes vốn đã là chuỗi thời gian)
    const unpaidLines = unpaidBoxes.map(bx=> ({ name: formatTimelineQuarterLabel(bx), amount: bx.interestAmount, box:bx }));
    const unpaidTotal = unpaidLines.reduce((s,x)=>s+x.amount, 0);
    const futureUnpaidBoxes = allBoxes.filter(bx=>{
      const f = new Date(bx.from+'T00:00:00');
      return !isNaN(f.getTime()) && f>today && !paidKeys.has(bx.key);
    }); // gần->xa (allBoxes vốn đã là chuỗi thời gian)
    const futureUnpaidLines = futureUnpaidBoxes.map(bx=> ({ name: formatTimelineQuarterLabel(bx), amount: bx.interestAmount, box:bx }));
    const futureUnpaidTotal = futureUnpaidLines.reduce((s,x)=>s+x.amount, 0);
    return { totalPaid: st.totalPaid, paidLines, paidTotal: st.paidSum, leftover: st.leftover, unpaidLines, unpaidTotal, futureUnpaidLines, futureUnpaidTotal, allBoxes, paidKeys };
  }

  // =====================================================================
  // Tính toán "Biên lai thu tiền lãi" thật sự sẽ phân bổ Tổng số tiền vào đúng những Quý nào —
  // dùng CHUNG kết quả này cho cả (1) câu giải thích hiển thị và (2) logic ghi nhận thật khi bấm
  // "Xác nhận đóng lãi thành công", đảm bảo 2 nơi LUÔN khớp nhau tuyệt đối.
  //   • Nếu Tổng < Tổng các Quý đã chọn: trả lần lượt CÁC QUÝ ĐÃ CHỌN theo đúng thứ tự cũ->mới cho
  //     tới khi không đủ trả tiếp thì DỪNG — các Quý còn lại (kể cả sau đó) đều CHƯA được trả.
  //   • Nếu Tổng >= Tổng các Quý đã chọn: trả HẾT các Quý đã chọn, phần dư (nếu có) tiếp tục thử trả
  //     thêm cho các Quý KHÁC chưa đóng (không nằm trong danh sách đã chọn), theo đúng thứ tự quá
  //     khứ→hiện tại rồi mới tới tương lai, DỪNG ngay khi không đủ trả tiếp.
  // =====================================================================
  function computeReceiptSettlementPreview(b, chosen, grandTotal, disp){
    let remaining = grandTotal;
    const paidQuarters = [];
    for(const bx of chosen){
      if(remaining >= bx.interestAmount){ paidQuarters.push(bx); remaining = Math.round((remaining-bx.interestAmount)*100)/100; }
      else break;
    }
    const unpaidChosenQuarters = chosen.filter(bx=> !paidQuarters.includes(bx));
    let extraPaidQuarters = [];
    if(unpaidChosenQuarters.length===0 && remaining>0){
      const chosenKeys = new Set(chosen.map(x=>x.key));
      const candidates = disp.unpaidLines.map(x=>x.box).concat(disp.futureUnpaidLines.map(x=>x.box)).filter(bx=> !chosenKeys.has(bx.key));
      for(const bx of candidates){
        if(remaining >= bx.interestAmount){ extraPaidQuarters.push(bx); remaining = Math.round((remaining-bx.interestAmount)*100)/100; }
        else break;
      }
    }
    return { paidQuarters, extraPaidQuarters, unpaidChosenQuarters, leftoverAmount: Math.max(0, remaining) };
  }
  function buildReceiptExplanation(result, chosenSum, grandTotal){
    if(Math.abs(grandTotal-chosenSum)<0.5) return ''; // bằng nhau -> không cần giải thích
    const { paidQuarters, extraPaidQuarters, unpaidChosenQuarters, leftoverAmount } = result;
    const names = (list)=> list.map(bx=>formatTimelineQuarterLabel(bx)).join(', ');
    if(grandTotal < chosenSum){
      if(paidQuarters.length===0){
        return `Tổng số tiền này không đủ trả cho bất cứ quý nào ở trên, số tiền còn dư chưa thuộc về quý nào là: ${moneySpaced(leftoverAmount)}, số tiền dư này sẽ được cộng dồn vào Tổng số tiền đã đóng lãi của hộ vay, ${names(unpaidChosenQuarters)} sẽ chưa được tính là đóng lãi xong`;
      }
      return `Tổng số tiền này chỉ đủ trả cho ${names(paidQuarters)}, số tiền còn dư chưa thuộc về quý nào là: ${moneySpaced(leftoverAmount)}, số tiền dư này sẽ được cộng dồn vào Tổng số tiền đã đóng lãi của hộ vay, ${names(unpaidChosenQuarters)} sẽ chưa được tính là đóng lãi xong`;
    }
    // grandTotal > chosenSum
    if(extraPaidQuarters.length===0){
      return `Tổng số tiền này sẽ trả cho ${names(paidQuarters)}, số tiền còn dư chưa thuộc về quý nào là: ${moneySpaced(leftoverAmount)}, số tiền dư này sẽ được cộng dồn vào Tổng số tiền đã đóng lãi của hộ vay`;
    }
    const afterChosenLeftover = Math.round((grandTotal-chosenSum)*100)/100;
    return `Tổng số tiền này sẽ trả cho ${names(paidQuarters)}, số tiền còn dư là ${moneySpaced(afterChosenLeftover)}, số tiền dư này sẽ được trả luôn cho ${names(extraPaidQuarters)}, số tiền còn lại chưa thuộc về quý nào là: ${moneySpaced(leftoverAmount)}, số tiền dư này sẽ được cộng dồn vào Tổng số tiền đã đóng lãi của hộ vay`;
  }
  // Trả về { unpaidText, paidText } cho cột công khai "Quý chưa/đã đóng lãi" — nguồn dữ liệu giờ là
  // Hộp tiền đóng lãi (không còn dùng checkbox phê duyệt cũ nữa).
  function borrowerQuarterPaymentLabels(b){
    const disp = computeInterestPaymentBoxDisplay(b);
    const unpaidText = disp.unpaidLines.map(x=>x.name).join(', '); // cũ trước, mới sau
    const paidText = disp.paidLines.map(x=>x.name).join(', '); // mới trước, cũ sau (đã sort sẵn)
    return { unpaidText, paidText };
  }

  // =====================================================================
  // Trạng thái hạn trả gốc của 1 người vay TÍNH ĐẾN HÔM NAY — 'active' (còn trong hạn gốc),
  // 'extended' (đang trong 1 đợt gia hạn còn hiệu lực), 'overdue' (đã quá hạn/quá hạn gia hạn gần
  // nhất mà chưa được gia hạn tiếp).
  // =====================================================================
  function borrowerLoanStatusToday(b){
    const today = new Date(); today.setHours(0,0,0,0);
    const exts = getBorrowerExtensions(b.id);
    if(exts.length){
      const last = exts[exts.length-1];
      const to = new Date(last.to+'T00:00:00');
      return today<=to ? 'extended' : 'overdue';
    }
    if(!b.dueDate) return 'active';
    const due = new Date(b.dueDate+'T00:00:00');
    return today<=due ? 'active' : 'overdue';
  }
  function computeExtensionStatusCounts(list){
    let inTerm=0, overdue=0, extended=0;
    list.forEach(b=>{
      const st = borrowerLoanStatusToday(b);
      if(st==='active') inTerm++; else if(st==='overdue') overdue++; else if(st==='extended') extended++;
    });
    return { inTerm, overdue, extended };
  }
  // Cộng N tháng (có thể lẻ .5 = thêm 15 ngày xấp xỉ) vào 1 ngày yyyy-mm-dd.
  function addMonthsToDateStr(dateStr, months){
    const d = new Date(dateStr+'T00:00:00');
    if(isNaN(d.getTime())) return '';
    const whole = Math.trunc(months);
    const frac = months - whole;
    let nd = new Date(d.getFullYear(), d.getMonth()+whole, d.getDate());
    if(frac>0.01) nd = new Date(nd.getFullYear(), nd.getMonth(), nd.getDate()+15);
    const pad = n=>String(n).padStart(2,'0');
    return `${nd.getFullYear()}-${pad(nd.getMonth()+1)}-${pad(nd.getDate())}`;
  }

  // Yêu cầu mới: cột "Số tiền lãi" công khai giờ là TỔNG của "Số tiền lãi (trong hạn)" + "Số tiền
  // lãi (gia hạn lần 1)" + ... + "Số tiền lãi (gia hạn lần 5)" — mỗi thành phần đã tự tính đúng dựa
  // trên các hộp chứa Quý đang khớp bộ lọc Quý/Năm hiện hành (xem getInTermColumnValue /
  // getExtensionLevelColumnValue). Không tính trực tiếp nữa, chỉ CỘNG DỒN từ các cột ẩn.
  function computeCurrentQuarterInterest(b){
    let total = getInTermColumnValue(b, 'interestAmount');
    for(let lvl=1; lvl<=MAX_LOAN_EXTENSIONS; lvl++) total += getExtensionLevelColumnValue(b, lvl, 'interestAmount');
    return Math.round(total);
  }
  // Các loại câu hỏi hỗ trợ trong module [Biểu mẫu/Khảo sát/Bài kiểm tra] — giống Google Forms.
  const SURVEY_QTYPES = [
    { key:'short', label:'Trả lời ngắn' },
    { key:'paragraph', label:'Đoạn văn trả lời dài' },
    { key:'radio', label:'Trắc nghiệm (chỉ chọn 1 phương án)' },
    { key:'checkbox', label:'Hộp kiểm (được chọn nhiều phương án)' },
    { key:'dropdown', label:'Menu thả xuống (chỉ chọn 1 phương án)' },
  ];
  function surveyQTypeLabel(t){ return (SURVEY_QTYPES.find(x=>x.key===t)||{}).label || t; }
  function surveyQTypeHasOptions(t){ return t==='radio' || t==='checkbox' || t==='dropdown'; }
  // Danh sách "Nguồn vay" của 1 Phương án vay — chọn "Nguồn khác" thì phải tự gõ tên nguồn cụ thể.
  const FUND_SOURCE_OPTIONS = ['Cấp trung ương', 'Cấp tỉnh/thành phố', 'Nguồn 841', 'Nguồn địa phương', 'Nguồn khác'];
  // ---------------------------------------------------------------------
  // Khi Admin thêm/sửa người vay mà gõ tên 1 địa bàn (ấp/thôn/khu phố) chưa từng có trong danh
  // sách — TỰ ĐỘNG thêm tên đó vào config.hamlets (sẽ hiện ra ở Cài đặt & Chia sẻ), ĐỒNG THỜI duy
  // trì 1 danh sách ẨN riêng (config.hamletsLegacyHidden — KHÔNG hiện ở Cài đặt) là bản sao của
  // toàn bộ hamlets nhưng thêm hậu tố " (cũ)" vào từng tên, dùng cho trường "Địa chỉ trước sáp
  // nhập" ở hồ sơ người vay.
  async function registerHamletIfNew(hamletName){
    if(!hamletName) return;
    const cfg = state.config;
    if(!cfg.hamlets) cfg.hamlets = [];
    if(!cfg.hamletsLegacyHidden) cfg.hamletsLegacyHidden = cfg.hamlets.map(h=>`${h} (cũ)`);
    if(!cfg.hamlets.includes(hamletName)){
      cfg.hamlets.push(hamletName);
      cfg.hamletsLegacyHidden.push(`${hamletName} (cũ)`);
      await cSet('config', cfg);
    }
  }
  function projectFundSourceLabel(p){
    if(!p) return '';
    if(p.fundSourceType==='Nguồn khác') return (p.fundSourceOther||'').trim() || 'Nguồn khác';
    return p.fundSourceType || '';
  }
  function provinceTitle(){

  // YÊU CẦU 1 — Kiểm tra & cấp Mã định danh NGẪU NHIÊN khi người dùng bỏ qua
  // bước tạo/tham gia mã. Quy tắc trùng lặp áp dụng CHUNG cho mọi cách tạo mã
  // (tự gõ hay hệ thống sinh ngẫu nhiên):
  //   - Một mã bị coi là "đã bị chiếm" nếu nó đang hoạt động HOẶC đang nằm trong
  //     Thùng rác CÁ NHÂN của bất kỳ tài khoản nào (users/{email}/deletedWards).
  //   - NGOẠI LỆ: mã đang nằm trong "Thùng rác hệ thống" (superadmin/trashWards —
  //     tức chủ website đã xác nhận xoá lần 2) được coi là đã thả tự do, có thể
  //     dùng lại để tạo mã mới.
  // ---------------------------------------------------------------------
  async function isWardIdTaken(wid){
    const cfg = await cGetOnceFor(wid, 'config', null);
    if(!cfg) return false; // chưa từng tồn tại, hoặc đã bị Chủ website xoá vĩnh viễn (purge) -> coi như trống
    if(!cfg.deleted) return true; // đang hoạt động bình thường -> chắc chắn đã bị chiếm
    // Đang ở trạng thái "đã xoá" — chỉ được coi là TRỐNG nếu nó đang nằm trong Thùng rác hệ thống.
    try{
      const sysSnap = await rtdb.ref(`superadmin/trashWards/${wid}`).get();
      if(sysSnap.exists()) return false; // Ngoại lệ: đã thả tự do
    }catch(e){ /* không đọc được (không phải site owner) -> coi như KHÔNG được thả tự do, an toàn hơn */ }
    return true; // đang nằm trong thùng rác cá nhân của ai đó -> vẫn coi là đã bị chiếm
  }
  const RANDOM_WID_CHARS = 'abcdefghijklmnopqrstuvwxyz0123456789';
  function randomWardIdCandidate(len){
    let s = '';
    for(let i=0;i<len;i++) s += RANDOM_WID_CHARS[Math.floor(Math.random()*RANDOM_WID_CHARS.length)];
    return s;
  }
  // Sinh 1 Mã định danh ngẫu nhiên 4 ký tự (chữ + số) CHƯA TỪNG bị chiếm — dò thử nhiều lần,
  // nếu cực hiếm vẫn trùng liên tục thì tăng dần độ dài để chắc chắn luôn tìm ra mã trống.
  async function generateUniqueRandomWardId(){
    for(let attempt=0; attempt<40; attempt++){
      const candidate = randomWardIdCandidate(4);
      if(!(await isWardIdTaken(candidate))) return candidate;
    }
    for(let len=5; len<=8; len++){
      for(let attempt=0; attempt<40; attempt++){
        const candidate = randomWardIdCandidate(len);
        if(!(await isWardIdTaken(candidate))) return candidate;
      }
    }
    return 'x' + Date.now().toString(36).slice(-7); // vét cạn cuối cùng, gần như không bao giờ chạm tới
  }

  // trong danh sách chia sẻ đích danh từ trước (giữ nguyên quyền đã cấp, không ghi đè).
  function ensureGrantEntryForGuest(cfg, email, name){
    if(!email) return false;
    const key = emailToKey(email);
    cfg.grants = cfg.grants || {};
    if(cfg.grants[key]){
      // Đã tồn tại — chỉ bổ sung tên hiển thị nếu trước đó chưa có, KHÔNG đụng vào quyền đã cấp.
      let changed = false;
      if(name && !cfg.grants[key].name){ cfg.grants[key].name = name; changed = true; }
      cfg.grants[key].lastJoinedAt = new Date().toISOString();
      return changed; // chỉ cần ghi lại nếu có thay đổi tên hiển thị
    }
    cfg.grants[key] = {
      email, name: name||'',
      joinedAt: new Date().toISOString(), autoAdded: true,

  // Trả về true nếu thành công (đã chuyển màn hình), false nếu bị chặn (sai mật khẩu...).
  async function joinOrCreateWard(widRaw, password){
    const wid = (widRaw||'').trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
    if(!wid || wid.length<3){ alert('Vui lòng nhập Mã định danh hợp lệ (tối thiểu 3 ký tự, chỉ gồm chữ thường/số/gạch dưới/gạch ngang).'); return false; }
    const emailKey = emailToKey(state.identity.email);
    const taken = await isWardIdTaken(wid);
    if(!taken){
      // Mã chưa từng tồn tại, hoặc đã được thả tự do (đang ở Thùng rác hệ thống) -> tài khoản này
      // trở thành CHỦ MÃ mới, cần thiết lập cơ bản (onboarding)
      await rtdb.ref(`users/${emailKey}/wards/${wid}`).set({kind:'owner', wardName:'', addedAt:new Date().toISOString()});
      state.identity.wardId = wid;
      setActiveWardCache(wid);
      state._pendingAccessCode = password || '';
      state._pendingSecretId = genSecretId();
      state.config = null;
      state.view = 'onboarding';
      render();
      return true;
    }
    const existingCfg = await cGetOnceFor(wid, 'config', null);
    if(existingCfg.deleted){ alert('Mã xã này hiện không khả dụng (đã bị xoá). Vui lòng liên hệ Chủ mã hoặc chọn mã khác.'); return false; }
    if(existingCfg.ownerEmail === state.identity.email){
      // Đã là Chủ mã của mã này (chỉ thiếu bản ghi trong Ví, ví dụ đăng nhập máy mới) -> tự phục hồi
      await rtdb.ref(`users/${emailKey}/wards/${wid}`).set({kind:'owner', wardName: existingCfg.wardName||'', addedAt:new Date().toISOString()});
    } else {
      if((existingCfg.accessCode||'') && existingCfg.accessCode !== (password||'')){
        alert('Sai mật khẩu mã xã. Vui lòng liên hệ Chủ mã để lấy đúng mật khẩu.');
        return false;
      }
      // Tự động đưa tài khoản KHÁCH này vào danh sách "Chia sẻ đích danh" của Chủ mã (Yêu cầu 2)
      if(ensureGrantEntryForGuest(existingCfg, state.identity.email, state.identity.name)){
        await wrefFor(wid, 'config').set(existingCfg);
        syncWardIndex(wid, existingCfg);
      }
      await rtdb.ref(`users/${emailKey}/wards/${wid}`).set({kind:'guest', wardName: existingCfg.wardName||'', addedAt:new Date().toISOString(), av: existingCfg.accessVersion||0});
    }
    await enterWard(wid);
    return true;
  }

  // [Tạo mã định danh cấp xã mới] — báo lỗi rõ nếu mã đã có người dùng.

  // [Tham gia bằng mã định danh cấp xã] — CHỈ tham gia mã đã có, không tự tạo mới.
  async function joinWardStrict(widRaw, password){

  // di chuyển đúng 1 "con trỏ" (config) nhỏ gọn sang wardId mới — TOÀN BỘ dữ liệu thật (hộ vay, chi
  // tiêu, thùng rác, nhật ký...) ở secretdata/{secretId}/... không hề bị đụng tới, tuyệt đối an toàn.
  async function renameOwnWardId(newWidRaw){
    const newWid = normalizeWardIdStr(newWidRaw);
    if(!newWid || newWid.length<3){ alert('Vui lòng nhập Mã định danh hợp lệ (tối thiểu 3 ký tự, chỉ gồm chữ thường/số/gạch dưới/gạch ngang).'); return false; }
    const oldWid = wardId();
    if(newWid === oldWid){ alert('Mã mới trùng với mã hiện tại, không có gì để đổi.'); return false; }
    if(await isWardIdTaken(newWid)){ alert('Mã này đã bị trùng với mã hiện có, hoặc trong thùng rác của ai đó, vui lòng thay đổi ký tự!'); return false; }
    if(!confirm(`Đổi tên mã định danh từ "${oldWid}" sang "${newWid}"?\n\nDữ liệu (hộ vay, chi tiêu, nhật ký...) hoàn toàn KHÔNG bị ảnh hưởng — luôn được "Mã ẩn" cố định phía sau bảo lãnh nguyên vẹn. Các Khách đang dùng mã cũ để tham gia sẽ cần được bạn cung cấp lại mã mới "${newWid}" để tiếp tục truy cập. Bạn có chắc chắn?`)) return false;
    await pushLog('đổi tên mã định danh', `${oldWid} → ${newWid}`); // secretId không đổi nên nhật ký vẫn đúng chỗ
    const movedCfg = { ...state.config }; // chỉ copy "con trỏ" — secretId bên trong giữ nguyên, không đổi
    await rtdb.ref(`data/${newWid}/config`).set(movedCfg);
    syncWardIndex(newWid, movedCfg);
    // Cập nhật lại con trỏ ngược secretId -> wardId sang tên mới (phục vụ Firebase Rules bảo mật)
    if(movedCfg.secretId) await rtdb.ref(`secret_ward_map/${movedCfg.secretId}`).set(newWid);
    await rtdb.ref(`data/${oldWid}`).remove(); // chỉ xoá con trỏ cũ, KHÔNG đụng tới secretdata/
    removeWardIndex(oldWid);
    const emailKey = emailToKey(state.identity.email);
    await rtdb.ref(`users/${emailKey}/wards/${oldWid}`).remove();
    await rtdb.ref(`users/${emailKey}/wards/${newWid}`).set({kind:'owner', wardName:(state.config&&state.config.wardName)||'', addedAt:new Date().toISOString()});
    detachRealtime();
    state.identity.wardId = newWid;
    setActiveWardCache(newWid);
    lset(IDENTITY_KEY, state.identity);
    await enterWard(newWid);
    return true;
  }

  async function purgeDeletedWardToSuperadmin(wid){
    if(!confirm('Xoá vĩnh viễn: mã này sẽ KHÔNG còn trong thùng rác của bạn nữa (chỉ Quản trị viên trang web mới khôi phục được cho bạn). Dữ liệu thật vẫn được "Mã ẩn" bảo lãnh an toàn tuyệt đối. Bạn có chắc chắn?')) return;

    // Thùng rác hệ thống, chuỗi wid này được coi là "thả tự do" nên CÓ THỂ bị người khác xin lại để
    // tạo mã mới (ghi đè lên data/{wid}/config). Nhờ lưu sẵn snapshot này, sau này khôi phục vẫn luôn
    // dựng lại đúng con trỏ trỏ về ĐÚNG secretId cũ — dữ liệu thật không bao giờ bị ảnh hưởng.
    const cfgSnapshot = await cGetOnceFor(wid, 'config', null);

  // ---- Thùng rác hệ thống (chỉ Chủ trang web) ----
  async function superRestoreWard(wid){
    if(!isAdmin()) return;
    const entry = state.sysTrash.find(x=>x.wardId===wid);
    if(!entry) return;
    // Yêu cầu 1: mã trong Thùng rác hệ thống được coi là "đã thả tự do" nên rất có thể đã bị người
    // khác tạo trùng trong lúc chờ khôi phục. Trước khi khôi phục, phải dò xem có bị trùng không
    // (kể cả trong thùng rác cá nhân của bất kỳ ai); nếu trùng thì tự đổi tên "con trỏ" theo công
    // thức "tênmã + 001", nếu vẫn trùng thì tăng dần 002, 003... Nhờ dữ liệu thật luôn được "Mã ẩn"
    // (secretId) cố định bảo lãnh — hoàn toàn tách biệt khỏi chuỗi wardId — nên dù có bị đổi tên con
    // trỏ, dữ liệu gốc (hộ vay, chi tiêu, nhật ký...) vẫn nguyên vẹn 100%, không hề bị mất hay lẫn
    // với dữ liệu của người đang chiếm cái tên cũ.
    let finalWid = wid;
    let renamed = false;
    if(await isWardIdTaken(wid)){
      renamed = true;
      let n = 1;
      while(await isWardIdTaken(`${wid}${String(n).padStart(3,'0')}`)) n++;
      finalWid = `${wid}${String(n).padStart(3,'0')}`;
    }
    if(entry.configSnapshot){
      // Dựng lại đúng "con trỏ" trỏ về ĐÚNG Mã ẩn (secretId) cũ -> toàn bộ dữ liệu thật hiện ra
      // nguyên vẹn ngay lập tức, bất kể con trỏ dùng tên nào.
      const restoredCfg = { ...entry.configSnapshot, deleted:false };
      delete restoredCfg.deletedAt; delete restoredCfg.deletedBy;
      await rtdb.ref(`data/${finalWid}/config`).set(restoredCfg);
      syncWardIndex(finalWid, restoredCfg);
      // Cập nhật lại con trỏ ngược secretId -> wardId (phục vụ Firebase Rules bảo mật)
      if(restoredCfg.secretId) await rtdb.ref(`secret_ward_map/${restoredCfg.secretId}`).set(finalWid);
    }
    if(renamed){
      alert(`Lưu ý: mã "${wid}" hiện đã có người khác đang sử dụng (do đã được thả tự do khi đưa vào Thùng rác hệ thống), nên con trỏ khôi phục sẽ dùng tên mới "${finalWid}". Yên tâm: TOÀN BỘ dữ liệu gốc (hộ vay, chi tiêu, nhật ký...) vẫn còn nguyên vẹn 100% vì luôn được "Mã ẩn" cố định bảo lãnh — hoàn toàn không bị mất hay lẫn với mã đang hoạt động kia.`);
    }
    await rtdb.ref(`users/${emailToKey(entry.ownerEmail)}/deletedWards/${finalWid}`).set({wardId:finalWid, wardName:(entry.configSnapshot&&entry.configSnapshot.wardName)||entry.wardName||'', deletedAt: entry.deletedAt||new Date().toISOString()});
    await rtdb.ref(`superadmin/trashWards/${wid}`).remove();
    await loadWallet(); render();
  }
  async function superPurgeForever(wid){
    if(!isAdmin()) return;
    if(!confirm('XOÁ VĨNH VIỄN — TOÀN BỘ dữ liệu (hộ vay, chi tiêu, nhật ký, cộng tác viên...) của mã xã này trên đám mây sẽ bị xoá sạch, KHÔNG THỂ khôi phục. Bạn có chắc chắn tuyệt đối?')) return;
    // Dữ liệu thật nằm ở secretdata/{secretId}/... (không phải data/{wid}/...) — phải lấy đúng
    // Mã ẩn từ snapshot đã chụp lúc đưa vào Thùng rác hệ thống để xoá đúng chỗ.
    const entry = state.sysTrash.find(x=>x.wardId===wid);
    const sid = entry && entry.configSnapshot && entry.configSnapshot.secretId;
    if(sid) await rtdb.ref(`secretdata/${sid}`).remove();
    await rtdb.ref(`data/${wid}`).remove();
    removeWardIndex(wid);
    await rtdb.ref(`superadmin/trashWards/${wid}`).remove();
    await loadWallet(); render();
  }

  async function boot(){
    state.view = 'boot'; render();
    // Đảm bảo Local Persistence đã được thiết lập xong TRƯỚC KHI Firebase Auth khôi phục phiên
    // đăng nhập cũ — tránh trường hợp hiếm gặp bị lệch thời điểm khiến phiên không được khôi phục.

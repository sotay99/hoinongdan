     FIREBASE THẬT CỦA ĐỒNG CHÍ (lấy tại Firebase Console > Project settings
     > General > Your apps > SDK setup and configuration).
     Sau khi thay xong, toàn bộ dữ liệu "Sổ vay vốn / Chi tiêu Xã / Nhật ký /
     Thùng rác / Cộng tác viên" sẽ tự động lưu & đồng bộ realtime trên

     ĐỂ BẬT ĐĂNG NHẬP GOOGLE THẬT (bắt buộc cho phần Auth bên dưới hoạt động):
     1) Vào Firebase Console > Authentication > Sign-in method > bật "Google".
     2) Vào Authentication > Settings > Authorized domains > thêm đúng tên
        miền (domain) nơi đồng chí sẽ host file HTML này (vd: tên miền
        Netlify/GitHub Pages/website riêng). Thiếu bước này Google sẽ báo lỗi
        "auth/unauthorized-domain" khi bấm đăng nhập.
     3) Vai trò (Owner/Editor/Viewer) KHÔNG cấu hình ở đây — Owner là người
        dùng email Google đăng nhập đầu tiên để "Thiết lập cơ sở dữ liệu lõi"
        (thường là Chủ tịch Hội), còn Editor/Viewer do Owner tự thêm bằng
        đúng email Google của cấp dưới tại mục "Cài đặt & Chia sẻ" trong app.
  ===================================================================== */
  const firebaseConfig = {
    apiKey: "AIzaSyAzt664dL14cJJnvCx7WdRD7WuZtUkdZs0",
    authDomain: "congtachoinongdan.firebaseapp.com",
    databaseURL: "https://congtachoinongdan-default-rtdb.firebaseio.com",
    projectId: "congtachoinongdan",
    storageBucket: "congtachoinongdan.firebasestorage.app",
    messagingSenderId: "98189524222",
    appId: "1:98189524222:web:930e6897cced900b1a79af"
  };
  firebase.initializeApp(firebaseConfig);
  const rtdb = firebase.database();
  const auth = firebase.auth();
  // Ép luôn hiện màn hình chọn tài khoản Google (tránh tự động đăng nhập lại
  // tài khoản Google gần nhất khi máy có nhiều tài khoản Google khác nhau).

<style>
  :root{
    --paper:#FBF7EE;
    --paper-2:#F3EEE0;
    --ink:#25321F;
    --rice-dark:#2F4A3C;
    --rice:#3E6350;
    --moss:#6B8F71;
    --gold:#C79A2B;
    --gold-soft:#E9D9AC;
    --clay:#B5551F;
    --line:#DCD4BE;
    --yellow:#E8B93B;
    --orange:#DD7A34;
    --red:#C1443C;
    --green:#4C7A52;
    --white:#FFFEFB;
    --shadow: 0 1px 2px rgba(37,50,31,.06), 0 4px 14px rgba(37,50,31,.06);
    --r: 10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  #root{
    font-family:'Be Vietnam Pro',sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    line-height:1.4;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  h1,h2,h3{font-family:'Be Vietnam Pro',sans-serif; margin:0; letter-spacing:-.01em;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  /* ---- layout shells ---- */
  .center-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
  .auth-card{
    background:var(--white); border:1px solid var(--line); border-radius:16px;
    padding:40px 36px; max-width:420px; width:100%; box-shadow:var(--shadow);
    text-align:center;
  }
  .rice-badge{
    width:56px; height:56px; margin:0 auto 16px; border-radius:14px;
    background:linear-gradient(145deg,var(--rice),var(--rice-dark));
    display:flex; align-items:center; justify-content:center; font-size:26px;
  }
  .auth-card h1{font-size:20px; color:var(--rice-dark); margin-bottom:6px;}
  .auth-card p.sub{color:#7A7A66; font-size:13.5px; margin:0 0 24px;}
  .field{margin-bottom:14px; text-align:left;}
  .field label{display:block; font-size:12.5px; font-weight:600; color:var(--rice-dark); margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    background:var(--paper); font-size:14px; color:var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--gold-soft); border-color:var(--gold);}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:10px 18px; border-radius:8px; border:1px solid transparent;
    font-size:13.5px; font-weight:600; transition:.15s; min-height:40px; line-height:1.2;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-primary{background:var(--rice-dark); color:var(--white);}
  .btn-primary:hover{background:var(--rice);}
  .btn-gold{background:var(--gold); color:#3A2C05;}
  .btn-gold:hover{filter:brightness(1.06);}
  .btn-ghost{background:transparent; border-color:var(--line); color:var(--rice-dark);}
  .btn-ghost:hover{background:var(--paper-2);}
  .btn-danger{background:var(--red); color:var(--white);}
  .btn-danger:hover{filter:brightness(1.08);}
  .btn-block{width:100%;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .btn-sm{padding:6px 10px; font-size:12px; border-radius:6px;}

  /* ---- app shell ---- */
  .app-shell{display:flex; min-height:100vh;}
  .sidebar{
    width:220px; flex-shrink:0; background:var(--rice-dark); color:var(--paper);
    display:flex; flex-direction:column; padding:22px 14px;
  }
  .sidebar .brand{display:flex; align-items:center; gap:10px; padding:0 6px 20px; border-bottom:1px solid rgba(255,255,255,.12); margin-bottom:16px;}
  .sidebar .brand .ico{font-size:22px;}
  .sidebar .brand .txt{font-size:13.5px; font-weight:700; line-height:1.25;}
  .sidebar .brand .txt small{display:block; font-weight:400; opacity:.7; font-size:11px;}
  .nav-item{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px;
    color:rgba(255,255,255,.78); font-size:13.5px; font-weight:500; margin-bottom:2px; border:none; background:none; width:100%; text-align:left;

  .nav-item:hover{background:rgba(255,255,255,.08); color:#fff;}
  .nav-item.active{background:var(--gold); color:#3A2C05;}
  .sidebar .foot{margin-top:auto; padding-top:14px; border-top:1px solid rgba(255,255,255,.12); font-size:11.5px; color:rgba(255,255,255,.55);}

  .main{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:16px 26px; border-bottom:1px solid var(--line); background:var(--white);
  }
  .topbar h2{font-size:18px; color:var(--rice-dark);}
  .topbar .sub{font-size:12px; color:#8A8570; margin-top:2px;}
  .top-actions{display:flex; align-items:center; gap:10px; position:relative;}
  .content{padding:22px 26px; overflow:auto;}

  .bell-btn{position:relative; background:var(--paper-2); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:16px;}
  .bell-dot{position:absolute; top:4px; right:5px; width:8px; height:8px; border-radius:50%; background:var(--red); border:2px solid var(--white);}
  .bell-panel{
    position:absolute; top:44px; right:0; width:340px; max-height:420px; overflow:auto;
    background:var(--white); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); z-index:50;
  }
  .bell-panel .bp-head{padding:12px 14px; font-weight:700; font-size:13px; border-bottom:1px solid var(--line); color:var(--rice-dark);}
  .bell-item{padding:11px 14px; border-bottom:1px solid var(--paper-2); font-size:12.5px; display:flex; gap:8px;}
  .bell-item .dotc{width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0;}
  .bell-empty{padding:26px 14px; text-align:center; color:#9A9580; font-size:12.5px;}

  .avatar{width:32px; height:32px; border-radius:50%; background:var(--gold-soft); color:#5c4813; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;}

  /* dashboard */
  .grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:22px;}
  .stat-card{border-radius:14px; padding:18px 20px; color:#fff; position:relative; overflow:hidden;}
  .stat-card .num{font-family:'JetBrains Mono',monospace; font-size:34px; font-weight:700; line-height:1;}
  .stat-card .lbl{font-size:12.5px; margin-top:6px; opacity:.92; font-weight:600;}
  .stat-card .sub{font-size:11px; opacity:.75; margin-top:3px;}
  .stat-yellow{background:linear-gradient(135deg,#E8B93B,#C99420);}
  .stat-orange{background:linear-gradient(135deg,#DD7A34,#B8591C);}
  .stat-red{background:linear-gradient(135deg,#C1443C,#96271F);}

  .panel{background:var(--white); border:1px solid var(--line); border-radius:14px; margin-bottom:18px;}
  .panel-head{padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;}
  .panel-head h3{font-size:14.5px; color:var(--rice-dark);}
  .panel-body{padding:16px 18px;}

  table{width:100%; border-collapse:collapse; font-size:12.8px;}
  th{text-align:left; padding:9px 10px; background:var(--paper-2); color:var(--rice-dark); font-weight:700; font-size:11.5px; text-transform:uppercase; letter-spacing:.02em; white-space:nowrap; position:sticky; top:0;}
  td{padding:9px 10px; border-bottom:1px solid var(--paper-2); white-space:nowrap;}
  tr:hover td{background:#FCFAF3;}
  .table-wrap{overflow:auto; -webkit-overflow-scrolling:touch; max-width:100%; max-height:60vh; border:1px solid var(--line); border-radius:10px;}
  .money{font-family:'JetBrains Mono',monospace; font-weight:600;}
  .pill{display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:700;}
  .pill-green{background:#E3EFE2; color:var(--green);}
  .pill-red{background:#F7E1DF; color:var(--red);}
  .pill-orange{background:#FBE7D6; color:var(--orange);}
  .pill-gray{background:var(--paper-2); color:#8A8570;}

  .toolbar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px;}
  .toolbar input, .toolbar select{padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:12.8px; background:var(--white);}
  .spacer{flex:1;}

  .modal-bg{position:fixed; inset:0; background:rgba(37,50,31,.45); display:flex; align-items:flex-start; justify-content:center; padding:40px 20px; overflow:auto; z-index:100;}
  .modal{background:var(--white); border-radius:16px; width:100%; max-width:720px; box-shadow:var(--shadow);}
  .modal-head{padding:18px 22px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;}
  .modal-head h3{font-size:16px; color:var(--rice-dark);}
  .modal-close{background:none; border:none; font-size:20px; color:#9A9580;}
  .modal-body{padding:20px 22px; max-height:70vh; overflow:auto;}
  .modal-foot{padding:16px 22px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:10px;}
  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px 14px;}
  .form-grid .full{grid-column:1/-1;}
  .divider-lbl{font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--gold); margin:16px 0 8px; display:flex; align-items:center; gap:8px;}

  .quarter-bar{display:flex; gap:4px; margin-bottom:6px;}

  .quarter-bar .qseg.active{background:var(--gold);}
  .checkbox-row{display:flex; align-items:center; gap:8px;}

  .empty-state{text-align:center; padding:50px 20px; color:#9A9580;}

  .tag-role{font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:20px; background:var(--gold-soft); color:#5c4813;}
  .tag-role.owner{background:var(--rice-dark); color:#fff;}
  .tag-role.viewer{background:var(--paper-2); color:#8A8570;}

  ::-webkit-scrollbar{width:8px; height:8px;}

  html{-webkit-text-size-adjust:100%; text-size-adjust:100%;}

  #root{overflow-x:hidden;}
  .preview-banner{
    position:sticky; top:0; z-index:60; background:#fff3cd; color:#7a5b00;
    padding:10px 16px; text-align:center; font-size:13px; font-weight:600;

    background:none; border:none; padding:0; margin:0; color:#1a4d8f;
    text-decoration:underline; font-weight:700; font-size:inherit; cursor:pointer;

  @media (max-width:820px){
    .app-shell{flex-direction:column;}
    .sidebar{width:100%; flex-direction:row; overflow-x:auto; -webkit-overflow-scrolling:touch; padding:8px 10px;}
    .sidebar .brand{display:none;}
    .nav-item{flex-shrink:0; width:auto; white-space:nowrap; padding:10px 14px;}
    .grid3{grid-template-columns:1fr;}
    .form-grid{grid-template-columns:1fr;}
    .topbar{flex-wrap:wrap; padding:14px 16px; gap:10px;}
    .content{padding:16px;}
    .bell-panel{width:min(340px, calc(100vw - 32px)); right:-8px;}
    .modal-bg{padding:0; align-items:stretch;}
    .modal{max-width:100%; width:100%; min-height:100dvh; border-radius:0; display:flex; flex-direction:column;}
    .modal-body{max-height:none; flex:1;}

    .modal-foot{flex-wrap:wrap;}
    .modal-foot .btn{flex:1; min-width:120px;}

  @media (max-width:600px){
    .auth-card{padding:28px 20px;}
    .field input, .field select, .field textarea{font-size:16px; padding:12px 13px;}

    .toolbar input, .toolbar select{font-size:15px; padding:11px 12px; min-height:42px; flex:1 1 100%;}

    .btn-sm{padding:9px 12px; font-size:13px; min-height:38px;}
    .toolbar .btn{flex:1 1 100%;}
    table{font-size:14px;}
    th{font-size:12px; padding:11px 12px;}
    td{padding:12px; font-size:14px;}
    .table-wrap{border-radius:10px;}
    .panel-body{padding:14px;}
    .panel-head{padding:13px 14px;}
    .panel-head h3{font-size:14px;}
    .stat-card{padding:16px;}
    .stat-card .num{font-size:26px;}
    .kv-row{font-size:13.5px; padding:9px 0;}
    .divider-lbl{font-size:11px; margin:18px 0 10px;}
    .topbar h2{font-size:16px;}
    .modal-head h3{font-size:15px;}
    .nav-item{font-size:13px; padding:11px 14px; gap:8px;}
    .backup-actions .btn, .backup-actions{width:100%;}

  }

  /* ---- backup panel ---- */
  .backup-actions{display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;}

  /* ---- print area (khổ A4, ẩn trên màn hình) ---- */
  #print-area{display:none;}
  #print-area .print-header{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; font-size:13px; margin-bottom:6px;}
  #print-area .print-header-right{text-align:right;}
  #print-area .print-divider{margin-top:4px;}
  #print-area .print-title{text-align:center; font-size:16px; margin:18px 0 16px; letter-spacing:.01em;}
  #print-area .print-sec{font-size:13.5px; margin:16px 0 8px; text-decoration:underline;}
  #print-area table.print-table{width:100%; border-collapse:collapse; font-size:12.5px; margin-bottom:4px;}

  @media print{
    body *{ visibility:hidden; }
    #print-area, #print-area *{ visibility:visible; }
    #print-area{ display:block; position:absolute; left:0; top:0; width:100%; padding:0 8mm; color:#000; }
    .no-print{ display:none !important; }
    @page{ size:A4 portrait; margin:15mm 12mm; }
  }
</style>

<script>
(function(){
  const root = document.getElementById('root');
  const money = n => (Math.round((n||0)) ).toLocaleString('vi-VN') + ' đ';
  const fmtDate = d => { if(!d) return '—'; const x=new Date(d); return x.toLocaleDateString('vi-VN'); };
  const todayStr = () => new Date().toISOString().slice(0,10);
  const uid = () => Math.random().toString(36).slice(2,10);
  const daysBetween = (a,b) => Math.round((new Date(b)-new Date(a))/86400000);

  // =====================================================================
  // ---------- LỚP LƯU TRỮ ĐÁM MÂY (Firebase Realtime Database) ----------
  // Toàn bộ dữ liệu NGHIỆP VỤ CHUNG của một Xã (config, borrowers, expenses,
  // trash, activityLog, collaborators) được lưu dưới nhánh:
  //     data/{wardId}/...
  // Nhờ vậy nhiều Xã có thể dùng chung 1 đường link web mà dữ liệu tách biệt
  // hoàn toàn (mỗi Xã có một "Mã định danh cấp Xã" — wardId — riêng).
  // =====================================================================
  function wardId(){ return state.identity && state.identity.wardId; }
  function wref(sub){ return rtdb.ref(`data/${wardId()}/${sub}`); }
  // Phiên bản tổng quát — thao tác với BẤT KỲ mã xã nào (không nhất thiết là mã đang active),
  // dùng cho màn hình "Ví mã xã" (đa mã xã / multi-tenant): kiểm tra mã tồn tại chưa, xoá/khôi phục...
  function wrefFor(wid, sub){ return rtdb.ref(`data/${wid}/${sub}`); }
  async function cGetOnceFor(wid, sub, fallback){
    try{ const snap = await wrefFor(wid, sub).get(); return snap.exists() ? snap.val() : fallback; }
    catch(e){ console.error('Firebase đọc lỗi:', wid, sub, e); return fallback; }
  }
  // Email của Chủ trang web (superadmin) — người duy nhất có quyền thao tác
  // với "Thùng rác hệ thống" (nơi các mã xã bị Chủ mã xoá vĩnh viễn cuối cùng sẽ rơi vào).
  const SITE_OWNER_EMAIL = 'lookatmevanthanhpham@gmail.com';
  function isSiteOwner(){ return !!(state.identity && state.identity.email === SITE_OWNER_EMAIL); }

  function snapToArray(val){ return val ? Object.values(val) : []; }
  function byId(list){ const o={}; (list||[]).forEach(x=>{ if(x && x.id) o[x.id]=x; }); return o; }

  // Đọc 1 lần (dùng khi cần kiểm tra dữ liệu trước khi quyết định vào app/onboarding)
  async function cGetOnce(sub, fallback){
    try{ const snap = await wref(sub).get(); return snap.exists() ? snap.val() : fallback; }
    catch(e){ console.error('Firebase đọc lỗi:', sub, e); return fallback; }
  }
  // Ghi đè toàn bộ nhánh (dùng cho config, hoặc khôi phục sao lưu)
  async function cSet(sub, value){
    try{ await wref(sub).set(value); }catch(e){ console.error('Firebase set lỗi:', sub, e); alert('Không thể lưu dữ liệu lên máy chủ. Vui lòng kiểm tra kết nối mạng / cấu hình Firebase.'); }
  }
  // Cập nhật một phần của nhánh (merge, không ghi đè các trường khác)
  async function cUpdate(sub, partial){
    try{ await wref(sub).update(partial); }catch(e){ console.error('Firebase update lỗi:', sub, e); }
  }
  // Ghi/thêm 1 bản ghi trong 1 tập hợp (borrowers/{id}, expenses/{id}, trash/{id}...)
  async function cSetRecord(sub, id, record){
    try{ await wref(sub).child(id).set(record); }catch(e){ console.error('Firebase set record lỗi:', sub, id, e); }
  }
  // Xoá 1 bản ghi khỏi 1 tập hợp
  async function cRemoveRecord(sub, id){
    try{ await wref(sub).child(id).remove(); }catch(e){ console.error('Firebase remove lỗi:', sub, id, e); }
  }
  // Thêm bản ghi mới với key tự sinh bởi Firebase (dùng cho Nhật ký hoạt động)
  async function cPush(sub, value){
    try{ const ref = wref(sub).push(); await ref.set(value); return ref.key; }
    catch(e){ console.error('Firebase push lỗi:', sub, e); }
  }

  // ---------- LẮNG NGHE REALTIME (onValue) ----------
  // Thay cho polling — mọi thay đổi từ bất kỳ thiết bị nào (Xã/Ấp) sẽ đẩy
  // xuống ngay lập tức cho tất cả các thiết bị khác đang mở ứng dụng.
  let realtimeUnsubs = [];
  let dataAttached = false; // đã bind borrowers/expenses/trash/log hay chưa (chỉ bind khi KHÔNG "chờ duyệt")
  function attachRealtime(){
    detachRealtime();
    const bind = (sub, applyFn) => {
      const ref = wref(sub);
      const cb = snap => { applyFn(snap.val()); render(); };
      ref.on('value', cb);
      realtimeUnsubs.push(()=>ref.off('value', cb));
    };
    // config luôn được lắng nghe (cần để xác định vai trò / phát hiện bị Chủ mã xoá hoặc
    // đổi mật khẩu mã — kể cả khi tài khoản đang ở trạng thái "chờ duyệt"). Từ nay việc chia
    // sẻ quyền (Loại 1 công khai / Loại 2 đích danh) đều nằm sẵn trong config.publicPerms /
    // config.grants — không cần một node "collaborators" riêng như trước nữa.
    bind('config', v => {
      const hasEmail = !!(state.identity && state.identity.email);
      const isOwnerOfIt = hasEmail && v && v.ownerEmail === state.identity.email;
      state.config = v;
      if(v && v.deleted && !isOwnerOfIt){
        if(hasEmail) kickToWallet('Mã xã này đã bị Chủ mã xoá. Vui lòng liên hệ Chủ mã để biết thêm chi tiết.');
        else kickAnonymousToLogin('Mã định danh này đã bị Chủ mã xoá hoặc thay đổi.');
        return;
      }
      if(hasEmail && !isOwnerOfIt && v){
        const mine = (state.myWards||[]).find(w=>w.wardId===wardId());
        if(mine && typeof mine.av==='number' && (v.accessVersion||0)!==mine.av){
          kickToWallet('Chủ mã đã thay đổi cấu hình, vui lòng liên hệ Chủ mã để lấy mã mới.'); return;
        }
      }
      // Khách qua mã (không đăng nhập) không có "ví" để lưu accessVersion đã tham gia, nên
      // nếu Chủ mã đổi mật khẩu, họ chỉ mất quyền ở lần tải lại trang kế tiếp — hạn chế đã biết,
      // vì hệ thống không lưu phiên cho người dùng ẩn danh.
      maybeAttachData();
    });
    maybeAttachData();
  }
  function maybeAttachData(){
    if(dataAttached) return;
    if(isPending()){ render(); return; }
    dataAttached = true;
    const bind = (sub, applyFn) => {
      const ref = wref(sub);
      const cb = snap => { applyFn(snap.val()); render(); };
      ref.on('value', cb);
      realtimeUnsubs.push(()=>ref.off('value', cb));
    };
    bind('borrowers', v => { state.borrowers = snapToArray(v); });
    bind('expenses', v => { state.expenses = snapToArray(v); });
    bind('trash', v => { state.trash = snapToArray(v); });
    // Nhật ký: chỉ lấy 500 dòng gần nhất, sắp xếp mới nhất lên đầu
    const logRef = wref('activityLog').limitToLast(500);
    const logCb = snap => { state.log = snapToArray(snap.val()).sort((a,b)=> new Date(b.time)-new Date(a.time)); render(); };
    logRef.on('value', logCb);
    realtimeUnsubs.push(()=>logRef.off('value', logCb));
    render();
  }
  function detachRealtime(){ realtimeUnsubs.forEach(off=>off()); realtimeUnsubs = []; dataAttached = false; }
  // Văng người dùng (Khách đã đăng nhập Google) về màn hình "Ví mã xã" kèm thông báo — dùng
  // khi Chủ mã xoá hoặc đổi mật khẩu mã trong lúc Khách đang xem.
  function kickToWallet(message){
    detachRealtime();
    state.identity.wardId = '';
    setActiveWardCache('');
    state.config = null; state.borrowers=[]; state.expenses=[]; state.trash=[]; state.log=[];
    alert(message);
    loadWallet().then(()=>{ state.view = 'wallet'; render(); });
  }
  // Văng Khách qua mã KHÔNG đăng nhập (codeGuest) về màn hình đăng nhập ban đầu.
  function kickAnonymousToLogin(message){
    detachRealtime();
    alert(message);
    state.identity = null;
    state.config = null; state.borrowers=[]; state.expenses=[]; state.trash=[]; state.log=[];
    state.view = 'login';
    render();
  }

  // =====================================================================
  // ---------- LỚP LƯU TRỮ NỘI BỘ (chỉ trên máy — KHÔNG lên đám mây) -----
  // Dùng riêng cho module "Thu – Chi nội bộ" và cho "identity" (thông tin
  // đăng nhập của riêng thiết bị này). Dùng localStorage thật của trình
  // duyệt — không bao giờ gửi lên Firebase hay bất kỳ máy chủ nào.
  // =====================================================================
  function lget(key, fallback){
    try{ const v = localStorage.getItem(key); return v!==null ? JSON.parse(v) : fallback; }
    catch(e){ return fallback; }
  }
  function lset(key, value){
    try{
      if(value===null || value===undefined) localStorage.removeItem(key);
      else localStorage.setItem(key, JSON.stringify(value));
    }catch(e){ console.error('localStorage set lỗi', e); }
  }
  // Namespace theo wardId để nhiều Xã dùng chung 1 máy/trình duyệt không đụng dữ liệu của nhau
  function localKey(name){ return `hnd_local_${wardId()||'chung'}_${name}`; }

  // ---------- export / print / backup helpers ----------
  function downloadBlob(filename, content, mime){
    const blob = new Blob([content], {type: mime});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
  }

  // ---------- expense categories (Chi tiêu xã) ----------
  // Dùng KHOÁ nội bộ ổn định (không chứa danh xưng địa phương) để lưu trữ dữ liệu;

  const CAT_MEETING = 'CAT_MEETING';
  const CAT_SUPPLIES = 'CAT_SUPPLIES';
  const CAT_TRAINING = 'CAT_TRAINING';
  const CAT_BONUS = 'CAT_BONUS';

  const LEGACY_CAT_HAMLET = 'Trích về cho các khu dân cư/Ấp';

      case CAT_SUPPLIES: return 'Mua văn phòng phẩm';
      case CAT_TRAINING: return 'Chi công tác tập huấn';
      case CAT_BONUS: return 'Chi bồi dưỡng cán bộ hoạt động quỹ';
      case CAT_OTHER: return 'Chi khác';

    }

    acctQuarter:'q1',
    expSearch:'', expFilterCat:'',
    modal:null,           // {type:'borrower'|'expense'|'onboarding'|'settings'|'trashConfirm', payload}
    bellOpen:false,
    walletTrashOpen:false,
    previewMode:false,   // môi trường tham quan (không đăng nhập, dùng dữ liệu mẫu, mọi nút bấm bị vô hiệu hoá)
  };

  // =====================================================================
  // ---------- HỆ PHÂN QUYỀN MỚI (module-based, thay cho collaborators cũ) ----
  // Mỗi mã xã có 2 lớp chia sẻ, lưu trong config:
  //   config.publicPerms = {data,members,strength,internal} -> 'none'|'view'|'edit'
  //     áp dụng cho BẤT KỲ ai vào bằng đúng Mã định danh + mật khẩu (kể cả không đăng nhập Google)
  //   config.grants = { [emailKey]: {email, data,members,strength,internal,settings} }
  //     áp dụng riêng cho MỘT tài khoản Google cụ thể (Loại 2 — chia sẻ đích danh),
  //     override lên trên publicPerms; "settings" chỉ có ở đây, không có ở publicPerms.
  // Chủ mã (config.ownerEmail đúng bằng email đang đăng nhập) luôn full quyền mọi nơi.
  // =====================================================================
  const SHARE_MODULES = [
    {key:'data', label:'Sổ vay vốn'},
    {key:'members', label:'Hồ sơ hội viên'},
    {key:'strength', label:'Thực lực Hội'},
    {key:'internal', label:'Thu – Chi nội bộ'},
  ];
  const PERM_OPTIONS = [
    {v:'none', label:'Không được xem'},
    {v:'view', label:'Được quyền xem'},
    {v:'edit', label:'Được quyền sửa'},
  ];
  function isOwner(){
    return !!(state.identity && state.identity.email && state.config && state.identity.email === state.config.ownerEmail);
  }
  function myGrant(){
    if(!state.identity || !state.identity.email || !state.config) return null;
    return (state.config.grants||{})[emailToKey(state.identity.email)] || null;
  }
  // Quyền hiệu lực của TÔI với 1 trong 4 module dữ liệu ('data'|'members'|'strength'|'internal')
  function modulePerm(m){
    if(state.previewMode) return 'edit'; // môi trường tham quan: thấy đầy đủ giao diện, nút bấm sẽ bị vô hiệu hoá riêng
    if(isOwner()) return 'edit';
    if(!state.config) return 'none';
    const g = myGrant();
    if(g && g[m]) return g[m];
    return (state.config.publicPerms && state.config.publicPerms[m]) || 'none';
  }
  function canViewModule(m){ return modulePerm(m)!=='none'; }
  function canEditModule(m){ return modulePerm(m)==='edit'; }
  // Quyền vào/sửa "Cài đặt của mã định danh" — CHỈ cấp được qua Loại 2 (đích danh email), không có ở Loại 1 (công khai)
  function settingsPerm(){
    if(state.previewMode) return 'edit';
    if(isOwner()) return 'edit';
    const g = myGrant();
    return (g && g.settings) || 'none';
  }
  function canEditSettings(){ return isOwner() || settingsPerm()==='edit'; }
  function hasAnyWardAccess(){
    if(state.previewMode) return true;
    if(isOwner()) return true;
    if(settingsPerm()!=='none') return true;
    return SHARE_MODULES.some(m=>modulePerm(m.key)!=='none');
  }
  // "Đang chờ duyệt" CHỈ áp dụng cho khách đã đăng nhập Google & tham gia bằng mã (Loại 2 chưa được cấp gì).
  // Khách qua mã không đăng nhập (codeGuest) hoặc môi trường tham quan dùng riêng hệ publicPerms/preview, không có khái niệm này.
  function isPending(){
    if(state.previewMode) return false;
    if(!state.identity || !state.identity.email) return false;
    if(!wardId() || !state.config) return false;
    return !hasAnyWardAccess();
  }

  // ---------- danh xưng hành chính động (Xã/Phường, Ấp/Khu phố/Thôn...) ----------
  // Mọi nơi trong giao diện, biểu mẫu, và file xuất (Excel/Word/PDF/In) đều PHẢI
  // lấy danh xưng qua các hàm dưới đây — tuyệt đối không viết chết chữ "Xã"/"Ấp".
  const ADMIN_LEVEL_OPTIONS = ['Xã', 'Phường'];
  const SUB_ADMIN_OPTIONS = ['Khu dân cư', 'Ấp', 'Thôn', 'Khu phố', 'Xóm', 'Tổ', 'Khác'];
  // Loại đơn vị hành chính cấp Tỉnh (dùng ở "Thông tin cơ bản bắt buộc" — màn hình thiết lập ban đầu / Cài đặt)
  const PROVINCE_TYPE_OPTIONS = ['Tỉnh', 'Thành phố'];
  function provinceTitle(){
    const cfg = state.config||{};
    const t = PROVINCE_TYPE_OPTIONS.includes(cfg.provinceType) ? cfg.provinceType : '';
    const name = (cfg.provinceName||'').trim();
    return name ? `${t} ${name}`.trim() : '';
  }

  // Cấp quản lý: "Xã" hoặc "Phường" (mặc định "Xã" nếu chưa cấu hình)
  function adminLevelLabel(){
    const v = state.config && state.config.adminLevel;
    return ADMIN_LEVEL_OPTIONS.includes(v) ? v : 'Xã';
  }
  // Cấp cơ sở trực thuộc: "Ấp"/"Khu phố"/"Thôn"/... hoặc tên tự điền khi chọn "Khác"
  function subAdminLabel(){
    const cfg = state.config||{};
    const t = SUB_ADMIN_OPTIONS.includes(cfg.subAdminType) ? cfg.subAdminType : 'Ấp';
    if(t === 'Khác'){
      const custom = (cfg.subAdminCustom||'').trim();
      return custom || 'Khu dân cư';
    }
    return t;
  }
  function subAdminLabelLower(){ return subAdminLabel().toLowerCase(); }
  // "Xã Hưng Phước" / "Phường Bình Minh"
  function wardTitle(){
    const name = ((state.config && state.config.wardName)||'').trim();
    return name ? `${adminLevelLabel()} ${name}` : '';
  }
  function wardTitleUpper(){ return wardTitle().toUpperCase(); }
  // "HỘI NÔNG DÂN XÃ HƯNG PHƯỚC" / "HỘI NÔNG DÂN PHƯỜNG BÌNH MINH"
  function hoiNongDanTitle(){
    const t = wardTitleUpper();
    return t ? `HỘI NÔNG DÂN ${t}` : 'HỘI NÔNG DÂN';
  }
  // "Hội Nông dân Xã Hưng Phước" (không viết hoa toàn bộ — dùng trong câu văn thường)
  function hoiNongDanNatural(){
    const t = wardTitle();
    return t ? `Hội Nông dân ${t}` : 'Hội Nông dân';
  }
  function adminLevelLabelLower(){ return adminLevelLabel().toLowerCase(); }
  // "Danh sách các khu phố" / "Danh sách các ấp"
  function subAdminListLabel(){ return `Danh sách các ${subAdminLabelLower()}`; }

  async function pushLog(action, target){
    const entry = { id:uid(), time:new Date().toISOString(), user: state.identity.email, userName: state.identity.name, action, target };
    // Dùng push() để Firebase tự sinh key — mọi thiết bị đang mở sẽ nhận
    // ngay bản ghi mới qua listener onValue (không cần ghi đè cả mảng).
    await cPush('activityLog', entry);
  }

  const IDENTITY_KEY = 'hnd_identity'; // chỉ lưu trên máy này (localStorage), không đưa lên đám mây
  // Mỗi tài khoản Google (email) có thể sở hữu/tham gia NHIỀU mã xã (multi-tenant).
  // Máy này chỉ cache "mã xã đang xem gần nhất" để lần sau mở lên vào thẳng, còn danh sách
  // đầy đủ các mã xã (Ví mã xã) luôn được đọc lại từ Firebase: users/{email}/wards.
  function activeWardCacheKey(email){ return `hnd_active_ward_${emailToKey(email)}`; }
  // "Mã ẩn" — chuỗi định danh cố định, KHÔNG BAO GIỜ đổi dù người dùng đổi tên/mã định danh
  // hiển thị bao nhiêu lần. Dùng riêng cho mục đích quản trị (thu phí / kích hoạt gói VIP-PRO
  // sau này) — hoàn toàn không hiển thị hay tác động gì tới trải nghiệm người dùng thường.
  function genSecretId(){ return 'sec_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,10) + Math.random().toString(36).slice(2,10); }
  // Đảm bảo MỖI tài khoản Google đã đăng nhập đều có 1 Mã ẩn cấp-tài khoản — kể cả khi họ
  // chưa/không kết nối với mã xã nào (mã định danh để trống), theo đúng yêu cầu quản trị.
  async function ensureAccountSecretId(){
    try{
      const ref = rtdb.ref(`users/${emailToKey(state.identity.email)}/secretId`);
      const snap = await ref.get();
      if(!snap.exists()) await ref.set(genSecretId());
    }catch(e){ console.error('Không tạo được Mã ẩn cấp tài khoản:', e); }
  }
  function setActiveWardCache(wid){ lset(activeWardCacheKey(state.identity.email), wid||''); }
  function seenWelcomeKey(email){ return `hnd_seen_welcome_${emailToKey(email)}`; }

  // ---------- VÍ MÃ XÃ (multi-tenant wallet) ----------
  // users/{emailKey}/wards/{wardId}        = {kind:'owner'|'guest', wardName, addedAt, av}
  // users/{emailKey}/deletedWards/{wardId} = {wardId, wardName, deletedAt}  (thùng rác cấp tài khoản — chỉ của Chủ mã)
  // superadmin/trashWards/{wardId}         = {wardId, wardName, ownerEmail, deletedAt} (thùng rác hệ thống — chỉ site owner)
  function myWardsRef(){ return rtdb.ref(`users/${emailToKey(state.identity.email)}/wards`); }
  function myDeletedWardsRef(){ return rtdb.ref(`users/${emailToKey(state.identity.email)}/deletedWards`); }

  async function loadWallet(){
    const wardsSnap = await myWardsRef().get().catch(()=>null);
    const wardsObj = (wardsSnap && wardsSnap.exists()) ? wardsSnap.val() : {};
    state.myWards = await Promise.all(Object.entries(wardsObj).map(async ([wid, w])=>{
      const live = await cGetOnceFor(wid, 'config', null);
      return {
        wardId: wid, kind: w.kind, addedAt: w.addedAt, av: w.av||0,
        wardName: (live && live.wardName) || w.wardName || '',
        adminLevel: live && live.adminLevel,
        live: live ? { deleted: !!live.deleted, accessVersion: live.accessVersion||0, ownerEmail: live.ownerEmail } : { deleted:true, accessVersion:0 },
      };
    }));
    const delSnap = await myDeletedWardsRef().get().catch(()=>null);
    const delObj = (delSnap && delSnap.exists()) ? delSnap.val() : {};
    state.myDeletedWards = Object.values(delObj);
    if(isSiteOwner()){
      const trashSnap = await rtdb.ref('superadmin/trashWards').get().catch(()=>null);
      state.sysTrash = (trashSnap && trashSnap.exists()) ? Object.values(trashSnap.val()) : [];
    } else state.sysTrash = [];
  }

  // Tự động thêm 1 mục "Chia sẻ đích danh" (mặc định CHƯA cấp quyền gì — 'none' ở mọi module)
  // vào cfg.grants ngay khi có người dùng tài khoản Google tham gia (KHÁCH) bằng đúng Mã định
  // danh của Chủ mã. Nhờ vậy Chủ mã vào "Cài đặt & Chia sẻ" sẽ thấy sẵn tài khoản đó và chỉ
  // cần bấm chọn quyền Xem/Sửa cho từng mục, không cần gõ tay lại email.
  // Trả về true nếu VỪA thêm mới (cần ghi lại cfg lên Firebase), false nếu tài khoản đã có sẵn
  // trong danh sách chia sẻ đích danh từ trước (giữ nguyên quyền đã cấp, không ghi đè).
  function ensureGrantEntryForGuest(cfg, email, name){
    if(!email) return false;
    const key = emailToKey(email);
    cfg.grants = cfg.grants || {};
    if(cfg.grants[key]){
      // Đã tồn tại — chỉ bổ sung tên hiển thị nếu trước đó chưa có, KHÔNG đụng vào quyền đã cấp.
      let changed = false;
      if(name && !cfg.grants[key].name){ cfg.grants[key].name = name; changed = true; }
      cfg.grants[key].lastJoinedAt = new Date().toISOString();
      return changed; // chỉ cần ghi lại nếu có thay đổi tên hiển thị
    }
    cfg.grants[key] = {
      email, name: name||'',
      joinedAt: new Date().toISOString(), autoAdded: true,
      data:'none', members:'none', strength:'none', internal:'none', settings:'none',
    };
    return true;
  }

  // Tham gia (Khách) hoặc tạo mới (trở thành Chủ mã) một mã định danh cấp xã.
  // Trả về true nếu thành công (đã chuyển màn hình), false nếu bị chặn (sai mật khẩu...).
  async function joinOrCreateWard(widRaw, password){
    const wid = (widRaw||'').trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
    if(!wid || wid.length<3){ alert('Vui lòng nhập Mã định danh hợp lệ (tối thiểu 3 ký tự, chỉ gồm chữ thường/số/gạch dưới/gạch ngang).'); return false; }
    const existingCfg = await cGetOnceFor(wid, 'config', null);
    const emailKey = emailToKey(state.identity.email);
    if(!existingCfg){
      // Mã chưa tồn tại -> tài khoản này trở thành CHỦ MÃ, cần thiết lập cơ bản (onboarding)
      await rtdb.ref(`users/${emailKey}/wards/${wid}`).set({kind:'owner', wardName:'', addedAt:new Date().toISOString()});
      state.identity.wardId = wid;
      setActiveWardCache(wid);
      state._pendingAccessCode = password || '';
      state.config = null;
      state.view = 'onboarding';
      render();
      return true;
    }
    if(existingCfg.deleted){ alert('Mã xã này đã bị Chủ mã xoá, không thể tham gia. Vui lòng hỏi lại Chủ mã hoặc tạo mã khác.'); return false; }
    if(existingCfg.ownerEmail === state.identity.email){
      // Đã là Chủ mã của mã này (chỉ thiếu bản ghi trong Ví, ví dụ đăng nhập máy mới) -> tự phục hồi
      await rtdb.ref(`users/${emailKey}/wards/${wid}`).set({kind:'owner', wardName: existingCfg.wardName||'', addedAt:new Date().toISOString()});
    } else {
      if((existingCfg.accessCode||'') && existingCfg.accessCode !== (password||'')){
        alert('Sai mật khẩu mã xã. Vui lòng liên hệ Chủ mã để lấy đúng mật khẩu.');
        return false;
      }
      // Tự động đưa tài khoản KHÁCH này vào danh sách "Chia sẻ đích danh" của Chủ mã (Yêu cầu 2)
      if(ensureGrantEntryForGuest(existingCfg, state.identity.email, state.identity.name)){
        await wrefFor(wid, 'config').set(existingCfg);
      }
      await rtdb.ref(`users/${emailKey}/wards/${wid}`).set({kind:'guest', wardName: existingCfg.wardName||'', addedAt:new Date().toISOString(), av: existingCfg.accessVersion||0});
    }
    await enterWard(wid);
    return true;
  }

  function normalizeWardIdStr(s){ return (s||'').trim().toLowerCase().replace(/[^a-z0-9_-]/g,''); }

  // ---- Dùng cho màn hình "Thiết lập ban đầu" (yêu cầu 4): 2 hành động RIÊNG BIỆT, không tự suy đoán ----
  // [Tạo mã định danh cấp xã mới] — báo lỗi rõ nếu mã đã có người dùng.
  async function createWardStrict(widRaw, password){
    const wid = normalizeWardIdStr(widRaw);
    if(!wid || wid.length<3){ alert('Vui lòng nhập Mã định danh hợp lệ (tối thiểu 3 ký tự, chỉ gồm chữ thường/số/gạch dưới/gạch ngang).'); return false; }
    const existing = await cGetOnceFor(wid, 'config', null);
    if(existing && !existing.deleted){ alert('Mã định danh này đã tồn tại, vui lòng thay đổi ký tự khác để tránh trùng lặp'); return false; }
    const emailKey = emailToKey(state.identity.email);
    await rtdb.ref(`users/${emailKey}/wards/${wid}`).set({kind:'owner', wardName:'', addedAt:new Date().toISOString()});
    state.identity.wardId = wid;
    setActiveWardCache(wid);
    state._pendingAccessCode = password || '';
    state._pendingSecretId = genSecretId();
    state.config = null;
    state.view = 'onboarding';
    render();
    return true;
  }
  // [Tham gia bằng mã định danh cấp xã] — CHỈ tham gia mã đã có, không tự tạo mới.
  async function joinWardStrict(widRaw, password){
    const wid = normalizeWardIdStr(widRaw);
    const cfg = wid ? await cGetOnceFor(wid, 'config', null) : null;
    if(!cfg || cfg.deleted){ alert('Mã định danh này chưa tồn tại hoặc đã bị thay đổi.'); return false; }
    if((cfg.accessCode||'') !== (password||'')){ alert('Mã định danh này chưa tồn tại hoặc đã bị thay đổi.'); return false; }
    const emailKey = emailToKey(state.identity.email);
    if(cfg.ownerEmail === state.identity.email){
      await rtdb.ref(`users/${emailKey}/wards/${wid}`).set({kind:'owner', wardName: cfg.wardName||'', addedAt:new Date().toISOString()});
    } else {
      // Tự động đưa tài khoản KHÁCH này vào danh sách "Chia sẻ đích danh" của Chủ mã (Yêu cầu 2)
      if(ensureGrantEntryForGuest(cfg, state.identity.email, state.identity.name)){
        await wrefFor(wid, 'config').set(cfg);
      }
      await rtdb.ref(`users/${emailKey}/wards/${wid}`).set({kind:'guest', wardName: cfg.wardName||'', addedAt:new Date().toISOString(), av: cfg.accessVersion||0});
    }
    await enterWard(wid);
    return true;
  }
  // Tham gia bằng mã (Loại 1 công khai) mà KHÔNG cần đăng nhập Google — dùng ở màn hình đăng nhập.
  // Không có "Ví mã xã", quyền hạn hoàn toàn theo config.publicPerms của mã đó.
  async function joinWardAsCodeGuest(widRaw, password){
    const wid = normalizeWardIdStr(widRaw);
    const cfg = wid ? await cGetOnceFor(wid, 'config', null) : null;
    if(!cfg || cfg.deleted){ alert('Mã định danh này chưa tồn tại hoặc đã bị thay đổi.'); return false; }
    if((cfg.accessCode||'') !== (password||'')){ alert('Mã định danh này chưa tồn tại hoặc đã bị thay đổi.'); return false; }
    state.previewMode = false;
    state.identity = { name:'Khách qua mã (không đăng nhập)', email:null, photo:'', wardId: wid };
    state.config = cfg;
    state.activeTab = 'dashboard';
    state.view = 'app';
    attachRealtime();
    render();
    return true;
  }

  // ---- Môi trường THAM QUAN (yêu cầu 2): xem giao diện mẫu, không cần đăng nhập, không đụng Firebase ----
  function buildDemoState(){
    return {
      config: {
        wardName:'Bình Minh (Bản xem trước)', adminLevel:'Xã', subAdminType:'Ấp', subAdminCustom:'',
        provinceType:'Tỉnh', provinceName:'Bình Phước (Bản xem trước)',

        retainPercent:30, accessCode:'', accessVersion:0, deleted:false,

        {id:'d2', name:'Trần Thị B (mẫu)', cccd:'', phone:'', guarantor:'', address:'', hamlet:'Ấp 2', project:'Phương án vay trồng rau sạch', principal:15000000, rate:6, loanDate:'2026-02-01', dueDate:'2026-08-01', fundSource:'', prevBalance:0, interestPaid:200000, principalPaid:0, isExtended:false, extensionDueDate:'', checked:false, note:'', deleted:false},

  function enterPreviewMode(){
    const demo = buildDemoState();
    detachRealtime();
    state.previewMode = true;
    state.identity = { name:'Khách tham quan', email:null, photo:'', wardId:'demo' };
    state.config = demo.config;
    state.borrowers = demo.borrowers;
    state.expenses = demo.expenses;
    state.trash = demo.trash;
    state.log = demo.log;
    state.activeTab = 'dashboard';

  }
  function exitPreviewMode(){

  async function boot(){

    // Google đã xác thực, dùng để đối chiếu phân quyền Owner/Editor/Viewer/Khách.
    auth.onAuthStateChanged(async (user) => {
      if(!user){
        detachRealtime();

      const stillHave = cachedActive && state.myWards.some(w=>w.wardId===cachedActive && !(w.live && w.live.deleted));
      if(stillHave){ await enterWard(cachedActive); return; }

      }

  // ---------- interest engine ----------
  function periodRange(){
    if(state.reportMode==='quarter'){
      const q = state.config.quarters[state.reportQuarter];
      return { from:q.start, to:q.end };
    }
    return { from: state.reportFrom, to: state.reportTo };
  }
  function calcInterest(b, from, to){
    if(!from || !to) return {days:0, interest:0, due:0};
    const days = Math.max(0, daysBetween(from, to));
    const rate = parseFloat(b.rate)||0;
    const principal = parseFloat(b.principal)||0;
    const interest = principal * (rate/100) * (days/365);
    const prev = parseFloat(b.prevBalance)||0;
    return { days, interest: Math.round(interest), due: Math.round(interest + prev) };
  }
  function interestStatus(b, due){
    const paid = parseFloat(b.interestPaid)||0;
    const diff = Math.round(paid - due);
    if(diff===0) return {label:'Đã đóng đủ', cls:'pill-green', diff:0};
    if(diff<0) return {label:`Còn thiếu ${money(-diff)}`, cls:'pill-red', diff};
    return {label:`Đóng thừa ${money(diff)}`, cls:'pill-orange', diff};
  }
  function principalStatus(b){
    const principal = parseFloat(b.principal)||0;
    const paid = parseFloat(b.principalPaid)||0;
    const diff = Math.round(paid - principal);
    if(diff===0) return {label:'Đã đóng đủ', cls:'pill-green'};
    if(diff<0) return {label:`Còn thiếu ${money(-diff)}`, cls:'pill-red'};
    return {label:`Đóng thừa ${money(diff)}`, cls:'pill-orange'};
  }

  // ---------- notifications engine ----------
  function computeAlerts(){
    const alerts = [];
    const today = new Date(todayStr());
    if(!state.config) return alerts;
    // quarter end reminder (interest)
    Object.entries(state.config.quarters||{}).forEach(([qk,q])=>{
      if(!q.end) return;
      const d = daysBetween(todayStr(), q.end);
      if(d===15 || (d>=0 && d<=15)){
        alerts.push({color:'orange', text:`Sắp hết ${q.label||qk.toUpperCase()} (còn ${d} ngày) — nhắc thu lãi định kỳ`, key:'q-'+qk});
      }
    });
    state.borrowers.forEach(b=>{
      if(b.dueDate){
        const d = daysBetween(todayStr(), b.dueDate);
        if(d>=0 && d<=15) alerts.push({color:'red', text:`Gốc của ${b.name} (${b.hamlet}) đến hạn còn ${d} ngày`, key:'p-'+b.id});
        else if(d>0 && d<=30) alerts.push({color:'orange', text:`Gốc của ${b.name} (${b.hamlet}) đến hạn còn ${d} ngày`, key:'p-'+b.id});
        else if(d>0 && d<=60) alerts.push({color:'yellow', text:`Gốc của ${b.name} (${b.hamlet}) đến hạn còn ${d} ngày`, key:'p-'+b.id});
      }
      if(b.isExtended && b.extensionDueDate){
        const d = daysBetween(todayStr(), b.extensionDueDate);
        if(d>=0 && d<=15) alerts.push({color:'red', text:`Gia hạn của ${b.name} sắp hết (còn ${d} ngày)`, key:'e-'+b.id});
        else if(d>0 && d<=30) alerts.push({color:'orange', text:`Gia hạn của ${b.name} sắp hết (còn ${d} ngày)`, key:'e-'+b.id});
      }
    });
    return alerts;
  }
  function dashboardCounts(alerts){
    // one borrower counted at its most severe color among principal/extension alerts
    const sevMap = {};
    alerts.forEach(a=>{
      if(!a.key.startsWith('p-') && !a.key.startsWith('e-')) return;
      const id = a.key.slice(2);
      const rank = {yellow:1, orange:2, red:3};
      if(!sevMap[id] || rank[a.color] > rank[sevMap[id]]) sevMap[id] = a.color;
    });
    const counts = {yellow:0, orange:0, red:0};
    Object.values(sevMap).forEach(c=>counts[c]++);
    return counts;
  }

  // ---------- accounting engine (Thu - Chi cấp Xã) ----------
  function acctPeriodRange(mode, quarterKey){
    mode = mode || state.acctMode; quarterKey = quarterKey || state.acctQuarter;
    const q = state.config.quarters;
    if(mode==='all') return { from:'2000-01-01', to: todayStr() };
    if(mode==='quarter') return { from:q[quarterKey].start, to:q[quarterKey].end };
    // year: từ đầu Quý 1 đến cuối Quý 4
    return { from:q.q1.start, to:q.q4.end };
  }
  function computeAcctTotals(from, to){
    const retain = state.config.retainPercent||0;
    const activeBorrowers = state.borrowers.filter(b=>!b.deleted);
    const thu = activeBorrowers.reduce((s,b)=> s + calcInterest(b, from, to).due, 0);
    const giuLaiAp = Math.round(thu*retain/100);
    const xaNhan = Math.round(thu - giuLaiAp);
    const activeExpenses = state.expenses.filter(e=>!e.deleted && e.date && e.date>=from && e.date<=to);
    const chiTotal = activeExpenses.reduce((s,e)=> s + (parseFloat(e.amount)||0), 0);
    const chiByCategory = {};
    const chiByHamlet = {};
    activeExpenses.forEach(e=>{
      const label = e.purpose===CAT_OTHER ? `${CAT_OTHER}: ${e.purposeOther||'(chưa ghi rõ)'}` : (isCatHamlet(e.purpose) ? CAT_HAMLET : e.purpose);
      chiByCategory[label] = (chiByCategory[label]||0) + (parseFloat(e.amount)||0);
      if(isCatHamlet(e.purpose)){
        const h = e.hamlet || '—';
        chiByHamlet[h] = (chiByHamlet[h]||0) + (parseFloat(e.amount)||0);
      }
    });
    return { thu, xaNhan, giuLaiAp, chiTotal, chiByCategory, chiByHamlet, tonQuy: Math.round(xaNhan - chiTotal), expenses: activeExpenses };
  }

  // ---------- báo cáo tổng quan toàn xã (theo phương án vay) ----------
  function computeProjectOverview(){
    const active = state.borrowers.filter(b=>!b.deleted);
    const byProject = {};
    active.forEach(b=>{
      const p = b.project || '—';
      if(!byProject[p]) byProject[p] = { name:p, hamlets:new Set(), disbursed:0, recovered:0 };
      byProject[p].hamlets.add(b.hamlet||'—');
      byProject[p].disbursed += parseFloat(b.principal)||0;
      byProject[p].recovered += parseFloat(b.principalPaid)||0;
    });
    const list = Object.values(byProject).map(p=>{
      const outstanding = Math.max(0, Math.round(p.disbursed - p.recovered));
      return {
        name: p.name,
        hamlets: [...p.hamlets].join(', '),
        disbursed: Math.round(p.disbursed),
        recovered: Math.round(p.recovered),
        outstanding,
        status: outstanding>0 ? 'Đang hoạt động' : 'Đã tất toán',
      };
    }).sort((a,b)=>a.name.localeCompare(b.name));
    const activeCount = list.filter(p=>p.status==='Đang hoạt động').length;
    const settledCount = list.filter(p=>p.status==='Đã tất toán').length;
    const totalBorrowers = active.filter(b=> ((parseFloat(b.principal)||0) - (parseFloat(b.principalPaid)||0)) > 0 ).length;
    const totalOutstanding = list.reduce((s,p)=>s+p.outstanding,0);
    return { list, activeCount, settledCount, totalBorrowers, totalOutstanding };
  }

  // ---------- activity feed for bell (recent + alerts) ----------
  function bellItems(){
    const alerts = computeAlerts().map(a=>({type:'alert', ...a}));
    const recentLogs = state.log.slice(0,8).map(l=>({
      type:'log', color:'gray',
      text: `${l.userName||l.user} đã ${l.action} — ${l.target}`,
      time: l.time
    }));
    return [...alerts.map(a=>({...a,time:null})), ...recentLogs];
  }

      area.innerHTML = `
        <div class="divider-lbl">Tạo mã định danh cấp xã mới</div>
        <div class="form-grid">
          <div class="field"><label>Mã định danh mới *</label><input id="wc-new-id" placeholder="vd: xabinhminh" style="text-transform:lowercase;"></div>
          <div class="field"><label>Mật khẩu (không bắt buộc)</label><input id="wc-new-pass" type="password"></div>
        </div>
        <button class="btn btn-primary btn-block" id="wc-new-confirm">Xác nhận tạo mã</button>`;
      area.scrollIntoView({behavior:'smooth', block:'start'});
      document.getElementById('wc-new-confirm').onclick = async ()=>{
        if(!saveNameTitle()) return;
        await createWardStrict(document.getElementById('wc-new-id').value, document.getElementById('wc-new-pass').value);
      };
    };
    document.getElementById('wc-mode-join').onclick = ()=>{
      const area = document.getElementById('wc-subarea');
      area.innerHTML = `
        <div class="divider-lbl">Tham gia bằng mã định danh đã có</div>
        <div class="form-grid">
          <div class="field"><label>Mã định danh *</label><input id="wc-join-id" placeholder="vd: xabinhminh" style="text-transform:lowercase;"></div>
          <div class="field"><label>Mật khẩu (nếu có)</label><input id="wc-join-pass" type="password"></div>
        </div>
        <button class="btn btn-primary btn-block" id="wc-join-confirm">Tham gia bằng mã này</button>`;
      area.scrollIntoView({behavior:'smooth', block:'start'});
      document.getElementById('wc-join-confirm').onclick = async ()=>{
        if(!saveNameTitle()) return;
        await joinWardStrict(document.getElementById('wc-join-id').value, document.getElementById('wc-join-pass').value);
      };

    document.getElementById('wc-logout').onclick = async ()=>{ await auth.signOut(); };

  // "Ví mã xã" — màn hình toàn trang, hiện khi chưa chọn mã xã nào để làm việc
  // (sau khi đăng xuất mã xã, hoặc mã đang xem bị Chủ mã xoá/đổi mật khẩu).
  function renderWallet(){
    root.innerHTML = `
      <div class="center-screen" style="align-items:flex-start; padding:40px 16px;">
        <div class="auth-card" style="max-width:640px; text-align:left;">
          <div class="rice-badge" style="margin:0 0 14px;">🗂️</div>
          <h1 style="text-align:left;">Ví mã định danh cấp Xã/Phường</h1>
          <p class="sub" style="text-align:left;">${state.identity.name} · ${state.identity.email}</p>
          <div id="wallet-panel-mount"></div>
          <button class="btn btn-ghost btn-block" id="wallet-logout" style="margin-top:18px;">Đăng xuất tài khoản Google</button>
        </div>
      </div>`;
    renderWardWalletPanel(document.getElementById('wallet-panel-mount'), {embedded:false});
    document.getElementById('wallet-logout').onclick = async ()=>{ await auth.signOut(); };
  }

  // Màn hình chờ duyệt — hiện khi tài khoản là KHÁCH của mã xã đang chọn nhưng Chủ mã
  // chưa cấp quyền Xem/Sửa (và mã xã cũng không bật "Cho phép xem tự do").
  function renderPendingScreen(){
    root.innerHTML = `
      <div class="center-screen">
        <div class="auth-card">
          <div class="rice-badge">⏳</div>
          <h1>Quyền truy cập đang chờ duyệt</h1>
          <p class="sub">Bạn đã tham gia mã xã <b>${wardId()}</b>${state.config&&state.config.wardName?` (${wardTitle()})`:''} với vai trò KHÁCH,
            nhưng Chủ mã chưa cấp quyền Xem/Sửa cho tài khoản <b>${state.identity.email}</b>.</p>
          <p class="sub">Vui lòng liên hệ Chủ mã để được cấp quyền tại mục "Cài đặt &amp; Chia sẻ" của họ.</p>
          <button class="btn btn-primary btn-block" id="pd-wallet">↩ Quay lại Ví mã xã</button>
          <button class="btn btn-ghost btn-block" id="pd-remove" style="margin-top:8px;">Xoá mã này khỏi tài khoản</button>
        </div>
      </div>`;
    document.getElementById('pd-wallet').onclick = exitToWallet;
    document.getElementById('pd-remove').onclick = ()=> guestRemoveWard(wardId());
  }

  // ---------------------------------------------------------------------
  // Khối HTML/sự kiện dùng CHUNG cho "Ví mã xã" — tái sử dụng ở cả màn hình
  // toàn trang (renderWallet) lẫn nhúng trong tab "Cài đặt & Chia sẻ".
  // ---------------------------------------------------------------------
  function renderWardWalletPanel(mountEl, opts){
    const embedded = !!(opts && opts.embedded);
    const rows = state.myWards.slice().sort((a,b)=> (a.wardName||a.wardId).localeCompare(b.wardName||b.wardId));
    const rowHtml = w=>{
      const active = wardId()===w.wardId;
      const deleted = w.live && w.live.deleted;
      const needsReauth = w.kind==='guest' && w.live && (w.live.accessVersion||0) !== (w.av||0) && !deleted;
      return `
        <div class="ward-row ${active?'active':''}" data-ward="${w.wardId}" style="display:flex; align-items:center; gap:10px; padding:11px 12px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px; cursor:pointer; ${active?'background:rgba(47,74,60,.08); border-color:var(--rice-dark);':''}">
          <div style="flex:1; min-width:0;">
            <div style="font-weight:700; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${w.wardName || `(chưa đặt tên) — ${w.wardId}`}</div>
            <div class="sub" style="font-size:11.5px;">Mã: <span class="mono">${w.wardId}</span>${deleted?' · <span style="color:var(--red);">Đã bị Chủ mã xoá</span>':''}${needsReauth?' · <span style="color:var(--orange);">Cần nhập lại mật khẩu mới</span>':''}</div>
          </div>
          <span class="tag-role" style="background:${w.kind==='owner'?'#1f8a4c':'#1f6fa8'}; color:#fff; font-size:11px; padding:3px 9px; border-radius:20px; font-weight:700;">${w.kind==='owner'?'CHỦ MÃ':'KHÁCH'}</span>
          <button class="btn btn-ghost btn-sm" data-ward-remove="${w.wardId}" title="${w.kind==='owner'?'Xoá mã này':'Xoá khỏi tài khoản'}">🗑️</button>
        </div>`;
    };
    mountEl.innerHTML = `
      <div class="divider-lbl">Các mã xã của tôi (${rows.length})</div>
      ${rows.length? rows.map(rowHtml).join('') : '<div class="empty-state" style="padding:14px 0;">Bạn chưa sở hữu hoặc tham gia mã xã nào.</div>'}

      <div class="divider-lbl">Thêm / Tham gia mã xã</div>
      <div class="form-grid">
        <div class="field"><label>Mã định danh cấp Xã/Phường</label><input id="ww-wardid" placeholder="vd: xabinhminh" style="text-transform:lowercase;"></div>
        <div class="field"><label>Mật khẩu mã xã (nếu có)</label><input id="ww-pass" type="password" placeholder="Để trống nếu không có"></div>
      </div>
      <p class="sub" style="margin:-6px 0 12px;">Mã chưa tồn tại → bạn trở thành <b>CHỦ MÃ</b> và tạo mới. Mã đã có → bạn tham gia với vai trò <b>KHÁCH</b>.</p>
      <button class="btn btn-primary ${embedded?'':'btn-block'}" id="ww-join">+ Tham gia / Tạo mã định danh cấp xã mới</button>

      <div class="divider-lbl" id="ww-trash-toggle" style="cursor:pointer; user-select:none;">🗑️ Mã xã đã xoá của tôi (${state.myDeletedWards.length}) ${state.walletTrashOpen?'▴':'▾'}</div>
      <div id="ww-trash-body" style="${state.walletTrashOpen?'':'display:none;'}">
        ${state.myDeletedWards.length? state.myDeletedWards.map(d=>`
          <div class="kv-row"><span>${d.wardName||'(chưa đặt tên)'} <span class="sub">(${d.wardId})</span></span>
            <span style="display:flex; gap:8px;">
              <button class="btn btn-ghost btn-sm" data-restore-ward="${d.wardId}">Khôi phục</button>
              <button class="btn btn-ghost btn-sm" data-purge-ward="${d.wardId}" style="color:var(--red);">Xoá vĩnh viễn</button>
            </span>
          </div>`).join('') : '<div class="sub" style="padding:6px 0 14px;">Trống.</div>'}
      </div>

      ${isSiteOwner() ? `
        <div class="divider-lbl">🛡️ Thùng rác hệ thống (Quản trị viên trang web)</div>
        ${state.sysTrash.length? state.sysTrash.map(d=>`
          <div class="kv-row"><span>${d.wardName||'(chưa đặt tên)'} <span class="sub">(${d.wardId} — chủ cũ: ${d.ownerEmail})</span></span>
            <span style="display:flex; gap:8px;">
              <button class="btn btn-ghost btn-sm" data-super-restore="${d.wardId}">Khôi phục cho chủ</button>
              <button class="btn btn-ghost btn-sm" data-super-purge="${d.wardId}" style="color:var(--red);">Xoá vĩnh viễn</button>
            </span>
          </div>`).join('') : '<div class="sub" style="padding:6px 0 14px;">Trống.</div>'}
      ` : ''}
    `;

    mountEl.querySelectorAll('.ward-row').forEach(rowEl=>{
      rowEl.addEventListener('click', async (e)=>{
        if(e.target.closest('[data-ward-remove]')) return;
        const wid = rowEl.dataset.ward;
        const w = state.myWards.find(x=>x.wardId===wid);
        if(!w) return;
        if(w.live && w.live.deleted){ alert('Mã xã này đã bị Chủ mã xoá.'); return; }
        const needsReauth = w.kind==='guest' && w.live && (w.live.accessVersion||0) !== (w.av||0);
        if(needsReauth){
          const pass = prompt('Chủ mã đã đổi mật khẩu mã xã. Vui lòng nhập mật khẩu MỚI để tiếp tục:');
          if(pass===null) return;
          await joinOrCreateWard(wid, pass);
          return;
        }
        await enterWard(wid);
      });
    });
    mountEl.querySelectorAll('[data-ward-remove]').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.stopPropagation();
        const wid = btn.dataset.wardRemove;
        const w = state.myWards.find(x=>x.wardId===wid);
        if(w && w.kind==='owner') await ownerDeleteWard(wid);
        else await guestRemoveWard(wid);
        if(embedded){ /* renderSettingsTab tự render lại thông qua các hàm trên khi cần */ }
      };
    });
    mountEl.querySelector('#ww-join').onclick = async ()=>{
      const wid = mountEl.querySelector('#ww-wardid').value;
      const pass = mountEl.querySelector('#ww-pass').value;
      if(!wid.trim()){ alert('Vui lòng nhập mã xã.'); return; }
      await joinOrCreateWard(wid, pass);
    };
    mountEl.querySelector('#ww-trash-toggle').onclick = ()=>{ state.walletTrashOpen = !state.walletTrashOpen; render(); };
    mountEl.querySelectorAll('[data-restore-ward]').forEach(btn=> btn.onclick = ()=> restoreDeletedWard(btn.dataset.restoreWard));
    mountEl.querySelectorAll('[data-purge-ward]').forEach(btn=> btn.onclick = ()=> purgeDeletedWardToSuperadmin(btn.dataset.purgeWard));
    mountEl.querySelectorAll('[data-super-restore]').forEach(btn=> btn.onclick = ()=> superRestoreWard(btn.dataset.superRestore));
    mountEl.querySelectorAll('[data-super-purge]').forEach(btn=> btn.onclick = ()=> superPurgeForever(btn.dataset.superPurge));
  }

  // Nhãn "Danh sách các ..." dùng ngay tại màn hình thiết lập lần đầu (trước khi state.config tồn tại)
  function subAdminListLabelLocal(subType, customVal){
    const t = SUB_ADMIN_OPTIONS.includes(subType) ? subType : 'Ấp';
    const label = t==='Khác' ? ((customVal||'').trim()||'Đơn vị') : t;
    return `Danh sách các ${label.toLowerCase()}`;
  }

  // Màn hình "Thiết lập ban đầu" — dùng chung cho 2 luồng:
  //   1) Vừa TẠO MÃ ĐỊNH DANH MỚI (createWardStrict) -> state.identity.wardId đã có, sẽ lưu lên Firebase.
  //   2) Bấm "Bỏ qua thiết lập mã định danh" ở màn Welcome (state._onboardingSkipWard=true) -> không có
  //      Mã định danh nào, dữ liệu bắt buộc sẽ được lưu CỤC BỘ trên máy (identity.localProfile) để dùng
  //      tạm cho Thu–Chi nội bộ, và có thể tái sử dụng sau này nếu họ tạo/tham gia mã.
  // Yêu cầu 3 & 4: tách rõ "Thông tin cơ bản (bắt buộc)" và "Thiết lập nâng cao (có thể bỏ qua)";
  // cả 2 nút ở khối nâng cao đều dẫn tới cùng 1 kết quả — lưu dữ liệu bắt buộc + dữ liệu nâng cao (đã gõ
  // hoặc mặc định nếu bỏ trống) rồi vào thẳng giao diện chính.
  function renderOnboarding(){
    const skipWardMode = !!state._onboardingSkipWard && !wardId();
    const lp = (state.identity && state.identity.localProfile) || {};
    const cfg = state.config || { hamlets: lp.hamlets||[], projects: lp.projects||[], quarters: lp.quarters || {
      q1:{label:'Quý 1', start:'2026-01-01', end:'2026-03-31'}, q2:{label:'Quý 2', start:'2026-04-01', end:'2026-06-30'},
      q3:{label:'Quý 3', start:'2026-07-01', end:'2026-09-30'}, q4:{label:'Quý 4', start:'2026-10-01', end:'2026-12-31'}
    }, retainPercent: (lp.retainPercent!=null? lp.retainPercent : 30), wardName: lp.wardName||'', adminLevel: lp.adminLevel||'Xã',
      subAdminType: lp.subAdminType||'Ấp', subAdminCustom: lp.subAdminCustom||'', provinceType: lp.provinceType||'', provinceName: lp.provinceName||'',
      ownerEmail: state.identity.email, officerTitle: lp.officerTitle||'' };
    const curLevel = ADMIN_LEVEL_OPTIONS.includes(cfg.adminLevel) ? cfg.adminLevel : 'Xã';
    const curSub = SUB_ADMIN_OPTIONS.includes(cfg.subAdminType) ? cfg.subAdminType : 'Ấp';
    const curProvinceType = PROVINCE_TYPE_OPTIONS.includes(cfg.provinceType) ? cfg.provinceType : 'Tỉnh';
    root.innerHTML = `
      <div class="center-screen">
        <div class="auth-card" style="max-width:640px; text-align:left;">
          <div class="rice-badge" style="margin:0 0 14px;">⚙️</div>
          <h1 style="text-align:left;">Thiết lập cơ sở dữ liệu lõi</h1>
          <p class="sub" style="text-align:left;">Thiết lập lần đầu cho địa phương — có thể chỉnh sửa lại sau trong mục Cài đặt.</p>

          ${skipWardMode? `
          <div style="background:var(--paper-2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:4px;">
            <b style="font-size:13px; color:var(--rice-dark);">Bạn đã chọn bỏ qua bước kết nối Mã định danh cấp Xã.</b>
            <p class="sub" style="margin:4px 0 0; font-size:11.5px;">Thông tin bên dưới sẽ được lưu trên thiết bị này để dùng cho phần Thu–Chi nội bộ. Bạn có thể tạo hoặc tham gia Mã định danh bất cứ lúc nào sau này (mục "🗂️ Chọn / thêm mã xã").</p>
          </div>` : ''}

          <div class="divider-lbl" id="ob-required-anchor">📌 Thông tin cơ bản (bắt buộc)</div>
          <div class="form-grid">
            <div class="field"><label>Loại xã/phường *</label>
              <select id="ob-adminlevel">${ADMIN_LEVEL_OPTIONS.map(o=>`<option value="${o}" ${curLevel===o?'selected':''}>${o}</option>`).join('')}</select>
            </div>
            <div class="field"><label id="ob-ward-label">Tên riêng (${curLevel}) *</label><input id="ob-ward" placeholder="Ví dụ: Hưng Phước, Bình Minh..." value="${cfg.wardName||''}"></div>
            <div class="field"><label>Loại tỉnh/thành phố *</label>
              <select id="ob-provincetype">${PROVINCE_TYPE_OPTIONS.map(o=>`<option value="${o}" ${curProvinceType===o?'selected':''}>${o}</option>`).join('')}</select>
            </div>
            <div class="field"><label>Tên tỉnh/thành phố *</label><input id="ob-provincename" placeholder="Ví dụ: Bình Phước, Cần Thơ..." value="${cfg.provinceName||''}"></div>
            <div class="field"><label>Loại khu dân cư cấp dưới *</label>
              <select id="ob-subadmin">${SUB_ADMIN_OPTIONS.map(o=>`<option value="${o}" ${curSub===o?'selected':''}>${o}</option>`).join('')}</select>
            </div>
            <div class="field" id="ob-subadmin-custom-wrap" style="${curSub==='Khác'?'':'display:none;'}">
              <label>Tên gọi khác (tự điền) *</label>
              <input id="ob-subadmin-custom" placeholder="Ví dụ: Buôn, Bản, Sóc..." value="${cfg.subAdminCustom||''}">
            </div>
            <div class="field"><label>Chức vụ cán bộ</label><input id="ob-title" placeholder="Chủ tịch Hội Nông dân... (có thể để trống)" value="${cfg.officerTitle||''}"></div>
          </div>

          ${!skipWardMode? `
          <div class="field full" style="margin-top:4px;">
            <label>Mã định danh cấp Xã/Phường (đường dẫn lưu dữ liệu trên đám mây)</label>
            <input value="${state.identity.wardId||''}" disabled style="text-transform:lowercase; opacity:.75;">
            <p class="sub" style="margin:4px 0 0; font-size:11.5px;">
              Dữ liệu sẽ lưu tại <span class="mono">data/${state.identity.wardId||'...'}/...</span> trên Firebase. Hãy cung cấp đúng mã này (và mật khẩu, nếu bạn đặt) cho các cán bộ khác để họ tham gia chung dữ liệu.
            </p>
          </div>` : ''}

          <div style="border:1px dashed var(--gold); border-radius:12px; padding:14px 16px; margin-top:20px; background:rgba(199,154,43,.06);">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:2px;">
              <b style="font-size:13.5px; color:var(--rice-dark);">⚙️ Thiết lập nâng cao</b>
            </div>
            <p class="sub" style="margin:0 0 12px; font-size:11.5px;">💡 Có thể bỏ qua và thiết lập sau trong phần Cài đặt. Các mục dưới đây có thể để trống hoặc để mặc định.</p>

            <div class="divider-lbl" id="ob-hamlets-divider">${subAdminListLabelLocal(curSub, cfg.subAdminCustom)}</div>
            <div class="field"><textarea id="ob-hamlets" rows="2" placeholder="${curSub} 1, ${curSub} 2, ${curSub} 3...">${(cfg.hamlets||[]).join(', ')}</textarea></div>
            <p class="sub" style="margin:-6px 0 0; font-size:11.5px;">Nhập cách nhau bởi dấu phẩy, hãy thêm dấu phẩy vào ạ</p>

            <div class="divider-lbl">Phương án vay vốn hiện hành</div>
            <div class="field"><textarea id="ob-projects" rows="2" placeholder="Phương án vay chăn nuôi bò, Phương án vay trồng rau sạch...">${(cfg.projects||[]).join(', ')}</textarea></div>
            <p class="sub" style="margin:-6px 0 0; font-size:11.5px;">Nhập cách nhau bởi dấu phẩy, hãy thêm dấu phẩy vào ạ</p>

            <div class="divider-lbl">Mốc thời gian 4 Quý trong năm</div>
            <div class="form-grid">
              ${['q1','q2','q3','q4'].map(q=>`
                <div style="border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:var(--white);">
                  <label style="font-size:12.5px; font-weight:700; color:var(--rice-dark);">${cfg.quarters[q].label}</label>
                  <div style="display:flex; gap:8px; margin-top:6px;">
                    <input type="date" id="ob-${q}-start" value="${cfg.quarters[q].start||''}">
                    <input type="date" id="ob-${q}-end" value="${cfg.quarters[q].end||''}">
                  </div>
                </div>`).join('')}

            <div class="divider-lbl" id="ob-retain-divider">Tỷ lệ giữ lại tại ${curSub.toLowerCase()}</div>
            <div class="field"><input type="number" id="ob-retain" value="${cfg.retainPercent}" min="0" max="100"> <span class="sub" id="ob-retain-sub">% tổng lãi ${curSub.toLowerCase()} thu được — phần còn lại nộp lên ${curLevel.toLowerCase()}</span></div>

            <div style="display:flex; gap:10px; margin-top:14px;">
              <button class="btn btn-ghost" id="ob-skip" style="flex:1;">Bỏ qua, thiết lập sau</button>
              <button class="btn btn-primary" id="ob-save" style="flex:1;">Lưu và tiếp tục</button>
            </div>
          </div>
        </div>
      </div>`;

    // Ép trình duyệt cuộn xuống phần "Thông tin cơ bản (bắt buộc)" ngay khi vào màn hình này
    // (chỉ đến được đây sau khi bấm [Tạo mã định danh mới] hoặc [Bỏ qua thiết lập mã định danh] — yêu cầu 3).
    const anchorEl = document.getElementById('ob-required-anchor');
    if(anchorEl) setTimeout(()=> anchorEl.scrollIntoView({behavior:'smooth', block:'start'}), 60);

    // ---- cập nhật động các nhãn/placeholder khi người dùng đổi cấu hình danh xưng ----
    function currentSubLabel(){
      const t = document.getElementById('ob-subadmin').value;
      if(t==='Khác'){ const c=(document.getElementById('ob-subadmin-custom').value||'').trim(); return c || 'Đơn vị'; }
      return t;
    }
    function refreshAdminLabels(){
      const level = document.getElementById('ob-adminlevel').value;
      const sub = currentSubLabel();
      document.getElementById('ob-subadmin-custom-wrap').style.display = document.getElementById('ob-subadmin').value==='Khác' ? '' : 'none';
      document.getElementById('ob-ward-label').textContent = `Tên riêng (${level}) *`;
      document.getElementById('ob-hamlets-divider').textContent = `Danh sách các ${sub.toLowerCase()}`;
      document.getElementById('ob-hamlets').placeholder = `${sub} 1, ${sub} 2, ${sub} 3...`;
      document.getElementById('ob-retain-divider').textContent = `Tỷ lệ giữ lại tại ${sub.toLowerCase()}`;
      document.getElementById('ob-retain-sub').textContent = `% tổng lãi ${sub.toLowerCase()} thu được — phần còn lại nộp lên ${level.toLowerCase()}`;
    }
    document.getElementById('ob-adminlevel').onchange = refreshAdminLabels;
    document.getElementById('ob-subadmin').onchange = refreshAdminLabels;
    document.getElementById('ob-subadmin-custom').oninput = refreshAdminLabels;

    // ---- Yêu cầu 3: kiểm tra đầy đủ "Thông tin cơ bản bắt buộc" trước khi được đi tiếp ----
    // Dùng CHUNG cho cả 2 nút [Bỏ qua, thiết lập sau] / [Lưu và tiếp tục] — theo yêu cầu 4,
    // cả 2 nút phải bắt buộc đủ thông tin cơ bản như nhau, chỉ phần "nâng cao" là được phép trống.
    function validateRequired(){
      const wardNameVal = document.getElementById('ob-ward').value.trim();
      const provinceNameVal = document.getElementById('ob-provincename').value.trim();
      const subAdminType = document.getElementById('ob-subadmin').value;
      const subAdminCustom = document.getElementById('ob-subadmin-custom').value.trim();
      if(!wardNameVal){ alert(`Vui lòng nhập Tên riêng (${document.getElementById('ob-adminlevel').value}).`); document.getElementById('ob-ward').focus(); return null; }
      if(!provinceNameVal){ alert('Vui lòng nhập Tên tỉnh/thành phố.'); document.getElementById('ob-provincename').focus(); return null; }
      if(subAdminType==='Khác' && !subAdminCustom){ alert('Vui lòng nhập tên gọi khác cho cấp cơ sở trực thuộc.'); document.getElementById('ob-subadmin-custom').focus(); return null; }
      return { wardNameVal, provinceNameVal, subAdminType, subAdminCustom };
    }

    // ---- Yêu cầu 4: cả 2 nút cùng chung 1 kết quả — lưu dữ liệu bắt buộc + dữ liệu nâng cao
    // (đã gõ hoặc mặc định nếu để trống), rồi vào ngay giao diện chính ----
    async function finishOnboarding(){
      const req = validateRequired();
      if(!req) return;
      const baseFields = {
        wardName: req.wardNameVal,
        adminLevel: document.getElementById('ob-adminlevel').value,
        provinceType: document.getElementById('ob-provincetype').value,
        provinceName: req.provinceNameVal,
        subAdminType: req.subAdminType, subAdminCustom: req.subAdminCustom,
        officerTitle: document.getElementById('ob-title').value.trim(),
        hamlets: document.getElementById('ob-hamlets').value.split(',').map(s=>s.trim()).filter(Boolean),
        projects: document.getElementById('ob-projects').value.split(',').map(s=>s.trim()).filter(Boolean),
        quarters: {
          q1:{label:'Quý 1', start:document.getElementById('ob-q1-start').value, end:document.getElementById('ob-q1-end').value},
          q2:{label:'Quý 2', start:document.getElementById('ob-q2-start').value, end:document.getElementById('ob-q2-end').value},
          q3:{label:'Quý 3', start:document.getElementById('ob-q3-start').value, end:document.getElementById('ob-q3-end').value},
          q4:{label:'Quý 4', start:document.getElementById('ob-q4-start').value, end:document.getElementById('ob-q4-end').value},
        },
        retainPercent: parseFloat(document.getElementById('ob-retain').value)||0,
      };

      if(skipWardMode){
        // Không có Mã định danh -> lưu CỤC BỘ trên thiết bị (không đẩy lên Firebase)
        state.identity.localProfile = { ...baseFields, savedAt: new Date().toISOString() };
        lset(IDENTITY_KEY, state.identity);
        lset(seenWelcomeKey(state.identity.email), true);
        delete state._onboardingSkipWard;
        state.view = 'app';
        state.activeTab = 'internal';
        render();
        return;
      }

      const newCfg = {
        ...baseFields,
        ownerEmail: cfg.ownerEmail,
        // ---- đa mã xã: mật khẩu mã (không bắt buộc) + trạng thái xoá ----
        accessCode: state._pendingAccessCode || '',
        accessVersion: 0,
        deleted: false,
        // ---- phân quyền chia sẻ (Loại 1 công khai / Loại 2 đích danh) — mặc định chưa chia sẻ gì ----
        publicPerms: {data:'none', members:'none', strength:'none', internal:'none'},
        grants: {},
        // ---- "Mã ẩn" cố định, không đổi dù đổi tên/mã định danh sau này — phục vụ quản lý VIP/PRO ----
        secretId: state._pendingSecretId || genSecretId(),
      };
      state.config = newCfg;
      await cSet('config', newCfg); // ghi lên data/{wardId}/config trên Firebase
      delete state._pendingAccessCode;
      delete state._pendingSecretId;
      // Cập nhật lại tên hiển thị của mã này trong Ví mã xã của Chủ mã
      await rtdb.ref(`users/${emailToKey(state.identity.email)}/wards/${wardId()}`).set({kind:'owner', wardName:req.wardNameVal, addedAt:new Date().toISOString()});
      state.view = 'app';
      attachRealtime();
      render();
    }

    document.getElementById('ob-save').onclick = finishOnboarding;
    document.getElementById('ob-skip').onclick = finishOnboarding;
  }

  function describeAccess(){
    if(state.previewMode) return 'Môi trường tham quan';
    if(!wardId()) return 'Chưa chọn mã xã';
    if(!state.identity.email) return 'Khách qua mã (không đăng nhập)';
    if(isOwner()) return 'Chủ mã (CHỦ MÃ)';
    if(isPending()) return 'Đang chờ Chủ mã duyệt';
    return 'Khách — đã được cấp quyền';

          </div>
          <div class="content" id="content"></div>
        </div>
      </div>`;
    document.querySelectorAll('.nav-item').forEach(el=>{
      el.onclick = ()=>{ state.activeTab = el.dataset.tab; state.bellOpen=false; render(); };
    });
    document.getElementById('bell-btn').onclick = (e)=>{ e.stopPropagation(); state.bellOpen = !state.bellOpen; render(); };
    const pvLogin = document.getElementById('pv-login');
    if(pvLogin) pvLogin.onclick = exitPreviewMode;
    const pvGuide = document.getElementById('pv-guide');
    if(pvGuide) pvGuide.onclick = ()=>{ state.activeTab='guide'; render(); };
    const wardLogoutBtn = document.getElementById('ward-logout-btn');
    if(wardLogoutBtn) wardLogoutBtn.onclick = exitToWallet;
    const gotoWalletBtn = document.getElementById('ward-goto-wallet');

    if(codeGuestLogoutBtn) codeGuestLogoutBtn.onclick = ()=>{

      state.identity = null;
      state.config=null; state.borrowers=[]; state.expenses=[]; state.trash=[]; state.log=[];
      state.view = 'login'; render();

    if(logoutBtn) logoutBtn.onclick = async ()=>{
      if(state.previewMode){ exitPreviewMode(); return; }
      detachRealtime();
      state.config = null; state.borrowers=[]; state.expenses=[]; state.trash=[]; state.log=[];
      await auth.signOut(); // auth.onAuthStateChanged (trong boot()) sẽ tự dọn identity & chuyển về màn hình đăng nhập
    };
    document.addEventListener('click', ()=>{ if(state.bellOpen){ state.bellOpen=false; render(); } }, {once:true});

    const content = document.getElementById('content');
    if(state.activeTab==='dashboard') renderDashboard(content, alerts);
    else if(state.activeTab==='data') renderDataTab(content);
    else if(state.activeTab==='expenses') renderExpensesTab(content);
    else if(state.activeTab==='reports') renderReportsTab(content);
    else if(state.activeTab==='internal') renderInternalTab(content);
    else if(state.activeTab==='members') renderMembersTab(content);
    else if(state.activeTab==='strength') renderStrengthTab(content);
    else if(state.activeTab==='trash') renderTrashTab(content);
    else if(state.activeTab==='log') renderLogTab(content);
    else if(state.activeTab==='settings') renderSettingsTab(content);
    else if(state.activeTab==='guide') renderGuideTab(content);
    else if(state.activeTab==='about') renderAboutTab(content);

    // Chỉ dựng modal khi chưa có modal nào đang mở trên màn hình — tránh bị
    // dựng chồng nhiều lớp modal mỗi khi có dữ liệu mới đẩy về qua realtime.
    if(state.modal && !document.querySelector('.modal-bg') && !state.previewMode){
      if(state.modal.type==='expense') renderExpenseModal();
      else renderModal();
    }

    // Môi trường THAM QUAN: mọi nút bấm/ô nhập bên trong nội dung module đều bị vô hiệu hoá —
    // người xem được phép chuyển tab thoải mái nhưng chỉ xem giao diện mẫu, không sửa được gì.
    if(state.previewMode){
      content.querySelectorAll('button, input, select, textarea').forEach(elx=>{ elx.disabled = true; });
    }
  }

  function borrowerRowStatus(b){
    const {from,to} = periodRange();
    const calc = calcInterest(b, from, to);
    return {calc, iStatus: interestStatus(b, calc.due), pStatus: principalStatus(b)};
  }

    document.getElementById('f-hamlet').onchange = e=>{ state.filterHamlet=e.target.value; renderDataTab(el); };
    document.getElementById('f-project').onchange = e=>{ state.filterProject=e.target.value; renderDataTab(el); };

    document.querySelectorAll('[data-check]').forEach(cb=>{
      cb.onchange = async ()=>{
        const b = state.borrowers.find(x=>x.id===cb.dataset.check);
        b.checked = cb.checked;
        await cSetRecord('borrowers', b.id, b);
        await pushLog('cập nhật', `tích chọn hộ ${b.name}`);
      };
    });
  }

  function bindAcctPeriodSelector(prefix, onChange){
    document.getElementById(`${prefix}-mode`).onchange = e=>{ state.acctMode = e.target.value; onChange(); };
    const qsel = document.getElementById(`${prefix}-quarter`);
    if(qsel) qsel.onchange = e=>{ state.acctQuarter = e.target.value; onChange(); };
  }

  function emptyExpense(){
    return { id: uid(), date: todayStr(), purpose: CAT_MEETING, purposeOther:'', hamlet:(state.config.hamlets||[])[0]||'', amount:0, note:'' };
  }

    let list = state.expenses.filter(e=>!e.deleted);
    if(state.expSearch) list = list.filter(e => (e.note+e.purposeOther+e.hamlet).toLowerCase().includes(state.expSearch.toLowerCase()));
    if(state.expFilterCat) list = list.filter(e=>e.purpose===state.expFilterCat);
    list = [...list].sort((a,b)=> (b.date||'').localeCompare(a.date||''));

    el.innerHTML = `
      <div class="panel"><div class="panel-head"><h3>Kỳ hạch toán đang xem</h3></div>
        <div class="panel-body"><div class="toolbar" style="margin:0;">${acctPeriodSelectorHtml('exp')}</div>

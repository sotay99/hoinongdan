<!-- ================= FIREBASE SDK (Realtime Database + Storage) ================= -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script>
  /* =====================================================================
     CẤU HÌNH FIREBASE — THAY CÁC GIÁ TRỊ BÊN DƯỚI BẰNG THÔNG SỐ DỰ ÁN
     FIREBASE THẬT CỦA ĐỒNG CHÍ (lấy tại Firebase Console > Project settings
     > General > Your apps > SDK setup and configuration).
     Sau khi thay xong, toàn bộ dữ liệu "Sổ vay vốn / Chi tiêu Xã / Nhật ký /
     Thùng rác / Cộng tác viên" sẽ tự động lưu & đồng bộ realtime trên
     Firebase Realtime Database. Dữ liệu module "Thu – Chi nội bộ" KHÔNG
     dùng cấu hình này — xem phần LOCAL-ONLY STORAGE bên dưới.

     ĐỂ BẬT ĐĂNG NHẬP GOOGLE THẬT (bắt buộc cho phần Auth bên dưới hoạt động):
     1) Vào Firebase Console > Authentication > Sign-in method > bật "Google".
     2) Vào Authentication > Settings > Authorized domains > thêm đúng tên
        miền (domain) nơi đồng chí sẽ host file HTML này (vd: tên miền
        Netlify/GitHub Pages/website riêng). Thiếu bước này Google sẽ báo lỗi
        "auth/unauthorized-domain" khi bấm đăng nhập.
     3) Vai trò (Owner/Editor/Viewer) KHÔNG cấu hình ở đây — Owner là người
        dùng email Google đăng nhập đầu tiên để "Thiết lập cơ sở dữ liệu lõi"
        (thường là Chủ tịch Hội), còn Editor/Viewer do Owner tự thêm bằng
        đúng email Google của cấp dưới tại mục "Cài đặt & Chia sẻ" trong app.
  ===================================================================== */
  const firebaseConfig = {
    apiKey: "AIzaSyAzt664dL14cJJnvCx7WdRD7WuZtUkdZs0",
    authDomain: "congtachoinongdan.firebaseapp.com",
    databaseURL: "https://congtachoinongdan-default-rtdb.firebaseio.com",
    projectId: "congtachoinongdan",
    storageBucket: "congtachoinongdan.firebasestorage.app",
    messagingSenderId: "98189524222",
    appId: "1:98189524222:web:930e6897cced900b1a79af"
  };
  firebase.initializeApp(firebaseConfig);
  const rtdb = firebase.database();
  const auth = firebase.auth();
  const storage = firebase.storage(); // dùng cho Module "Huấn luyện AI" — lưu file gốc .docx/.xlsx/ảnh
  // Ép luôn hiện màn hình chọn tài khoản Google (tránh tự động đăng nhập lại
  // tài khoản Google gần nhất khi máy có nhiều tài khoản Google khác nhau).
  const googleProvider = new firebase.auth.GoogleAuthProvider();
  googleProvider.setCustomParameters({ prompt: 'select_account' });
  // GHI NHỚ ĐĂNG NHẬP VĨNH VIỄN trên thiết bị (Local Persistence) — mặc định Firebase Auth JS SDK
  // đã dùng chế độ này, nhưng ta khai báo TƯỜNG MINH để chắc chắn tuyệt đối: chỉ cần đăng nhập
  // đúng 1 lần, tắt hẳn trình duyệt hay khởi động lại máy vẫn giữ nguyên phiên đăng nhập (lưu ở
  // IndexedDB/localStorage của trình duyệt) cho tới khi người dùng CHỦ ĐỘNG bấm "Đăng xuất".
  const authPersistenceReady = auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
    .catch(e => console.error('Không thiết lập được Local Persistence cho Firebase Auth (sẽ dùng mặc định của trình duyệt):', e));
</script>
<style>
  :root{
    --paper:#FBF7EE;
    --paper-2:#F3EEE0;
    --ink:#25321F;
    --rice-dark:#2F4A3C;
    --rice:#3E6350;
    --moss:#6B8F71;
    --gold:#C79A2B;
    --gold-soft:#E9D9AC;
    --clay:#B5551F;
    --line:#DCD4BE;
    --yellow:#E8B93B;
    --orange:#DD7A34;
    --red:#C1443C;
    --green:#4C7A52;
    --white:#FFFEFB;
    --shadow: 0 1px 2px rgba(37,50,31,.06), 0 4px 14px rgba(37,50,31,.06);
    --r: 10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  #root{
    font-family:'Be Vietnam Pro',sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    line-height:1.4;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  h1,h2,h3{font-family:'Be Vietnam Pro',sans-serif; margin:0; letter-spacing:-.01em;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  /* ---- layout shells ---- */
  .center-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
  .auth-card{
    background:var(--white); border:1px solid var(--line); border-radius:16px;
    padding:40px 36px; max-width:420px; width:100%; box-shadow:var(--shadow);
    text-align:center;
  }
  .rice-badge{
    width:56px; height:56px; margin:0 auto 16px; border-radius:14px;
    background:linear-gradient(145deg,var(--rice),var(--rice-dark));
    display:flex; align-items:center; justify-content:center; font-size:26px;
  }
  .auth-card h1{font-size:20px; color:var(--rice-dark); margin-bottom:6px;}
  .auth-card p.sub{color:#7A7A66; font-size:13.5px; margin:0 0 24px;}
  .field{margin-bottom:14px; text-align:left;}
  .field label{display:block; font-size:12.5px; font-weight:600; color:var(--rice-dark); margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
    background:var(--paper); font-size:14px; color:var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--gold-soft); border-color:var(--gold);}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:10px 18px; border-radius:8px; border:1px solid transparent;
    font-size:13.5px; font-weight:600; transition:.15s; min-height:40px; line-height:1.2;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-primary{background:var(--rice-dark); color:var(--white);}
  .btn-primary:hover{background:var(--rice);}
  .btn-gold{background:var(--gold); color:#3A2C05;}
  .btn-gold:hover{filter:brightness(1.06);}
  .btn-ghost{background:transparent; border-color:var(--line); color:var(--rice-dark);}
  .btn-ghost:hover{background:var(--paper-2);}
  .btn-danger{background:var(--red); color:var(--white);}
  .btn-danger:hover{filter:brightness(1.08);}
  .btn-block{width:100%;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .btn-sm{padding:6px 10px; font-size:12px; border-radius:6px;}

  /* ---- app shell ---- */
  .app-shell{display:flex; min-height:100vh;}
  .sidebar{
    width:220px; flex-shrink:0; background:var(--rice-dark); color:var(--paper);
    display:flex; flex-direction:column; padding:22px 14px;
  }
  .sidebar .brand{display:flex; align-items:center; gap:10px; padding:0 6px 20px; border-bottom:1px solid rgba(255,255,255,.12); margin-bottom:16px;}
  .sidebar .brand .ico{font-size:22px;}
  .sidebar .brand .txt{font-size:13.5px; font-weight:700; line-height:1.25;}
  .sidebar .brand .txt small{display:block; font-weight:400; opacity:.7; font-size:11px;}
  .nav-item{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px;
    color:rgba(255,255,255,.78); font-size:13.5px; font-weight:500; margin-bottom:2px; border:none; background:none; width:100%; text-align:left;
  }
  .nav-item .badge{margin-left:auto; background:var(--red); color:#fff; font-size:10.5px; font-weight:700; padding:1px 6px; border-radius:20px;}
  .nav-item:hover{background:rgba(255,255,255,.08); color:#fff;}
  .nav-item.active{background:var(--gold); color:#3A2C05;}
  .sidebar .foot{margin-top:auto; padding-top:14px; border-top:1px solid rgba(255,255,255,.12); font-size:11.5px; color:rgba(255,255,255,.55);}

  .main{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:16px 26px; border-bottom:1px solid var(--line); background:var(--white);
  }
  .topbar h2{font-size:18px; color:var(--rice-dark);}
  .topbar .sub{font-size:12px; color:#8A8570; margin-top:2px;}
  .top-actions{display:flex; align-items:center; gap:10px; position:relative;}
  .content{padding:22px 26px; overflow:auto;}

  .bell-btn{position:relative; background:var(--paper-2); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:16px;}
  .bell-dot{position:absolute; top:4px; right:5px; width:8px; height:8px; border-radius:50%; background:var(--red); border:2px solid var(--white);}
  .bell-panel{
    position:absolute; top:44px; right:0; width:340px; max-height:420px; overflow:auto;
    background:var(--white); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); z-index:50;
  }
  .bell-panel .bp-head{padding:12px 14px; font-weight:700; font-size:13px; border-bottom:1px solid var(--line); color:var(--rice-dark);}
  .bell-item{padding:11px 14px; border-bottom:1px solid var(--paper-2); font-size:12.5px; display:flex; gap:8px;}
  .bell-item .dotc{width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0;}
  .bell-empty{padding:26px 14px; text-align:center; color:#9A9580; font-size:12.5px;}

  .avatar{width:32px; height:32px; border-radius:50%; background:var(--gold-soft); color:#5c4813; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;}

  /* dashboard */
  .grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:22px;}
  .stat-card{border-radius:14px; padding:18px 20px; color:#fff; position:relative; overflow:hidden;}
  .stat-card .num{font-family:'JetBrains Mono',monospace; font-size:34px; font-weight:700; line-height:1;}
  .stat-card .lbl{font-size:12.5px; margin-top:6px; opacity:.92; font-weight:600;}
  .stat-card .sub{font-size:11px; opacity:.75; margin-top:3px;}
  .stat-yellow{background:linear-gradient(135deg,#E8B93B,#C99420);}
  .stat-orange{background:linear-gradient(135deg,#DD7A34,#B8591C);}
  .stat-red{background:linear-gradient(135deg,#C1443C,#96271F);}

  .panel{background:var(--white); border:1px solid var(--line); border-radius:14px; margin-bottom:18px;}
  .panel-head{padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;}
  .panel-head h3{font-size:14.5px; color:var(--rice-dark);}
  .panel-body{padding:16px 18px;}

  table{width:100%; border-collapse:collapse; font-size:12.8px;}
  th{text-align:left; padding:9px 10px; background:var(--paper-2); color:var(--rice-dark); font-weight:700; font-size:11.5px; text-transform:uppercase; letter-spacing:.02em; white-space:nowrap; position:sticky; top:0;}
  td{padding:9px 10px; border-bottom:1px solid var(--paper-2); white-space:nowrap;}
  tr:hover td{background:#FCFAF3;}
  .table-wrap{overflow:auto; -webkit-overflow-scrolling:touch; max-width:100%; max-height:60vh; border:1px solid var(--line); border-radius:10px;}
  .money{font-family:'JetBrains Mono',monospace; font-weight:600;}
  /* Cột "dính" bên trái khi cuộn ngang — dùng cho cột icon-sửa + cột tên (người vay/phương án vay) */
  .sv-sticky-1{ position:sticky; left:0; z-index:2; width:40px; min-width:40px; }
  /* Khung dropdown bộ lọc đa chọn (Ấp/Phương án vay/Quý/Năm) ở Sổ vay vốn */
  .sv-filter-dropdown{ position:relative; display:inline-block; }
  .sv-filter-panel{ position:absolute; top:calc(100% + 4px); left:0; z-index:50; background:var(--white); border:1px solid var(--line); border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.18); padding:8px; min-width:220px; max-height:280px; overflow-y:auto; }
  .sv-filter-item{ display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; font-size:12.5px; cursor:pointer; white-space:nowrap; }
  .sv-filter-item:hover{ background:var(--paper-2); }
  .sv-filter-item input:disabled + span{ opacity:.35; }
  .sv-filter-item.disabled{ opacity:.4; cursor:not-allowed; }
  .sv-filter-divider{ height:1px; background:var(--line); margin:6px 0; }
  .sv-sticky-2{ position:sticky; left:40px; z-index:2; }
  thead .sv-sticky-1, thead .sv-sticky-2{ z-index:3; background:var(--paper-2); }
  .sv-sticky-1, .sv-sticky-2{ box-shadow:2px 0 4px -2px rgba(0,0,0,.15); }
  /* Cột dính riêng cho modal "Tính tiền lãi và phê duyệt đóng lãi" — cột đầu là checkbox "Đã đóng
     lãi" nên cần rộng hơn cột icon-bút bình thường (40px) để chứa chữ. */
  .ia-sticky-1{ position:sticky; left:0; z-index:2; min-width:110px; text-align:center; }
  .ia-sticky-2{ position:sticky; left:92px; z-index:2; }
  thead .ia-sticky-1, thead .ia-sticky-2{ z-index:3; background:var(--paper-2); }
  .ia-sticky-1, .ia-sticky-2{ box-shadow:2px 0 4px -2px rgba(0,0,0,.15); }
  /* Tiêu đề nhóm dùng CHUNG cho mọi bảng ở Sổ vay vốn (Danh sách người vay, {Thống kê chung}, Thùng
     rác, modal Tính tiền lãi và phê duyệt đóng lãi, và mọi bảng tương lai) — nền xanh lá nhạt mờ
     ảo, chữ đen in đậm, viền đen mảnh. */
  .sv-group-header{ background:rgba(76,175,80,.10); color:#000; font-weight:800; padding:10px 14px; border-radius:8px; font-size:13.5px; margin-bottom:8px; border:1px solid #000; }
  .sv-group-header-th{ background:rgba(76,175,80,.10) !important; color:#000 !important; font-weight:800; border:1px solid #000 !important; }
  .pill{display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:700;}
  .pill-green{background:#E3EFE2; color:var(--green);}
  .pill-red{background:#F7E1DF; color:var(--red);}
  .pill-orange{background:#FBE7D6; color:var(--orange);}
  .pill-gray{background:var(--paper-2); color:#8A8570;}

  .toolbar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px;}
  .toolbar input, .toolbar select{padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:12.8px; background:var(--white);}
  .spacer{flex:1;}

  .modal-bg{position:fixed; inset:0; background:rgba(37,50,31,.45); display:flex; align-items:flex-start; justify-content:center; padding:40px 20px; overflow:auto; z-index:100;}
  .modal{background:var(--white); border-radius:16px; width:100%; max-width:720px; box-shadow:var(--shadow);}
  .modal-head{padding:18px 22px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;}
  .modal-head h3{font-size:16px; color:var(--rice-dark);}
  .modal-close{background:none; border:none; font-size:20px; color:#9A9580;}
  .modal-body{padding:20px 22px; max-height:70vh; overflow:auto;}
  .modal-foot{padding:16px 22px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:10px;}
  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px 14px;}
  .form-grid .full{grid-column:1/-1;}
  .divider-lbl{font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--gold); margin:16px 0 8px; display:flex; align-items:center; gap:8px;}
  .divider-lbl::after{content:''; flex:1; height:1px; background:var(--line);}

  .quarter-bar{display:flex; gap:4px; margin-bottom:6px;}
  .quarter-bar .qseg{flex:1; height:8px; border-radius:4px; background:var(--paper-2); position:relative;}
  .quarter-bar .qseg.active{background:var(--gold);}
  .checkbox-row{display:flex; align-items:center; gap:8px;}

  .empty-state{text-align:center; padding:50px 20px; color:#9A9580;}
  .empty-state .e-ico{font-size:34px; margin-bottom:10px;}

  .kv-row{display:flex; justify-content:space-between; padding:6px 0; font-size:13px; border-bottom:1px dashed var(--line);}
  .kv-row b{font-family:'JetBrains Mono',monospace;}

  .tag-role{font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:20px; background:var(--gold-soft); color:#5c4813;}
  .tag-role.owner{background:var(--rice-dark); color:#fff;}
  .tag-role.viewer{background:var(--paper-2); color:#8A8570;}

  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}

  html{-webkit-text-size-adjust:100%; text-size-adjust:100%;}
  body{margin:0; overflow-x:hidden;}
  #root{overflow-x:hidden;}
  .preview-banner{
    position:sticky; top:0; z-index:60; background:#fff3cd; color:#7a5b00;
    padding:10px 16px; text-align:center; font-size:13px; font-weight:600;
    border-bottom:2px solid #f0c14b;
  }
  .link-btn{
    background:none; border:none; padding:0; margin:0; color:var(--rice-dark);
    text-decoration:underline; font-weight:700; font-size:inherit; cursor:pointer; display:inline;
  }
  .preview-banner .link-btn{
    background:none; border:none; padding:0; margin:0; color:#1a4d8f;
    text-decoration:underline; font-weight:700; font-size:inherit; cursor:pointer;
  }

  @media (max-width:820px){
    .app-shell{flex-direction:column;}
    .sidebar{width:100%; flex-direction:row; overflow-x:auto; -webkit-overflow-scrolling:touch; padding:8px 10px;}
    .sidebar .brand{display:none;}
    .nav-item{flex-shrink:0; width:auto; white-space:nowrap; padding:10px 14px;}
    .grid3{grid-template-columns:1fr;}
    .form-grid{grid-template-columns:1fr;}
    .topbar{flex-wrap:wrap; padding:14px 16px; gap:10px;}
    .content{padding:16px;}
    .bell-panel{width:min(340px, calc(100vw - 32px)); right:-8px;}
    .modal-bg{padding:0; align-items:stretch;}
    .modal{max-width:100%; width:100%; min-height:100dvh; border-radius:0; display:flex; flex-direction:column;}
    .modal-body{max-height:none; flex:1;}
    .modal-head, .modal-foot{padding:14px 16px;}
    .modal-foot{flex-wrap:wrap;}
    .modal-foot .btn{flex:1; min-width:120px;}
  }

  /* ---- Điện thoại (≤600px): chữ đủ lớn, nút đủ to, cách xa để bấm không nhầm ---- */
  @media (max-width:600px){
    .auth-card{padding:28px 20px;}
    .field input, .field select, .field textarea{font-size:16px; padding:12px 13px;}
    .toolbar{gap:10px 8px;}
    .toolbar input, .toolbar select{font-size:15px; padding:11px 12px; min-height:42px; flex:1 1 100%;}
    .btn{font-size:14.5px; padding:11px 16px; min-height:44px;}
    .btn-sm{padding:9px 12px; font-size:13px; min-height:38px;}
    .toolbar .btn{flex:1 1 100%;}
    table{font-size:14px;}
    th{font-size:12px; padding:11px 12px;}
    td{padding:12px; font-size:14px;}
    .table-wrap{border-radius:10px;}
    .panel-body{padding:14px;}
    .panel-head{padding:13px 14px;}
    .panel-head h3{font-size:14px;}
    .stat-card{padding:16px;}
    .stat-card .num{font-size:26px;}
    .kv-row{font-size:13.5px; padding:9px 0;}
    .divider-lbl{font-size:11px; margin:18px 0 10px;}
    .topbar h2{font-size:16px;}
    .modal-head h3{font-size:15px;}
    .nav-item{font-size:13px; padding:11px 14px; gap:8px;}
    .backup-actions .btn, .backup-actions{width:100%;}
    .backup-actions .btn{flex:1 1 100%;}
  }

  /* ---- backup panel ---- */
  .backup-actions{display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;}

  /* ---- print area (khổ A4, ẩn trên màn hình) ---- */
  #print-area{display:none;}
  #print-area .print-header{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; font-size:13px; margin-bottom:6px;}
  #print-area .print-header-right{text-align:right;}
  #print-area .print-divider{margin-top:4px;}
  #print-area .print-title{text-align:center; font-size:16px; margin:18px 0 16px; letter-spacing:.01em;}
  #print-area .print-sec{font-size:13.5px; margin:16px 0 8px; text-decoration:underline;}
  #print-area table.print-table{width:100%; border-collapse:collapse; font-size:12.5px; margin-bottom:4px;}
  #print-area table.print-table th, #print-area table.print-table td{border:1px solid #333; padding:5px 8px; text-align:left;}
  #print-area table.print-table td:last-child, #print-area table.print-table th:last-child{text-align:right;}
  #print-area .print-signdate{text-align:right; font-style:italic; margin-top:26px; font-size:13px;}
  #print-area .print-signblock{display:flex; justify-content:space-between; margin-top:6px; font-size:13px;}
  #print-area .print-sign-col{width:46%; text-align:center;}
  #print-area .print-sign-note{font-style:italic; font-size:12px; margin-top:2px;}
  #print-area .print-sign-space{height:70px;}

  @media print{
    body *{ visibility:hidden; }
    #print-area, #print-area *{ visibility:visible; }
    #print-area{ display:block; position:absolute; left:0; top:0; width:100%; padding:0 8mm; color:#000; }
    .no-print{ display:none !important; }
    @page{ size:A4 portrait; margin:15mm 12mm; }
    /* Khổ A4 NẰM NGANG riêng cho bảng Sổ vay vốn (nhiều cột) — kích hoạt bằng class .landscape */
    @page landscape-a4{ size:A4 landscape; margin:10mm; }
    #print-area.landscape{ page:landscape-a4; padding:0 4mm; }
    #print-area.landscape table.print-table{ width:100%; table-layout:fixed; word-break:break-word; }
  }

  /* ================= Trợ lý AI "Chàng Nông dân Thông minh" ================= */
  @keyframes fabBob{
    0%, 55%{ transform:translateY(0) rotate(0deg); }
    65%{ transform:translateY(-7px) rotate(-4deg); }
    75%{ transform:translateY(0) rotate(0deg); }
    85%{ transform:translateY(-3px) rotate(3deg); }
    100%{ transform:translateY(0) rotate(0deg); }
  }
  /* Hiệu ứng chớp nhẹ nhàng, chậm rãi nền xanh lá — báo hiệu 2 mốc Quý liền kề vừa được tự động
     đồng bộ theo nhau khi người dùng sửa 1 trong 2 (kéo dài 2,5 giây, lặp chậm không gây khó chịu). */
  @keyframes qimFlashGreen{
    0%, 100%{ background:transparent; }
    50%{ background:rgba(129,199,132,.55); }
  }
  .qim-flash{ animation: qimFlashGreen 0.85s ease-in-out 3; border-radius:8px; }
  /* Nút "GIA HẠN" / "Xem" — nền đổi màu tuần hoàn trắng ↔ cam nhạt, chậm rãi mượt mà; độ trễ bắt
     đầu (animation-delay, gán ngẫu nhiên qua inline style mỗi nút) làm các nút KHÔNG đồng bộ nhau. */
  @keyframes extPulseOrange{
    0%, 100%{ background:#fff; }
    50%{ background:#ff9800; }
  }
  .ext-action-btn{
    border:1px solid #000; border-radius:8px; padding:6px 14px; font-weight:800; color:#5a3d00;
    cursor:pointer; animation: extPulseOrange 12.6s ease-in-out infinite; transition:transform .15s ease;
    display:inline-block;
  }
  .ext-action-btn:hover{ transform:scale(1.35); position:relative; z-index:5; }
  .ext-action-btn:disabled{ animation:none; background:#eee; color:#999; cursor:not-allowed; transform:none; opacity:.6; }
  /* Biến thể xanh lá cho nút "Xem" / "Đóng tiền lãi" ở modal "Tính tiền lãi và phê duyệt đóng lãi"
     — y hệt nút GIA HẠN (viền, bo góc, phóng to khi hover, độ trễ ngẫu nhiên) chỉ khác màu tuần
     hoàn: trắng ↔ xanh lá đậm thay vì trắng ↔ cam đậm. */
  @keyframes extPulseGreen{
    0%, 100%{ background:#fff; color:#1b5e20; }
    50%{ background:#1b7a3d; color:#fff; }
  }
  .ext-action-btn.ext-green{ animation-name: extPulseGreen; color:#1b5e20; }
  /* Nút "hộp chứa Quý" + nút chữ "i" (thông tin) trong modal Đóng lãi — góc vuông 90 độ, dính sát
     nhau, phóng to khi hover, nhấp nháy nhanh lúc mới mở bảng rồi tự dừng sau ~3 giây. */
  @keyframes qboxPulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.1); } }
  .qbox-wrap{ display:inline-flex; margin:3px; }
  .qbox-btn{ border:1px solid #000; border-radius:0; padding:6px 12px; font-weight:700; cursor:pointer; background:#fff; transition:transform .12s ease; }
  .qbox-btn.qbox-pulsing{ animation: qboxPulse 0.5s ease-in-out infinite; }
  .qbox-btn:hover{ transform:scale(1.3); position:relative; z-index:6; }
  .qbox-btn.qbox-selected{ background:#1b7a3d; color:#fff; }
  .qbox-info-btn{ border:1px solid #000; border-left:none; border-radius:0; width:26px; font-weight:800; font-style:italic; cursor:pointer; background:#fff; transition:transform .12s ease; }
  .qbox-info-btn:hover{ transform:scale(1.3); position:relative; z-index:6; }
  .qbox-selectall-btn{ border:1px solid #000; border-radius:6px; padding:6px 14px; font-weight:700; cursor:pointer; background:var(--paper-2); transition:transform .12s ease; margin:3px; }
  .qbox-selectall-btn:hover{ transform:scale(1.3); position:relative; z-index:6; }
  .fab-chat{
    position:fixed; right:22px; bottom:22px; width:60px; height:60px; border-radius:50%;
    background:linear-gradient(145deg, var(--gold), var(--rice-dark)); color:#fff; border:none;
    box-shadow:0 6px 18px rgba(47,74,60,.35); cursor:pointer; z-index:400; font-size:26px;
    display:flex; align-items:center; justify-content:center;
    animation: fabBob 4.5s ease-in-out infinite;
  }
  .fab-chat:hover{ filter:brightness(1.08); }
  @media (max-width:640px){ .fab-chat{ right:14px; bottom:14px; width:54px; height:54px; font-size:22px; } }

  /* "Siêu ghi chú" — icon bồng bềnh nằm ngay trên đầu icon Chat AI, y hệt kiểu dáng/hiệu ứng */
  .fab-notes-wrap{ position:fixed; right:22px; bottom:96px; z-index:400; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .fab-notes-label{ background:var(--rice-dark); color:#fff; font-size:10.5px; font-weight:700; padding:3px 10px; border-radius:10px; white-space:nowrap; box-shadow:0 2px 6px rgba(0,0,0,.18); }
  .fab-notes-btn{ width:60px; height:60px; border-radius:50%; background:linear-gradient(145deg, var(--gold), var(--rice-dark)); color:#fff; border:none;
    box-shadow:0 6px 18px rgba(47,74,60,.35); cursor:pointer; font-size:26px; display:flex; align-items:center; justify-content:center;
    animation: fabBob 4.5s ease-in-out infinite; }
  .fab-notes-btn:hover{ filter:brightness(1.08); }
  .fab-notes-btn.fab-intro{ animation: fabIntro 1s ease-in-out 5 !important; }
  @media (max-width:640px){ .fab-notes-wrap{ right:14px; bottom:82px; } .fab-notes-btn{ width:54px; height:54px; font-size:22px; } }

  /* Cây thư mục/tệp trong sidebar Siêu ghi chú */
  .sn-crumbs{ font-size:11px; color:rgba(255,255,255,.75); padding:0 10px 8px; word-break:break-word; }
  .sn-crumbs span{ cursor:pointer; text-decoration:underline; }
  .sn-tree-row{ display:flex; align-items:center; gap:6px; padding:7px 8px; border-radius:8px; cursor:pointer; font-size:12.5px; color:#fff; }
  .sn-tree-row:hover{ background:rgba(255,255,255,.1); }
  .sn-tree-row.active{ background:rgba(255,255,255,.2); font-weight:700; }
  .sn-tree-name{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sn-tree-actions{ display:flex; gap:5px; opacity:.65; flex-shrink:0; }
  .sn-tree-actions button{ background:none; border:none; color:#fff; cursor:pointer; font-size:11px; padding:0; }
  .sn-tree-actions button:hover{ opacity:1; }
  /* Yêu cầu 6: nhún nhảy/rung rinh sống động trong 5 giây đầu tiên khi vào giao diện chính, để
     thu hút sự chú ý — sau đó tự động chuyển về hiệu ứng "lềnh bềnh" tuần hoàn như bình thường. */
  @keyframes fabIntro{
    0%,100%{ transform:translateY(0) rotate(0deg) scale(1); }
    10%{ transform:translateY(-14px) rotate(-12deg) scale(1.08); }
    20%{ transform:translateY(0) rotate(10deg) scale(0.96); }
    30%{ transform:translateY(-11px) rotate(-9deg) scale(1.06); }
    40%{ transform:translateY(0) rotate(7deg) scale(1); }
    50%{ transform:translateY(-13px) rotate(-7deg) scale(1.07); }
    60%{ transform:translateY(0) rotate(5deg) scale(1); }
    70%{ transform:translateY(-9px) rotate(-5deg); }
    80%{ transform:translateY(0) rotate(3deg); }
    90%{ transform:translateY(-5px) rotate(-2deg); }
  }
  .fab-chat.fab-intro{ animation: fabIntro 1s ease-in-out 5 !important; }

  /* Yêu cầu 5: tooltip nhỏ hiện bên cạnh nút gửi khi rê chuột qua */
  .ai-send-wrap{ position:relative; display:flex; align-items:center; flex-shrink:0; }
  .ai-send-tooltip{ position:absolute; right:calc(100% + 10px); top:50%; transform:translateY(-50%); background:var(--rice-dark); color:#fff; font-size:11.5px; padding:6px 11px; border-radius:8px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity .15s ease; box-shadow:var(--shadow); }
  .ai-send-wrap:hover .ai-send-tooltip{ opacity:1; }

  .ai-overlay{ position:fixed; inset:0; z-index:500; background:var(--paper); display:flex; }
  /* Khung nhúng cho module "Tạo bài Tuyên truyền" — tái sử dụng toàn bộ style Chat AI nhưng nằm
     NGAY TRONG nội dung tab (không phải overlay toàn màn hình cố định). */
  .pg-embed{ display:flex; height:76vh; min-height:540px; border:1px solid var(--line); border-radius:14px; overflow:hidden; box-shadow:var(--shadow); }
  .pg-roles{ display:flex; flex-wrap:wrap; gap:8px; padding:10px 0 4px; }
  .pg-role-btn{ background:var(--white); border:1px solid var(--line); border-radius:20px; padding:7px 14px; font-size:12.5px; font-weight:700; color:var(--rice-dark); cursor:pointer; transition:all .15s; }
  .pg-role-btn:hover{ background:var(--gold); color:#fff; border-color:var(--gold); }
  .pg-role-btn.pg-confirm-btn{ background:var(--gold); color:#fff; border-color:var(--gold); font-weight:800; }
  .pg-role-btn.pg-confirm-btn:hover{ filter:brightness(1.08); }
  @media (max-width:900px){ .pg-embed{ height:auto; min-height:0; flex-direction:column; } .pg-embed .ai-sidebar{ width:100%; max-height:280px; } }
  .ai-sidebar{ width:270px; flex-shrink:0; background:var(--rice-dark); color:#fff; display:flex; flex-direction:column; padding:16px 12px; }
  .ai-exit-btn{ background:var(--gold); color:#3A2C05; border:none; border-radius:12px; padding:12px 14px; font-weight:800; font-size:14px; cursor:pointer; margin-bottom:14px; }
  .ai-exit-btn:hover{ filter:brightness(1.06); }
  .ai-newchat-btn{ background:rgba(255,255,255,.12); color:#fff; border:1px solid rgba(255,255,255,.3); border-radius:10px; padding:10px 12px; font-size:13.5px; cursor:pointer; margin-bottom:12px; text-align:left; }
  .ai-newchat-btn:hover{ background:rgba(255,255,255,.2); }
  .ai-hist-label{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; opacity:.7; margin:6px 0 6px; }
  .ai-hist-list{ overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:4px; }
  .ai-hist-item{ display:flex; align-items:center; gap:6px; padding:9px 10px; border-radius:8px; cursor:pointer; font-size:13px; }
  .ai-hist-item:hover{ background:rgba(255,255,255,.1); }
  .ai-hist-item.active{ background:rgba(255,255,255,.2); font-weight:700; }
  .ai-hist-item .ai-hist-title{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ai-hist-item .ai-hist-del{ opacity:.6; background:none; border:none; color:#fff; cursor:pointer; font-size:13px; }
  .ai-hist-item .ai-hist-del:hover{ opacity:1; }
  .ai-main{ flex:1; display:flex; flex-direction:column; min-width:0; }
  .ai-header{ padding:16px 24px; border-bottom:1px solid var(--line); font-weight:800; font-size:16px; color:var(--rice-dark); background:var(--white); }
  .ai-messages{ flex:1; overflow-y:auto; padding:20px 10%; display:flex; flex-direction:column; gap:14px; }
  @media (max-width:900px){ .ai-messages{ padding:16px 4%; } .ai-sidebar{ width:210px; } }
  .ai-bubble{
    max-width:78%; padding:12px 16px; border-radius:14px;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size:16px; line-height:1.6; white-space:pre-wrap;
  }
  .ai-bubble.user{ align-self:flex-end; background:var(--rice-dark); color:#fff; border-bottom-right-radius:4px; }
  .ai-bubble.assistant{ align-self:flex-start; background:var(--white); border:1px solid var(--line); border-bottom-left-radius:4px; }
  .ai-bubble.thinking{ opacity:.7; font-style:italic; }
  /* Hiệu ứng "sóng chữ" nhấp nhô liên tục — dùng cho "Chàng đang suy nghĩ..." và "AI đang tiêu hoá..." */
  @keyframes waveBounce{ 0%, 60%, 100%{ transform:translateY(0); } 30%{ transform:translateY(-5px); } }
  .wave-text span{ display:inline-block; animation: waveBounce 1.1s ease-in-out infinite; }
  /* Banner nổi bật báo AI đã tiêu hoá xong */
  .kn-done-banner{ background:linear-gradient(90deg, #2f6b3a, #4a9c5c); color:#fff; padding:12px 16px; border-radius:12px; font-weight:700; font-size:13.5px; margin:8px 0; box-shadow:0 4px 14px rgba(47,107,58,.35); animation: knDoneAppear .35s ease-out; }
  @keyframes knDoneAppear{ 0%{ opacity:0; transform:translateY(8px); } 100%{ opacity:1; transform:translateY(0); } }
  .ai-bubble p, .ai-bubble li, .ai-bubble br{ font-size:inherit; line-height:inherit; }
  .ai-bubble .ai-md-list{ margin:4px 0; padding-left:22px; font-size:inherit; line-height:inherit; }
  .ai-bubble .ai-md-list li{ margin:3px 0; }
  /* Khối code sinh ra bởi renderMarkdownLite — có nút Sao chép riêng, font monospace, dễ đọc */
  .md-code-block{ background:#1e1e1e; border-radius:10px; margin:8px 0; overflow:hidden; font-size:12.5px; }
  .md-code-head{ display:flex; align-items:center; justify-content:space-between; background:#2d2d2d; color:#ccc; padding:5px 10px; font-size:11px; }
  .md-code-head button{ background:rgba(255,255,255,.12); color:#fff; border:none; border-radius:6px; padding:3px 9px; font-size:11px; cursor:pointer; }
  .md-code-head button:hover{ background:rgba(255,255,255,.22); }
  .md-code-block pre{ margin:0; padding:12px 14px; overflow-x:auto; }
  .md-code-block code{ font-family:'JetBrains Mono', 'Courier New', monospace; color:#e6e6e6; white-space:pre; }
  /* Khối bảng sinh ra bởi renderMarkdownLite — có nút Sao chép bảng */
  .md-table-block{ margin:8px 0; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .md-table-head{ display:flex; justify-content:flex-end; background:var(--paper-2); padding:5px 8px; }
  .md-table-head button{ background:var(--white); border:1px solid var(--line); border-radius:6px; padding:3px 9px; font-size:11px; cursor:pointer; }
  .md-table-head button:hover{ background:var(--paper-2); }
  table.md-table{ width:100%; border-collapse:collapse; font-size:12.5px; }
  table.md-table th, table.md-table td{ border:1px solid var(--line); padding:6px 10px; text-align:left; }
  table.md-table th{ background:var(--paper-2); font-weight:700; }
  /* Thẻ file thật (PowerPoint/Word/Excel/PDF) do AI xuất ra, sinh bởi renderMarkdownLite */
  .md-file-card{ display:flex; align-items:center; gap:12px; background:var(--white); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin:8px 0; box-shadow:var(--shadow); }
  .md-file-icon{ font-size:28px; flex-shrink:0; }
  .md-file-info{ flex:1; min-width:0; }
  .md-file-title{ font-weight:700; font-size:13px; color:var(--rice-dark); }
  .md-file-sub{ font-size:11px; color:#9A9580; margin-top:2px; }
  .md-file-download{ background:var(--gold); color:#3A2C05; border:none; border-radius:20px; padding:8px 16px; font-weight:700; font-size:12.5px; cursor:pointer; flex-shrink:0; white-space:nowrap; }
  .md-file-download:hover{ filter:brightness(1.06); }
  .md-file-download:disabled{ opacity:.6; cursor:wait; }
  @media (max-width:768px){ .ai-bubble{ font-size:15px; padding:10px 14px; } }

  /* Bọc bong bóng + thanh icon hành động (sửa/copy/thêm vào ghi chú) */
  .ai-bubble-wrap{ display:flex; flex-direction:column; max-width:78%; }
  .ai-bubble-wrap.user{ align-self:flex-end; align-items:flex-end; }
  .ai-bubble-wrap.assistant{ align-self:flex-start; align-items:flex-start; }
  .ai-bubble-wrap .ai-bubble{ max-width:100%; }
  .ai-bubble-actions{ display:flex; gap:4px; margin-top:4px; opacity:0; transition:opacity .15s ease; }
  .ai-bubble-wrap:hover .ai-bubble-actions, .ai-bubble-actions.force-show{ opacity:1; }
  .ai-bubble-act{ background:var(--paper-2); border:1px solid var(--line); border-radius:7px; width:25px; height:25px; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--rice-dark); padding:0; }
  .ai-bubble-act:hover{ background:var(--paper); }
  .ai-bubble-addnote-wrap{ position:relative; }
  .ai-bubble-addnote-menu{ position:absolute; bottom:calc(100% + 6px); background:var(--white); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow); min-width:220px; z-index:35; overflow:hidden; }
  .ai-bubble-wrap.user .ai-bubble-addnote-menu{ right:0; }
  .ai-bubble-wrap.assistant .ai-bubble-addnote-menu{ left:0; }
  .ai-bubble-addnote-menu .ai-add-opt{ text-align:left; }
  .ai-edit-box{ display:flex; flex-direction:column; gap:6px; width:100%; }
  .ai-edit-box textarea{ width:100%; min-width:260px; font-family:inherit; font-size:14px; padding:10px 12px; border-radius:10px; border:1px solid var(--line); resize:vertical; }
  .ai-edit-box-actions{ display:flex; gap:8px; justify-content:flex-end; }

  /* Toast thông báo nhanh */
  .hnd-toast{ position:fixed; left:50%; bottom:30px; transform:translate(-50%, 16px); background:var(--rice-dark); color:#fff; padding:10px 22px; border-radius:24px; font-size:13.5px; font-weight:700; box-shadow:var(--shadow); z-index:1000; opacity:0; transition:opacity .25s ease, transform .25s ease; pointer-events:none; max-width:80vw; text-align:center; }
  .hnd-toast.show{ opacity:1; transform:translate(-50%, 0); }
  /* Thông báo LỚN (gia hạn thành công / phê duyệt đóng lãi thành công) — nhảy sổ ra giữa màn hình,
     "nhảy múa" (phóng to/xoay nhẹ) trong 1 giây, đứng im 4 giây, rồi mờ dần và biến mất. */
  @keyframes bigToastPopDance{
    0%{ transform:translate(-50%,-50%) scale(0) rotate(0deg); opacity:0; }
    15%{ transform:translate(-50%,-50%) scale(1.18) rotate(-8deg); opacity:1; }
    30%{ transform:translate(-50%,-50%) scale(0.94) rotate(6deg); }
    45%{ transform:translate(-50%,-50%) scale(1.08) rotate(-4deg); }
    60%{ transform:translate(-50%,-50%) scale(0.98) rotate(3deg); }
    75%{ transform:translate(-50%,-50%) scale(1.03) rotate(-2deg); }
    100%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
  }
  @keyframes bigToastFadeOut{ 0%{ opacity:1; } 100%{ opacity:0; } }
  .big-toast{
    position:fixed; top:44%; left:50%; z-index:99999; background:#1b7a3d; color:#fff; font-weight:800;
    font-size:16px; padding:20px 32px; border-radius:16px; box-shadow:0 10px 40px rgba(0,0,0,.4);
    text-align:center; max-width:90vw; animation: bigToastPopDance 1s ease-out forwards;
  }
  .big-toast.big-toast-fading{ animation: bigToastFadeOut 1s ease-in forwards; }


  /* Hiệu ứng chữ "CHÚC ĐỒNG CHÍ..." nổi lềnh bềnh nhẹ nhàng như trên mặt nước, ở các popup chào mừng */
  @keyframes welcomeFloat{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    25%{ transform: translateY(-8px) rotate(-0.6deg); }
    50%{ transform: translateY(-2px) rotate(0deg); }
    75%{ transform: translateY(-10px) rotate(0.6deg); }
  }
  .welcome-float-title{ display:inline-block; animation: welcomeFloat 3.2s ease-in-out infinite; }
  .ai-inputbar{ display:flex; gap:10px; padding:16px 10%; border-top:1px solid var(--line); background:var(--white); align-items:flex-end; }
  @media (max-width:900px){ .ai-inputbar{ padding:12px 4%; } }
  .ai-inputbar textarea{ flex:1; resize:none; border:1px solid var(--line); border-radius:14px; padding:12px 14px; font-size:14px; font-family:inherit; max-height:120px; }
  .ai-inputbar button{ background:var(--gold); color:#3A2C05; border:none; border-radius:50%; width:46px; height:46px; font-size:18px; cursor:pointer; flex-shrink:0; }
  .ai-inputbar button:disabled{ opacity:.5; cursor:not-allowed; }
  .ai-inputbar button.ai-stop-btn{ background:#b3261e; color:#fff; animation: fabBob 1.4s ease-in-out infinite; }
  .admin-view-banner{ background:#3A2C05; color:#FFE7A6; padding:8px 16px; font-size:13px; text-align:center; font-weight:700; }

  /* Tiêu đề "Sổ tay Công tác Hội Nông dân cấp xã/phường" ở trên cùng mọi giao diện chính —
     lắc nhẹ qua phải rồi qua trái LIÊN TỤC, không còn đoạn đứng im (giữ nguyên tốc độ lắc cũ:
     center->phải mất 1.26s, phải->trái mất 2.52s, trái->center mất 1.26s, cộng lại 1 chu kỳ ~5.04s). */
  .app-title-banner{ width:100%; background:linear-gradient(90deg, var(--rice-dark), var(--gold)); color:#fff; text-align:center; padding:8px 10px; font-weight:800; font-size:13.5px; letter-spacing:.4px; overflow:hidden; white-space:nowrap; }
  .app-title-banner span{ display:inline-block; animation: bannerSway 5.04s ease-in-out infinite; }
  @keyframes bannerSway{
    0%{ transform:translateX(0); }
    25%{ transform:translateX(14px); }
    75%{ transform:translateX(-14px); }
    100%{ transform:translateX(0); }
  }
  @media (max-width:640px){ .app-title-banner{ font-size:11.5px; padding:7px 8px; } }

  /* Model đang hoạt động (dropdown chọn Cấu hình AI) */
  .ai-model-bar{ padding:8px 10% 0; background:var(--white); }
  @media (max-width:900px){ .ai-model-bar{ padding:8px 4% 0; } }
  .ai-model-select{ position:relative; display:inline-flex; align-items:center; gap:6px; background:var(--paper-2); border:1px solid var(--line); border-radius:20px; padding:6px 14px; font-size:12.5px; font-weight:700; color:var(--rice-dark); cursor:pointer; user-select:none; }
  .ai-model-select:hover{ background:var(--paper); }
  .ai-model-caret{ font-size:10px; opacity:.6; }
  .ai-model-dropdown{ position:absolute; top:calc(100% + 6px); left:0; background:var(--white); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); min-width:240px; max-width:320px; z-index:20; overflow:hidden; }
  .ai-model-opt{ padding:10px 14px; font-size:13px; cursor:pointer; border-bottom:1px solid var(--line); }
  .ai-model-opt:last-child{ border-bottom:none; }
  .ai-model-opt:hover{ background:var(--paper-2); }
  .ai-model-opt.active{ background:rgba(199,154,43,.15); font-weight:700; }
  .ai-model-opt .sub{ display:block; font-size:11px; margin-top:2px; }

  /* Nút "THÊM THÀNH PHẦN" (tài liệu/ảnh/tìm web) */
  .ai-add-btn{ position:relative; background:var(--paper-2) !important; color:var(--rice-dark) !important; border:1px solid var(--line) !important; border-radius:20px !important; width:auto !important; height:46px; padding:0 16px; font-size:12.5px !important; font-weight:800; display:flex; align-items:center; gap:6px; white-space:nowrap; cursor:pointer; }
  .ai-add-btn:hover{ background:var(--paper) !important; }
  .ai-add-menu{ position:absolute; bottom:calc(100% + 8px); left:0; background:var(--white); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); min-width:200px; z-index:20; overflow:hidden; }
  .ai-add-opt{ padding:11px 16px; font-size:13px; cursor:pointer; border-bottom:1px solid var(--line); text-align:left; color:var(--ink); font-weight:600; }
  .ai-add-opt:last-child{ border-bottom:none; }
  .ai-add-opt:hover{ background:var(--paper-2); }

  /* Micro */
  .ai-mic-btn{ background:var(--paper-2) !important; color:var(--rice-dark) !important; border:1px solid var(--line) !important; }
  .ai-mic-btn:hover{ background:var(--paper) !important; }
  .ai-mic-btn.listening{ background:var(--red) !important; color:#fff !important; border-color:var(--red) !important; animation:aiMicPulse 1.2s ease-in-out infinite; }
  @keyframes aiMicPulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(193,68,60,.5); } 50%{ box-shadow:0 0 0 8px rgba(193,68,60,0); } }

  /* Chip tệp đính kèm đang chờ gửi + trong bong bóng lịch sử */
  .ai-attach-row{ display:flex; flex-wrap:wrap; gap:8px; padding:0 10% 8px; }
  @media (max-width:900px){ .ai-attach-row{ padding:0 4% 8px; } }
  .ai-attach-chip{ display:inline-flex; align-items:center; gap:6px; background:var(--paper-2); border:1px solid var(--line); border-radius:16px; padding:5px 10px; font-size:12px; color:var(--rice-dark); }
  .ai-attach-chip button{ background:none; border:none; cursor:pointer; font-size:11px; color:var(--red); padding:0; }
  .ai-bubble-attach{ margin-top:6px; font-size:11.5px; opacity:.75; }

<body>
<div id="root"></div>
<div id="print-area"></div>

<script>
(function(){
  const root = document.getElementById('root');
  const money = n => (Math.round((n||0)) ).toLocaleString('vi-VN') + ' đ';
  const fmtDate = d => { if(!d) return '—'; const x=new Date(d); return x.toLocaleDateString('vi-VN'); };
  const todayStr = () => new Date().toISOString().slice(0,10);
  const uid = () => Math.random().toString(36).slice(2,10);
  // Thoát ký tự HTML đặc biệt — dùng khi chèn văn bản người dùng/AI tự do (chat) vào innerHTML.
  function escapeHtml(s){
    return String(s==null? '' : s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------------------------------------------------------------------
  // Ép nhập liệu số tiền/phần trăm/CCCD/SĐT cho Sổ vay vốn — theo đúng yêu cầu nghiệp vụ:
  //   • Số TIỀN (tổng vốn phương án, số tiền vay, tiền lãi/gốc đã đóng): CHỈ cho gõ chữ số (không
  //     cho dấu phẩy hay ký tự khác), TỰ ĐỘNG tách cụm 3 chữ số bằng 1 khoảng trắng NGAY TRONG LÚC
  //     gõ, tính từ PHẢI qua TRÁI (vd: gõ 87230934500 -> hiện "87 230 934 500"), tối đa 12 ký tự số.
  //   • % / LÃI SUẤT: CHỈ cho gõ chữ số và đúng 1 dấu phẩy (,) làm phần thập phân.
  //   • CCCD: chỉ chữ số, tối đa 13 ký tự, tách cụm 4 số/nhóm từ phải qua trái.
  //   • SĐT: chỉ chữ số và dấu +, tối đa 12 ký tự, tách cụm 3 số/nhóm từ phải qua trái.
  // ---------------------------------------------------------------------
  function groupDigitsRight(digits, clusterSize){
    if(!digits) return '';
    const rev = digits.split('').reverse().join('');
    const chunks = rev.match(new RegExp(`.{1,${clusterSize}}`, 'g')) || [];
    return chunks.map(c=>c.split('').reverse().join('')).reverse().join(' ');
  }
  // Hiển thị tiền dạng "87 230 934 500 đ" (khoảng trắng, KHÔNG dấu chấm) — dùng riêng cho các
  // trường tiền của Sổ vay vốn ở danh sách/xuất Excel/in, đồng bộ với cách gõ ở ô nhập liệu.
  function moneySpaced(n){
    const val = Math.round(Math.abs(n||0));
    const sign = (n||0) < 0 ? '-' : '';
    return `${sign}${groupDigitsRight(String(val), 3)} đ`;
  }
  function parseVNMoney(str){ return parseInt(String(str||'').replace(/[^\d]/g,''), 10) || 0; }
  function parseVNPercent(str){ return parseFloat(String(str||'').replace(/[^\d,]/g,'').replace(',', '.')) || 0; }
  function attachMoneyInputMask(input, maxDigits){
    if(!input) return;
    const limit = maxDigits || 12;
    input.addEventListener('input', ()=>{
      let digits = input.value.replace(/[^\d]/g, '');
      if(digits.length>limit) digits = digits.slice(0, limit);
      input.value = groupDigitsRight(digits, 3);
    });
    input.addEventListener('keypress', (e)=>{
      if(e.key.length===1 && !/[\d]/.test(e.key)){
        e.preventDefault();
        alert('Chỉ được nhập chữ số cho ô này. Hệ thống sẽ tự động tách cụm 3 số giúp bạn.');
      }
    });
  }
  function attachCccdInputMask(input){
    if(!input) return;
    input.addEventListener('input', ()=>{
      let digits = input.value.replace(/[^\d]/g, '').slice(0, 13);
      input.value = groupDigitsRight(digits, 4);
    });
    input.addEventListener('keypress', (e)=>{
      if(e.key.length===1 && !/[\d]/.test(e.key)){ e.preventDefault(); alert('Số CCCD chỉ được nhập chữ số.'); }
    });
  }
  function attachPhoneInputMask(input){
    if(!input) return;
    input.addEventListener('input', ()=>{
      let raw = input.value.replace(/[^\d+]/g, '');
      const plus = raw.startsWith('+') ? '+' : '';
      let digits = raw.replace(/\+/g, '');
      const maxDigits = 12 - plus.length;
      if(digits.length>maxDigits) digits = digits.slice(0, maxDigits);
      input.value = plus + groupDigitsRight(digits, 3);
    });
    input.addEventListener('keypress', (e)=>{
      const ch = e.key; if(ch.length!==1) return;
      if(!/[\d+]/.test(ch)){ e.preventDefault(); alert('Số điện thoại chỉ được nhập chữ số và dấu +.'); }
    });
  }
  function attachPercentInputMask(input){
    if(!input) return;
    input.addEventListener('keypress', (e)=>{
      const ch = e.key;
      if(ch.length!==1) return;
      const isDigit = /[\d]/.test(ch);
      const isComma = ch===',';
      if(isComma && input.value.includes(',')){ e.preventDefault(); return; } // chỉ 1 dấu phẩy
      if(!isDigit && !isComma){
        e.preventDefault();
        alert('Chỉ được nhập chữ số và dấu phẩy (,) cho ô Lãi suất/Tỷ lệ %. Vui lòng kiểm tra lại.');
      }
    });
    input.addEventListener('input', ()=>{
      const cleaned = input.value.replace(/[^\d,]/g, '');
      const parts = cleaned.split(',');
      const fixed = parts.length>2 ? (parts[0]+','+parts.slice(1).join('')) : cleaned;
      if(fixed !== input.value) input.value = fixed;
    });
  }
  // Giới hạn số ký tự tối đa được gõ vào 1 ô input/textarea (chặn ngay lúc gõ, không phải chờ Lưu
  // mới báo lỗi) — dùng cho các trường có giới hạn ký tự trong Sổ vay vốn.
  function attachMaxLengthMask(input, maxLen){
    if(!input) return;
    input.setAttribute('maxlength', String(maxLen));
  }

  // ---------------------------------------------------------------------
  // Câu hỏi khảo sát dạng "🔢 Chỉ nhập số" — chỉ nhận chữ số + TỐI ĐA 1 dấu phẩy, tự động tách
  // cụm 3 ký tự (cách nhau bằng khoảng trắng) NGAY TRONG LÚC gõ. Phần nguyên tách từ PHẢI sang
  // trái (kiểu hàng nghìn thông thường: 34092000 -> "34 092 000"), phần thập phân (sau dấu phẩy)
  // tách từ TRÁI sang phải (34,8743 -> "34 , 874 3").
  // ---------------------------------------------------------------------
  function formatNumericGroupedLive(raw){
    const cleaned = String(raw||'').replace(/[^\d,]/g, '');
    const firstComma = cleaned.indexOf(',');
    let intPart, decPart, hasComma;
    if(firstComma===-1){ intPart = cleaned; decPart = ''; hasComma = false; }
    else { intPart = cleaned.slice(0, firstComma); decPart = cleaned.slice(firstComma+1).replace(/,/g,''); hasComma = true; }
    const groupRight = (s)=>{ if(!s) return ''; const rev = s.split('').reverse().join(''); const chunks = rev.match(/.{1,3}/g)||[]; return chunks.map(c=>c.split('').reverse().join('')).reverse().join(' '); };
    const groupLeft = (s)=>{ if(!s) return ''; return (s.match(/.{1,3}/g)||[]).join(' '); };
    const intF = groupRight(intPart);
    const decF = groupLeft(decPart);
    if(!hasComma) return intF;
    return decF ? `${intF} , ${decF}` : `${intF} ,`;
  }
  function attachPublicNumericMask(input){
    if(!input) return;
    const dispEl = input.parentElement ? input.parentElement.querySelector(`[data-numeric-disp="${input.dataset.qid}"]`) : null;
    const updateDisp = ()=>{ if(dispEl) dispEl.textContent = input.value ? `= ${formatNumericGroupedLive(input.value)}` : ''; };
    input.addEventListener('keypress', (e)=>{
      const ch = e.key;
      if(ch.length!==1) return;
      const isDigit = /\d/.test(ch);
      const isComma = ch===',';
      if(isComma && input.value.includes(',')){ e.preventDefault(); return; }
      if(!isDigit && !isComma){ e.preventDefault(); alert('Câu này chỉ được nhập chữ số và dấu phẩy (,), không được nhập ký tự khác.'); }
    });
    input.addEventListener('input', ()=>{
      // KHÔNG tự nhóm số ngay trong ô đang gõ nữa (đây là nguyên nhân gây lệch số khi gõ nhiều chữ
      // số) — chỉ lọc bỏ ký tự lạ, số đã định dạng đẹp hiện riêng ở dòng bên dưới.
      input.value = input.value.replace(/[^\d,]/g,'');
      updateDisp();
    });
    updateDisp();
  }
  const daysBetween = (a,b) => Math.round((new Date(b)-new Date(a))/86400000);

  // ---------------------------------------------------------------------
  // Chuyển Markdown CƠ BẢN (từ trả lời của AI) sang HTML an toàn — thay cho việc hiển thị thô
  // các dấu *, **, - ... Luôn escapeHtml TRƯỚC (chống XSS) rồi mới áp quy tắc Markdown lên trên
  // phần đã được thoát ký tự, nên các thẻ HTML sinh ra là do chính hàm này tạo, không phải do
  // nội dung gốc (AI/người dùng) chèn vào được.
  // Hỗ trợ: **in đậm**, *in nghiêng*, gạch đầu dòng (dòng bắt đầu bằng "- " hoặc "* "), danh sách
  // số thứ tự ("1. "), và xuống dòng thường (\n -> <br>).
  // ---------------------------------------------------------------------
  function renderMarkdownLite(raw){
    if(!raw) return '';
    function inlineMd(s){
      return s
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/(^|[^*])\*(?!\*)([^*]+?)\*(?!\*)/g, '$1<em>$2</em>');
    }
    let text = String(raw);
    // 1) Tách khối code ```lang\n...\n``` ra xử lý riêng TRƯỚC — để AI biên tập/viết code, người
    // dùng có khung riêng dễ đọc + nút "Sao chép" (yêu cầu: khung có chứa code dễ copy).
    const codeBlocks = [];
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code)=>{
      const idx = codeBlocks.length;
      codeBlocks.push({ lang:(lang||'').trim(), code: code.replace(/\n$/,'') });
      return `\u0000CB${idx}\u0000`;
    });
    // 2) Tách khối bảng Markdown (| cột | cột |) ra xử lý riêng — hiện thành <table> có nút "Sao
    // chép bảng" (yêu cầu: khung có chứa bảng).
    const tableBlocks = [];
    text = text.replace(/((?:^\|.*\|[ \t]*$\n?){2,})/gm, (m)=>{
      const linesArr = m.trim().split('\n').filter(l=>l.trim());
      if(linesArr.length<2 || !/^\|?[\s:|-]+\|?$/.test(linesArr[1])) return m;
      const idx = tableBlocks.length;
      tableBlocks.push(linesArr);
      return `\u0000TB${idx}\u0000`;
    });
    // 3) Escape toàn bộ phần còn lại (placeholder chỉ gồm chữ/số nên không bị ảnh hưởng)
    const esc = escapeHtml(text);
    const lines = esc.split('\n');
    let html = '';
    let listMode = null; // null | 'ul' | 'ol'
    const closeList = ()=>{ if(listMode){ html += listMode==='ul' ? '</ul>' : '</ol>'; listMode = null; } };
    lines.forEach(line=>{
      const bulletMatch = line.match(/^\s*[-*]\s+(.*)$/);
      const numberMatch = line.match(/^\s*\d+[.)]\s+(.*)$/);
      if(bulletMatch){
        if(listMode!=='ul'){ closeList(); html += '<ul class="ai-md-list">'; listMode = 'ul'; }
        html += `<li>${inlineMd(bulletMatch[1])}</li>`;
      } else if(numberMatch){
        if(listMode!=='ol'){ closeList(); html += '<ol class="ai-md-list">'; listMode = 'ol'; }
        html += `<li>${inlineMd(numberMatch[1])}</li>`;
      } else {
        closeList();
        html += line.trim()==='' ? '<br>' : `${inlineMd(line)}<br>`;
      }
    });
    closeList();
    html = html.replace(/(<br>)+$/,''); // bỏ (các) <br> thừa ở cuối cùng
    // 4) Thay placeholder bằng khối code/bảng THẬT (escape riêng nội dung gốc từng khối) — riêng
    // các "ngôn ngữ" đặc biệt pptx/docx/xlsx/pdf sẽ hiện THẺ FILE có nút Tải xuống thật, KHÔNG hiện
    // như khối code thường (AI được huấn luyện dùng đúng cú pháp này khi tạo file thật cho người dùng).
    const FILE_KINDS = { pptx:{icon:'📊', label:'Bài trình chiếu PowerPoint (.pptx)'}, docx:{icon:'📄', label:'Văn bản Word (.docx)'}, xlsx:{icon:'📈', label:'Bảng tính Excel (.xlsx)'}, pdf:{icon:'🧾', label:'Tài liệu PDF (in/lưu PDF)'}, voice:{icon:'🔊', label:'Giọng nói AI'} };
    html = html.replace(/\u0000CB(\d+)\u0000/g, (m,i)=>{
      const cb = codeBlocks[parseInt(i,10)];
      const langKey = cb.lang.toLowerCase();
      const kind = FILE_KINDS[langKey];
      if(kind && langKey==='voice'){
        return `<div class="md-file-card" data-file-type="voice">
          <pre class="md-file-raw" style="display:none;">${escapeHtml(cb.code)}</pre>
          <div class="md-file-icon">${kind.icon}</div>
          <div class="md-file-info"><div class="md-file-title">${kind.label}</div><div class="md-file-sub">Bấm để nghe giọng đọc AI thật ngay trong trình duyệt</div></div>
          <button class="md-file-download md-voice-play">▶️ Nghe giọng đọc AI</button>
        </div>`;
      }
      if(kind){
        return `<div class="md-file-card" data-file-type="${langKey}">
          <pre class="md-file-raw" style="display:none;">${escapeHtml(cb.code)}</pre>
          <div class="md-file-icon">${kind.icon}</div>
          <div class="md-file-info"><div class="md-file-title">${kind.label}</div><div class="md-file-sub">Bấm để tạo tệp thật và tải về máy</div></div>
          <button class="md-file-download">⬇️ Tải xuống</button>
        </div>`;
      }
      return `<div class="md-code-block"><div class="md-code-head"><span>${escapeHtml(cb.lang||'code')}</span><button class="md-code-copy">📋 Sao chép</button></div><pre><code>${escapeHtml(cb.code)}</code></pre></div>`;
    });
    html = html.replace(/\u0000TB(\d+)\u0000/g, (m,i)=>{
      const linesArr = tableBlocks[parseInt(i,10)];
      const rows = linesArr.map(l=> l.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(c=>c.trim()));
      const header = rows[0]||[]; const body = rows.slice(2);
      const thead = `<tr>${header.map(h=>`<th>${inlineMd(escapeHtml(h))}</th>`).join('')}</tr>`;
      const tbody = body.map(r=>`<tr>${r.map(c=>`<td>${inlineMd(escapeHtml(c))}</td>`).join('')}</tr>`).join('');
      return `<div class="md-table-block"><div class="md-table-head"><button class="md-table-copy">📋 Sao chép bảng</button></div><table class="md-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
    });
    return html;
  }
  // Nối sự kiện cho nút "Sao chép" trong khối code/bảng do renderMarkdownLite sinh ra — gọi lại
  // sau MỖI lần render bong bóng chat (Chat AI & Tạo bài Tuyên truyền).
  function wireMarkdownExtras(container){
    if(!container) return;
    container.querySelectorAll('.md-code-copy').forEach(btn=>{
      btn.onclick = ()=>{
        const codeEl = btn.closest('.md-code-block').querySelector('code');
        copyMessageText(codeEl? codeEl.textContent : '');
      };
    });
    container.querySelectorAll('.md-table-copy').forEach(btn=>{
      btn.onclick = ()=>{
        const table = btn.closest('.md-table-block').querySelector('table');
        if(!table) return;
        const rows = Array.from(table.querySelectorAll('tr')).map(tr=> Array.from(tr.children).map(td=>td.textContent).join('\t'));
        copyMessageText(rows.join('\n'));
      };
    });
    // Thẻ file thật (pptx/docx/xlsx/pdf) do AI tạo — bấm mới THỰC SỰ dựng file (không tốn phí nếu
    // người dùng không bấm), rồi tải về máy hoặc mở hộp thoại in/lưu PDF.
    container.querySelectorAll('.md-file-download').forEach(btn=>{
      btn.onclick = async ()=>{
        const card = btn.closest('.md-file-card');
        if(!card) return;
        const type = card.dataset.fileType;
        const rawEl = card.querySelector('.md-file-raw');
        const raw = rawEl ? rawEl.textContent : '';
        // Giọng nói AI: nút bấm để PHÁT/DỪNG (toggle) — tự quản lý nhãn nút riêng, không dùng
        // luồng disable/tải-file chung bên dưới.
        if(type==='voice'){ speakTextAsAiVoice(raw, btn); return; }
        const oldLabel = btn.textContent;
        btn.disabled = true; btn.textContent = '⏳ Đang tạo tệp...';
        try{
          if(type==='pptx') await generatePptxFromAiOutline(raw);
          else if(type==='xlsx') generateXlsxFromAiCsv(raw);
          else if(type==='docx') generateDocxFromAiOutline(raw);
          else if(type==='pdf') generatePdfFromAiOutline(raw);
        }catch(e){
          console.error('[Tạo file thật] Lỗi:', e);
          alert('Tạo tệp thất bại: ' + e.message);
        }
        btn.disabled = false; btn.textContent = oldLabel;
      };
    });
  }

  // ---------------------------------------------------------------------
  // TẠO FILE THẬT từ nội dung có cấu trúc do AI xuất ra (không phải giả lập) — dùng cho Chat AI và
  // Tạo bài Tuyên truyền. Cú pháp AI cần tuân theo được huấn luyện trong system prompt tương ứng.
  // ---------------------------------------------------------------------
  async function generatePptxFromAiOutline(text){
    if(!window.PptxGenJS){ alert('Thư viện tạo PowerPoint chưa tải xong, vui lòng thử lại sau ít giây.'); return; }
    const pptx = new window.PptxGenJS();
    const slidesRaw = text.split(/\n\s*---\s*\n/);
    slidesRaw.forEach(block=>{
      const lines = block.split('\n').map(l=>l.trim()).filter(l=>l);
      if(!lines.length) return;
      const slide = pptx.addSlide();
      const title = lines[0].replace(/^#+\s*/,'');
      slide.addText(title, { x:0.5, y:0.3, w:9, h:1, fontSize:28, bold:true, color:'2F4A3C' });
      const bullets = lines.slice(1).map(l=> l.replace(/^[-*]\s*/,''));
      if(bullets.length){
        slide.addText(bullets.map(b=>({ text:b, options:{ bullet:true, breakLine:true } })), { x:0.6, y:1.5, w:8.8, h:5, fontSize:18, color:'333333' });
      }
    });
    await pptx.writeFile({ fileName:`Trinh-chieu_${todayStr()}.pptx` });
  }
  function generateXlsxFromAiCsv(text){
    if(!window.XLSX){ alert('Thư viện xuất Excel chưa tải xong, vui lòng thử lại sau ít giây.'); return; }
    const rows = text.trim().split('\n').filter(l=>l.trim()).map(line=> line.split(',').map(c=>c.trim()));
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
    XLSX.writeFile(wb, `Bang-tinh_${todayStr()}.xlsx`);
  }
  function generateDocxFromAiOutline(text){
    const bodyHtml = renderMarkdownLite(text);
    const doc = htmlToWordDoc('Tài liệu', bodyHtml);
    downloadBlob(`Tai-lieu_${todayStr()}.doc`, doc, 'application/msword');
  }
  function generatePdfFromAiOutline(text){
    const area = document.getElementById('print-area');
    if(!area){ alert('Không tìm thấy khu vực in trên trang.'); return; }
    area.innerHTML = `<div style="padding:10mm;">${renderMarkdownLite(text)}</div>`;
    area.classList.remove('landscape');
    window.print();
  }
  // Giọng nói AI THẬT — dùng Web Speech API có sẵn của trình duyệt/thiết bị (không cần API trả
  // phí, hoạt động ngay lập tức). Bấm lần nữa để dừng đọc giữa chừng.
  let _currentSpeechUtterance = null;
  function speakTextAsAiVoice(text, btn){
    if(!window.speechSynthesis){ alert('Rất tiếc, trình duyệt của bạn không hỗ trợ giọng nói AI (Web Speech API). Vui lòng thử trên Chrome/Edge/Safari bản mới.'); return; }
    if(window.speechSynthesis.speaking){
      window.speechSynthesis.cancel();
      _currentSpeechUtterance = null;
      if(btn) btn.textContent = '▶️ Nghe giọng đọc AI';
      return;
    }
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'vi-VN';
    const voices = window.speechSynthesis.getVoices();
    const viVoice = voices.find(v=> v.lang && v.lang.toLowerCase().startsWith('vi'));
    if(viVoice) utter.voice = viVoice;
    utter.rate = 0.95;
    utter.onend = ()=>{ _currentSpeechUtterance = null; if(btn) btn.textContent = '▶️ Nghe giọng đọc AI'; };
    utter.onerror = ()=>{ _currentSpeechUtterance = null; if(btn) btn.textContent = '▶️ Nghe giọng đọc AI'; };
    window.speechSynthesis.speak(utter);
    _currentSpeechUtterance = utter;
    if(btn) btn.textContent = '⏹ Dừng đọc';
  }

  // =====================================================================
  // ---------- LỚP LƯU TRỮ ĐÁM MÂY (Firebase Realtime Database) ----------
  // KIẾN TRÚC "CON TRỎ / MÃ ẨN" — đúng như yêu cầu: mỗi mã định danh (wardId) luôn đi kèm
  // 1 "Mã ẩn" (secretId) CỐ ĐỊNH, không bao giờ đổi và không ai nhìn thấy được:
  //   • data/{wardId}/config  — CHỈ là "con trỏ/nhãn" nhỏ gọn, cho phép gõ đúng wardId là tìm ra
  //     Xã. wardId có thể đổi tên, bị xoá, hay được cấp lại cho người khác sau này — đây là phần
  //     DUY NHẤT bị ảnh hưởng khi đổi tên mã.
  //   • secretdata/{secretId}/{borrowers,expenses,trash,activityLog,collaborators} — TOÀN BỘ dữ
  //     liệu nghiệp vụ thật, được neo theo Mã ẩn VĨNH VIỄN. Dù wardId có đổi tên, bị xoá rồi cấp
  //     lại cho người khác (tái sử dụng chuỗi ký tự) thì dữ liệu thật ở đây KHÔNG BAO GIỜ bị đụng
  //     tới, bị mất, hay bị lẫn với dữ liệu của người khác — vì mỗi secretId là duy nhất tuyệt đối
  //     và chỉ được sinh ra đúng 1 lần khi mã được thiết lập lần đầu (xem genSecretId()). Sau này
  //     nâng cấp gói VIP/PRO cho 1 mã cụ thể cũng là gắn cờ VIP vào ĐÚNG secretId này.
  // =====================================================================
  function wardId(){ return state.identity && state.identity.wardId; }
  // "Mã ẩn" đang active — bảo lãnh toàn bộ dữ liệu thật của mã xã hiện tại. Có fallback về wardId
  // cho các mã xã kiểu CŨ (tạo trước khi có kiến trúc này) chưa có sẵn field secretId.
  function secretId(){ return (state.config && state.config.secretId) || wardId(); }
  function wref(sub){
    if(sub === 'config') return rtdb.ref(`data/${wardId()}/config`);
    return rtdb.ref(`secretdata/${secretId()}/${sub}`);
  }
  // CHỈ dùng cho sub="config" — thao tác "con trỏ" của BẤT KỲ wardId nào (không nhất thiết đang
  // active), dùng ở màn hình "Ví mã xã" (đa mã xã / multi-tenant): kiểm tra mã tồn tại chưa, xoá/
  // khôi phục con trỏ... Dữ liệu THẬT không bao giờ được truy cập qua wardId — dùng srefFor().
  function wrefFor(wid, sub){
    if(sub !== 'config') throw new Error('wrefFor() chỉ dùng cho sub="config". Dữ liệu thật phải truy cập theo Mã ẩn — dùng srefFor(secretId, sub).');
    return rtdb.ref(`data/${wid}/config`);
  }
  // Truy cập dữ liệu thật theo ĐÚNG 1 secretId đã biết trước (không phụ thuộc mã xã đang active) —
  // dùng khi cần thao tác dữ liệu của một mã KHÔNG PHẢI mã đang mở (vd: sau khi khôi phục xong).
  function srefFor(sid, sub){ return rtdb.ref(`secretdata/${sid}/${sub}`); }

  // ---------------------------------------------------------------------
  // Mục lục toàn hệ thống (chỉ Admin đọc được, dùng cho Module [CÀI ĐẶT ADMIN] — Khu vực 3):
  // mỗi khi "con trỏ" config của 1 mã xã được ghi/cập nhật, đồng bộ 1 bản ghi rút gọn vào
  // system_wards_index/{wardId} để Admin liệt kê TẤT CẢ mã xã đang hoạt động mà không cần quét
  // toàn bộ cây "data/" (vốn có thể rất lớn và bị chặn bởi luật bảo mật Firebase).
  // ---------------------------------------------------------------------
  function syncWardIndex(wid, cfg){
    if(!wid || !cfg) return;
    rtdb.ref(`system_wards_index/${wid}`).set({
      wardId: wid, wardName: cfg.wardName||'', adminLevel: cfg.adminLevel||'',
      ownerEmail: cfg.ownerEmail||'', deleted: !!cfg.deleted, secretId: cfg.secretId||'',
      updatedAt: new Date().toISOString(),
    }).catch(e=>console.error('Đồng bộ system_wards_index lỗi:', e));
  }
  function removeWardIndex(wid){
    if(!wid) return;
    rtdb.ref(`system_wards_index/${wid}`).remove().catch(()=>{});
  }
  async function loadSystemWardsIndex(){
    try{
      const snap = await rtdb.ref('system_wards_index').get();
      state.systemWardsIndex = (snap && snap.exists()) ? Object.values(snap.val()) : [];
    }catch(e){ state.systemWardsIndex = []; }
  }
  // [CÀI ĐẶT ADMIN] — Khu vực 3, nút [Xem cơ sở dữ liệu]: cho phép Admin mở CHẾ ĐỘ XEM (chỉ đọc,
  // không sửa được gì) toàn bộ dữ liệu của MỘT mã xã bất kỳ, không cần là Chủ mã/được cấp quyền.
  async function adminViewWard(wid){
    if(!isAdmin()) return;
    detachRealtime();
    state._adminViewingWard = true;
    state.identity.wardId = wid; // KHÔNG gọi setActiveWardCache — không đổi mã "của riêng Admin" đang lưu cache
    state.config = await cGetOnce('config', null);
    if(!state.config){ alert('Không tìm thấy dữ liệu cấu hình cho mã này (có thể đã bị xoá vĩnh viễn).'); state._adminViewingWard = false; return; }
    state.activeTab = 'dashboard';
    state.view = 'app';
    state._showWardWelcome = true;
    attachRealtime();
    render();
  }
  // [CÀI ĐẶT ADMIN] — Khu vực 3, nút [Xoá vào Thùng rác]: Admin chuyển bất kỳ mã xã nào vào đúng
  // Thùng rác cá nhân của Chủ mã đó (y hệt luồng ownerDeleteWard sẵn có), Chủ mã tự khôi phục sau.
  async function adminDeleteWardToTrash(wid){
    if(!isAdmin()) return;
    const cfg = await cGetOnceFor(wid, 'config', null);
    if(!cfg){ alert('Không tìm thấy mã này.'); return; }
    if(cfg.deleted){ alert('Mã này đã ở trong thùng rác từ trước.'); return; }
    if(!confirm(`[ADMIN] Xoá mã "${wid}"${cfg.wardName?` (${cfg.wardName})`:''} vào Thùng rác của Chủ mã (${cfg.ownerEmail||'không rõ'})? Bạn có chắc chắn?`)) return;
    cfg.deleted = true; cfg.deletedAt = new Date().toISOString(); cfg.deletedBy = state.identity.email;
    await wrefFor(wid, 'config').set(cfg);
    syncWardIndex(wid, cfg);
    if(cfg.ownerEmail){
      const ownerKey = emailToKey(cfg.ownerEmail);
      await rtdb.ref(`users/${ownerKey}/wards/${wid}`).remove();
      await rtdb.ref(`users/${ownerKey}/deletedWards/${wid}`).set({wardId:wid, wardName:cfg.wardName||'', deletedAt:new Date().toISOString(), deletedByAdmin: state.identity.email});
    }
    await loadSystemWardsIndex();
    const mount = document.getElementById('content');
    if(mount && state.activeTab==='adminSettings') renderAdminSettingsTab(mount);
  }
  async function cGetOnceFor(wid, sub, fallback){
    try{ const snap = await wrefFor(wid, sub).get(); return snap.exists() ? snap.val() : fallback; }
    catch(e){ console.error('Firebase đọc lỗi:', wid, sub, e); return fallback; }
  }
  // Email của Chủ trang web (superadmin) — người duy nhất có quyền thao tác
  // với "Thùng rác hệ thống" (nơi các mã xã bị Chủ mã xoá vĩnh viễn cuối cùng sẽ rơi vào).
  // Email của các Admin TỐI CAO — cố định trong code, không ai (kể cả admin khác) có quyền xoá
  // quyền admin của 2 tài khoản này. Các admin khác được thêm/xoá lẫn nhau qua Firebase (admins/...).
  const SUPER_ADMIN_EMAILS = ['lookatmevanthanhpham@gmail.com', '219thanhdeptrai@gmail.com'];
  function isSuperAdmin(){ return !!(state.identity && state.identity.email && SUPER_ADMIN_EMAILS.includes(state.identity.email)); }
  function isAdmin(){
    if(!state.identity || !state.identity.email) return false;
    if(isSuperAdmin()) return true;
    return !!(state.admins||{})[emailToKey(state.identity.email)];
  }
  // Giữ tên cũ để không phải sửa lại các chỗ gọi trước đây — nay có nghĩa "là Admin" (đã mở rộng đa Admin).
  function isSiteOwner(){ return isAdmin(); }

  function snapToArray(val){ return val ? Object.values(val) : []; }
  function byId(list){ const o={}; (list||[]).forEach(x=>{ if(x && x.id) o[x.id]=x; }); return o; }

  // Đọc 1 lần (dùng khi cần kiểm tra dữ liệu trước khi quyết định vào app/onboarding)
  async function cGetOnce(sub, fallback){
    try{ const snap = await wref(sub).get(); return snap.exists() ? snap.val() : fallback; }
    catch(e){ console.error('Firebase đọc lỗi:', sub, e); return fallback; }
  }
  // Ghi đè toàn bộ nhánh (dùng cho config, hoặc khôi phục sao lưu)
  async function cSet(sub, value){
    try{
      await wref(sub).set(value);
      if(sub === 'config') syncWardIndex(wardId(), value); // chạy nền, không cần chờ — phục vụ mục lục toàn hệ thống cho Admin
    }catch(e){ console.error('Firebase set lỗi:', sub, e); alert('Không thể lưu dữ liệu lên máy chủ. Vui lòng kiểm tra kết nối mạng / cấu hình Firebase.'); }
  }
  // Cập nhật một phần của nhánh (merge, không ghi đè các trường khác)
  async function cUpdate(sub, partial){
    try{ await wref(sub).update(partial); }catch(e){ console.error('Firebase update lỗi:', sub, e); }
  }
  // Ghi/thêm 1 bản ghi trong 1 tập hợp (borrowers/{id}, expenses/{id}, trash/{id}...)
  async function cSetRecord(sub, id, record){
    try{ await wref(sub).child(id).set(record); }catch(e){ console.error('Firebase set record lỗi:', sub, id, e); }
  }
  // Xoá 1 bản ghi khỏi 1 tập hợp
  async function cRemoveRecord(sub, id){
    try{ await wref(sub).child(id).remove(); }catch(e){ console.error('Firebase remove lỗi:', sub, id, e); }
  }
  // Thêm bản ghi mới với key tự sinh bởi Firebase (dùng cho Nhật ký hoạt động)
  async function cPush(sub, value){
    try{ const ref = wref(sub).push(); await ref.set(value); return ref.key; }
    catch(e){ console.error('Firebase push lỗi:', sub, e); }
  }

  // ---------- LẮNG NGHE REALTIME (onValue) ----------
  // Thay cho polling — mọi thay đổi từ bất kỳ thiết bị nào (Xã/Ấp) sẽ đẩy
  // xuống ngay lập tức cho tất cả các thiết bị khác đang mở ứng dụng.
  let realtimeUnsubs = [];
  let dataAttached = false; // đã bind borrowers/expenses/trash/log hay chưa (chỉ bind khi KHÔNG "chờ duyệt")
  function attachRealtime(){
    detachRealtime();
    const bind = (sub, applyFn) => {
      const ref = wref(sub);
      const cb = snap => { applyFn(snap.val()); render(); };
      ref.on('value', cb);
      realtimeUnsubs.push(()=>ref.off('value', cb));
    };
    // config luôn được lắng nghe (cần để xác định vai trò / phát hiện bị Chủ mã xoá hoặc
    // đổi mật khẩu mã — kể cả khi tài khoản đang ở trạng thái "chờ duyệt"). Từ nay việc chia
    // sẻ quyền (Loại 1 công khai / Loại 2 đích danh) đều nằm sẵn trong config.publicPerms /
    // config.grants — không cần một node "collaborators" riêng như trước nữa.
    bind('config', v => {
      const hasEmail = !!(state.identity && state.identity.email);
      const isOwnerOfIt = hasEmail && v && v.ownerEmail === state.identity.email;
      state.config = v;
      if(v && v.deleted && !isOwnerOfIt){
        if(hasEmail) kickToWallet('Mã xã này đã bị Chủ mã xoá. Vui lòng liên hệ Chủ mã để biết thêm chi tiết.');
        else kickAnonymousToLogin('Mã định danh này đã bị Chủ mã xoá hoặc thay đổi.');
        return;
      }
      if(hasEmail && !isOwnerOfIt && v){
        const mine = (state.myWards||[]).find(w=>w.wardId===wardId());
        if(mine && typeof mine.av==='number' && (v.accessVersion||0)!==mine.av){
          kickToWallet('Chủ mã đã thay đổi cấu hình, vui lòng liên hệ Chủ mã để lấy mã mới.'); return;
        }
      }
      // Khách qua mã (không đăng nhập) không có "ví" để lưu accessVersion đã tham gia, nên
      // nếu Chủ mã đổi mật khẩu, họ chỉ mất quyền ở lần tải lại trang kế tiếp — hạn chế đã biết,
      // vì hệ thống không lưu phiên cho người dùng ẩn danh.
      maybeAttachData();
    });
    maybeAttachData();
  }
  function maybeAttachData(){
    if(dataAttached) return;
    if(isPending()){ render(); return; }
    dataAttached = true;
    const bind = (sub, applyFn) => {
      const ref = wref(sub);
      const cb = snap => { applyFn(snap.val()); render(); };
      ref.on('value', cb);
      realtimeUnsubs.push(()=>ref.off('value', cb));
    };
    bind('borrowers', v => { state.borrowers = snapToArray(v); });
    bind('loanProjects', v => { state.loanProjects = snapToArray(v); });
    bind('borrowerColumnPrefs', v => { state.borrowerColumnPrefsShared = v || null; });
    bind('interestApprovals', v => { state.interestApprovals = v || {}; });
    bind('interestApprovalColumnPrefs', v => { state.iaColumnPrefsShared = v || null; });
    bind('quarterSettingsHistory', v => { state.quarterSettingsHistory = snapToArray(v).sort((a,b)=> new Date(b.time)-new Date(a.time)); });
    bind('loanExtensions', v => { state.loanExtensions = v || {}; });
    bind('interestPaymentBoxes', v => { state.interestPaymentBoxes = v || {}; });
    bind('expenses', v => { state.expenses = snapToArray(v); });
    bind('trash', v => { state.trash = snapToArray(v); });
    // Nhật ký: chỉ lấy 500 dòng gần nhất, sắp xếp mới nhất lên đầu
    const logRef = wref('activityLog').limitToLast(500);
    const logCb = snap => { state.log = snapToArray(snap.val()).sort((a,b)=> new Date(b.time)-new Date(a.time)); render(); };
    logRef.on('value', logCb);
    realtimeUnsubs.push(()=>logRef.off('value', logCb));
    render();
  }
  function detachRealtime(){ realtimeUnsubs.forEach(off=>off()); realtimeUnsubs = []; dataAttached = false; }
  // Văng người dùng (Khách đã đăng nhập Google) về màn hình "Ví mã xã" kèm thông báo — dùng
  // khi Chủ mã xoá hoặc đổi mật khẩu mã trong lúc Khách đang xem.
  function kickToWallet(message){
    detachRealtime();
    state.identity.wardId = '';
    setActiveWardCache('');
    state.config = null; state.borrowers=[]; state.loanProjects=[]; state.borrowerColumnPrefsShared=null; state.borrowerVisibleCols=null; state.borrowerColumnOrder=null; state.filterHamlets=null; state.filterProjectIds=null; state.filterQuarters=null; state.filterQuartersAdvanced=false; state.filterYears=null; state.filterYearsAdvanced=false; state.openFilterDropdown=null; state.surveys=[]; state.expenses=[]; state.trash=[]; state.log=[];
    alert(message);
    loadWallet().then(()=>{ state.view = 'wallet'; render(); });
  }
  // Văng Khách qua mã KHÔNG đăng nhập (codeGuest) về màn hình đăng nhập ban đầu.
  function kickAnonymousToLogin(message){
    detachRealtime();
    alert(message);
    state.identity = null;
    state.config = null; state.borrowers=[]; state.loanProjects=[]; state.borrowerColumnPrefsShared=null; state.borrowerVisibleCols=null; state.borrowerColumnOrder=null; state.filterHamlets=null; state.filterProjectIds=null; state.filterQuarters=null; state.filterQuartersAdvanced=false; state.filterYears=null; state.filterYearsAdvanced=false; state.openFilterDropdown=null; state.surveys=[]; state.expenses=[]; state.trash=[]; state.log=[];
    state.view = 'login';
    render();

  // =====================================================================
  // ---------- LỚP LƯU TRỮ NỘI BỘ (chỉ trên máy — KHÔNG lên đám mây) -----
  // Dùng riêng cho module "Thu – Chi nội bộ" và cho "identity" (thông tin
  // đăng nhập của riêng thiết bị này). Dùng localStorage thật của trình
  // duyệt — không bao giờ gửi lên Firebase hay bất kỳ máy chủ nào.
  // =====================================================================
  function lget(key, fallback){
    try{ const v = localStorage.getItem(key); return v!==null ? JSON.parse(v) : fallback; }
    catch(e){ return fallback; }
  }
  function lset(key, value){
    try{
      if(value===null || value===undefined) localStorage.removeItem(key);
      else localStorage.setItem(key, JSON.stringify(value));
    }catch(e){ console.error('localStorage set lỗi', e); }
  }
  // Namespace theo wardId để nhiều Xã dùng chung 1 máy/trình duyệt không đụng dữ liệu của nhau
  function localKey(name){ return `hnd_local_${wardId()||'chung'}_${name}`; }

  // ---------- export / print / backup helpers ----------
  function downloadBlob(filename, content, mime){
    const blob = new Blob([content], {type: mime});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
  }

  // được GHÉP Ô (merge) trải dài hết bề ngang bảng — không bị bó kín vào 1 ô/1 cột.
  function exportBorrowersExcel(list, visibleCols){
    if(!window.XLSX){ alert('Thư viện xuất Excel chưa tải xong, vui lòng thử lại sau ít giây.'); return; }
    const projLabel = projectFilterLabel(activeLoanProjects());
    const hamletLabel = hamletFilterLabel(state.config.hamlets||[]);
    const headerLines = [
      [hoiNongDanTitle()],
      [provinceTitle()],
      [`BÁO CÁO SỔ VAY VỐN — Phương án: ${projLabel} — ${subAdminLabel()}: ${hamletLabel}`],
      [`Thời gian xuất: ${new Date().toLocaleString('vi-VN')}`],
      [],
    ];
    const colLabels = visibleCols.map(c=>c.label);
    const dataRows = list.map(b=> visibleCols.map(c=> (c.getPlain||c.get)(b)));
    const aoa = [...headerLines, colLabels, ...dataRows];
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    const lastCol = Math.max(0, visibleCols.length - 1);
    ws['!merges'] = headerLines.map((line,r)=> (line.length? { s:{r,c:0}, e:{r,c:lastCol} } : null)).filter(Boolean);
    ws['!cols'] = visibleCols.map(()=>({wch:20}));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'So vay von');
    XLSX.writeFile(wb, `So-vay-von_${todayStr()}.xlsx`);
  }

  // Yêu cầu mới: hiển thị người vay nhóm RIÊNG BIỆT theo từng Phương án vay (mỗi phương án 1 khu
  // vực/bảng riêng có tiêu đề tên phương án), thay vì gộp chung 1 bảng phẳng.
  // "X năm Y tháng Z ngày" — LUÔN hiện tháng (kể cả 0 tháng); ẩn hẳn phần năm nếu năm=0; ẩn hẳn
  // phần ngày nếu ngày=0. Dùng để hiện "thời hạn" của phương án vay ở tiêu đề nhóm danh sách.
  function calcLoanDuration(startStr, endStr){
    if(!startStr || !endStr) return '';
    const start = new Date(startStr+'T00:00:00');
    const end = new Date(endStr+'T00:00:00');
    if(isNaN(start.getTime()) || isNaN(end.getTime()) || end<start) return '';
    let years = end.getFullYear() - start.getFullYear();
    let months = end.getMonth() - start.getMonth();
    let days = end.getDate() - start.getDate();
    if(days<0){ months -= 1; days += new Date(end.getFullYear(), end.getMonth(), 0).getDate(); }
    if(months<0){ years -= 1; months += 12; }
    const parts = [];
    if(years>0) parts.push(`${years} năm`);
    parts.push(`${months} tháng`);
    if(days>0) parts.push(`${days} ngày`);
    return parts.join(' ');
  }
  // Số ngày còn lại tính từ hôm nay (theo lịch hiện hành) tới Ngày đến hạn — có thể âm nếu đã quá hạn.
  function daysRemainingUntil(dueDateStr){
    if(!dueDateStr) return null;
    const due = new Date(dueDateStr+'T00:00:00');
    if(isNaN(due.getTime())) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((due-today)/86400000);
    // Yêu cầu mới: khi về tới 0 thì DỪNG LẠI ở 0, không cho chạy tiếp thành số âm nữa.
    return Math.max(0, diff);
  }
  function daysRemainingLabel(dueDateStr){
    const d = daysRemainingUntil(dueDateStr);
    return d==null ? '' : `còn ${d} ngày`;
  }
  // Màu nền cả dòng theo mức khẩn cấp của "Thời gian còn lại": 90-61 ngày xanh green nhạt, 60-31
  // ngày xanh cyan nhạt, 30-1 ngày vàng nhạt, 0 ngày (và quá hạn) đỏ nhạt.
  function daysRemainingRowColor(dueDateStr){
    const d = daysRemainingUntil(dueDateStr);
    if(d==null) return '';
    if(d<=0) return 'rgba(239,83,80,.20)';
    if(d<=30) return 'rgba(255,213,79,.28)';
    if(d<=60) return 'rgba(77,208,225,.22)';
    if(d<=90) return 'rgba(129,199,132,.22)';
    return '';
  }
  // Các cột tiền tệ -> lấy TỔNG (SUM); các cột ngày/phương án/nguồn vay -> lấy GIÁ TRỊ GIỐNG NHAU
  // của cả nhóm (vì cùng 1 phương án thì các trường này ai cũng như ai); còn lại để trống.
  const BORROWER_TOTAL_SUM_KEYS = ['principal','quarterInterestAmount','splitCentralAmt','splitProvinceAmt','splitWardAmt','hamletAllocAmt','interestOutstanding','overdueDebtAmount'];
  const BORROWER_TOTAL_SAME_KEYS = ['project','loanDate','dueDate','fundSource','interestFromDate','interestToDate'];
  function computeBorrowerColumnSum(key, groupList){
    switch(key){
      case 'principal': return groupList.reduce((s,b)=> s+(parseFloat(b.principal)||0), 0);
      case 'quarterInterestAmount': return groupList.reduce((s,b)=> s+computeCurrentQuarterInterest(b), 0);
      case 'splitCentralAmt': return groupList.reduce((s,b)=> s+computeBorrowerAllocations(b).central, 0);
      case 'splitProvinceAmt': return groupList.reduce((s,b)=> s+computeBorrowerAllocations(b).province, 0);
      case 'splitWardAmt': return groupList.reduce((s,b)=> s+computeBorrowerAllocations(b).ward, 0);
      case 'hamletAllocAmt': return groupList.reduce((s,b)=> s+computeBorrowerAllocations(b).hamlet, 0);
      default: return 0; // interestOutstanding/overdueDebtAmount: chưa có dữ liệu thật, tổng tạm = 0
    }
  }
  function wardFullLabel(){ return `${adminLevelLabel()} ${(state.config&&state.config.wardName)||''}`.trim(); }
  // Giá trị 1 ô ở dòng tổng hợp (dòng TỔNG mỗi phương án, hoặc dòng {Thống kê chung}) — cho phép
  // ghi đè riêng cột "name"/"hamlet" theo ngữ cảnh gọi (opts.nameOverride/hamletOverride).
  function borrowerAggregateCellValue(colKey, groupList, opts){
    opts = opts || {};
    if(colKey==='name') return opts.nameOverride!=null ? opts.nameOverride : 'TỔNG';
    if(colKey==='hamlet') return opts.hamletOverride!=null ? opts.hamletOverride : wardFullLabel();
    if(BORROWER_TOTAL_SUM_KEYS.includes(colKey)) return moneySpaced(computeBorrowerColumnSum(colKey, groupList));
    if(BORROWER_TOTAL_SAME_KEYS.includes(colKey)){
      if(!groupList.length) return '';
      const col = BORROWER_COLUMNS().find(c=>c.key===colKey);
      return col ? col.get(groupList[0]) : '';
    }
    return '';
  }

  // Bảng {Thống kê chung} — KHÔNG có tiêu đề, đặt phía TRÊN bảng phương án vay đầu tiên. Tổng hợp
  // TOÀN BỘ người vay đang hiển thị (theo đúng bộ lọc hiện dùng), không phân biệt phương án. Cột
  // "Họ và tên" đổi nhãn hiển thị thành "Địa phương" (không đổi tên cột thật ở nơi khác), cột "Đơn
  // vị" bị ẨN hẳn khỏi bảng này.
  function renderBorrowerOverallStatsHtml(list, visibleCols, hamlets){
    const restCols = visibleCols.slice(1).filter(c=>c.key!=='hamlet'); // ẨN hẳn cột Đơn vị ở bảng này
    const nameHeaderLabel = 'Địa phương';
    ensureFilterHamletsInit(hamlets);
    const selHamlets = state.filterHamlets;
    const allSelected = selHamlets.length===0 || selHamlets.length===hamlets.length;
    // "Tất cả ấp" -> gộp 1 hàng toàn xã; chọn 1 hoặc nhiều ấp cụ thể -> mỗi ấp 1 hàng riêng.
    const rows = allSelected
      ? [{ label: wardFullLabel(), groupList: list }]
      : selHamlets.map(h=> ({ label: `${subAdminLabel()} ${h}`, groupList: list.filter(b=>b.hamlet===h) }));
    const rowsHtml = rows.map(r=>{
      const cellVal = (colKey)=> borrowerAggregateCellValue(colKey, r.groupList, { nameOverride: r.label });
      return `<tr>
        <td class="sv-sticky-1" style="background:var(--white);"></td>
        <td class="sv-sticky-2" style="background:var(--white); font-weight:700;">${escapeHtml(r.label)}</td>
        ${restCols.map(c=>`<td class="${c.align==='right'?'money':''}">${cellVal(c.key)}</td>`).join('')}
      </tr>`;
    }).join('');
    return `
      <div class="table-wrap" style="margin-bottom:18px;">
        <table>
          <thead><tr>
            <th class="sv-sticky-1 sv-group-header-th"></th>
            <th class="sv-sticky-2 sv-group-header-th">${escapeHtml(nameHeaderLabel)}</th>
            ${restCols.map(c=>`<th>${escapeHtml(c.key==='principal'? 'Tổng dư nợ' : c.label)}</th>`).join('')}
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>`;
  }

  function renderBorrowerGroupedTablesHtml(list, visibleCols, projects, canEdit){
    if(!list.length) return `<div class="empty-state"><div class="e-ico">🌾</div>Chưa có người vay nào theo bộ lọc hiện tại</div>`;
    const groups = {};
    list.forEach(b=>{
      const key = (b.projectId && projects.some(p=>p.id===b.projectId)) ? b.projectId : '__none__';
      (groups[key] = groups[key]||[]).push(b);
    });
    const groupOrder = projects.map(p=>p.id).filter(pid=>groups[pid]);
    if(groups['__none__']) groupOrder.push('__none__');
    const statsHtml = renderBorrowerOverallStatsHtml(list, visibleCols, state.config.hamlets||[]);
    const groupsHtml = groupOrder.map(gid=>{
      const groupList = groups[gid];
      const proj = gid==='__none__' ? null : projects.find(p=>p.id===gid);
      const projName = proj ? escapeHtml(proj.name) : '(Không rõ phương án — có thể đã bị xoá)';
      const duration = proj ? calcLoanDuration(proj.disburseDate, proj.dueDate) : '';
      const capitalTxt = proj ? `, ${groupDigitsRight(String(Math.round(proj.totalCapital||0)),3)} đồng` : '';
      const durationTxt = duration ? `, ${duration}` : '';
      const nameCol = visibleCols[0]; // luôn là cột "Họ và tên" vì đã khoá cứng đứng đầu tiên
      const restCols = visibleCols.slice(1);
      return `
      <div style="margin-bottom:18px;">
        <div class="sv-group-header">📋 ${projName} (${groupList.length} người vay)${capitalTxt}${durationTxt}</div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th class="sv-sticky-1"></th>
              <th class="sv-sticky-2">${nameCol? escapeHtml(nameCol.label) : ''}</th>
              ${restCols.map(c=>`<th>${escapeHtml(c.label)}</th>`).join('')}
            </tr></thead>
            <tbody>${groupList.map(b=>{
              const dueRef = proj? proj.dueDate : b.dueDate;
              const rowColor = daysRemainingRowColor(dueRef);
              return `<tr${rowColor? ` style="background:${rowColor};"` : ''}>
                <td class="sv-sticky-1" style="background:var(--white);"><button class="btn btn-ghost btn-sm" data-view="${b.id}" title="Xem/Sửa" style="padding:4px 8px;">✏️</button></td>
                <td class="sv-sticky-2" style="background:var(--white);">${nameCol? nameCol.get(b) : ''}</td>
                ${restCols.map(c=>`<td class="${c.align==='right'?'money':''}">${c.get(b)}</td>`).join('')}
              </tr>`;
            }).join('')}
            <tr style="background:var(--paper-2); font-weight:700;">
              <td class="sv-sticky-1" style="background:var(--paper-2);"></td>
              <td class="sv-sticky-2" style="background:var(--paper-2);">${borrowerAggregateCellValue('name', groupList)}</td>
              ${restCols.map(c=>`<td class="${c.align==='right'?'money':''}">${borrowerAggregateCellValue(c.key, groupList)}</td>`).join('')}
            </tr>
            </tbody>
          </table>
        </div>
      </div>`;
    }).join('');
    return statsHtml + groupsHtml;
  }

  // Bảng nhóm dành riêng cho modal "Tính tiền lãi và phê duyệt đóng lãi" — cột đầu là checkbox "Đã
  // đóng lãi" (không phải icon bút). Dòng TỔNG mỗi phương án cũng có checkbox chọn/bỏ chọn CẢ NHÓM,
  // đồng bộ 2 chiều giống hệt kiểu "Tất cả" đã dùng ở các bộ lọc khác.
  function renderIAGroupedTablesHtml(list, visibleCols, projects){
    if(!list.length) return `<div class="empty-state"><div class="e-ico">🌾</div>Chưa có người vay nào theo bộ lọc hiện tại</div>`;
    const groups = {};
    list.forEach(b=>{
      const key = (b.projectId && projects.some(p=>p.id===b.projectId)) ? b.projectId : '__none__';
      (groups[key] = groups[key]||[]).push(b);
    });
    const groupOrder = projects.map(p=>p.id).filter(pid=>groups[pid]);
    if(groups['__none__']) groupOrder.push('__none__');
    const statsHtml = renderBorrowerOverallStatsHtml(list, visibleCols, state.config.hamlets||[]);
    const groupsHtml = groupOrder.map(gid=>{
      const groupList = groups[gid];
      const proj = gid==='__none__' ? null : projects.find(p=>p.id===gid);
      const projName = proj ? escapeHtml(proj.name) : '(Không rõ phương án — có thể đã bị xoá)';
      const duration = proj ? calcLoanDuration(proj.disburseDate, proj.dueDate) : '';
      const capitalTxt = proj ? `, ${groupDigitsRight(String(Math.round(proj.totalCapital||0)),3)} đồng` : '';
      const durationTxt = duration ? `, ${duration}` : '';
      const nameCol = visibleCols[0];
      const restCols = visibleCols.slice(1);
      return `
      <div style="margin-bottom:18px;">
        <div class="sv-group-header">📋 ${projName} (${groupList.length} người vay)${capitalTxt}${durationTxt}</div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th class="ia-sticky-1">Thông tin đóng lãi</th>
              <th>Quyết định</th>
              <th>${nameCol? escapeHtml(nameCol.label) : ''}</th>
              ${restCols.map(c=>`<th>${escapeHtml(c.label)}</th>`).join('')}
            </tr></thead>
            <tbody>${groupList.map(b=>{
              const dueRef = proj? proj.dueDate : b.dueDate;
              const rowColor = daysRemainingRowColor(dueRef);
              const dispB = computeInterestPaymentBoxDisplay(b);
              const paidCount = dispB.paidLines.length;
              const totalUnpaidB = dispB.unpaidTotal + dispB.futureUnpaidTotal;
              return `<tr${rowColor? ` style="background:${rowColor};"` : ''}>
                <td class="ia-sticky-1" style="background:var(--white);"><button class="ext-action-btn ext-green preview-allow" style="animation-delay:${(Math.random()*3.5).toFixed(2)}s;" data-ia-hist="${b.id}">Xem (${paidCount})</button></td>
                <td>${totalUnpaidB<=0? `<button class="ext-action-btn" disabled title="Hộ vay này đã đóng hết lãi, không còn nợ lãi">Đóng tiền lãi</button>` : `<button class="ext-action-btn ext-green preview-allow" style="animation-delay:${(Math.random()*3.5).toFixed(2)}s;" data-ia-pay="${b.id}">Đóng tiền lãi</button>`}</td>
                <td>${nameCol? nameCol.get(b) : ''}</td>
                ${restCols.map(c=>`<td class="${c.align==='right'?'money':''}">${c.get(b)}</td>`).join('')}
              </tr>`;
            }).join('')}
            <tr style="background:var(--paper-2); font-weight:700;">
              <td class="ia-sticky-1" style="background:var(--paper-2);"><button class="ext-action-btn ext-green" data-ia-hist-locked="1">Xem</button></td>
              <td><button class="ext-action-btn ext-green" data-ia-pay-locked="1">Đóng tiền lãi</button></td>
              <td>${borrowerAggregateCellValue('name', groupList)}</td>
              ${restCols.map(c=>`<td class="${c.align==='right'?'money':''}">${borrowerAggregateCellValue(c.key, groupList)}</td>`).join('')}
            </tr>
            </tbody>
          </table>
        </div>
      </div>`;
    }).join('');
    return statsHtml + groupsHtml;
  }

  // =====================================================================
  // Modal "Tính tiền lãi và phê duyệt đóng lãi" — cấu trúc y hệt panel "Danh sách người vay" (tìm
  // kiếm, 4 bộ lọc dùng CHUNG state với panel chính, tuỳ chỉnh cột riêng) nhưng KHÔNG có nút Xuất
  // Excel/In/Thêm người vay; cột đầu mỗi bảng là checkbox "Đã đóng lãi" thay cho icon sửa.
  // =====================================================================
  // =====================================================================
  // Modal con "GIA HẠN" — mở khi bấm nút GIA HẠN của 1 người vay (hoặc dòng TỔNG cho cả nhóm).
  // targets: mảng người vay (1 phần tử nếu bấm từng dòng, nhiều phần tử nếu bấm dòng TỔNG).
  // =====================================================================
  const EXTENSION_DURATION_OPTIONS = [0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,6,7,8,9,10,11,12];
  function renderExtensionApprovalModal(targets, reopenParent){
    if(!targets.length) return;
    const isGroup = targets.length>1;
    const extLevel = getBorrowerExtensions(targets[0].id).length + 1; // Lần thứ mấy (đã kiểm tra đồng nhất trước khi mở)
    const lockedFrom = latestBorrowerExtension(targets[0].id) ? latestBorrowerExtension(targets[0].id).to : targets[0].dueDate;
    const sampleRate = parseFloat(targets[0].rate)||0;
    const draft = {
      to:'', duration:'other', rateType:'zero', ratePct:0, customRateInput:'',
      allocMode:'wardOnly', hamletAllocPercent:45, splitCentral:0, splitProvince:4.32, splitWard:2.28, allTiersHamletPercent:45,
    };
    const wrap = document.createElement('div');
    wrap.className = 'modal-bg';
    document.body.appendChild(wrap);
    const close = ()=>{ wrap.remove(); if(reopenParent) reopenParent(); };

    function personLabel(){ return isGroup ? 'các hộ vay này trong phương án vay' : `hộ vay ${escapeHtml(targets[0].name)}`; }
    function hoLabel(){ return isGroup ? 'Các hộ' : 'Hộ'; }

    function renderBody(){
      const pastLines = getBorrowerExtensions(targets[0].id).map((e,i)=> `${hoLabel()} này đã được gia hạn LẦN ${i+1} với ngày kết thúc là ${fmtDate(e.to)}.`).join('<br>');
      const projName = isGroup ? (activeLoanProjects().find(p=>p.id===targets[0].projectId)||{}).name || '' : '';
      const introTitle = isGroup
        ? `Gia hạn nợ gốc LẦN ${extLevel} cho các hộ vay này trong phương án vay ${escapeHtml(projName)}`
        : `Gia hạn nợ gốc LẦN ${extLevel} cho hộ vay ${escapeHtml(targets[0].name)}`;
      const introBody = isGroup
        ? `Đang thiết lập gia hạn LẦN ${extLevel} chung cho toàn bộ ${targets.length} hộ vay đang hiển thị theo bộ lọc.<br>${pastLines? pastLines+'<br>' : ''}Hãy quyết định xem các hộ này sẽ được gia hạn trả nợ gốc trong bao lâu nữa:`
        : `${hoLabel()} này được vay với số tiền gốc ${moneySpaced(targets[0].principal)}, từ ngày ${fmtDate(targets[0].loanDate)} Đến ngày ${fmtDate(targets[0].dueDate)},<br>${pastLines? pastLines+'<br>' : ''}hãy quyết định xem ${isGroup?'các hộ':'họ'} được sẽ được gia hạn trả nợ gốc trong bao lâu nữa:`;

      const rateLabel2 = `${String(sampleRate).replace('.',',')}%/năm`;
      const showAlloc = draft.rateType==='current' || (draft.rateType==='custom' && draft.ratePct>0);

      let summaryLine = '';
      if(draft.to){
        const dur = calcLoanDuration(lockedFrom, draft.to);
        summaryLine = `${hoLabel()} này sẽ được gia hạn trả nợ gốc (LẦN ${extLevel}) từ ngày ${fmtDate(lockedFrom)} đến ngày ${fmtDate(draft.to)}${dur? ' ('+dur+')':''}. với lãi suất trong thời gian gia hạn là ${String(draft.ratePct).replace('.',',')}%/năm`;
      }

      wrap.innerHTML = `
        <div class="modal" style="max-width:96vw; width:760px;">
          <div class="modal-head"><h3>Gia hạn nợ</h3><button class="modal-close preview-allow" id="ext-close">✕</button></div>
          <div class="modal-body">
            <div style="background:rgba(255,183,77,.28); color:#000; font-weight:800; padding:10px 14px; border-radius:8px; margin-bottom:10px;">${introTitle}</div>
            <p class="sub" style="line-height:1.6;">${introBody}</p>

            <div class="form-grid">
              <div class="field"><label>Gia hạn từ ngày</label><input value="${fmtDate(lockedFrom)}" disabled></div>
              <div class="field">
                <label>Khoảng thời gian <span class="sub">(chỉ để tính nhanh)</span></label>
                <select id="ext-duration" class="preview-allow">
                  <option value="other">Khác</option>
                  ${EXTENSION_DURATION_OPTIONS.map(m=>`<option value="${m}" ${draft.duration==String(m)?'selected':''}>${String(m).replace('.',',')} tháng</option>`).join('')}
                </select>
              </div>
              <div class="field"><label>Gia hạn đến ngày *</label><input type="date" id="ext-to" class="preview-allow" value="${draft.to}" min="${lockedFrom}"></div>
            </div>

            <div class="divider-lbl">Chọn lãi suất trong thời gian gia hạn (lãi suất quá hạn) %/năm:</div>
            <div style="display:flex; gap:0;">
              <button class="btn btn-sm preview-allow" id="ext-rate-zero" style="border:1px solid #000; border-radius:8px 0 0 8px; ${draft.rateType==='zero'?'background:var(--gold); color:#fff;':'background:var(--white);'}">0% / năm</button>
              <button class="btn btn-sm preview-allow" id="ext-rate-current" style="border:1px solid #000; border-left:none; ${draft.rateType==='current'?'background:var(--gold); color:#fff;':'background:var(--white);'}">${rateLabel2}</button>
              <button class="btn btn-sm preview-allow" id="ext-rate-custom" style="border:1px solid #000; border-left:none; border-radius:0 8px 8px 0; ${draft.rateType==='custom'?'background:var(--gold); color:#fff;':'background:var(--white);'}">Lãi suất khác</button>
            </div>
            ${draft.rateType==='custom'? `<div class="field" style="margin-top:8px; max-width:200px;"><label>Nhập lãi suất khác (%/năm)</label><input id="ext-rate-custom-input" class="preview-allow" value="${draft.customRateInput}" maxlength="5" placeholder="Vd: 3,3"></div>` : ''}

            ${showAlloc? `
            <div class="divider-lbl">Chọn phương án phân bổ lãi</div>
            <p class="sub" style="margin-top:-4px;">Số tiền lãi thu về trong đợt gia hạn này được phân bổ về đâu?</p>
            <div style="display:flex; flex-direction:column; gap:8px;">
              <label class="sv-filter-item" style="border:1px solid var(--line); border-radius:8px;"><input type="radio" name="ext-alloc" class="preview-allow" id="ext-alloc-wardOnly" ${draft.allocMode==='wardOnly'?'checked':''}> Phân bổ hết 100% về cấp xã</label>
              <label class="sv-filter-item" style="border:1px solid var(--line); border-radius:8px;"><input type="radio" name="ext-alloc" class="preview-allow" id="ext-alloc-wardHamlet" ${draft.allocMode==='wardHamlet'?'checked':''}> Phân bổ về cấp xã và cấp ${subAdminLabelLower()}</label>
              ${draft.allocMode==='wardHamlet'? `<div class="field" style="margin-left:24px; max-width:260px;"><label>Cấp xã phân bổ tiền lãi xuống cấp ${subAdminLabelLower()} với tỷ lệ:</label><input id="ext-hamlet-pct" class="preview-allow" value="${String(draft.hamletAllocPercent).replace('.',',')}" maxlength="5"></div>` : ''}
              <label class="sv-filter-item" style="border:1px solid var(--line); border-radius:8px;"><input type="radio" name="ext-alloc" class="preview-allow" id="ext-alloc-allTiers" ${draft.allocMode==='allTiers'?'checked':''}> Phân bổ về Tất cả các cấp (trung ương, tỉnh, xã, ${subAdminLabelLower()})</label>
              ${draft.allocMode==='allTiers'? `
                <div style="margin-left:24px;">
                  <p class="sub">Lãi suất của tất cả các cấp cộng lại (Trung ương, tỉnh, xã) phải luôn bằng ${String(draft.ratePct).replace('.',',')}%/năm</p>
                  <div class="form-grid">
                    <div class="field"><label>Cấp trung ương (%)</label><input id="ext-central" class="preview-allow" value="${String(draft.splitCentral).replace('.',',')}" maxlength="5"></div>
                    <div class="field"><label>Cấp tỉnh/thành phố (%)</label><input id="ext-province" class="preview-allow" value="${String(draft.splitProvince).replace('.',',')}" maxlength="5"></div>
                    <div class="field"><label>Cấp xã/phường (%)</label><input id="ext-ward" class="preview-allow" value="${String(draft.splitWard).replace('.',',')}" maxlength="5"></div>
                  </div>
                  <p class="sub">Tổng số tiền lãi cấp xã/phường nhận được, tiếp tục phân bổ số tiền đó về cấp ${subAdminLabelLower()} là (tỷ lệ %, không nhập quá 100):</p>
                  <div class="field" style="max-width:200px;"><input id="ext-alltiers-hamlet-pct" class="preview-allow" value="${String(draft.allTiersHamletPercent).replace('.',',')}" maxlength="5"></div>
                </div>` : ''}
            </div>` : ''}

            ${summaryLine? `<div style="background:var(--paper-2); border-radius:10px; padding:10px 14px; margin-top:14px; font-size:12.5px; font-weight:700;">${escapeHtml(summaryLine)}</div>` : ''}
          </div>
          <div class="modal-foot">
            <button class="btn btn-ghost preview-allow" id="ext-cancel">Đóng bảng (không phê duyệt)</button>
            <button class="btn btn-primary preview-allow" id="ext-save">Lưu (phê duyệt gia hạn)</button>
          </div>
        </div>`;
      wire();
    }

    function wire(){
      wrap.querySelector('#ext-close').onclick = close;
      wrap.querySelector('#ext-cancel').onclick = close;
      wrap.onclick = (e)=>{ if(e.target===wrap) close(); };

      wrap.querySelector('#ext-duration').onchange = (e)=>{
        draft.duration = e.target.value;
        if(draft.duration!=='other') draft.to = addMonthsToDateStr(lockedFrom, parseFloat(draft.duration));
        renderBody();
      };
      wrap.querySelector('#ext-to').onchange = (e)=>{
        const v = e.target.value;
        if(v && v<=lockedFrom){ alert('Chỉ được chọn ngày SAU Ngày đến hạn/gia hạn hiện tại. Vui lòng chọn lại.'); e.target.value = draft.to; return; }
        draft.to = v; draft.duration = 'other';
        renderBody();
      };
      wrap.querySelector('#ext-rate-zero').onclick = ()=>{ draft.rateType='zero'; draft.ratePct=0; renderBody(); };
      wrap.querySelector('#ext-rate-current').onclick = ()=>{ draft.rateType='current'; draft.ratePct=sampleRate; renderBody(); };
      wrap.querySelector('#ext-rate-custom').onclick = ()=>{ draft.rateType='custom'; renderBody(); };
      const customInput = wrap.querySelector('#ext-rate-custom-input');
      if(customInput){
        customInput.addEventListener('keypress', (e)=>{
          const ch=e.key; if(ch.length!==1) return;
          if(!/[\d,]/.test(ch) || (ch===',' && customInput.value.includes(','))){ e.preventDefault(); }
        });
        const commitCustomRate = ()=>{
          const val = parseFloat(customInput.value.replace(',','.'));
          if(!val || val<=0 || val>50){ alert('Lãi suất khác phải lớn hơn 0 và không vượt quá 50%. Hệ thống sẽ tạm áp dụng 0%/năm.'); draft.rateType='zero'; draft.ratePct=0; }
          else { draft.customRateInput = customInput.value; draft.ratePct = val; }
          renderBody();
        };
        customInput.addEventListener('blur', commitCustomRate);
        // Yêu cầu mới: bấm Enter cũng ghi nhận số vừa nhập (nếu hợp lệ) và sổ khung phân bổ lãi
        // xuống ngay, y hệt hành vi khi bấm ra ngoài (blur) — không cần phải click ra ngoài nữa.
        customInput.addEventListener('keydown', (e)=>{
          if(e.key==='Enter'){ e.preventDefault(); commitCustomRate(); }
        });
      }
      ['ext-alloc-wardOnly','ext-alloc-wardHamlet','ext-alloc-allTiers'].forEach(id=>{
        const el = wrap.querySelector('#'+id); if(!el) return;
        el.onchange = ()=>{ draft.allocMode = id.replace('ext-alloc-',''); renderBody(); };
      });
      const bindEnterTriggersBlur = (el)=>{
        if(!el) return;
        el.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); el.blur(); } });
      };
      const hamletPctInput = wrap.querySelector('#ext-hamlet-pct');
      if(hamletPctInput) hamletPctInput.onblur = ()=>{
        const v = parseFloat(hamletPctInput.value.replace(',','.'));
        if(!v || v<=0 || v>100){ alert(`Tỷ lệ phân bổ về ${subAdminLabelLower()} phải lớn hơn 0 và không vượt quá 100%.`); hamletPctInput.value = String(draft.hamletAllocPercent).replace('.',','); return; }
        draft.hamletAllocPercent = v;
      };
      bindEnterTriggersBlur(hamletPctInput);
      ['ext-central','ext-province','ext-ward'].forEach(id=>{
        const el = wrap.querySelector('#'+id); if(!el) return;
        el.onblur = ()=>{
          const v = parseFloat(el.value.replace(',','.'))||0;
          if(id==='ext-central') draft.splitCentral=v; if(id==='ext-province') draft.splitProvince=v; if(id==='ext-ward') draft.splitWard=v;
        };
        bindEnterTriggersBlur(el);
      });
      const allTiersHamletInput = wrap.querySelector('#ext-alltiers-hamlet-pct');
      if(allTiersHamletInput) allTiersHamletInput.onblur = ()=>{
        const v = parseFloat(allTiersHamletInput.value.replace(',','.'));
        if(!v || v<=0 || v>100){ alert(`Tỷ lệ phân bổ về ${subAdminLabelLower()} phải lớn hơn 0 và không vượt quá 100%.`); allTiersHamletInput.value = String(draft.allTiersHamletPercent).replace('.',','); return; }
        draft.allTiersHamletPercent = v;
      };
      bindEnterTriggersBlur(allTiersHamletInput);

      wrap.querySelector('#ext-save').onclick = async ()=>{
        if(state.previewMode){ alert('Bạn đang ở chế độ tham quan, không thể lưu phê duyệt gia hạn thật.'); return; }
        if(!canEditModule('data')){ alert('Bạn không có quyền Sửa ở Sổ vay vốn nên không thể phê duyệt gia hạn. Vui lòng liên hệ Chủ mã định danh.'); return; }
        if(extLevel > MAX_LOAN_EXTENSIONS){ alert(`Không thể lưu! Hệ thống chỉ cho phép gia hạn tối đa ${MAX_LOAN_EXTENSIONS} lần cho 1 khoản vay.`); return; }
        if(!draft.to){ alert('Vui lòng chọn "Gia hạn đến ngày".'); return; }
        if(draft.allocMode==='allTiers'){
          const sum = Math.round((draft.splitCentral+draft.splitProvince+draft.splitWard)*100)/100;
          if(Math.abs(sum-draft.ratePct)>0.01){ alert(`Tổng 3 cấp (${sum}%) phải bằng đúng lãi suất gia hạn (${draft.ratePct}%). Vui lòng kiểm tra lại.`); return; }
        }
        const record = {
          from: lockedFrom, to: draft.to, rateType: draft.rateType, ratePct: draft.ratePct, allocMode: draft.allocMode,
          hamletAllocPercent: draft.allocMode==='wardHamlet' ? draft.hamletAllocPercent : (draft.allocMode==='allTiers' ? draft.allTiersHamletPercent : null),
          splitCentral: draft.allocMode==='allTiers' ? draft.splitCentral : null,
          splitProvince: draft.allocMode==='allTiers' ? draft.splitProvince : null,
          splitWard: draft.allocMode==='allTiers' ? draft.splitWard : null,
          savedAt: new Date().toISOString(), savedBy: state.identity.email||'',
        };
        for(const b of targets){
          const arr = getBorrowerExtensions(b.id).slice();
          arr.push(record);
          await cSet('loanExtensions/'+b.id, arr);
        }
        await pushLog('phê duyệt', `gia hạn nợ gốc LẦN ${extLevel} cho ${isGroup? targets.length+' hộ vay' : targets[0].name}`);
        close();
        showBigToast(`Đã gia hạn thành công lần ${extLevel}`);
      };
    }
    renderBody();
  }

  // Bảng {Thống kê chung} riêng cho modal "Gia hạn nợ" — 5 cột: Địa phương, Tổng dư nợ, Hộ trong
  // hạn, Hộ quá hạn, Hộ được gia hạn.
  function renderExtensionStatsHtml(list, hamlets){
    ensureFilterHamletsInit(hamlets);
    const selHamlets = state.filterHamlets;
    const allSelected = selHamlets.length===0 || selHamlets.length===hamlets.length;
    const rows = allSelected
      ? [{ label: wardFullLabel(), groupList: list }]
      : selHamlets.map(h=> ({ label:`${subAdminLabel()} ${h}`, groupList: list.filter(b=>b.hamlet===h) }));
    const rowsHtml = rows.map(r=>{
      const principalSum = r.groupList.reduce((s,b)=> s+(parseFloat(b.principal)||0), 0);
      const counts = computeExtensionStatusCounts(r.groupList);
      return `<tr>
        <td style="font-weight:700;">${escapeHtml(r.label)}</td>
        <td class="money">${moneySpaced(principalSum)}</td>
        <td>${counts.inTerm} hộ</td>
        <td>${counts.overdue} hộ</td>
        <td>${counts.extended} hộ</td>
      </tr>`;
    }).join('');
    return `
      <div class="table-wrap" style="margin-bottom:18px;">
        <table>
          <thead><tr>
            <th class="sv-group-header-th">Địa phương</th>
            <th class="sv-group-header-th">Tổng dư nợ</th>
            <th class="sv-group-header-th">Hộ trong hạn</th>
            <th class="sv-group-header-th">Hộ quá hạn</th>
            <th class="sv-group-header-th">Hộ được gia hạn</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>`;
  }
  // Bảng nhóm theo phương án cho modal "Gia hạn nợ" — cột: Quyết định (nút GIA HẠN) | Lịch sử gia
  // hạn (nút Xem) | Họ và tên | Số tiền gốc | Ngày đến hạn | Ngày gia hạn gần nhất.
  function renderExtensionGroupedTablesHtml(list, projects){
    if(!list.length) return `<div class="empty-state"><div class="e-ico">🌾</div>Chưa có người vay nào theo bộ lọc hiện tại</div>`;
    const groups = {};
    list.forEach(b=>{
      const key = (b.projectId && projects.some(p=>p.id===b.projectId)) ? b.projectId : '__none__';
      (groups[key] = groups[key]||[]).push(b);
    });
    const groupOrder = projects.map(p=>p.id).filter(pid=>groups[pid]);
    if(groups['__none__']) groupOrder.push('__none__');
    return groupOrder.map(gid=>{
      const groupList = groups[gid];
      const proj = gid==='__none__' ? null : projects.find(p=>p.id===gid);
      const projName = proj ? escapeHtml(proj.name) : '(Không rõ phương án — có thể đã bị xoá)';
      const duration = proj ? calcLoanDuration(proj.disburseDate, proj.dueDate) : '';
      const capitalTxt = proj ? `, ${groupDigitsRight(String(Math.round(proj.totalCapital||0)),3)} đồng` : '';
      const durationTxt = duration ? `, ${duration}` : '';
      const extCounts = groupList.map(b=>getBorrowerExtensions(b.id).length);
      const allSame = extCounts.length>0 && extCounts.every(c=>c===extCounts[0]);
      const commonLevel = allSame ? extCounts[0] : null;
      const groupMaxedOut = allSame && commonLevel>=MAX_LOAN_EXTENSIONS;
      const totalXemLabel = allSame ? (commonLevel>0? `Xem (gH ${commonLevel} lần)` : 'Xem (0)') : 'Xem';
      return `
      <div style="margin-bottom:18px;">
        <div class="sv-group-header">📋 ${projName} (${groupList.length} người vay)${capitalTxt}${durationTxt}</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Lịch sử gia hạn</th><th>Quyết định</th><th>Họ và tên</th><th>Số tiền gốc</th><th>Ngày đến hạn</th><th>Ngày gia hạn gần nhất</th></tr></thead>
            <tbody>${groupList.map(b=>{
              const exts = getBorrowerExtensions(b.id);
              const xemLabel = exts.length ? `Xem (gH ${exts.length} lần)` : 'Xem (0)';
              const rowColor = daysRemainingRowColor(b.dueDate);
              const maxedOut = exts.length>=MAX_LOAN_EXTENSIONS;
              return `<tr${rowColor? ` style="background:${rowColor};"` : ''}>
                <td><button class="ext-action-btn preview-allow" style="animation-delay:${(Math.random()*3.5).toFixed(2)}s;" data-ext-history="${b.id}">${xemLabel}</button></td>
                <td>${maxedOut? `<button class="ext-action-btn" disabled title="Đã đạt tối đa 5 lần gia hạn">GIA HẠN</button>` : `<button class="ext-action-btn preview-allow" style="animation-delay:${(Math.random()*3.5).toFixed(2)}s;" data-ext-single="${b.id}">GIA HẠN</button>`}</td>
                <td>${escapeHtml(b.name)}</td>
                <td class="money">${moneySpaced(b.principal)}</td>
                <td>${fmtDate(b.dueDate)}</td>
                <td>${exts.length? 'hạn '+fmtDate(exts[exts.length-1].to) : ''}</td>
              </tr>`;
            }).join('')}
            <tr style="background:var(--paper-2); font-weight:700;">
              <td>${allSame? `<button class="ext-action-btn preview-allow" style="animation-delay:${(Math.random()*3.5).toFixed(2)}s;" data-ext-group-history="${gid}">${totalXemLabel}</button>` : `<button class="ext-action-btn" disabled>Xem</button>`}</td>
              <td>${(allSame && !groupMaxedOut)? `<button class="ext-action-btn preview-allow" style="animation-delay:${(Math.random()*3.5).toFixed(2)}s;" data-ext-group="${gid}">GIA HẠN</button>` : `<button class="ext-action-btn" disabled title="${groupMaxedOut? 'Tất cả người vay trong nhóm đã đạt tối đa 5 lần gia hạn' : 'Chỉ dùng được khi tất cả người vay trong nhóm có cùng số lần gia hạn'}">GIA HẠN</button>`}</td>
              <td>TỔNG</td>
              <td class="money">${moneySpaced(groupList.reduce((s,b)=>s+(parseFloat(b.principal)||0),0))}</td>
              <td></td>
              <td></td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>`;
    }).join('');
  }
  function formatUnderlinedDMY(dateStr){
    if(!dateStr) return '<u>ngày …</u> <u>tháng …</u> <u>năm …</u>';
    const d = new Date(dateStr+'T00:00:00');
    return `<u>ngày ${d.getDate()}</u> <u>tháng ${d.getMonth()+1}</u> <u>năm ${d.getFullYear()}</u>`;
  }

  // =====================================================================
  // Modal chính "Gia hạn nợ" — thiết kế y hệt modal "Tính tiền lãi và phê duyệt đóng lãi" (tìm
  // kiếm, 4 bộ lọc dùng CHUNG state, khôi phục bộ lọc gốc) nhưng KHÔNG có nút Tuỳ chỉnh cột / Lưu /
  // Huỷ ở đầu-cuối — chỉ có "Đóng bảng".
  // =====================================================================
  function renderExtensionModal(){
    const wrap = document.createElement('div');
    wrap.className = 'modal-bg';
    document.body.appendChild(wrap);
    const close = ()=>{ state.showExtensionModal = false; wrap.remove(); };

    function renderBody(){
      const hamlets = state.config.hamlets||[];
      const projects = activeLoanProjects();
      ensureFilterHamletsInit(hamlets);
      ensureFilterProjectsInit(projects);
      let list = state.borrowers.filter(b=>!b.deleted);
      if(state.search) list = list.filter(b=> (b.name+b.cccd+b.phone).toLowerCase().includes(state.search.toLowerCase()));
      if(state.filterHamlets.length < hamlets.length) list = list.filter(b=>state.filterHamlets.includes(b.hamlet));
      if(state.filterProjectIds.length < projects.length) list = list.filter(b=>state.filterProjectIds.includes(b.projectId));
      const range = selectedQuarterYearRange();
      if(range.from && range.to){
        const rf = new Date(range.from+'T00:00:00'), rt = new Date(range.to+'T00:00:00');
        list = list.filter(b=>{
          if(!b.loanDate) return false;
          const latestExt = latestBorrowerExtension(b.id);
          const endRef = latestExt ? latestExt.to : b.dueDate;
          if(!endRef) return false;
          const bf = new Date(b.loanDate+'T00:00:00'), bt = new Date(endRef+'T00:00:00');
          return bf<=rt && bt>=rf;
        });
      }
      const statsHtml = renderExtensionStatsHtml(list, hamlets);
      const tablesHtml = renderExtensionGroupedTablesHtml(list, projects);

      wrap.innerHTML = `
        <div class="modal" style="max-width:98vw; width:1300px;">
          <div class="modal-head"><h3>📅 Gia hạn nợ</h3><button class="modal-close preview-allow" id="extm-close">✕</button></div>
          <div class="modal-body" style="max-height:78vh; overflow:auto;">
            <div class="toolbar" style="flex-wrap:wrap;">
              <input id="extm-search" class="preview-allow" placeholder="🔎 Tìm theo tên, CCCD, SĐT..." value="${state.search}" style="min-width:200px;">
              ${buildHamletFilterDropdownHtml(hamlets)}
              ${buildProjectFilterDropdownHtml(projects)}
              ${buildQuarterFilterDropdownHtml()}
              ${buildYearFilterDropdownHtml()}
              <button class="btn btn-ghost btn-sm preview-allow" id="extm-reset-all-btn">↺ Khôi phục bộ lọc gốc</button>
            </div>
            <p class="sub" style="margin:10px 0; font-size:12.5px;">Thời gian đang được tính từ ${formatUnderlinedDMY(range.from)} đến ${formatUnderlinedDMY(range.to)}</p>
            ${statsHtml}
            ${tablesHtml}
            <div style="display:flex; gap:8px; margin-top:16px;">
              <button class="btn btn-ghost preview-allow" id="extm-close-bottom">Đóng bảng</button>
            </div>
          </div>
        </div>`;
      wire(hamlets, projects, list, projects);
    }

    function wire(hamlets, projects, list, allProjects){
      wrap.querySelector('#extm-close').onclick = close;
      wrap.querySelector('#extm-close-bottom').onclick = close;
      wrap.onclick = (e)=>{ if(e.target===wrap) close(); };

      wrap.querySelector('#extm-search').oninput = (e)=>{ state.search = e.target.value; renderBody(); };
      const toggleDropdown = (kind)=>{ state.openFilterDropdown = state.openFilterDropdown===kind ? null : kind; renderBody(); };
      const hb = wrap.querySelector('#f-hamlet-btn'); if(hb) hb.onclick=(e)=>{ e.stopPropagation(); toggleDropdown('hamlet'); };
      const pb = wrap.querySelector('#f-project-btn'); if(pb) pb.onclick=(e)=>{ e.stopPropagation(); toggleDropdown('project'); };
      const qb = wrap.querySelector('#f-quarter-btn'); if(qb) qb.onclick=(e)=>{ e.stopPropagation(); toggleDropdown('quarter'); };
      const yb = wrap.querySelector('#f-year-btn'); if(yb) yb.onclick=(e)=>{ e.stopPropagation(); toggleDropdown('year'); };
      const hAll = wrap.querySelector('#f-hamlet-all'); if(hAll) hAll.onclick=(e)=>{ e.stopPropagation(); toggleHamletAll(hamlets, hAll.checked); renderBody(); };
      wrap.querySelectorAll('.f-hamlet-item').forEach(cb=> cb.onclick=(e)=>{ e.stopPropagation(); toggleHamletOne(hamlets, cb.dataset.name, cb.checked); renderBody(); });
      const pAll = wrap.querySelector('#f-project-all'); if(pAll) pAll.onclick=(e)=>{ e.stopPropagation(); toggleProjectAll(projects, pAll.checked); renderBody(); };
      wrap.querySelectorAll('.f-project-item').forEach(cb=> cb.onclick=(e)=>{ e.stopPropagation(); toggleProjectOne(projects, cb.dataset.id, cb.checked); renderBody(); });
      wrap.querySelectorAll('.f-quarter-item').forEach(cb=> cb.onclick=(e)=>{ e.stopPropagation(); toggleQuarterFilter(cb.dataset.key, cb.checked); renderBody(); });
      wrap.querySelectorAll('.f-year-item').forEach(cb=> cb.onclick=(e)=>{ e.stopPropagation(); toggleYearFilter(parseInt(cb.dataset.year,10), cb.checked); renderBody(); });
      const yearPanel = wrap.querySelector('#f-year-panel'); if(yearPanel){ const sel = yearPanel.querySelector('[data-selected-year]'); if(sel) sel.scrollIntoView({block:'center'}); }
      const resetAllBtn = wrap.querySelector('#extm-reset-all-btn'); if(resetAllBtn) resetAllBtn.onclick=()=>{ resetAllBorrowerFilters(hamlets, projects); renderBody(); };

      wrap.querySelectorAll('[data-ext-single]').forEach(btn=>{
        btn.onclick = ()=>{
          const b = state.borrowers.find(x=>x.id===btn.dataset.extSingle);
          if(b) renderExtensionApprovalModal([b], renderBody);
        };
      });
      wrap.querySelectorAll('[data-ext-group]').forEach(btn=>{
        btn.onclick = ()=>{
          const gid = btn.dataset.extGroup;
          const groupList = list.filter(b=> (b.projectId && allProjects.some(p=>p.id===b.projectId)) ? b.projectId===gid : gid==='__none__');
          if(groupList.length) renderExtensionApprovalModal(groupList, renderBody);
        };
      });
      wrap.querySelectorAll('[data-ext-history], [data-ext-group-history]').forEach(btn=>{
        btn.onclick = ()=> alert('Tính năng "Xem lịch sử gia hạn" đang được phát triển, sẽ sớm ra mắt.');
      });

      if(!state._extOutsideClickBound){
        state._extOutsideClickBound = true;
        document.addEventListener('click', (e)=>{
          if(!state.showExtensionModal || !state.openFilterDropdown) return;
          if(e.target.closest('.sv-filter-dropdown')) return;
          state.openFilterDropdown = null;
          if(document.body.contains(wrap)) renderBody();
        });
      }
    }

    state.showExtensionModal = true;
    renderBody();
  }

        <div class="kv-row" style="border-top:1px solid var(--line); padding-top:6px;"><span>Tổng số tiền chưa đóng lãi (tương lai)</span><b>${moneySpaced(disp.futureUnpaidTotal)}</b></div>

    wrap.innerHTML = `
      <div class="modal" style="max-width:96vw; width:640px;">

        <div class="modal-body">
          <p class="sub" style="margin:0 0 10px;">được tính đến ngày ${fmtDate(todayStr())}</p>
          ${bodyHtml}

        <div class="modal-foot"><button class="btn btn-primary" id="iahist-close2">Đóng bảng</button></div>
      </div>`;

    wrap.onclick = (e)=>{ if(e.target===wrap) close(); };
  }

  function renderQuarterBoxInfoModal(b, box){
    const wrap = document.createElement('div');
    wrap.className = 'modal-bg';
    const qName = formatTimelineQuarterLabel(box);
    const lvl = box.extLevel||0;
    const getPct = (field)=> lvl===0 ? getInTermColumnValue(b, field) : getExtensionLevelColumnValue(b, lvl, field);
    const centralPct = getPct('splitCentralPct'), provincePct = getPct('splitProvincePct'), wardPct = getPct('splitWardPct'), hamletPct = getPct('hamletAllocPct');
    const fmtPct = n=> String(n).replace('.',',');
    const lines = [];
    lines.push(`đây là ${qName} chưa đóng lãi`);
    lines.push(`Bắt đầu từ ngày ${fmtDate(box.from)} đến ngày ${fmtDate(box.to)}, tổng số ngày trong quý này là ${box.days} ngày.`);
    lines.push(`Số tiền chưa đóng trong quý này là: ${moneySpaced(box.interestAmount)}.`);
    lines.push(`Lãi suất đang được áp dụng trong quý này: ${fmtPct(box.rate)}%/năm${lvl>0? ` (lãi suất quá hạn lần ${lvl})` : ''}.`);
    if(box.short) lines.push(`Đây là quý KHÔNG đủ ngày như các quý bình thường khác (vì vậy nó có dấu * ở tên quý).`);
    if(lvl===0) lines.push(`Đây là quý đang trong thời gian chưa bị quá hạn.`);
    else lines.push(`Đây là quý đang trong thời gian gia hạn lần ${lvl} (vì vậy nó có ${'#'.repeat(lvl)} ở tên quý).`);
    wrap.innerHTML = `
      <div class="modal" style="max-width:94vw; width:520px;">
        <div class="modal-head"><h3>Thông tin chi tiết ${escapeHtml(qName)} của hộ vay ${escapeHtml(b.name)}</h3><button class="modal-close" id="qbi-close">✕</button></div>
        <div class="modal-body">
          ${lines.map(l=>`<p style="margin:0 0 8px;">${escapeHtml(l)}</p>`).join('')}
          <p style="margin:12px 0 4px; font-weight:700;">Thông tin phân bổ lãi suất (về Trung ương, cấp tỉnh, cấp xã) trong tổng số lãi suất ${fmtPct(box.rate)}%/năm và chia % của xã đối với cấp ${subAdminLabelLower()}:</p>
          <div class="kv-row"><span>Trung ương</span><b>${fmtPct(centralPct)}%/năm</b></div>
          <div class="kv-row"><span>Cấp tỉnh</span><b>${fmtPct(provincePct)}%/năm</b></div>
          <div class="kv-row"><span>Cấp xã</span><b>${fmtPct(wardPct)}%/năm</b></div>
          <div class="kv-row"><span>% tiền cấp xã phân bổ về cấp ${subAdminLabelLower()}</span><b>${fmtPct(hamletPct)}%</b></div>
        </div>
        <div class="modal-foot"><button class="btn btn-primary" id="qbi-close2">Đóng bảng</button></div>
      </div>`;
    document.body.appendChild(wrap);
    const close = ()=> wrap.remove();
    wrap.querySelector('#qbi-close').onclick = close;
    wrap.querySelector('#qbi-close2').onclick = close;
    wrap.onclick = (e)=>{ if(e.target===wrap) close(); };
  }

  // Modal con "Đóng lãi" cho 1 người vay — mở từ nút "Đóng tiền lãi" ở từng dòng trong modal "Tính
  // tiền lãi và phê duyệt đóng lãi". 2 chế độ: 'select' (chọn các Quý muốn đóng) -> 'receipt' (biên
  // lai thu tiền lãi, xác nhận xong sẽ ghi vào Hộp tiền đóng lãi của người vay).
  function renderInterestPaymentApprovalModal(b){
    const wrap = document.createElement('div');
    wrap.className = 'modal-bg';
    document.body.appendChild(wrap);
    const close = ()=> wrap.remove();
    let mode = 'select';
    const selectedKeys = new Set();
    let receiptSurplus = 0, receiptShortfall = 0;
    let autoLockedKey = null; // key của Quý (quá khứ+hiện tại) DUY NHẤT, tự chọn sẵn và không cho bỏ

    function renderBody(){
      if(mode==='select'){
        const disp = computeInterestPaymentBoxDisplay(b);
        const pastList = disp.unpaidLines; // đã cũ->mới
        const futureList = disp.futureUnpaidLines; // đã gần->xa
        // Nếu chỉ có đúng 1 Quý quá khứ+hiện tại -> tự động chọn sẵn, khoá không cho bỏ chọn.
        if(pastList.length===1){ autoLockedKey = pastList[0].box.key; selectedKeys.add(autoLockedKey); }
        else autoLockedKey = null;
        const pastSelectedCount = pastList.filter(x=>selectedKeys.has(x.box.key)).length;
        const futureUnlocked = pastList.length===0 || pastSelectedCount===pastList.length;
        const canSelectFuture = (idx)=> idx===0 || selectedKeys.has(futureList[idx-1].box.key);

        const renderPastGroup = ()=>{
          if(!pastList.length) return `<p class="sub">Không có Quý nào chưa đóng lãi từ quá khứ tới hiện tại.</p>`;
          const allSel = pastList.every(x=> selectedKeys.has(x.box.key));
          const showSelectAll = pastList.length>1;
          return `<div style="margin-top:6px;">
            ${pastList.map(x=>{
              const sel = selectedKeys.has(x.box.key);
              const locked = x.box.key===autoLockedKey;
              return `<span class="qbox-wrap">
                <button class="qbox-btn qbox-pulsing preview-allow ${sel?'qbox-selected':''}" data-qkey="${x.box.key}" data-group="past" ${locked?'disabled title="Quý duy nhất — luôn được chọn"':''}>${escapeHtml(x.name)}</button>
                <button class="qbox-info-btn qbox-pulsing preview-allow" data-qinfo="${x.box.key}">i</button>
              </span>`;
            }).join('')}
            ${showSelectAll? `<button class="qbox-selectall-btn preview-allow" data-selall="past">${allSel? 'Bỏ chọn tất cả' : 'Chọn tất cả'}</button>` : ''}
          </div>`;
        };
        const renderFutureGroup = ()=>{
          if(!futureList.length) return `<p class="sub">Không có Quý nào chưa đóng lãi trong TƯƠNG LAI.</p>`;
          const allSel = futureList.every(x=> selectedKeys.has(x.box.key));
          return `<div style="margin-top:6px;">
            ${futureList.map((x,idx)=>{
              const sel = selectedKeys.has(x.box.key);
              const locked = !futureUnlocked;
              return `<span class="qbox-wrap">
                <button class="qbox-btn qbox-pulsing preview-allow ${sel?'qbox-selected':''} ${locked?'qbox-locked':''}" data-qkey="${x.box.key}" data-group="future" data-fidx="${idx}" ${locked?'style="opacity:.45;"':''}>${escapeHtml(x.name)}</button>
                <button class="qbox-info-btn qbox-pulsing preview-allow" data-qinfo="${x.box.key}">i</button>
              </span>`;
            }).join('')}
            <button class="qbox-selectall-btn preview-allow" data-selall="future" ${futureUnlocked?'':'disabled style="opacity:.45;"'}>${allSel? 'Bỏ chọn tất cả' : 'Chọn tất cả'}</button>
          </div>`;
        };
        const selectedCount = selectedKeys.size;
        const selectedSum = pastList.concat(futureList).filter(x=>selectedKeys.has(x.box.key)).reduce((s,x)=>s+x.amount,0);
        const canProceed = selectedCount>0;
        wrap.innerHTML = `
          <div class="modal" style="max-width:96vw; width:900px;">
            <div class="modal-head"><h3>Phê duyệt đóng tiền lãi cho hộ vay ${escapeHtml(b.name)}</h3><button class="modal-close preview-allow" id="iapay-close">✕</button></div>
            <div class="modal-body">
              <div class="divider-lbl" style="margin-top:0;">Các Quý chưa đóng lãi từ QUÁ KHỨ tới HIỆN TẠI:</div>
              ${renderPastGroup()}
              <div class="divider-lbl">Các Quý chưa đóng lãi trong TƯƠNG LAI:</div>
              ${renderFutureGroup()}
            </div>
            <div class="modal-foot" style="justify-content:space-between;">
              <button class="btn btn-ghost preview-allow" id="iapay-cancel">Đóng bảng</button>
              <div style="display:flex; align-items:center; gap:12px;">
                ${selectedCount? `<span class="sub" style="font-weight:700; color:var(--rice-dark);">Tổng ${groupDigitsRight(String(selectedSum),3)} đồng (trong ${selectedCount}-quý được chọn)</span>` : ''}
                <button class="btn btn-primary preview-allow" id="iapay-start" ${canProceed?'':'disabled'}>Bắt đầu tính tiền lãi và đóng lãi</button>
              </div>
            </div>
          </div>`;
        wireSelect(pastList, futureList, futureUnlocked, canSelectFuture);
        // Hiệu ứng nhấp nháy phóng to 1.1x liên tục trong 3 giây rồi tự dừng hẳn.
        setTimeout(()=>{ wrap.querySelectorAll('.qbox-pulsing').forEach(el=>el.classList.remove('qbox-pulsing')); }, 3000);
      } else {
        const disp = computeInterestPaymentBoxDisplay(b);
        const allBoxByKey = {}; disp.allBoxes.forEach(bx=> allBoxByKey[bx.key]=bx);
        const chosen = [...selectedKeys].map(k=>allBoxByKey[k]).filter(Boolean);
        const chosenSum = chosen.reduce((s,bx)=>s+bx.interestAmount, 0);
        const grandTotal = chosenSum + receiptSurplus - receiptShortfall;
        wrap.innerHTML = `
          <div class="modal" style="max-width:96vw; width:640px;">
            <div class="modal-head"><h3>BIÊN LAI THU TIỀN LÃI ĐỐI VỚI HỘ VAY ${escapeHtml(b.name).toUpperCase()}</h3><button class="modal-close preview-allow" id="rcpt-close">✕</button></div>
            <div class="modal-body">
              <p style="margin:0 0 6px; font-weight:700;">Các quý đóng lãi là:</p>
              ${chosen.map(bx=>`<div class="kv-row"><span>${escapeHtml(formatTimelineQuarterLabel(bx))}</span><b>${moneySpaced(bx.interestAmount)}</b></div>`).join('')}
              <div class="kv-row" style="border-top:1px solid var(--line); margin-top:6px; padding-top:6px;"><span>Tổng tiền các quý</span><b>${moneySpaced(chosenSum)}</b></div>
              <div class="kv-row" style="margin-top:10px;"><span>Số tiền đóng dư (đ)</span><b id="rcpt-surplus-disp">+ ${moneySpaced(receiptSurplus)}</b></div>
              <input id="rcpt-surplus" class="preview-allow" style="text-align:right;" placeholder="sửa" value="">
              <div class="kv-row" style="margin-top:6px;"><span>Số tiền đóng thiếu (đ)</span><b id="rcpt-shortfall-disp">- ${moneySpaced(receiptShortfall)}</b></div>
              <input id="rcpt-shortfall" class="preview-allow" style="text-align:right;" placeholder="sửa" value="">
              <div class="kv-row" style="margin-top:10px;">
                <span style="display:flex; align-items:center; gap:4px;">Tổng tất cả (số tiền thực nhận) <button type="button" class="qbox-info-btn" id="rcpt-total-info" style="width:20px; height:20px; font-size:11px; border-radius:50%; vertical-align:middle;">i</button></span>
                <b id="rcpt-total-disp">= ${moneySpaced(grandTotal)}</b>
              </div>
              <div id="rcpt-total-tip" style="display:none; background:var(--paper-2); border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:12px; margin:4px 0;">Đây là số tiền nhận được thực tế từ người đóng lãi</div>
              <input id="rcpt-grandtotal" class="preview-allow" style="text-align:right;" placeholder="sửa" value="">
              <p class="sub" id="rcpt-explain" style="margin-top:6px;">${escapeHtml(buildReceiptExplanation(computeReceiptSettlementPreview(b, chosen, grandTotal, disp), chosenSum, grandTotal))}</p>
              <p class="sub" id="rcpt-error" style="color:var(--red); font-weight:700; display:none; margin-top:6px;"></p>
            </div>
            <div class="modal-foot">
              <button class="btn btn-ghost preview-allow" id="rcpt-cancel">Huỷ (chưa phê duyệt)</button>
              <button class="btn btn-primary preview-allow" id="rcpt-confirm">Xác nhận đóng lãi thành công</button>
            </div>
          </div>`;
        wireReceipt(chosen, chosenSum);
      }
    }

    function wireSelect(pastList, futureList, futureUnlocked, canSelectFuture){
      wrap.querySelector('#iapay-close').onclick = close;
      wrap.querySelector('#iapay-cancel').onclick = close;
      wrap.onclick = (e)=>{ if(e.target===wrap) close(); };
      const fullList = pastList.concat(futureList);
      const clearAllFuture = ()=>{ futureList.forEach(x=> selectedKeys.delete(x.box.key)); };
      wrap.querySelectorAll('[data-qkey]').forEach(btn=>{
        if(btn.disabled) return;
        btn.onclick = ()=>{
          const k = btn.dataset.qkey;
          const grp = btn.dataset.group;
          if(grp==='future'){
            if(!futureUnlocked){ alert('Phải chọn HẾT các Quý ở phần "QUÁ KHỨ tới HIỆN TẠI" trước khi chọn Quý tương lai (trừ khi không còn Quý nào ở phần đó).'); return; }
            const idx = parseInt(btn.dataset.fidx,10);
            const alreadySel = selectedKeys.has(k);
            if(!alreadySel){
              if(!canSelectFuture(idx)){ alert('Chỉ được chọn Quý tương lai theo đúng thứ tự — vui lòng chọn Quý tương lai GẦN NHẤT trước.'); return; }
              selectedKeys.add(k);
            } else {
              // Bỏ chọn 1 Quý tương lai gần -> tự động bỏ chọn luôn TẤT CẢ Quý tương lai xa hơn nó
              // (không cần báo lỗi, cứ tự làm cho đúng logic).
              selectedKeys.delete(k);
              for(let j=idx+1;j<futureList.length;j++) selectedKeys.delete(futureList[j].box.key);
            }
          } else {
            if(selectedKeys.has(k)){
              selectedKeys.delete(k);
              // Bỏ chọn 1 Quý "quá khứ+hiện tại" khi trước đó đã chọn hết -> mất điều kiện mở khoá
              // tương lai -> xoá sạch mọi lựa chọn tương lai đang có.
              clearAllFuture();
            } else {
              selectedKeys.add(k);
            }
          }
          renderBody();
        };
      });
      wrap.querySelectorAll('[data-qinfo]').forEach(btn=>{
        btn.onclick = (e)=>{
          e.stopPropagation();
          const bx = fullList.find(x=>x.box.key===btn.dataset.qinfo);
          if(bx) renderQuarterBoxInfoModal(b, bx.box);
        };
      });
      const pastSelAllBtn = wrap.querySelector('[data-selall="past"]');
      if(pastSelAllBtn) pastSelAllBtn.onclick = ()=>{
        const allSel = pastList.every(x=> selectedKeys.has(x.box.key));
        pastList.forEach(x=>{ if(x.box.key===autoLockedKey) return; if(allSel) selectedKeys.delete(x.box.key); else selectedKeys.add(x.box.key); });
        if(allSel) clearAllFuture(); // vừa bỏ chọn tất cả quá khứ+hiện tại -> mất điều kiện mở khoá tương lai
        renderBody();
      };
      const futureSelAllBtn = wrap.querySelector('[data-selall="future"]');
      if(futureSelAllBtn && !futureSelAllBtn.disabled) futureSelAllBtn.onclick = ()=>{
        const allSel = futureList.every(x=> selectedKeys.has(x.box.key));
        if(allSel) clearAllFuture();
        else futureList.forEach(x=> selectedKeys.add(x.box.key)); // chọn tất cả luôn hợp lệ về thứ tự vì chọn liên tục từ đầu
        renderBody();
      };
      const startBtn = wrap.querySelector('#iapay-start');
      if(startBtn) startBtn.onclick = ()=>{ if(!selectedKeys.size) return; mode='receipt'; renderBody(); };
    }

    function wireReceipt(chosen, chosenSum){
      wrap.querySelector('#rcpt-close').onclick = close;
      wrap.querySelector('#rcpt-cancel').onclick = close;
      wrap.onclick = (e)=>{ if(e.target===wrap) close(); };
      const surplusInput = wrap.querySelector('#rcpt-surplus');
      const shortfallInput = wrap.querySelector('#rcpt-shortfall');
      const totalInput = wrap.querySelector('#rcpt-grandtotal');
      const errorEl = wrap.querySelector('#rcpt-error');
      const confirmBtn = wrap.querySelector('#rcpt-confirm');
      const maxAllowed = computeInterestPaymentBoxDisplay(b).unpaidTotal + computeInterestPaymentBoxDisplay(b).futureUnpaidTotal;
      const setError = (msg)=>{
        if(errorEl){ errorEl.textContent = msg||''; errorEl.style.display = msg? 'block' : 'none'; }
        if(confirmBtn) confirmBtn.disabled = !!msg;
      };
      const currentGrandTotal = ()=> chosenSum + receiptSurplus - receiptShortfall;
      const checkTotalValid = ()=>{
        const t = currentGrandTotal();
        if(t<=0){ setError('Tổng tất cả đang bị âm hoặc bằng 0 — vui lòng kiểm tra lại số tiền đóng thiếu, không thể lưu.'); return false; }
        if(t > maxAllowed){ setError('Tổng Số tiền này lớn hơn so với Tổng tiền chưa đóng lãi của hộ vay, vui lòng điều chỉnh lại'); return false; }
        setError(''); return true;
      };
      const updateExplanation = ()=>{
        const explainEl = wrap.querySelector('#rcpt-explain');
        if(!explainEl) return;
        const dispNow = computeInterestPaymentBoxDisplay(b);
        const result = computeReceiptSettlementPreview(b, chosen, currentGrandTotal(), dispNow);
        explainEl.textContent = buildReceiptExplanation(result, chosenSum, currentGrandTotal());
      };
      const surplusDisp = wrap.querySelector('#rcpt-surplus-disp');
      const shortfallDisp = wrap.querySelector('#rcpt-shortfall-disp');
      const totalDisp = wrap.querySelector('#rcpt-total-disp');
      const refreshDisplays = ()=>{
        if(surplusDisp) surplusDisp.textContent = `+ ${moneySpaced(receiptSurplus)}`;
        if(shortfallDisp) shortfallDisp.textContent = `- ${moneySpaced(receiptShortfall)}`;
        if(totalDisp) totalDisp.textContent = `= ${moneySpaced(currentGrandTotal())}`;
        updateExplanation();
        checkTotalValid();
      };
      // ---- Ô nhập chỉ chứa SỐ THUẦN (không dấu +/-/=, không chữ "đ", KHÔNG tự chèn dấu cách nhóm 3
      // số ngay trong lúc gõ — đây chính là nguyên nhân gốc gây lệch con trỏ khi gõ nhiều chữ số).
      // Mỗi lần gõ (sự kiện "input") đều LẬP TỨC tính toán lại và cập nhật cả 3 dòng hiển thị kết
      // quả + dòng giải thích + tính hợp lệ — không cần đợi rời khỏi ô nữa ("nhảy múa" theo thời gian thực).
      surplusInput.addEventListener('input', ()=>{
        surplusInput.value = surplusInput.value.replace(/[^\d]/g,'').slice(0,10);
        receiptSurplus = parseInt(surplusInput.value,10)||0;
        if(receiptSurplus>0 && receiptShortfall>0){ receiptShortfall = 0; shortfallInput.value = ''; }
        refreshDisplays();
      });
      shortfallInput.addEventListener('input', ()=>{
        shortfallInput.value = shortfallInput.value.replace(/[^\d]/g,'').slice(0,10);
        receiptShortfall = parseInt(shortfallInput.value,10)||0;
        if(receiptShortfall>0 && receiptSurplus>0){ receiptSurplus = 0; surplusInput.value = ''; }
        refreshDisplays();
      });
      totalInput.addEventListener('input', ()=>{
        totalInput.value = totalInput.value.replace(/[^\d]/g,'').slice(0,12);
        const newTotal = parseInt(totalInput.value,10)||0;
        const diff = newTotal - chosenSum;
        if(diff>0){ receiptSurplus = diff; receiptShortfall = 0; }
        else if(diff<0){ receiptShortfall = -diff; receiptSurplus = 0; }
        else { receiptSurplus = 0; receiptShortfall = 0; }
        surplusInput.value = ''; shortfallInput.value = '';
        refreshDisplays();
      });
      [surplusInput, shortfallInput, totalInput].forEach(inp=>{
        inp.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); inp.blur(); } });
      });

      // Nút chữ "i" cạnh "Tổng tất cả (số tiền thực nhận)"
      const totalInfoBtn = wrap.querySelector('#rcpt-total-info');
      const totalTip = wrap.querySelector('#rcpt-total-tip');
      if(totalInfoBtn) totalInfoBtn.onclick = (e)=>{ e.stopPropagation(); totalTip.style.display = totalTip.style.display==='none' ? 'block' : 'none'; };
      document.addEventListener('click', (e)=>{ if(totalTip && totalTip.style.display!=='none' && !e.target.closest('#rcpt-total-info') && !e.target.closest('#rcpt-total-tip')) totalTip.style.display='none'; });

      // Rê chuột vào nút "Xác nhận đóng lãi thành công" -> tự cuộn xuống cuối bảng để thấy hết
      // thông tin phía dưới trước khi bấm.
      if(confirmBtn) confirmBtn.addEventListener('mouseenter', ()=>{
        const body = wrap.querySelector('.modal-body');
        if(body) body.scrollTo({ top: body.scrollHeight, behavior:'smooth' });
      });

      checkTotalValid();
      wrap.querySelector('#rcpt-confirm').onclick = async ()=>{
        if(state.previewMode){ alert('Bạn đang ở chế độ tham quan, không thể xác nhận đóng lãi thật.'); return; }
        if(!canEditModule('data')){ alert('Bạn không có quyền Sửa ở Sổ vay vốn nên không thể xác nhận đóng lãi. Vui lòng liên hệ Chủ mã định danh.'); return; }
        if(!checkTotalValid()) return;
        const raw = getInterestPaymentBoxRaw(b.id);
        const payments = Object.assign({}, raw.payments||{});
        const grandTotal = currentGrandTotal();
        // Ghi nhận ĐÚNG theo đúng dòng "giải thích" đang hiện — chỉ đánh dấu đã đóng cho những Quý
        // thật sự đủ tiền trả (paidQuarters), cộng thêm những Quý khác được trả nhờ số dư
        // (extraPaidQuarters) — KHÔNG đánh dấu mù toàn bộ các Quý đã chọn.
        const dispNow = computeInterestPaymentBoxDisplay(b);
        const result = computeReceiptSettlementPreview(b, chosen, grandTotal, dispNow);
        result.paidQuarters.forEach(bx=>{ payments[bx.key] = bx.interestAmount; });
        result.extraPaidQuarters.forEach(bx=>{ payments[bx.key] = bx.interestAmount; });
        const newTotalPaid = (raw.totalPaid||0) + grandTotal;
        await cSet('interestPaymentBoxes/'+b.id, { totalPaid: newTotalPaid, payments });
        state.interestPaymentBoxes = state.interestPaymentBoxes||{};
        state.interestPaymentBoxes[b.id] = { totalPaid:newTotalPaid, payments };
        await settleInterestPaymentLeftover(b);
        await pushLog('xác nhận', `đóng lãi cho hộ vay ${b.name} (${moneySpaced(grandTotal)})`);
        close();

    function wire(hamlets, projects, list, visibleCols){
      wrap.querySelector('#ia-close').onclick = close;
      wrap.querySelector('#ia-cancel-btn-top').onclick = close;
      wrap.querySelector('#ia-cancel-btn-bottom').onclick = close;
      const doSave = async ()=>{ await saveInterestApprovalDraft(); wrap.remove(); };
      wrap.querySelector('#ia-save-btn-top').onclick = doSave;

      wrap.onclick = (e)=>{ if(e.target===wrap) close(); };

      wrap.querySelector('#ia-search').oninput = (e)=>{ state.search = e.target.value; renderBody(); };
      const toggleDropdown = (kind)=>{ state.openFilterDropdown = state.openFilterDropdown===kind ? null : kind; renderBody(); };
      const hb = wrap.querySelector('#f-hamlet-btn'); if(hb) hb.onclick=(e)=>{ e.stopPropagation(); toggleDropdown('hamlet'); };
      const pb = wrap.querySelector('#f-project-btn'); if(pb) pb.onclick=(e)=>{ e.stopPropagation(); toggleDropdown('project'); };
      const qb = wrap.querySelector('#f-quarter-btn'); if(qb) qb.onclick=(e)=>{ e.stopPropagation(); toggleDropdown('quarter'); };
      const yb = wrap.querySelector('#f-year-btn'); if(yb) yb.onclick=(e)=>{ e.stopPropagation(); toggleDropdown('year'); };
      const hAll = wrap.querySelector('#f-hamlet-all'); if(hAll) hAll.onclick=(e)=>{ e.stopPropagation(); toggleHamletAll(hamlets, hAll.checked); renderBody(); };
      wrap.querySelectorAll('.f-hamlet-item').forEach(cb=> cb.onclick=(e)=>{ e.stopPropagation(); toggleHamletOne(hamlets, cb.dataset.name, cb.checked); renderBody(); });
      const pAll = wrap.querySelector('#f-project-all'); if(pAll) pAll.onclick=(e)=>{ e.stopPropagation(); toggleProjectAll(projects, pAll.checked); renderBody(); };
      wrap.querySelectorAll('.f-project-item').forEach(cb=> cb.onclick=(e)=>{ e.stopPropagation(); toggleProjectOne(projects, cb.dataset.id, cb.checked); renderBody(); });
      wrap.querySelectorAll('.f-quarter-item').forEach(cb=> cb.onclick=(e)=>{ e.stopPropagation(); toggleQuarterFilter(cb.dataset.key, cb.checked); renderBody(); });
      wrap.querySelectorAll('.f-year-item').forEach(cb=> cb.onclick=(e)=>{ e.stopPropagation(); toggleYearFilter(parseInt(cb.dataset.year,10), cb.checked); renderBody(); });
      const yearPanel = wrap.querySelector('#f-year-panel'); if(yearPanel){ const sel = yearPanel.querySelector('[data-selected-year]'); if(sel) sel.scrollIntoView({block:'center'}); }
      const resetAllBtn = wrap.querySelector('#ia-reset-all-btn'); if(resetAllBtn) resetAllBtn.onclick=()=>{ resetAllBorrowerFilters(hamlets, projects); renderBody(); };

      const colPickerBtn = wrap.querySelector('#ia-col-picker-btn');
      if(colPickerBtn) colPickerBtn.onclick = ()=>{ if(state.showIAColumnPicker) cancelIAColumnPicker(); else openIAColumnPicker(); renderBody(); };
      const colSaveBtn = wrap.querySelector('#ia-col-save-btn'); if(colSaveBtn) colSaveBtn.onclick = async ()=>{ await commitIAColumnPicker('save'); renderBody(); };
      const colViewBtn = wrap.querySelector('#ia-col-view-btn'); if(colViewBtn) colViewBtn.onclick = async ()=>{ await commitIAColumnPicker('view'); renderBody(); };
      const colDefaultBtn = wrap.querySelector('#ia-col-default-btn'); if(colDefaultBtn) colDefaultBtn.onclick = async ()=>{ await commitIAColumnPicker('default'); renderBody(); };
      const colCancelBtn = wrap.querySelector('#ia-col-cancel-btn'); if(colCancelBtn) colCancelBtn.onclick = ()=>{ cancelIAColumnPicker(); renderBody(); };
      wrap.querySelectorAll('[data-col-toggle]').forEach(cb=>{
        cb.onclick = ()=>{
          const key = cb.dataset.colToggle;
          if(key==='name'){ cb.checked = true; return; }
          state.iaColPickerDraftVisible = toggleBorrowerColumnVisibility(state.iaColPickerDraftVisible || ensureIAVisibleCols(), key);
          renderBody();
        };
      });
      let dragColKey = null;
      wrap.querySelectorAll('.col-pick-row').forEach(row=>{
        if(row.dataset.colKey==='name') return;
        row.addEventListener('dragstart', ()=>{ dragColKey = row.dataset.colKey; row.style.opacity='0.4'; });
        row.addEventListener('dragend', ()=>{ row.style.opacity=''; });
        row.addEventListener('dragover', (e)=> e.preventDefault());
        row.addEventListener('drop', (e)=>{
          e.preventDefault();
          const targetKey = row.dataset.colKey;
          if(!dragColKey || dragColKey===targetKey) return;
          const order = state.iaColPickerDraftOrder || ensureIAColumnOrder();
          state.iaColPickerDraftOrder = moveBorrowerColumnGroup(order, dragColKey, targetKey);
          renderBody();
        });
      });

      // ---- Cột "Lịch sử đóng lãi" (Xem) và "Quyết định" (Đóng tiền lãi) ----
      // Nút "Xem"/"Đóng tiền lãi" ở dòng TỔNG vẫn tạm khoá (báo đang nâng cấp). Nút "Xem" và "Đóng
      // tiền lãi" ở TỪNG DÒNG người vay đều đã hoạt động thật.
      wrap.querySelectorAll('[data-ia-hist]').forEach(btn=>{
        btn.onclick = ()=>{

          if(b) renderInterestPaymentHistoryModal(b);

      wrap.querySelectorAll('[data-ia-hist-locked]').forEach(btn=>{

      wrap.querySelectorAll('[data-ia-pay]').forEach(btn=>{
        btn.onclick = ()=>{
          const b = state.borrowers.find(x=>x.id===btn.dataset.iaPay);
          if(b) renderInterestPaymentApprovalModal(b);
        };
      });

      if(!state._iaOutsideClickBound){
        state._iaOutsideClickBound = true;
        document.addEventListener('click', (e)=>{
          if(!state.showInterestApprovalModal || !state.openFilterDropdown) return;
          if(e.target.closest('.sv-filter-dropdown')) return;
          state.openFilterDropdown = null;
          if(document.body.contains(wrap)) renderBody();
        });
      }
    }

    state.showInterestApprovalModal = true;
    renderBody();
  }

    const loanCalcInterestBtn = document.getElementById('loan-calc-interest-btn');
    if(loanCalcInterestBtn) loanCalcInterestBtn.onclick = ()=> renderInterestApprovalModal();
    const loanQuarterSettingsBtn = document.getElementById('loan-quarter-settings-btn');
    if(loanQuarterSettingsBtn) loanQuarterSettingsBtn.onclick = ()=> renderQuarterIntervalModal();
    const loanApproveSettlementBtn = document.getElementById('loan-approve-settlement-btn');
    if(loanApproveSettlementBtn) loanApproveSettlementBtn.onclick = ()=> alert('Tính năng "Phê duyệt tất toán khoản vay" đang được phát triển, sẽ sớm ra mắt.');

    // ---- Bộ lọc đa chọn (Ấp / Phương án vay / Quý / Năm) ----
    document.getElementById('f-search').oninput = e=>{ state.search=e.target.value; renderDataTab(el); };

    const hamletBtn = document.getElementById('f-hamlet-btn'); if(hamletBtn) hamletBtn.onclick = (e)=>{ e.stopPropagation(); toggleDropdown('hamlet'); };
    const projectBtn = document.getElementById('f-project-btn'); if(projectBtn) projectBtn.onclick = (e)=>{ e.stopPropagation(); toggleDropdown('project'); };
    const quarterBtn = document.getElementById('f-quarter-btn'); if(quarterBtn) quarterBtn.onclick = (e)=>{ e.stopPropagation(); toggleDropdown('quarter'); };
    const yearBtn = document.getElementById('f-year-btn'); if(yearBtn) yearBtn.onclick = (e)=>{ e.stopPropagation(); toggleDropdown('year'); };

      cb.onclick = (e)=>{ e.stopPropagation(); toggleHamletOne(hamlets, cb.dataset.name, cb.checked); renderDataTab(el); };
    });
    const projectAllCb = document.getElementById('f-project-all');
    if(projectAllCb) projectAllCb.onclick = (e)=>{ e.stopPropagation(); toggleProjectAll(projects, projectAllCb.checked); renderDataTab(el); };
    el.querySelectorAll('.f-project-item').forEach(cb=>{
      cb.onclick = (e)=>{ e.stopPropagation(); toggleProjectOne(projects, cb.dataset.id, cb.checked); renderDataTab(el); };

        if(state.activeTab!=='data' || !state.openFilterDropdown) return;

        const c = document.getElementById('content'); if(c && state.activeTab==='data') renderDataTab(c);

    const colPickerBtn = document.getElementById('col-picker-btn');

    const colViewBtn = document.getElementById('col-view-btn');
    if(colViewBtn) colViewBtn.onclick = async ()=>{ await commitBorrowerColumnPicker('view'); renderDataTab(el); };
    const colDefaultBtn = document.getElementById('col-default-btn');
    if(colDefaultBtn) colDefaultBtn.onclick = async ()=>{ await commitBorrowerColumnPicker('default'); renderDataTab(el); };
    const colCancelBtn = document.getElementById('col-cancel-btn');
    if(colCancelBtn) colCancelBtn.onclick = ()=>{ cancelBorrowerColumnPicker(); renderDataTab(el); };

    document.querySelectorAll('[data-col-toggle]').forEach(cb=>{
      cb.onchange = ()=>{
        const key = cb.dataset.colToggle;
        if(key==='name') { cb.checked = true; return; } // "Họ và tên" không cho ẩn
        state.borrowerColPickerDraftVisible = toggleBorrowerColumnVisibility(state.borrowerColPickerDraftVisible || ensureBorrowerVisibleCols(), key);
        renderDataTab(el);
      };
    });
    // Kéo-thả sắp xếp lại thứ tự cột (trên bản nháp) — các cặp bắt buộc đi cùng nhau tự động được
    // giữ liền kề, "Họ và tên" không kéo được và không nhận được thả vào trước nó.
    let dragColKey = null;
    el.querySelectorAll('.col-pick-row').forEach(row=>{
      if(row.dataset.colKey==='name') return; // cố định, không cho kéo
      row.addEventListener('dragstart', ()=>{ dragColKey = row.dataset.colKey; row.style.opacity='0.4'; });
      row.addEventListener('dragend', ()=>{ row.style.opacity=''; });
      row.addEventListener('dragover', (e)=> e.preventDefault());
      row.addEventListener('drop', (e)=>{
        e.preventDefault();
        const targetKey = row.dataset.colKey;
        if(!dragColKey || dragColKey===targetKey) return;
        const order = state.borrowerColPickerDraftOrder || ensureBorrowerColumnOrder();
        state.borrowerColPickerDraftOrder = moveBorrowerColumnGroup(order, dragColKey, targetKey);
        renderDataTab(el);
      });
    });

    // ---- Xuất Excel / In ----
    document.getElementById('exp-excel-btn').onclick = ()=> renderBorrowersExcelPreviewModal(list, visibleCols);
    document.getElementById('print-btn').onclick = ()=> printBorrowersList(list, visibleCols);

    // ---- Người vay ----
    document.querySelectorAll('[data-view]').forEach(b=>{
      b.onclick = ()=>{ state.modal={type:'borrower', payload: state.borrowers.find(x=>x.id===b.dataset.view)}; render(); };
    });
  }

  function acctPeriodSelectorHtml(prefix){
    const q = state.config.quarters;
    return `
      <select id="${prefix}-mode">
        <option value="year" ${state.acctMode==='year'?'selected':''}>Cả năm (Quý 1 → Quý 4)</option>
        <option value="quarter" ${state.acctMode==='quarter'?'selected':''}>Theo Quý</option>
        <option value="all" ${state.acctMode==='all'?'selected':''}>Toàn bộ từ trước đến nay</option>
      </select>
      ${state.acctMode==='quarter' ? `
        <select id="${prefix}-quarter">
          ${['q1','q2','q3','q4'].map(k=>`<option value="${k}" ${state.acctQuarter===k?'selected':''}>${q[k].label} (${fmtDate(q[k].start)} → ${fmtDate(q[k].end)})</option>`).join('')}
        </select>` : ''}
    `;
  }
  function bindAcctPeriodSelector(prefix, onChange){
    document.getElementById(`${prefix}-mode`).onchange = e=>{ state.acctMode = e.target.value; onChange(); };
    const qsel = document.getElementById(`${prefix}-quarter`);
    if(qsel) qsel.onchange = e=>{ state.acctQuarter = e.target.value; onChange(); };
  }

  function emptyExpense(){
    return { id: uid(), date: todayStr(), purpose: CAT_MEETING, purposeOther:'', hamlet:(state.config.hamlets||[])[0]||'', amount:0, note:'' };
  }

        <div class="panel-body"><div class="toolbar" style="margin:0;">${acctPeriodSelectorHtml('exp')}</div>
          <div class="sub" style="margin-top:8px;">Khoảng áp dụng: <b>${fmtDate(from)} → ${fmtDate(to)}</b></div>

      <div class="grid3">
        <div class="stat-card" style="background:linear-gradient(135deg,var(--rice),var(--rice-dark));">

          <div class="lbl">Tổng lãi trích về cho ${adminLevelLabel()}</div>
          <div class="sub">= Tổng lãi thu được × (100% − ${state.config.retainPercent||0}% ${subAdminLabelLower()} giữ lại)</div>
        </div>
        <div class="stat-card" style="background:linear-gradient(135deg,var(--clay),#7d3813);">
          <div class="num mono">${money(acct.chiTotal)}</div>
          <div class="lbl">Tổng số tiền ${adminLevelLabel()} đã chi</div>
          <div class="sub">Cộng dồn từ các khoản chi trong kỳ</div>
        </div>
        <div class="stat-card" style="background:linear-gradient(135deg,${acct.tonQuy>=0?'var(--green)':'var(--red)'},${acct.tonQuy>=0?'#2f4f34':'#7a231d'});">
          <div class="num mono">${money(acct.tonQuy)}</div>
          <div class="lbl">Tồn quỹ ${adminLevelLabel()}</div>
          <div class="sub">= Tổng nhận về − Tổng đã chi</div>
        </div>
      </div>

      <div class="toolbar">
        <input id="e-search" placeholder="🔎 Tìm theo ghi chú, ${subAdminLabelLower()}..." value="${state.expSearch}" style="min-width:220px;">
        <select id="e-cat"><option value="">Tất cả mục đích chi</option>${EXPENSE_CATEGORIES.map(c=>`<option value="${c}" ${state.expFilterCat===c?'selected':''}>${categoryLabel(c)}</option>`).join('')}</select>
        <div class="spacer"></div>
        ${canEditModule('data')? `<button class="btn btn-primary" id="add-exp-btn">+ Thêm khoản chi mới</button>` : ''}
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Ngày chi</th><th>Nội dung / Mục đích</th><th>Địa bàn (${subAdminLabel()})</th><th>Số tiền</th><th>Ghi chú</th><th></th></tr></thead>
          <tbody>
            ${list.length? list.map(e=>`
              <tr>
                <td>${fmtDate(e.date)}</td>
                <td>${e.purpose===CAT_OTHER? `${categoryLabel(CAT_OTHER)}: ${e.purposeOther||''}` : categoryLabel(e.purpose)}</td>
                <td>${isCatHamlet(e.purpose)? (e.hamlet||'—') : '—'}</td>
                <td class="money">${money(e.amount)}</td>
                <td>${e.note||'—'}</td>
                <td><button class="btn btn-ghost btn-sm" data-view-exp="${e.id}">Xem/Sửa</button></td>
              </tr>`).join('') : `<tr><td colspan="6"><div class="empty-state"><div class="e-ico">💰</div>Chưa có khoản chi nào trong kỳ này</div></td></tr>`}

        ${state.showExpenseTrash? `<div class="panel-body">${buildTrashPanelHtml(['expense'])}</div>` : ''}

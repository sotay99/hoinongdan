  // ---------- interest engine ----------
  function periodRange(){
    if(state.reportMode==='quarter'){
      return resolveQuarterDates(state.reportQuarter);
    }
    return { from: state.reportFrom, to: state.reportTo };
  }
  function calcInterest(b, from, to){
    if(!from || !to) return {days:0, interest:0, due:0};
    const days = Math.max(0, daysBetween(from, to));
    const rate = parseFloat(b.rate)||0;
    const principal = parseFloat(b.principal)||0;
    const interest = principal * (rate/100) * (days/365);
    const prev = parseFloat(b.prevBalance)||0;
    return { days, interest: Math.round(interest), due: Math.round(interest + prev) };
  }
  function interestStatus(b, due){
    const paid = parseFloat(b.interestPaid)||0;
    const diff = Math.round(paid - due);
    if(diff===0) return {label:'Đã đóng đủ', cls:'pill-green', diff:0};
    if(diff<0) return {label:`Còn thiếu ${money(-diff)}`, cls:'pill-red', diff};
    return {label:`Đóng thừa ${money(diff)}`, cls:'pill-orange', diff};
  }
  function principalStatus(b){
    const principal = parseFloat(b.principal)||0;
    const paid = parseFloat(b.principalPaid)||0;
    const diff = Math.round(paid - principal);
    if(diff===0) return {label:'Đã đóng đủ', cls:'pill-green'};
    if(diff<0) return {label:`Còn thiếu ${money(-diff)}`, cls:'pill-red'};
    return {label:`Đóng thừa ${money(diff)}`, cls:'pill-orange'};
  }

  // ---------- notifications engine ----------
  function computeAlerts(){
    const alerts = [];
    const today = new Date(todayStr());
    if(!state.config) return alerts;
    // quarter end reminder (interest)
    Object.entries(state.config.quarters||DEFAULT_QUARTERS).forEach(([qk,q])=>{
      const resolved = resolveQuarterDates(qk);
      if(!resolved.to) return;
      const d = daysBetween(todayStr(), resolved.to);
      if(d===15 || (d>=0 && d<=15)){
        alerts.push({color:'orange', text:`Sắp hết ${q.label||qk.toUpperCase()} (còn ${d} ngày) — nhắc thu lãi định kỳ`, key:'q-'+qk});
      }
    });
    state.borrowers.forEach(b=>{
      if(b.dueDate){
        const d = daysBetween(todayStr(), b.dueDate);
        if(d>=0 && d<=15) alerts.push({color:'red', text:`Gốc của ${b.name} (${b.hamlet}) đến hạn còn ${d} ngày`, key:'p-'+b.id});
        else if(d>0 && d<=30) alerts.push({color:'orange', text:`Gốc của ${b.name} (${b.hamlet}) đến hạn còn ${d} ngày`, key:'p-'+b.id});
        else if(d>0 && d<=60) alerts.push({color:'yellow', text:`Gốc của ${b.name} (${b.hamlet}) đến hạn còn ${d} ngày`, key:'p-'+b.id});
      }
    });
    return alerts;
  }
  function dashboardCounts(alerts){
    // one borrower counted at its most severe color among principal/extension alerts
    const sevMap = {};
    alerts.forEach(a=>{
      if(!a.key.startsWith('p-') && !a.key.startsWith('e-')) return;
      const id = a.key.slice(2);
      const rank = {yellow:1, orange:2, red:3};
      if(!sevMap[id] || rank[a.color] > rank[sevMap[id]]) sevMap[id] = a.color;
    });
    const counts = {yellow:0, orange:0, red:0};
    Object.values(sevMap).forEach(c=>counts[c]++);
    return counts;
  }

  // ---------- accounting engine (Thu - Chi cấp Xã) ----------
  function acctPeriodRange(mode, quarterKey){
    mode = mode || state.acctMode; quarterKey = quarterKey || state.acctQuarter;
    const q = state.config.quarters;
    if(mode==='all') return { from:'2000-01-01', to: todayStr() };
    if(mode==='quarter') return { from:q[quarterKey].start, to:q[quarterKey].end };
    // year: từ đầu Quý 1 đến cuối Quý 4
    return { from:q.q1.start, to:q.q4.end };
  }
  function computeAcctTotals(from, to){
    const retain = state.config.retainPercent||0;
    const activeBorrowers = state.borrowers.filter(b=>!b.deleted);
    const thu = activeBorrowers.reduce((s,b)=> s + calcInterest(b, from, to).due, 0);
    const giuLaiAp = Math.round(thu*retain/100);
    const xaNhan = Math.round(thu - giuLaiAp);
    const activeExpenses = state.expenses.filter(e=>!e.deleted && e.date && e.date>=from && e.date<=to);
    const chiTotal = activeExpenses.reduce((s,e)=> s + (parseFloat(e.amount)||0), 0);
    const chiByCategory = {};
    const chiByHamlet = {};
    activeExpenses.forEach(e=>{
      const label = e.purpose===CAT_OTHER ? `${CAT_OTHER}: ${e.purposeOther||'(chưa ghi rõ)'}` : (isCatHamlet(e.purpose) ? CAT_HAMLET : e.purpose);
      chiByCategory[label] = (chiByCategory[label]||0) + (parseFloat(e.amount)||0);
      if(isCatHamlet(e.purpose)){
        const h = e.hamlet || '—';
        chiByHamlet[h] = (chiByHamlet[h]||0) + (parseFloat(e.amount)||0);
      }
    });
    return { thu, xaNhan, giuLaiAp, chiTotal, chiByCategory, chiByHamlet, tonQuy: Math.round(xaNhan - chiTotal), expenses: activeExpenses };
  }

  // ---------- báo cáo tổng quan toàn xã (theo phương án vay) ----------
  function computeProjectOverview(){
    const active = state.borrowers.filter(b=>!b.deleted);
    const byProject = {};
    active.forEach(b=>{
      const p = borrowerProjectName(b) || '—';
      if(!byProject[p]) byProject[p] = { name:p, hamlets:new Set(), disbursed:0, recovered:0 };
      byProject[p].hamlets.add(b.hamlet||'—');
      byProject[p].disbursed += parseFloat(b.principal)||0;
      byProject[p].recovered += parseFloat(b.principalPaid)||0;
    });
    const list = Object.values(byProject).map(p=>{
      const outstanding = Math.max(0, Math.round(p.disbursed - p.recovered));
      return {
        name: p.name,
        hamlets: [...p.hamlets].join(', '),
        disbursed: Math.round(p.disbursed),
        recovered: Math.round(p.recovered),
        outstanding,
        status: outstanding>0 ? 'Đang hoạt động' : 'Đã tất toán',
      };
    }).sort((a,b)=>a.name.localeCompare(b.name));
    const activeCount = list.filter(p=>p.status==='Đang hoạt động').length;
    const settledCount = list.filter(p=>p.status==='Đã tất toán').length;
    const totalBorrowers = active.filter(b=> ((parseFloat(b.principal)||0) - (parseFloat(b.principalPaid)||0)) > 0 ).length;
    const totalOutstanding = list.reduce((s,p)=>s+p.outstanding,0);
    return { list, activeCount, settledCount, totalBorrowers, totalOutstanding };
  }

  function handleAiFiles(fileList){
    const files = Array.from(fileList||[]);
    if(!files.length) return;
    const MAX_MB = 8;
    files.forEach(file=>{
      if(file.size > MAX_MB*1024*1024){ alert(`Tệp "${file.name}" vượt quá ${MAX_MB}MB, vui lòng chọn tệp nhỏ hơn.`); return; }
      const reader = new FileReader();
      reader.onload = ()=>{
        const base64 = String(reader.result).split(',')[1] || '';
        state.aiPendingAttachments.push({ name:file.name, mimeType: file.type || 'application/octet-stream', base64 });
        renderAiChatOverlay();

  let aiRecognition = null;

  function toggleMicGeneric(targetInputId, rerenderFn){

    aiRecognition = new SR();

    aiRecognition.onerror = ()=>{ state._aiMicListening = false; rerenderFn(); };
    aiRecognition.onend = ()=>{ state._aiMicListening = false; rerenderFn(); };
    aiRecognition.onresult = (e)=>{
      const text = e.results[0][0].transcript;
      const inputEl = document.getElementById(targetInputId);
      if(inputEl) inputEl.value = (inputEl.value ? inputEl.value + ' ' : '') + text;
    };
    try{ aiRecognition.start(); }catch(e){ /* đã start rồi thì bỏ qua */ }

GỢI Ý CÁC KHÍA CẠNH CẦN ĐỀ CẬP KHI ĐỀ XUẤT PHƯƠNG ÁN (NHÓM B) HOẶC KHI SOẠN THẢO (NHÓM A) THEO TỪNG LOẠI SẢN PHẨM — đây là những điều bạn nên TỰ SUY LUẬN và đưa vào phương án đề xuất (NHÓM B) hoặc tự cân nhắc khi viết (NHÓM A), không phải danh sách câu hỏi để hỏi ngược người dùng:
- Bài viết MXH / Tin nhắn Zalo: chủ đề chính sách/nội dung cần truyền tải, độ dài mong muốn (ngắn/vừa/dài), có cần kèm ảnh minh hoạ không.
- Hình ảnh & Poster: mô tả ý tưởng CÀNG CHI TIẾT CÀNG TỐT — khuyến khích mạnh mẽ người dùng tải lên ảnh/tài liệu tham khảo (nếu có) để bạn đọc trực tiếp cho nhanh, dễ hiểu hơn là chỉ mô tả bằng lời; hỏi thêm tông màu ưa thích, có cần chữ/khẩu hiệu in trên ảnh không, dùng để đăng ở đâu (mạng xã hội hay in treo).
- Video tuyên truyền: hỏi người dùng mô tả rõ BỐI CẢNH (diễn ra ở đâu, những ai xuất hiện), mô tả ÂM THANH (nhạc nền, tiếng động nền), và NHÂN VẬT trong video sẽ nói/thoại những câu gì cụ thể; hỏi thêm thời lượng mong muốn.
- Banner: nội dung cần nổi bật nhất, treo ở đâu (ngoài trời/hội trường), kích thước ngang hay dọc, có logo/hình ảnh cụ thể nào cần đưa vào không.
- Kịch bản loa truyền thanh: thời lượng đọc mong muốn, có cần nhạc hiệu mở đầu/kết thúc không.
- Slide trình chiếu: số lượng slide mong muốn, các ý chính cần có trong từng phần, có cần số liệu minh hoạ không.
- Khẩu hiệu/Slogan: chủ đề, số lượng phương án cần gợi ý (mặc định gợi ý khoảng 5-8 phương án để lựa chọn).
- Hỏi - Đáp: những thắc mắc phổ biến nhất mà bà con hay hỏi về chủ đề này, số lượng câu hỏi mong muốn.
- Tạo giọng nói AI: nội dung/kịch bản cần đọc thành giọng nói (nếu người dùng chưa có sẵn kịch bản, hãy tự soạn 1 đoạn văn bản phù hợp để đọc trước), giọng đọc mong muốn nam hay nữ (trình duyệt sẽ tự chọn giọng tiếng Việt có sẵn gần nhất), tốc độ đọc nhanh/vừa/chậm. LUÔN xuất kết quả cuối cùng bằng đúng cú pháp khối \`\`\`voice (xem hướng dẫn bên dưới) để người dùng bấm nghe được giọng đọc AI thật ngay trong trình duyệt.

  async function sendPropagandaMessage(text, forceVideoFlag){
    const hasText = !!(text && text.trim());
    if(!hasText && !state.propagandaPendingAttachments.length) return;
    if(state.propagandaSending) return;
    let chat = state.propagandaChats.find(c=>c.id===state.propagandaActiveChatId);
    if(!chat){
      chat = { id:'pc_'+uid(), title:(text||'').trim().slice(0,40) || 'Bài tuyên truyền mới', messages:[], updatedAt:new Date().toISOString() };
      state.propagandaChats.unshift(chat);
      state.propagandaActiveChatId = chat.id;
    }
    // Yêu cầu mới: hễ đoạn chat có nhắc tới "video" (bấm nút vai trò Video, hoặc tự gõ có chữ

    // đó về sau trong đúng đoạn chat này.
    if(forceVideoFlag || /video/i.test(text||'')) chat.hasVideoRole = true;
    const attachmentsForApi = state.propagandaPendingAttachments.slice();
    const attachmentsForHistory = attachmentsForApi.map(a=>({ name:a.name, mimeType:a.mimeType }));
    chat.messages.push({ role:'user', text:(text||'').trim(), time:new Date().toISOString(), attachments: attachmentsForHistory });

    await runPropagandaAssistantTurn(chat, attachmentsForApi);

  function handlePropagandaFiles(fileList){
    const files = Array.from(fileList||[]);
    if(!files.length) return;
    const MAX_MB = 8;
    files.forEach(file=>{
      if(file.size > MAX_MB*1024*1024){ alert(`Tệp "${file.name}" vượt quá ${MAX_MB}MB, vui lòng chọn tệp nhỏ hơn.`); return; }
      const reader = new FileReader();
      reader.onload = ()=>{
        const base64 = String(reader.result).split(',')[1] || '';
        state.propagandaPendingAttachments.push({ name:file.name, mimeType: file.type || 'application/octet-stream', base64 });
        const c = document.getElementById('content'); if(c) renderPropagandaTab(c);
      };
      reader.onerror = ()=> alert(`Không đọc được tệp "${file.name}".`);
      reader.readAsDataURL(file);
    });
  }

  // Gọi Gemini API bằng ĐÚNG Cấu hình AI (model) mà người dùng đang chọn ở thanh model phía trên
  // ô nhập liệu. opts.attachments: tệp/ảnh đính kèm cho tin nhắn CUỐI CÙNG. opts.webSearch: bật
  // Google Search grounding (chế độ "Tìm kiếm web") cho lượt trả lời này.

  // Nhận diện "hãng" của 1 Cấu hình AI dựa trên tên model/tên gợi nhớ mà Admin đã nhập, để hệ
  // thống tự biết đâu là API Key Gemini, đâu là ChatGPT (OpenAI), đâu là Claude (Anthropic)...
  // ---------------------------------------------------------------------
  function aiVendorOf(p){
    const s = (((p&&p.model)||'') + ' ' + ((p&&p.label)||'')).toLowerCase();
    if(s.includes('gemini')) return 'gemini';
    if(s.includes('gpt') || s.includes('openai') || s.includes('chatgpt') || /\bo[134]\b/.test(s)) return 'openai';
    if(s.includes('claude') || s.includes('anthropic')) return 'anthropic';
    return 'unknown';
  }

  // Gọi 1 lượt Gemini duy nhất theo cơ chế STREAMING (:streamGenerateContent?alt=sse) — đọc từng
  // đoạn nhỏ ngay khi AI vừa xử lý xong, gọi onDelta(fullTextSoFar) liên tục để giao diện tuôn chữ
  // mượt mà. LƯU Ý: hàm này THROW lỗi (không tự bắt) để hàm điều phối bên ngoài quyết định có
  // chuyển sang tầng dự phòng tiếp theo hay không.
  async function callGeminiOnce(provider, model, messages, opts, onDelta){
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse&key=${provider.apiKey}`;
    const contents = messages.map((m,i)=>{
      const parts = [{text:m.text||''}];
      if(i===messages.length-1 && opts.attachments && opts.attachments.length){
        opts.attachments.forEach(a=> parts.push({ inline_data:{ mime_type:a.mimeType, data:a.base64 } }));
      }
      return { role: m.role==='assistant' ? 'model' : 'user', parts };
    });
    const body = { system_instruction:{ parts:[{text: opts.systemPromptOverride || await buildAiSystemPrompt()}] }, contents };
    if(opts.webSearch) body.tools = [{ google_search:{} }]; // chế độ "Tìm kiếm web" — chỉ hoạt động với các model Gemini có hỗ trợ grounding
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body), signal: opts.signal });
    if(!res.ok){
      let msg = `HTTP ${res.status}`;
      try{ const errData = await res.json(); msg = (errData && errData.error && errData.error.message) || (Array.isArray(errData) && errData[0] && errData[0].error && errData[0].error.message) || msg; }catch(e){}
      throw new Error(`[Gemini ${model}] ${msg}`);
    }
    let fullText = '';
    if(!res.body || !res.body.getReader){
      // Môi trường không hỗ trợ đọc luồng (hiếm gặp) -> rơi về đọc trọn gói 1 lần cho an toàn
      const data = await res.json();
      const arr = Array.isArray(data) ? data : [data];
      arr.forEach(obj=>{
        if(obj && obj.error) throw new Error(`[Gemini ${model}] ${obj.error.message || 'lỗi không xác định'}`);
        const parts = obj && obj.candidates && obj.candidates[0] && obj.candidates[0].content && obj.candidates[0].content.parts;
        if(parts) fullText += parts.map(p=>p.text||'').join('');
      });
      if(onDelta) onDelta(fullText);
      if(!fullText.trim()) throw new Error(`[Gemini ${model}] Không có nội dung trả về (có thể bị chặn an toàn hoặc quá tải).`);
      return { text: fullText.trim() };
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let buffer = '';
    while(true){
      const { done, value } = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, { stream:true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // giữ lại phần dòng còn dở dang cho lượt đọc kế tiếp
      for(const line of lines){
        const trimmed = line.trim();
        if(!trimmed.startsWith('data:')) continue;
        const jsonStr = trimmed.slice(5).trim();
        if(!jsonStr) continue;
        let obj;
        try{ obj = JSON.parse(jsonStr); }catch(e){ continue; /* dòng chưa trọn vẹn — đợi chunk sau */ }
        if(obj.error) throw new Error(`[Gemini ${model}] ${obj.error.message || 'lỗi không xác định'}`);
        const parts = obj.candidates && obj.candidates[0] && obj.candidates[0].content && obj.candidates[0].content.parts;
        if(parts){
          const deltaText = parts.map(p=>p.text||'').join('');
          if(deltaText){ fullText += deltaText; if(onDelta) onDelta(fullText); }
        }
      }
    }
    if(!fullText.trim()) throw new Error(`[Gemini ${model}] Không có nội dung trả về (có thể bị chặn an toàn hoặc quá tải).`);
    return { text: fullText.trim() };
  }

  // Nếu Admin gõ chung chung/sai ("chatgpt", "gpt", để trống...) thì OpenAI sẽ báo lỗi 400
  // "invalid model ID" ngay lập tức — tự động ép về 1 Model ID CỤ THỂ, hợp lệ. LƯU Ý: model
  // "gpt-4o-mini" đã ngừng được khuyến nghị (OpenAI đang chuyển hẳn sang dòng GPT-5), model thay
  // thế hiện hành cho nhu cầu chi phí thấp/độ trễ thấp là "gpt-5-mini".
  function sanitizeOpenAIModel(raw){
    const m = (raw||'').trim();
    const invalid = ['', 'chatgpt', 'chat gpt', 'chat-gpt', 'gpt', 'gpt chat', 'openai', 'chat gpt 4', 'gpt4', 'gpt-4'];
    if(invalid.includes(m.toLowerCase())) return 'gpt-5-mini';
    return m;
  }
  // Gọi 1 lượt OpenAI (ChatGPT) — chuẩn Chat Completions, cũng hỗ trợ streaming SSE. THROW lỗi
  // khi thất bại, để hàm điều phối quyết định tầng kế tiếp.
  async function callOpenAIOnce(provider, messages, opts, onDelta){
    const model = sanitizeOpenAIModel(provider.model);
    const oaMessages = [{ role:'system', content: opts.systemPromptOverride || await buildAiSystemPrompt() }];
    messages.forEach((m,i)=>{
      if(i===messages.length-1 && opts.attachments && opts.attachments.length){
        const contentArr = [{ type:'text', text:m.text||'' }];
        opts.attachments.forEach(a=>{
          if((a.mimeType||'').startsWith('image/')) contentArr.push({ type:'image_url', image_url:{ url:`data:${a.mimeType};base64,${a.base64}` } });
        });
        oaMessages.push({ role: m.role==='assistant'?'assistant':'user', content: contentArr });
      } else {
        oaMessages.push({ role: m.role==='assistant'?'assistant':'user', content: m.text||'' });
      }
    });
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization': `Bearer ${provider.apiKey}` },
      body: JSON.stringify({ model, messages: oaMessages, stream:true }),
      signal: opts.signal,
    });
    if(!res.ok){
      let msg = `HTTP ${res.status}`;
      try{ const errData = await res.json(); msg = (errData && errData.error && errData.error.message) || msg; }catch(e){}
      throw new Error(`[OpenAI ${model}] ${msg}`);
    }
    let fullText = '';
    if(!res.body || !res.body.getReader){
      const data = await res.json();
      fullText = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
      if(onDelta) onDelta(fullText);
      if(!fullText.trim()) throw new Error(`[OpenAI ${model}] Không có nội dung trả về.`);
      return { text: fullText.trim() };
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let buffer = '';
    while(true){
      const { done, value } = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, { stream:true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for(const line of lines){
        const trimmed = line.trim();
        if(!trimmed.startsWith('data:')) continue;
        const jsonStr = trimmed.slice(5).trim();
        if(!jsonStr || jsonStr==='[DONE]') continue;
        let obj;
        try{ obj = JSON.parse(jsonStr); }catch(e){ continue; }
        if(obj.error) throw new Error(`[OpenAI ${model}] ${obj.error.message || 'lỗi không xác định'}`);
        const deltaText = obj.choices && obj.choices[0] && obj.choices[0].delta && obj.choices[0].delta.content;
        if(deltaText){ fullText += deltaText; if(onDelta) onDelta(fullText); }
      }
    }
    if(!fullText.trim()) throw new Error(`[OpenAI ${model}] Không có nội dung trả về.`);
    return { text: fullText.trim() };
  }

  // Gọi 1 lượt Anthropic (Claude) — chuẩn Messages API, hỗ trợ streaming SSE. THROW lỗi khi thất bại.
  async function callAnthropicOnce(provider, messages, opts, onDelta){
    const model = provider.model || 'claude-3-5-sonnet-20241022';
    const anthMessages = messages.map((m,i)=>{
      if(i===messages.length-1 && opts.attachments && opts.attachments.length){
        const contentArr = [{ type:'text', text:m.text||'' }];
        opts.attachments.forEach(a=>{
          if((a.mimeType||'').startsWith('image/')) contentArr.push({ type:'image', source:{ type:'base64', media_type:a.mimeType, data:a.base64 } });
        });
        return { role: m.role==='assistant'?'assistant':'user', content: contentArr };
      }
      return { role: m.role==='assistant'?'assistant':'user', content: m.text||'' };
    });
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json', 'x-api-key': provider.apiKey,
        'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true',
      },
      body: JSON.stringify({ model, max_tokens:4096, system: opts.systemPromptOverride || await buildAiSystemPrompt(), messages: anthMessages, stream:true }),
      signal: opts.signal,
    });
    if(!res.ok){
      let msg = `HTTP ${res.status}`;
      try{ const errData = await res.json(); msg = (errData && errData.error && errData.error.message) || msg; }catch(e){}
      throw new Error(`[Claude ${model}] ${msg}`);
    }
    let fullText = '';
    if(!res.body || !res.body.getReader){
      const data = await res.json();
      fullText = (data.content||[]).map(c=>c.text||'').join('');
      if(onDelta) onDelta(fullText);
      if(!fullText.trim()) throw new Error(`[Claude ${model}] Không có nội dung trả về.`);
      return { text: fullText.trim() };
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let buffer = '';
    while(true){
      const { done, value } = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, { stream:true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for(const line of lines){
        const trimmed = line.trim();
        if(!trimmed.startsWith('data:')) continue;
        const jsonStr = trimmed.slice(5).trim();
        if(!jsonStr) continue;
        let obj;
        try{ obj = JSON.parse(jsonStr); }catch(e){ continue; }
        if(obj.type==='content_block_delta' && obj.delta && obj.delta.text){ fullText += obj.delta.text; if(onDelta) onDelta(fullText); }
        else if(obj.type==='error'){ throw new Error(`[Claude ${model}] ${(obj.error && obj.error.message) || 'lỗi không xác định'}`); }
      }
    }
    if(!fullText.trim()) throw new Error(`[Claude ${model}] Không có nội dung trả về.`);
    return { text: fullText.trim() };
  }

  // ---------------------------------------------------------------------
  // BỘ ĐIỀU PHỐI "DỰ PHÒNG TỰ ĐỘNG 3 TẦNG" — đây là hàm DUY NHẤT mà giao diện chat gọi tới.
  // TẦNG 1: gemini-pro-latest (API Key Gemini trong Cấu hình AI).
  // TẦNG 2: nếu Tầng 1 lỗi bất kỳ kiểu gì (quá tải, 429, 503, 404 model đã ngừng hỗ trợ, mất
  //         mạng...) -> ÂM THẦM chuyển sang gemini-flash-latest, dùng CHUNG API Key Gemini đó.
  // TẦNG 3: nếu Tầng 2 cũng lỗi -> kiểm tra trong Cấu hình AI có API Key của hãng khác không (vd
  //         ChatGPT/Claude); nếu có thì âm thầm gọi hãng đó để "cứu nguy"; nếu không có gì khác
  //         ngoài đúng 1 API Key Gemini thì mới báo lỗi thân thiện cho người dùng.
  // LƯU Ý QUAN TRỌNG: dùng alias "-latest" (gemini-pro-latest / gemini-flash-latest) thay vì ghim
  // cứng 1 phiên bản cụ thể (như "gemini-1.5-pro") — vì Google đổi/khai tử phiên bản Gemini rất
  // nhanh (chỉ trong vài tháng), ghim cứng version cụ thể sẽ tái diễn lỗi 404 "model not found"
  // sau một thời gian. Alias "-latest" tự động trỏ sang bản mới nhất Google phát hành, có báo
  // trước 2 tuần khi đổi model đứng sau alias — không cần sửa code lại mỗi khi Google nâng cấp.
  // Toàn bộ quá trình chuyển tầng diễn ra NGẦM — người dùng không thấy bất kỳ cảnh báo lỗi đỏ nào,
  // chỉ thấy bong bóng "đang suy nghĩ" hơi lâu hơn bình thường rồi có câu trả lời bình thường.
  // Ngoại lệ: nếu người dùng tự tay CHỌN đích danh 1 model không phải Gemini ở thanh chọn model,
  // hệ thống tôn trọng đúng lựa chọn đó (không tự ý chuyển sang Gemini).
  // ---------------------------------------------------------------------
  async function callAIWithFallback(messages, opts, onDelta){
    opts = opts || {};
    if(!state.aiProviders || !state.aiProviders.length) await loadAiProviders();
    const providers = state.aiProviders || [];
    if(!providers.length){
      return { text:'Admin chưa cấu hình API AI nào. Vui lòng vào Module "CÀI ĐẶT ADMIN → Cấu hình AI" để thêm API Key.' };
    }
    const selected = getActiveAiProvider();
    const selectedVendor = selected ? aiVendorOf(selected) : null;

    // Người dùng tự chọn đích danh 1 model KHÔNG PHẢI Gemini -> tôn trọng lựa chọn, không áp dụng
    // cơ chế 3 tầng dành riêng cho Gemini (cơ chế này chỉ để chống nghẽn/quá tải của Gemini).
    if(selected && selectedVendor && selectedVendor !== 'gemini'){
      try{
        if(selectedVendor==='anthropic') return await callAnthropicOnce(selected, messages, opts, onDelta);
        return await callOpenAIOnce(selected, messages, opts, onDelta);
      }catch(e){
        if(e && e.name==='AbortError') throw e; // người dùng chủ động dừng -> KHÔNG dò tầng khác
        console.error('[AI] Model đang chọn gặp lỗi:', e);
        return { text:'Xin lỗi, hệ thống AI đang gặp sự cố với model đang chọn. Bạn thử lại sau ít phút hoặc đổi sang model khác ở thanh chọn model phía trên nhé.' };
      }
    }

    const geminiProvider = (selected && selectedVendor==='gemini') ? selected : providers.find(p=> p.apiKey && aiVendorOf(p)==='gemini');

    if(geminiProvider && geminiProvider.apiKey){
      // ---- TẦNG 1: gemini-pro-latest ----
      try{
        return await callGeminiOnce(geminiProvider, 'gemini-pro-latest', messages, opts, onDelta);
      }catch(e1){
        if(e1 && e1.name==='AbortError') throw e1; // người dùng chủ động dừng -> KHÔNG dò tầng khác
        console.warn('[AI Fallback] Tầng 1 (gemini-pro-latest) lỗi -> âm thầm chuyển Tầng 2:', e1);
        if(onDelta) onDelta(''); // đưa bong bóng về lại trạng thái "đang suy nghĩ" trong lúc chuyển tầng
        // ---- TẦNG 2: gemini-flash-latest (dùng chung API Key Gemini) ----
        try{
          return await callGeminiOnce(geminiProvider, 'gemini-flash-latest', messages, opts, onDelta);
        }catch(e2){
          if(e2 && e2.name==='AbortError') throw e2;
          console.warn('[AI Fallback] Tầng 2 (gemini-flash-latest) cũng lỗi -> âm thầm chuyển Tầng 3:', e2);
          if(onDelta) onDelta('');
        }
      }
    }

    // ---- TẦNG 3: hãng khác trong Cấu hình AI (nếu Admin có gắn thêm, vd ChatGPT/Claude) ----
    const otherProvider = providers.find(p=> p!==geminiProvider && p.apiKey && aiVendorOf(p)!=='gemini');
    if(otherProvider){
      try{
        const vendor = aiVendorOf(otherProvider);
        if(vendor==='anthropic') return await callAnthropicOnce(otherProvider, messages, opts, onDelta);
        return await callOpenAIOnce(otherProvider, messages, opts, onDelta);
      }catch(e3){
        if(e3 && e3.name==='AbortError') throw e3;
        console.error('[AI Fallback] Tầng 3 (hãng khác) cũng lỗi:', e3);
      }
    }

    if(!geminiProvider){
      return { text:'Admin chưa cấu hình API AI Gemini hợp lệ. Vui lòng vào Module "CÀI ĐẶT ADMIN → Cấu hình AI" để thêm API Key.' };
    }
    // Chỉ có ĐÚNG 1 API Key Gemini (không có hãng nào khác để cứu nguy) và cả 2 tầng Gemini đều lỗi.
    return { text:'Xin lỗi, hệ thống AI hiện đang quá tải, chưa thể trả lời ngay lúc này. Bạn vui lòng thử lại sau ít phút nhé!' };
  }
  // Thực hiện 1 lượt gọi AI trả lời cho đúng trạng thái `chat.messages` HIỆN TẠI (không tự thêm
  // tin nhắn người dùng nào) — dùng chung cho: gửi tin nhắn mới, gửi lại sau khi sửa, và "Tải lại"
  // (yêu cầu AI trả lời lại cho đúng câu hỏi cũ).
  async function runAssistantTurn(chat, attachmentsForApi){
    state.aiSending = true;
    state.aiAbortController = new AbortController();
    const assistantMsg = { role:'assistant', text:'', time:new Date().toISOString(), streaming:true };
    chat.messages.push(assistantMsg);
    renderAiChatOverlay();
    try{
      const result = await callAIWithFallback(chat.messages.slice(0,-1), { attachments: attachmentsForApi||[], webSearch: state.aiWebSearchOn, signal: state.aiAbortController.signal }, (partial)=>{
        assistantMsg.text = partial;
        const bubbleEl = document.getElementById('ai-streaming-bubble');
        if(bubbleEl){
          if(partial){
            bubbleEl.classList.remove('thinking');
            bubbleEl.textContent = partial;
          } else {
            bubbleEl.classList.add('thinking');
            bubbleEl.innerHTML = waveTextHtml('Chàng đang suy nghĩ…');
          }
          const msgBox = document.getElementById('ai-messages');
          if(msgBox) msgBox.scrollTop = msgBox.scrollHeight;
        }
      });
      assistantMsg.text = result.text;
    }catch(e){
      assistantMsg.text = (e && e.name==='AbortError') ? 'Bạn đã dừng câu trả lời này.' : 'Xin lỗi, đã có lỗi xảy ra khi trả lời. Bạn thử lại nhé.';
    }
    delete assistantMsg.streaming;
    chat.updatedAt = new Date().toISOString();
    state.aiSending = false;
    state.aiAbortController = null;
    renderAiChatOverlay();
    saveAiChatToCloud(chat);
    // Yêu cầu 7: sau lượt trao đổi ĐẦU TIÊN của 1 đoạn chat mới, để AI tự đặt tên ngắn gọn cho
    // đoạn chat đó (giống các mô hình AI hiện nay), thay vì chỉ lấy tạm mấy chữ đầu câu hỏi.
    if(chat.messages.filter(m=>m.role==='user').length===1 && chat.messages.filter(m=>m.role==='assistant').length===1){
      generateChatTitle(chat);
    }
  }
  async function sendAiMessage(text){
    const hasText = !!(text && text.trim());
    if(!hasText && !state.aiPendingAttachments.length) return;
    if(state.aiSending) return;
    let chat = state.aiChats.find(c=>c.id===state.aiActiveChatId);
    if(!chat){ chat = { id:'c_'+uid(), title:'Đoạn chat mới', messages:[], updatedAt:new Date().toISOString() }; state.aiChats.unshift(chat); state.aiActiveChatId = chat.id; }
    const attachmentsForApi = state.aiPendingAttachments.slice();
    // Chỉ lưu TÊN + LOẠI tệp vào lịch sử (không lưu base64) để tránh phình dung lượng Firebase —
    // nội dung thật chỉ dùng ngay cho lượt gọi AI này.
    const attachmentsForHistory = attachmentsForApi.map(a=>({ name:a.name, mimeType:a.mimeType }));
    chat.messages.push({ role:'user', text: (text||'').trim(), time:new Date().toISOString(), attachments: attachmentsForHistory });
    if(chat.messages.length===1) chat.title = (text||'').trim().slice(0,40) || (attachmentsForHistory[0] && attachmentsForHistory[0].name) || 'Đoạn chat mới';
    chat.updatedAt = new Date().toISOString();
    state.aiPendingAttachments = [];
    await runAssistantTurn(chat, attachmentsForApi);
  }

  // ---------------------------------------------------------------------
  // Toast thông báo nhanh (dùng chung toàn app) + sao chép vào clipboard.
  // ---------------------------------------------------------------------
  function showToast(msg){
    const old = document.getElementById('hnd-toast');
    if(old) old.remove();
    const toast = document.createElement('div');
    toast.id = 'hnd-toast';
    toast.className = 'hnd-toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    requestAnimationFrame(()=> toast.classList.add('show'));
    setTimeout(()=>{ toast.classList.remove('show'); setTimeout(()=>{ if(toast.parentNode) toast.remove(); }, 300); }, 1800);
  }
  // Thông báo LỚN dùng cho các sự kiện quan trọng (gia hạn thành công, phê duyệt đóng lãi thành
  // công) — nhảy sổ ra giữa màn hình + nhảy múa 1 giây, đứng im 4 giây, rồi mờ dần và biến mất.
  function showBigToast(msg){
    const el = document.createElement('div');
    el.className = 'big-toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(()=>{
      el.classList.add('big-toast-fading');
      setTimeout(()=>{ if(el.parentNode) el.remove(); }, 1000);
    }, 1000 + 4000);
  }
  function writeClipboardSilent(text){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).catch(()=> fallbackCopyText(text));
    } else fallbackCopyText(text);
  }
  function fallbackCopyText(text){
    try{
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy');
      ta.remove();
    }catch(e){ console.warn('Sao chép clipboard lỗi:', e); }
  }
  function copyMessageText(text){ writeClipboardSilent(text); showToast('Đã sao chép!'); }

  // Dựng HTML "sóng chữ" nhấp nhô liên tục — mỗi ký tự trễ dần 1 chút để tạo hiệu ứng cuộn sóng
  // như đang gõ tin nhắn. Dùng cho "Chàng đang suy nghĩ..." và "AI đang tiêu hoá tài liệu...".
  function waveTextHtml(text){
    const chars = Array.from(text||'');
    return `<span class="wave-text">${chars.map((ch,i)=>`<span style="animation-delay:${(i*0.045).toFixed(3)}s">${ch===' '?'&nbsp;':escapeHtml(ch)}</span>`).join('')}</span>`;
  }

  // Xoá HẲN 1 tin nhắn bất kỳ (của người dùng hoặc AI) khỏi đoạn chat — không thể hoàn tác.
  function deleteMessageAt(idx){
    if(!confirm('Xoá tin nhắn này? Thao tác này KHÔNG THỂ hoàn tác, không thể khôi phục lại. Bạn có chắc chắn?')) return;
    const chat = state.aiChats.find(c=>c.id===state.aiActiveChatId);
    if(!chat || !chat.messages[idx]) return;
    chat.messages.splice(idx, 1);
    chat.updatedAt = new Date().toISOString();
    renderAiChatOverlay();
    saveAiChatToCloud(chat);
  }
  // "Tải lại" — chỉ có ở tin nhắn NGƯỜI DÙNG mới nhất: giữ nguyên câu hỏi, xoá bỏ phản hồi cũ của
  // AI (và mọi thứ sau đó, dù thường không có gì sau tin mới nhất) rồi yêu cầu AI trả lời lại từ đầu.
  async function regenerateReply(idx){
    if(state.aiSending) return;
    const chat = state.aiChats.find(c=>c.id===state.aiActiveChatId);
    if(!chat || !chat.messages[idx]) return;
    chat.messages = chat.messages.slice(0, idx+1);
    await runAssistantTurn(chat, []);
  }
  // Đổi tên 1 đoạn chat theo ý người dùng (ghi đè tên do AI tự đặt, nếu có).
  function renameAiChat(chatId){
    const chat = state.aiChats.find(c=>c.id===chatId);
    if(!chat) return;
    const name = prompt('Đổi tên đoạn chat:', chat.title||'');
    if(name===null || !name.trim()) return;
    chat.title = name.trim().slice(0,60);
    renderAiChatOverlay();
    saveAiChatToCloud(chat);
  }
  // Yêu cầu 7: để AI tự đặt tên ngắn gọn cho đoạn chat dựa trên nội dung trao đổi đầu tiên — gọi
  // riêng 1 lượt AI nhỏ, KHÔNG đưa vào lịch sử hiển thị, không ảnh hưởng luồng chat chính.
  async function generateChatTitle(chat){
    try{
      const firstUser = chat.messages.find(m=>m.role==='user' && !m.streaming);
      const firstAssistant = chat.messages.find(m=>m.role==='assistant' && !m.streaming);
      if(!firstUser || !firstUser.text) return;
      const askText = `Dựa vào đoạn hội thoại sau, hãy đặt 1 tiêu đề thật ngắn gọn (tối đa 6 từ, không quá 40 ký tự, không dùng dấu ngoặc kép, không chấm câu ở cuối, không giải thích gì thêm — CHỈ trả lời đúng tiêu đề) tóm tắt chủ đề chính của đoạn hội thoại:\nNgười dùng: ${firstUser.text.slice(0,300)}\n${firstAssistant && firstAssistant.text? 'Trợ lý: '+firstAssistant.text.slice(0,300) : ''}`;
      const result = await callAIWithFallback([{ role:'user', text: askText }], {}, null);
      const title = (result.text||'').replace(/["'“”‘’\n]/g,'').trim().replace(/[.。]$/,'').slice(0,60);
      if(title){
        chat.title = title;
        if(state._aiChatOpen) renderAiChatOverlay();
        saveAiChatToCloud(chat);
      }
    }catch(e){ console.warn('[AI] Tự đặt tên đoạn chat lỗi (giữ nguyên tên mặc định):', e); }
  }

  // ---------------------------------------------------------------------
  // Sửa & Gửi lại tin nhắn NGƯỜI DÙNG — xoá mọi tin nhắn phía sau (kiểu Gemini) rồi hỏi lại AI.
  // ---------------------------------------------------------------------
  function startEditMessage(idx){ state._aiBubbleEditingIndex = idx; renderAiChatOverlay(); }
  function cancelEditMessage(){ state._aiBubbleEditingIndex = null; renderAiChatOverlay(); }
  async function resendEditedMessage(idx, newText){
    if(!newText || !newText.trim()) return;
    const chat = state.aiChats.find(c=>c.id===state.aiActiveChatId);
    if(!chat) return;
    chat.messages = chat.messages.slice(0, idx); // xoá đúng tin nhắn này và mọi tin nhắn phía sau
    state._aiBubbleEditingIndex = null;
    await sendAiMessage(newText.trim());
  }

  // ---------------------------------------------------------------------
  // "Thêm vào Siêu ghi chú" — đóng Chat AI, mở Siêu ghi chú đúng không gian đã chọn, dán sẵn nội
  // dung tin nhắn vào khung nhập liệu để người dùng xem/sửa rồi tự bấm Gửi.
  // ---------------------------------------------------------------------
  function toggleAddNoteMenu(idx){
    state._aiBubbleAddNoteMenuIndex = (state._aiBubbleAddNoteMenuIndex === idx) ? null : idx;
    renderAiChatOverlay();
  }
  async function addMessageToNotes(idx, space){
    const chat = state.aiChats.find(c=>c.id===state.aiActiveChatId);
    const msg = chat && chat.messages[idx];
    if(!msg) return;
    const text = msg.text || '';
    state._aiBubbleAddNoteMenuIndex = null;
    writeClipboardSilent(text);
    closeAiChat();
    state._superNotesOpen = true;
    state.superNotesSpace = 'personal';
    state.superNotesCurrentFolder = null; state.superNotesEditingId = null; state.superNotesTrashOpen = false;
    attachSuperNotesRealtime();
    if(space === 'shared') await switchNotesSpace('shared');
    else renderSuperNotesOverlay();
    setTimeout(()=>{
      const inputEl = document.getElementById('sn-input');
      if(inputEl){ inputEl.value = text; inputEl.focus(); }
    }, 60);
    showToast(space==='shared'? 'Đã đưa vào ô nhập của Bộ ghi chú dùng chung!' : 'Đã đưa vào ô nhập của Bộ ghi chú cá nhân!');
  }

  // Dựng không gian chat toàn màn hình kiểu Gemini (sidebar lịch sử + khung chat + ô nhập).
  // Gắn TRỰC TIẾP vào document.body (ngoài #root) để không bị render() của app xoá mất.
  function renderAiChatOverlay(){
    let overlay = document.getElementById('ai-chat-overlay');
    let firstCreate = false;
    if(!overlay){
      overlay = document.createElement('div'); overlay.id = 'ai-chat-overlay'; overlay.className = 'ai-overlay';
      document.body.appendChild(overlay);
      firstCreate = true;
    }
    const chat = state.aiChats.find(c=>c.id===state.aiActiveChatId);
    const provider = getActiveAiProvider();
    let lastUserIdx = -1;
    if(chat) chat.messages.forEach((mm,i)=>{ if(mm.role==='user') lastUserIdx = i; });
    // Yêu cầu 6: chỉ tự cuộn xuống đáy nếu người dùng ĐANG ở gần đáy trước khi render lại (đúng
    // hành vi chat bình thường); nếu họ đã cuộn lên xem tin nhắn cũ (vd để bấm Sửa) thì GIỮ
    // NGUYÊN đúng vị trí đang xem, không tự ý kéo họ xuống dưới cùng nữa.
    const prevMsgBox = document.getElementById('ai-messages');
    const wasNearBottom = prevMsgBox ? (prevMsgBox.scrollHeight - prevMsgBox.scrollTop - prevMsgBox.clientHeight < 80) : true;
    const prevScrollTop = prevMsgBox ? prevMsgBox.scrollTop : 0;
    overlay.innerHTML = `
      <div class="ai-sidebar">
        <button class="ai-exit-btn" id="ai-exit-btn">✕ THOÁT</button>
        <button class="ai-newchat-btn" id="ai-newchat-btn">➕ Đoạn chat mới</button>
        <button class="ai-newchat-btn" id="ai-goto-notes-btn">🗒️ Mở Siêu ghi chú</button>
        <div class="ai-hist-label">Lịch sử đoạn chat</div>
        <div class="ai-hist-list">
          ${state.aiChats.length? state.aiChats.map(c=>`
            <div class="ai-hist-item ${c.id===state.aiActiveChatId?'active':''}" data-ai-hist="${c.id}">
              <span class="ai-hist-title">${escapeHtml(c.title||'Đoạn chat mới')}</span>
              <button class="ai-hist-del" data-ai-hist-rename="${c.id}" title="Đổi tên đoạn chat">✏️</button>
              <button class="ai-hist-del" data-ai-hist-del="${c.id}" title="Xoá đoạn chat">🗑️</button>
            </div>`).join('') : '<div class="sub" style="color:rgba(255,255,255,.6); padding:6px 10px;">Chưa có đoạn chat nào.</div>'}
        </div>
        ${!state.identity || !state.identity.email? '<div class="sub" style="color:rgba(255,255,255,.6); padding:8px 10px; font-size:11px;">Bạn đang dùng khách/tham quan — lịch sử chat chỉ lưu tạm trong phiên này.</div>' : ''}
      </div>
      <div class="ai-main">
        <div class="ai-header">🤖 Chàng Nông dân Thông minh</div>
        <div class="ai-messages" id="ai-messages">
          ${!chat || !chat.messages.length? `
            <div class="ai-bubble assistant">Chào bạn! Chàng là "Chàng Nông dân Thông minh" 🌾 — sẵn sàng hỗ trợ nghiệp vụ Hội Nông dân, hướng dẫn sử dụng phần mềm, phân tích số liệu hộ vay, hoặc trò chuyện bất cứ điều gì bạn cần. Bạn muốn hỏi gì nào?</div>`
            : chat.messages.map((m, idx)=>{
                if(m.streaming){
                  return `<div class="ai-bubble assistant ${m.text? '' : 'thinking'}" id="ai-streaming-bubble">${m.text? escapeHtml(m.text) : waveTextHtml('Chàng đang suy nghĩ…')}</div>`;
                }
                if(state._aiBubbleEditingIndex === idx){
                  return `<div class="ai-bubble-wrap ${m.role}">
                    <div class="ai-edit-box">
                      <textarea id="ai-edit-textarea-${idx}" rows="3">${escapeHtml(m.text)}</textarea>
                      <div class="ai-edit-box-actions">
                        <button class="btn btn-ghost btn-sm" data-edit-cancel="${idx}">Huỷ bỏ</button>
                        <button class="btn btn-primary btn-sm" data-edit-resend="${idx}">Gửi lại</button>
                      </div>
                    </div>
                  </div>`;
                }
                const attachHtml = m.attachments && m.attachments.length? `<div class="ai-bubble-attach">${m.attachments.map(a=>`📎 ${escapeHtml(a.name)}`).join('&nbsp;&nbsp;')}</div>` : '';
                const bodyHtml = m.role==='assistant' ? renderMarkdownLite(m.text) : escapeHtml(m.text);
                const isLastUserMsg = m.role==='user' && idx===lastUserIdx;
                return `<div class="ai-bubble-wrap ${m.role}">
                  <div class="ai-bubble ${m.role}">${bodyHtml}${attachHtml}</div>
                  <div class="ai-bubble-actions">
                    ${m.role==='user'? `<button class="ai-bubble-act" data-bubble-edit="${idx}" title="Sửa">✏️</button>` : ''}
                    ${isLastUserMsg? `<button class="ai-bubble-act" data-bubble-reload="${idx}" title="Tải lại — yêu cầu AI trả lời lại">🔄</button>` : ''}
                    <button class="ai-bubble-act" data-bubble-copy="${idx}" title="Sao chép">📋</button>
                    <div class="ai-bubble-addnote-wrap">
                      <button class="ai-bubble-act" data-bubble-addnote="${idx}" title="Thêm vào Siêu ghi chú">📌</button>
                      ${state._aiBubbleAddNoteMenuIndex===idx? `<div class="ai-bubble-addnote-menu">
                        <div class="ai-add-opt" data-addnote-space="shared" data-addnote-idx="${idx}">🏛️ Thêm vào Bộ ghi chú dùng chung</div>

                    </div>

        </div>

        <div class="ai-model-bar">
          <div class="ai-model-select" id="ai-model-select">
            <span>${provider? `🧠 ${escapeHtml(provider.label||provider.model)}` : '⚠️ Chưa cấu hình AI'}</span><span class="ai-model-caret">▾</span>
            ${state._aiModelMenuOpen? `<div class="ai-model-dropdown">
              ${state.aiProviders.length? state.aiProviders.map(p=>`
                <div class="ai-model-opt ${provider&&p.id===provider.id?'active':''}" data-ai-select-provider="${p.id}">
                  ${escapeHtml(p.label||p.model)}<span class="sub">${escapeHtml(p.model)}</span>
                </div>`).join('') : `<div class="ai-model-opt sub">Chưa có cấu hình AI nào — vào "CÀI ĐẶT ADMIN" để thêm.</div>`}
            </div>` : ''}
          </div>
          ${state.aiWebSearchOn? `<span class="ai-model-select" style="background:rgba(199,154,43,.18); margin-left:8px;">🌐 Đang bật Tìm kiếm web</span>` : ''}
        </div>

        ${state.aiPendingAttachments.length? `<div class="ai-attach-row">
          ${state.aiPendingAttachments.map((a,i)=>`<span class="ai-attach-chip">📎 ${escapeHtml(a.name)} <button data-ai-attach-remove="${i}">✕</button></span>`).join('')}
        </div>` : ''}

        <div class="ai-inputbar">
          <div class="ai-add-btn" id="ai-add-btn" role="button" tabindex="0">➕ THÊM THÀNH PHẦN
            ${state._aiAddMenuOpen? `<div class="ai-add-menu">
              <div class="ai-add-opt" data-ai-add="image">🖼️ Tải ảnh lên</div>
              <div class="ai-add-opt" data-ai-add="doc">📄 Tải tài liệu lên</div>
              <div class="ai-add-opt" data-ai-add="websearch">🌐 ${state.aiWebSearchOn? '✅ Đang bật — bấm để tắt' : 'Tìm kiếm web'}</div>
            </div>` : ''}
          </div>
          <textarea id="ai-input" rows="1" placeholder="Nhắn tin cho Chàng Nông dân Thông minh... (Enter để xuống dòng, Ctrl+Enter để gửi)"></textarea>
          <button class="ai-mic-btn ${state._aiMicListening?'listening':''}" id="ai-mic-btn" type="button" title="Nói để nhập liệu">🎤</button>
          <div class="ai-send-wrap">
            <span class="ai-send-tooltip">${state.aiSending? 'Chỉ bấm nút để dừng — Enter sẽ không có tác dụng' : 'Bấm Ctrl+Enter để gửi nhanh'}</span>
            ${state.aiSending? `<button id="ai-stop-btn" class="ai-stop-btn" title="Dừng câu trả lời">⏹</button>` : `<button id="ai-send-btn">➤</button>`}
          </div>
        </div>
      </div>`;
    const msgBox = document.getElementById('ai-messages');
    if(msgBox) msgBox.scrollTop = wasNearBottom ? msgBox.scrollHeight : prevScrollTop;
    wireMarkdownExtras(overlay);
    document.getElementById('ai-exit-btn').onclick = closeAiChat;
    document.getElementById('ai-newchat-btn').onclick = newAiChat;
    const gotoNotesBtn = document.getElementById('ai-goto-notes-btn');
    if(gotoNotesBtn) gotoNotesBtn.onclick = ()=>{ closeAiChat(); openSuperNotes(); };
    overlay.querySelectorAll('[data-ai-hist]').forEach(elx=>{
      elx.addEventListener('click', (e)=>{
        if(e.target.closest('[data-ai-hist-del]')) return;
        state.aiActiveChatId = elx.dataset.aiHist;
        renderAiChatOverlay();
      });
    });
    overlay.querySelectorAll('[data-ai-hist-del]').forEach(btn=>{
      btn.onclick = (e)=>{ e.stopPropagation(); deleteAiChatById(btn.dataset.aiHistDel); };
    });
    overlay.querySelectorAll('[data-ai-hist-rename]').forEach(btn=>{
      btn.onclick = (e)=>{ e.stopPropagation(); renameAiChat(btn.dataset.aiHistRename); };
    });

    // ---- Icon hành động trên bong bóng tin nhắn: Sửa / Tải lại / Copy / Thêm vào Siêu ghi chú / Xoá ----
    overlay.querySelectorAll('[data-bubble-edit]').forEach(btn=>{
      btn.onclick = ()=> startEditMessage(parseInt(btn.dataset.bubbleEdit,10));
    });
    overlay.querySelectorAll('[data-bubble-reload]').forEach(btn=>{
      btn.onclick = ()=> regenerateReply(parseInt(btn.dataset.bubbleReload,10));
    });
    overlay.querySelectorAll('[data-bubble-copy]').forEach(btn=>{
      btn.onclick = ()=>{
        const idx = parseInt(btn.dataset.bubbleCopy,10);
        const m = chat && chat.messages[idx];
        if(m) copyMessageText(m.text||'');
      };
    });
    overlay.querySelectorAll('[data-bubble-delete]').forEach(btn=>{
      btn.onclick = ()=> deleteMessageAt(parseInt(btn.dataset.bubbleDelete,10));
    });
    overlay.querySelectorAll('[data-bubble-addnote]').forEach(btn=>{
      btn.onclick = (e)=>{ e.stopPropagation(); toggleAddNoteMenu(parseInt(btn.dataset.bubbleAddnote,10)); };
    });
    overlay.querySelectorAll('[data-addnote-space]').forEach(elx=>{
      elx.addEventListener('click', (e)=>{
        e.stopPropagation();
        addMessageToNotes(parseInt(elx.dataset.addnoteIdx,10), elx.dataset.addnoteSpace);
      });
    });
    overlay.querySelectorAll('[data-edit-cancel]').forEach(btn=> btn.onclick = cancelEditMessage);
    overlay.querySelectorAll('[data-edit-resend]').forEach(btn=>{
      btn.onclick = ()=>{
        const idx = parseInt(btn.dataset.editResend,10);
        const ta = document.getElementById(`ai-edit-textarea-${idx}`);
        resendEditedMessage(idx, ta? ta.value : '');
      };
    });

    // ---- Thanh chọn model AI đang hoạt động ----
    const modelSelectEl = document.getElementById('ai-model-select');
    if(modelSelectEl) modelSelectEl.addEventListener('click', (e)=>{ e.stopPropagation(); toggleAiModelMenu(); });
    overlay.querySelectorAll('[data-ai-select-provider]').forEach(elx=>{
      elx.addEventListener('click', (e)=>{ e.stopPropagation(); selectAiProvider(elx.dataset.aiSelectProvider); });
    });

    // ---- Nút "THÊM THÀNH PHẦN" ----
    const addBtn = document.getElementById('ai-add-btn');
    if(addBtn){
      addBtn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleAiAddMenu(); });
      addBtn.addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); e.stopPropagation(); toggleAiAddMenu(); } });
    }
    overlay.querySelectorAll('[data-ai-add]').forEach(elx=>{
      elx.addEventListener('click', (e)=>{
        e.stopPropagation();
        const kind = elx.dataset.aiAdd;
        if(kind==='websearch') toggleAiWebSearch();
        else triggerAiFileInput(kind);
      });
    });
    overlay.querySelectorAll('[data-ai-attach-remove]').forEach(btn=>{
      btn.onclick = (e)=>{ e.stopPropagation(); removeAiAttachment(parseInt(btn.dataset.aiAttachRemove,10)); };
    });

    // ---- Micro ----
    const micBtn = document.getElementById('ai-mic-btn');
    if(micBtn) micBtn.onclick = toggleAiMic;

    // Bấm ra ngoài thì tự đóng các dropdown (chỉ gắn listener DUY NHẤT 1 lần lúc tạo overlay,
    // tránh chồng chất listener qua mỗi lần render lại).
    if(firstCreate){
      aiOutsideClickHandler = ()=>{
        if(state._aiModelMenuOpen || state._aiAddMenuOpen || state._aiBubbleAddNoteMenuIndex!=null){
          state._aiModelMenuOpen = false; state._aiAddMenuOpen = false; state._aiBubbleAddNoteMenuIndex = null;
          if(document.getElementById('ai-chat-overlay')) renderAiChatOverlay();
        }
      };
      document.addEventListener('click', aiOutsideClickHandler);
    }

    const sendBtn = document.getElementById('ai-send-btn');
    const stopBtn = document.getElementById('ai-stop-btn');
    if(stopBtn) stopBtn.onclick = ()=>{ if(state.aiAbortController) state.aiAbortController.abort(); };
    const inputEl = document.getElementById('ai-input');
    const doSend = ()=>{
      if(state.aiSending) return; // đang trả lời -> Enter không có tác dụng, chỉ nút Dừng mới dừng được
      const v = inputEl.value; inputEl.value='';
      sendAiMessage(v);
    };
    if(sendBtn) sendBtn.onclick = doSend;
    if(inputEl){
      inputEl.focus();
      // Yêu cầu 5: Enter thường = xuống dòng (mặc định của textarea, không preventDefault);
      // Ctrl+Enter (hoặc Cmd+Enter trên Mac) = gửi tin nhắn ngay.
      inputEl.addEventListener('keydown', (e)=>{
        if(e.key==='Enter' && (e.ctrlKey || e.metaKey)){ e.preventDefault(); doSend(); }
      });
    }
  }

  // =====================================================================
  // Không gian [Siêu ghi chú] — sidebar cây thư mục cá nhân + khung soạn thảo + khung nhập liệu
  // AI tiêu hoá, dựng theo đúng phong cách khung Chat AI (bồng bềnh, toàn màn hình).
  // =====================================================================
  function renderSuperNotesOverlay(){
    let overlay = document.getElementById('super-notes-overlay');
    let firstCreate = false;
    if(!overlay){
      overlay = document.createElement('div'); overlay.id = 'super-notes-overlay'; overlay.className = 'ai-overlay';
      document.body.appendChild(overlay);
      firstCreate = true;
    }
    const curId = state.superNotesCurrentFolder;
    const crumbs = snBreadcrumb(curId);
    const items = state.superNotesTrashOpen
      ? Object.values(state.superNotesTree||{}).filter(n=> n && n.deleted).sort((a,b)=>(b.deletedAt||'').localeCompare(a.deletedAt||''))
      : snChildrenOf(curId);
    const editingNode = state.superNotesEditingId ? state.superNotesTree[state.superNotesEditingId] : null;
    const provider = getActiveAiProvider();
    const isShared = state.superNotesSpace==='shared';
    const canEdit = isShared ? snCanEdit() : true;
    const canView = isShared ? snCanView() : true;

    overlay.innerHTML = `
      <div class="ai-sidebar" style="display:flex; flex-direction:column;">
        <button class="ai-exit-btn" id="sn-exit-btn">✕ THOÁT</button>
        <button class="ai-newchat-btn" id="sn-goto-chat-btn">💬 Chat với AI Chàng Nông dân Thông minh</button>
        <div style="display:flex; gap:6px; margin-bottom:10px;">
          <button class="ai-newchat-btn" id="sn-space-shared" style="flex:1; margin-bottom:0; ${isShared?'background:rgba(255,255,255,.28); font-weight:800;':''}">🏛️ Bộ chung Xã/Phường</button>
          <button class="ai-newchat-btn" id="sn-space-personal" style="flex:1; margin-bottom:0; ${!isShared?'background:rgba(255,255,255,.28); font-weight:800;':''}">🔒 Bộ cá nhân</button>
        </div>
        ${isShared && isOwner()? `<button class="ai-newchat-btn" id="sn-shared-settings-btn">⚙️ Cài đặt & Chia sẻ</button>` : ''}
        ${isShared && !isOwner()? `<div class="sub" style="color:rgba(255,255,255,.65); padding:0 8px 8px; font-size:11px;">Quyền của bạn ở đây: <b style="color:#fff;">${canEdit?'Toàn quyền sửa':(canView?'Chỉ xem':'Không được xem')}</b></div>` : ''}
        ${!isShared && usingLocalNotes()? `<div class="sub" style="color:rgba(255,255,255,.65); padding:0 8px 8px; font-size:11px;">💡 Bạn chưa đăng nhập bằng tài khoản Google nên ghi chú cá nhân của bạn sẽ được lưu tạm tại trình duyệt/máy tính này.</div>` : ''}
        <div class="ai-hist-label">${isShared? 'Bộ ghi chú dùng chung' : 'Siêu ghi chú của tôi'}</div>
        ${!state.superNotesTrashOpen? `
        <div class="sn-crumbs">
          <span data-sn-goto="">🏠 Gốc</span>${crumbs.map(c=>` / <span data-sn-goto="${c.id}">${escapeHtml(c.name)}</span>`).join('')}
        </div>
        ${canEdit? `
        <div class="toolbar" style="padding:0 10px 8px; flex-wrap:wrap; gap:6px;">
          <button class="btn btn-ghost btn-sm" id="sn-new-folder" style="color:#fff; border-color:rgba(255,255,255,.3);">📁 Thư mục</button>
          <button class="btn btn-ghost btn-sm" id="sn-new-text" style="color:#fff; border-color:rgba(255,255,255,.3);">📝 Ghi chú</button>
        </div>` : ''}` : `
        <div class="toolbar" style="padding:0 10px 8px;">
          <button class="btn btn-ghost btn-sm" id="sn-close-trash" style="color:#fff; border-color:rgba(255,255,255,.3);">◀ Quay lại</button>
        </div>`}
        <div class="ai-hist-list">
          ${!canView? `<div class="sub" style="color:rgba(255,255,255,.6); padding:8px 10px;">Bạn không có quyền xem Bộ ghi chú dùng chung này. Vui lòng liên hệ Chủ mã.</div>` :
            items.length? items.map(n=>`
            <div class="sn-tree-row ${n.id===state.superNotesEditingId?'active':''}" data-sn-item="${n.id}">
              <span>${n.type==='folder'?'📁':'📝'}</span>
              <span class="sn-tree-name">${escapeHtml(n.name)}</span>
              <span class="sn-tree-actions">
                ${state.superNotesTrashOpen? (canEdit? `
                  <button data-sn-restore="${n.id}" title="Khôi phục">♻️</button>
                  <button data-sn-purge="${n.id}" title="Xoá vĩnh viễn">🗑️</button>
                ` : '') : (canEdit? `
                  <button data-sn-rename="${n.id}" title="Đổi tên">✏️</button>
                  <button data-sn-delete="${n.id}" title="Xoá vào thùng rác">🗑️</button>
                ` : '')}

        </div>
        <button class="ai-newchat-btn" id="sn-trash-btn" style="margin:8px 10px 0; margin-top:auto;">${state.superNotesTrashOpen? '◀ Quay lại kho ghi chú' : '🗑️ Thùng rác'}</button>
      </div>
      <div class="ai-main">
        <div class="ai-header">🗒️ Siêu ghi chú${editingNode? ' — ' + escapeHtml(editingNode.name) : ''}</div>
        ${state.previewMode? `<div class="admin-view-banner" style="background:#7a5b00; color:#fff3cd;">⚠️ Bạn đang ở trạng thái tham quan, vui lòng đăng nhập hoặc tham gia bằng mã định danh để sử dụng tính năng này.</div>` : ''}
        <div class="ai-messages" id="sn-content-area" style="align-items:stretch;">
          ${!canView? `<div class="ai-bubble assistant">Bạn không có quyền xem Bộ ghi chú dùng chung của mã xã này. Vui lòng liên hệ Chủ mã để được cấp quyền.</div>` :
            editingNode? `
            <div style="display:flex; flex-direction:column; gap:10px; height:100%;">
              <div style="display:flex; gap:8px; align-items:center;">
                <input id="sn-editor-name" value="${escapeHtml(editingNode.name)}" style="flex:1; font-weight:700;" ${canEdit?'':'disabled'}>
                ${canEdit? `<button class="btn btn-primary btn-sm" id="sn-editor-save">💾 Lưu</button>` : ''}
              </div>
              ${editingNode.storageUrl? `<p class="sub" style="margin:0;"><a href="${editingNode.storageUrl}" target="_blank" rel="noopener">📎 Xem/tải tệp gốc</a></p>` : ''}
              <textarea id="sn-editor-content" style="flex:1; min-height:340px; width:100%; font-family:inherit; font-size:13.5px; padding:12px; border:1px solid var(--line); border-radius:10px; resize:vertical;" ${canEdit?'':'disabled'}>${escapeHtml(editingNode.content||'')}</textarea>
            </div>` : `
            <div class="ai-bubble assistant">${isShared? `Đây là <b>Bộ ghi chú dùng chung</b> của mã xã <b class="mono">${escapeHtml(wardId()||'')}</b> 🏛️ — mọi người cùng mã định danh đều xem được (tuỳ quyền Chủ mã cấp).` : `Chào bạn! Đây là <b>Siêu ghi chú cá nhân</b> của riêng bạn 📓 — nơi lưu mọi tri thức cá nhân để "Chàng Nông dân Thông minh" hiểu bạn hơn khi trò chuyện.`}<br><br>
            Bạn có thể: bấm vào 1 ghi chú bên trái để xem${canEdit?'/sửa':''}, ${canEdit? 'hoặc gõ chữ / nói / tải ảnh-PDF / tải cả thư mục vào khung bên dưới — AI sẽ tự đọc, biên tập sạch sẽ và tạo ra ghi chú mới giúp bạn.' : '(bạn chỉ có quyền xem ở đây).'}</div>`}
          ${state.superNotesJustCompletedMsg? `<div class="kn-done-banner">✅ ${escapeHtml(state.superNotesJustCompletedMsg)}</div>` : ''}
          ${state.superNotesReviewMode? `
            <div class="ai-bubble assistant">Tôi đã xem tài liệu và ghi chú của bạn, bây giờ bạn hãy tiếp tục bổ sung thêm những thành phần tiếp theo ở khung chat bên dưới để hoàn thiện tệp ghi chú này. Nếu bạn không muốn bổ sung gì nữa, hãy chọn các phương án dưới đây:
              <div style="display:flex; flex-direction:column; gap:8px; margin-top:12px;">
                <button class="btn btn-primary btn-sm" id="sn-review-digest">✅ Hãy tiêu hoá tài liệu bằng AI và tạo ghi chú thành công</button>
                <button class="btn btn-ghost btn-sm" id="sn-review-skip">⏭️ Bỏ qua bước tiêu hoá tài liệu bằng AI và tạo ghi chú thành công luôn!</button>
              </div>
            </div>` : ''}
          ${state.superNotesStoppedConfirm? `
            <div class="ai-bubble assistant">Bạn đã bắt AI dừng tiêu hoá ghi chú và tài liệu của bạn, bạn có muốn đưa thẳng mọi thứ vào bộ ghi chú mà không cần tiêu hoá không?
              <div style="display:flex; gap:8px; margin-top:12px;">
                <button class="btn btn-primary btn-sm" id="sn-stopped-yes">Có</button>
                <button class="btn btn-ghost btn-sm" id="sn-stopped-no">Không</button>
              </div>
            </div>` : ''}
          ${state.superNotesProcessing? `
            <div class="ai-bubble assistant thinking" style="display:flex; align-items:center; gap:12px; justify-content:space-between;">
              <span>⏳ ${waveTextHtml(state.superNotesProcessingMsg||'Đang xử lý')}</span>
              <button class="btn btn-ghost btn-sm" id="sn-stop-btn" style="flex-shrink:0; white-space:nowrap;">⏹ Dừng lại</button>
            </div>` : ''}
        </div>

        ${canView && canEdit? `
        <div class="ai-model-bar">
          <div class="ai-model-select" id="sn-model-select">
            <span>${provider? `🧠 ${escapeHtml(provider.label||provider.model)}` : '⚠️ Chưa cấu hình AI'}</span><span class="ai-model-caret">▾</span>
            ${state._aiModelMenuOpen? `<div class="ai-model-dropdown">
              ${state.aiProviders.length? state.aiProviders.map(p=>`
                <div class="ai-model-opt ${provider&&p.id===provider.id?'active':''}" data-sn-select-provider="${p.id}">
                  ${escapeHtml(p.label||p.model)}<span class="sub">${escapeHtml(p.model)}</span>
                </div>`).join('') : `<div class="ai-model-opt sub">Chưa có cấu hình AI nào — vào "CÀI ĐẶT ADMIN" để thêm.</div>`}
            </div>` : ''}
          </div>
          <span class="ai-model-select" style="margin-left:8px; background:rgba(199,154,43,.1); cursor:default;">💡 Ưu tiên dùng Gemini để đọc ảnh/PDF chính xác nhất</span>
        </div>

        ${state.superNotesPendingFiles.length? `<div class="ai-attach-row">
          ${state.superNotesPendingFiles.map((f,i)=>`<span class="ai-attach-chip">📎 ${escapeHtml(f.name)} <button data-sn-pending-remove="${i}" ${state.superNotesProcessing?'disabled':''}>✕</button></span>`).join('')}
        </div>` : ''}

        <div class="ai-inputbar">
          <div class="ai-add-btn" id="sn-add-btn" role="button" tabindex="0">➕ Tải tài liệu lên
            ${state._aiAddMenuOpen? `<div class="ai-add-menu">
              <div class="ai-add-opt" data-sn-add="file">📄 Tải tài liệu lên (ảnh/PDF/Word/Excel...)</div>
              <div class="ai-add-opt" data-sn-add="folder">🗂️ Thêm thư mục (nhiều tệp cùng lúc)</div>
            </div>` : ''}
          </div>
          <textarea id="sn-input" rows="1" placeholder="Gõ nội dung, hoặc tải ảnh/PDF/tài liệu để AI tự tạo ghi chú... (Enter xuống dòng, Ctrl+Enter gửi)" ${state.superNotesProcessing?'disabled':''}></textarea>
          <button class="ai-mic-btn ${state._aiMicListening?'listening':''}" id="sn-mic-btn" type="button" title="Nói để nhập liệu" ${state.superNotesProcessing?'disabled':''}>🎤</button>
          <div class="ai-send-wrap">
            <span class="ai-send-tooltip">Bấm Ctrl+Enter để gửi nhanh</span>
            <button id="sn-send-btn" ${state.superNotesProcessing?'disabled':''}>➤</button>
          </div>
        </div>` : ''}
      </div>`;

    const contentArea = document.getElementById('sn-content-area');
    if(contentArea) contentArea.scrollTop = contentArea.scrollHeight;

    document.getElementById('sn-exit-btn').onclick = closeSuperNotes;
    document.getElementById('sn-goto-chat-btn').onclick = ()=>{ closeSuperNotes(); openAiChat(); };
    document.getElementById('sn-space-shared').onclick = ()=> switchNotesSpace('shared');
    document.getElementById('sn-space-personal').onclick = ()=> switchNotesSpace('personal');
    const sharedSettingsBtn = document.getElementById('sn-shared-settings-btn');
    if(sharedSettingsBtn) sharedSettingsBtn.onclick = renderSharedNotesSettingsPopup;

    // ---- điều hướng cây thư mục ----
    overlay.querySelectorAll('[data-sn-goto]').forEach(elx=> elx.onclick = ()=>{ state.superNotesCurrentFolder = elx.dataset.snGoto || null; state.superNotesEditingId = null; renderSuperNotesOverlay(); });
    overlay.querySelectorAll('[data-sn-item]').forEach(elx=>{
      elx.addEventListener('click', (e)=>{
        if(e.target.closest('[data-sn-rename],[data-sn-delete],[data-sn-restore],[data-sn-purge]')) return;
        const node = state.superNotesTree[elx.dataset.snItem];
        if(!node) return;
        if(node.type==='folder' && !state.superNotesTrashOpen){ state.superNotesCurrentFolder = node.id; state.superNotesEditingId = null; renderSuperNotesOverlay(); }
        else if(node.type==='file' && !state.superNotesTrashOpen){ state.superNotesEditingId = node.id; renderSuperNotesOverlay(); }
      });
    });

    // ---- tạo mới / thùng rác ----
    const newFolderBtn = document.getElementById('sn-new-folder');
    if(newFolderBtn) newFolderBtn.onclick = async ()=>{ const name = prompt('Tên thư mục mới:'); if(name && name.trim()) await snCreateFolder(name, curId); };
    const newTextBtn = document.getElementById('sn-new-text');
    if(newTextBtn) newTextBtn.onclick = async ()=>{
      const name = prompt('Tên ghi chú mới:', 'Ghi chú mới');
      if(name===null) return;
      const id = await snCreateTextFile(name, curId, '');
      if(id){ state.superNotesEditingId = id; renderSuperNotesOverlay(); }
    };
    const trashBtn = document.getElementById('sn-trash-btn');
    if(trashBtn) trashBtn.onclick = ()=>{ state.superNotesTrashOpen = !state.superNotesTrashOpen; state.superNotesEditingId = null; renderSuperNotesOverlay(); };
    const closeTrashBtn = document.getElementById('sn-close-trash');
    if(closeTrashBtn) closeTrashBtn.onclick = ()=>{ state.superNotesTrashOpen = false; renderSuperNotesOverlay(); };
    overlay.querySelectorAll('[data-sn-rename]').forEach(btn=> btn.onclick = async (e)=>{
      e.stopPropagation();
      const node = state.superNotesTree[btn.dataset.snRename];
      const name = prompt('Đổi tên thành:', node? node.name : '');
      if(name && name.trim()) await snRenameNode(btn.dataset.snRename, name);
    });
    overlay.querySelectorAll('[data-sn-delete]').forEach(btn=> btn.onclick = (e)=>{ e.stopPropagation(); snSoftDeleteNode(btn.dataset.snDelete); });
    overlay.querySelectorAll('[data-sn-restore]').forEach(btn=> btn.onclick = (e)=>{ e.stopPropagation(); snRestoreNode(btn.dataset.snRestore); });
    overlay.querySelectorAll('[data-sn-purge]').forEach(btn=> btn.onclick = (e)=>{ e.stopPropagation(); snPurgeNode(btn.dataset.snPurge); });

    // ---- lưu file đang mở ----
    const editorSaveBtn = document.getElementById('sn-editor-save');
    if(editorSaveBtn) editorSaveBtn.onclick = async ()=>{
      const newName = document.getElementById('sn-editor-name').value;
      const newContent = document.getElementById('sn-editor-content').value;
      if(newName && newName.trim() && newName.trim()!==editingNode.name) await snRenameNode(editingNode.id, newName);
      await snSaveTextFile(editingNode.id, newContent);
    };

    // ---- thanh chọn model AI (dùng chung logic với Chat AI) ----
    const modelSelectEl = document.getElementById('sn-model-select');
    if(modelSelectEl) modelSelectEl.addEventListener('click', (e)=>{ e.stopPropagation(); toggleAiModelMenu(); });
    overlay.querySelectorAll('[data-sn-select-provider]').forEach(elx=>{
      elx.addEventListener('click', (e)=>{ e.stopPropagation(); selectAiProvider(elx.dataset.snSelectProvider); renderSuperNotesOverlay(); });
    });

    // ---- nút "Tải tài liệu lên" (đổi tên từ "THÊM THÀNH PHẦN") — chỉ THÊM vào danh sách chờ,
    // KHÔNG xử lý ngay, để người dùng xem lại/gỡ bớt trước khi tự bấm Gửi ----
    const addBtn = document.getElementById('sn-add-btn');
    if(addBtn) addBtn.addEventListener('click', (e)=>{ e.stopPropagation(); state._aiAddMenuOpen = !state._aiAddMenuOpen; renderSuperNotesOverlay(); });
    overlay.querySelectorAll('[data-sn-add]').forEach(elx=>{
      elx.addEventListener('click', (e)=>{
        e.stopPropagation();
        state._aiAddMenuOpen = false;
        const input = document.createElement('input');
        input.type = 'file'; input.multiple = true;
        if(elx.dataset.snAdd==='folder') input.webkitdirectory = true;
        input.onchange = ()=>{
          state.superNotesPendingFiles = state.superNotesPendingFiles.concat(Array.from(input.files||[]));
          renderSuperNotesOverlay();
        };
        input.click();
      });
    });
    overlay.querySelectorAll('[data-sn-pending-remove]').forEach(btn=>{
      btn.onclick = ()=>{
        state.superNotesPendingFiles.splice(parseInt(btn.dataset.snPendingRemove,10), 1);
        renderSuperNotesOverlay();
      };
    });

    // ---- micro ----
    const micBtn = document.getElementById('sn-mic-btn');
    if(micBtn) micBtn.onclick = toggleNotesMic;

    // ---- Dừng lại giữa chừng khi AI đang tiêu hoá — huỷ request đang chạy, GIỮ NGUYÊN nội dung/tệp ----
    const stopBtn = document.getElementById('sn-stop-btn');
    if(stopBtn) stopBtn.onclick = ()=>{ if(state.superNotesAbortController) state.superNotesAbortController.abort(); };

    // ---- Xác nhận trước khi tiêu hoá (2 nút) ----
    const reviewDigestBtn = document.getElementById('sn-review-digest');
    if(reviewDigestBtn) reviewDigestBtn.onclick = ()=> finalizeSuperNoteReview(true);
    const reviewSkipBtn = document.getElementById('sn-review-skip');
    if(reviewSkipBtn) reviewSkipBtn.onclick = ()=> finalizeSuperNoteReview(false);

    // ---- Xác nhận sau khi bấm Dừng (Có/Không đưa thẳng vào ghi chú) ----
    const stoppedYesBtn = document.getElementById('sn-stopped-yes');
    if(stoppedYesBtn) stoppedYesBtn.onclick = ()=> resolveSuperNoteStoppedConfirm(true);
    const stoppedNoBtn = document.getElementById('sn-stopped-no');
    if(stoppedNoBtn) stoppedNoBtn.onclick = ()=> resolveSuperNoteStoppedConfirm(false);

    // Bấm ra ngoài thì đóng dropdown "THÊM/model" (gắn 1 lần duy nhất lúc tạo overlay)
    if(firstCreate){
      snOutsideClickHandler = ()=>{
        if(state._aiModelMenuOpen || state._aiAddMenuOpen){
          state._aiModelMenuOpen = false; state._aiAddMenuOpen = false;
          if(document.getElementById('super-notes-overlay')) renderSuperNotesOverlay();
        }
      };
      document.addEventListener('click', snOutsideClickHandler);
    }

    // ---- gửi nội dung gõ tay + tệp đang chờ -> ĐƯA VÀO BƯỚC XÁC NHẬN trước khi tiêu hoá ----
    const sendBtn = document.getElementById('sn-send-btn');
    const inputEl = document.getElementById('sn-input');
    const doSend = ()=>{
      const v = inputEl.value;
      if(!v.trim() && !state.superNotesPendingFiles.length) return;
      queueSuperNoteForReview(v, state.superNotesPendingFiles.slice());
      inputEl.value = '';
      state.superNotesPendingFiles = [];
      renderSuperNotesOverlay();
    };
    if(sendBtn) sendBtn.onclick = doSend;
    if(inputEl){
      inputEl.addEventListener('keydown', (e)=>{
        if(e.key==='Enter' && (e.ctrlKey || e.metaKey)){ e.preventDefault(); doSend(); }
      });
    }
  }

  // Popup [Cài đặt & Chia sẻ] cho Bộ ghi chú dùng chung — chỉ Chủ mã (isOwner()) mới thấy nút mở.
  function renderSharedNotesSettingsPopup(){
    const cfg = state.sharedNotesConfig || {defaultPerm:'view', grants:{}};
    const wrap = document.createElement('div');
    wrap.className = 'modal-bg';
    wrap.innerHTML = `
      <div class="modal" style="max-width:520px;">
        <div class="modal-body">
          <h3 style="margin-top:0;">⚙️ Cài đặt & Chia sẻ — Bộ ghi chú dùng chung</h3>
          <p class="sub" style="margin-top:0;">Áp dụng mặc định cho mọi người đang có chung mã định danh <b class="mono">${escapeHtml(wardId()||'')}</b> (kể cả Khách qua mã không đăng nhập):</p>
          <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:16px;">
            <label><input type="radio" name="sns-default" value="none" ${cfg.defaultPerm==='none'?'checked':''}> Không cho phép xem</label>
            <label><input type="radio" name="sns-default" value="view" ${(cfg.defaultPerm==='view'||!cfg.defaultPerm)?'checked':''}> Cho phép xem (chỉ đọc)</label>
            <label><input type="radio" name="sns-default" value="edit" ${cfg.defaultPerm==='edit'?'checked':''}> Cho phép sửa (toàn quyền thêm/sửa/xoá)</label>
          </div>
          <div class="divider-lbl">Phân quyền riêng cho từng người (theo email Google)</div>
          <div class="toolbar">
            <input id="sns-email" placeholder="email@gmail.com" style="min-width:200px;">
            <select id="sns-perm">
              <option value="none">Không cho xem</option>
              <option value="view">Chỉ xem</option>
              <option value="edit" selected>Toàn quyền sửa</option>
            </select>
            <button class="btn btn-primary btn-sm" id="sns-add-grant">Thêm</button>
          </div>
          <div id="sns-grants-list" style="margin:10px 0;">
            ${Object.values(cfg.grants||{}).length? Object.values(cfg.grants||{}).map(g=>`
              <div class="kv-row"><span>${escapeHtml(g.email)} — ${g.perm==='edit'?'Toàn quyền sửa':g.perm==='view'?'Chỉ xem':'Không cho xem'}</span><button class="btn btn-ghost btn-sm" data-sns-remove="${emailToKey(g.email)}">Gỡ</button></div>`).join('') : '<div class="sub">Chưa có phân quyền riêng nào.</div>'}
          </div>
          <div style="display:flex; gap:10px; margin-top:14px;">
            <button class="btn btn-ghost" id="sns-close" style="flex:1;">Đóng</button>
            <button class="btn btn-primary" id="sns-save" style="flex:1;">💾 Lưu</button>
          </div>
        </div>
      </div>`;
    document.body.appendChild(wrap);
    let localGrants = { ...(cfg.grants||{}) };
    function refreshGrantsList(){
      const listEl = wrap.querySelector('#sns-grants-list');
      const arr = Object.values(localGrants);
      listEl.innerHTML = arr.length? arr.map(g=>`
        <div class="kv-row"><span>${escapeHtml(g.email)} — ${g.perm==='edit'?'Toàn quyền sửa':g.perm==='view'?'Chỉ xem':'Không cho xem'}</span><button class="btn btn-ghost btn-sm" data-sns-remove="${emailToKey(g.email)}">Gỡ</button></div>`).join('') : '<div class="sub">Chưa có phân quyền riêng nào.</div>';
      listEl.querySelectorAll('[data-sns-remove]').forEach(btn=> btn.onclick = ()=>{ delete localGrants[btn.dataset.snsRemove]; refreshGrantsList(); });
    }
    refreshGrantsList();
    wrap.querySelector('#sns-close').onclick = ()=> wrap.remove();
    wrap.querySelector('#sns-add-grant').onclick = ()=>{
      const email = wrap.querySelector('#sns-email').value.trim().toLowerCase();
      const perm = wrap.querySelector('#sns-perm').value;
      if(!email || !email.includes('@')){ alert('Vui lòng nhập đúng email.'); return; }
      localGrants[emailToKey(email)] = { email, perm };
      wrap.querySelector('#sns-email').value = '';
      refreshGrantsList();
    };
    wrap.querySelector('#sns-save').onclick = async ()=>{
      const defaultPerm = wrap.querySelector('input[name="sns-default"]:checked').value;
      await saveSharedNotesConfig({ defaultPerm, grants: localGrants });
      alert('Đã lưu cấu hình chia sẻ Bộ ghi chú dùng chung.');
      wrap.remove();
      renderSuperNotesOverlay();
    };
  }

  function renderLogin(){
    root.innerHTML = `
      <div class="center-screen">
        <div class="auth-card">
          <div class="rice-badge">🌾</div>
          <h1>Sổ tay Công tác<br>Hội Nông dân cấp xã/phường</h1>
          <p class="sub">Đăng nhập để quản lý công tác hội, thực lực hội, hội viên, quỹ hỗ trợ nông dân, thu chi nội bộ, vốn vay, lãi suất và báo cáo địa phương</p>
          <button class="btn btn-gold btn-block" id="li-btn">🔒 Đăng nhập bằng Google</button>
          <button class="btn btn-ghost btn-block" id="li-preview" style="margin-top:8px;">👀 Tham quan mà không cần đăng nhập</button>

          <div class="divider-lbl">Hoặc tham gia bằng mã định danh có sẵn</div>
          <div class="field" style="text-align:left;"><label>Mã định danh</label><input id="li-wardid" placeholder="vd: xabinhminh" style="text-transform:lowercase;"></div>
          <div class="field" style="text-align:left;"><label>Mật khẩu</label><input id="li-pass" type="password" placeholder="Để trống nếu không có"></div>
          <button class="btn btn-primary btn-block" id="li-joincode">Tham gia bằng mã này</button>
        </div>
      </div>`;
    document.getElementById('li-btn').onclick = async ()=>{
      const btn = document.getElementById('li-btn');
      btn.disabled = true; btn.textContent = 'Đang mở cửa sổ đăng nhập Google…';
      try{
        await auth.signInWithPopup(googleProvider);
        // Kết quả đăng nhập sẽ được xử lý tự động trong auth.onAuthStateChanged (boot()).
      }catch(e){
        console.error('Đăng nhập Google lỗi:', e);
        if(!(e && e.code==='auth/popup-closed-by-user')){
          alert('Đăng nhập Google thất bại. Vui lòng kiểm tra kết nối mạng, hoặc liên hệ quản trị viên để bật "Google" trong Firebase Console > Authentication > Sign-in method.');
        }
        btn.disabled = false; btn.textContent = '🔒 Đăng nhập bằng Google';

    document.getElementById('wc-mode-new').onclick = ()=>{

      document.getElementById('wc-new-confirm').onclick = async ()=>{
        if(!saveNameTitle()) return;
        await createWardStrict(document.getElementById('wc-new-id').value, document.getElementById('wc-new-pass').value);

    document.getElementById('wc-mode-join').onclick = ()=>{
      const area = document.getElementById('wc-subarea');

        <div class="divider-lbl">Tham gia bằng mã định danh đã có</div>

      area.scrollIntoView({behavior:'smooth', block:'start'});

  // "Ví mã xã" — màn hình toàn trang, hiện khi chưa chọn mã xã nào để làm việc
  // (sau khi đăng xuất mã xã, hoặc mã đang xem bị Chủ mã xoá/đổi mật khẩu).
  function renderWallet(){
    root.innerHTML = `
      <div class="center-screen" style="align-items:flex-start; padding:40px 16px;">
        <div class="auth-card" style="max-width:640px; text-align:left;">

  // Màn hình chờ duyệt — hiện khi tài khoản là KHÁCH của mã xã đang chọn nhưng Chủ mã

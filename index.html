<script>
(function(){
  const root = document.getElementById('root');
  const money = n => (Math.round((n||0)) ).toLocaleString('vi-VN') + ' đ';
  const fmtDate = d => { if(!d) return '—'; const x=new Date(d); return x.toLocaleDateString('vi-VN'); };
  const todayStr = () => new Date().toISOString().slice(0,10);
  const uid = () => Math.random().toString(36).slice(2,10);
  const daysBetween = (a,b) => Math.round((new Date(b)-new Date(a))/86400000);

  // =====================================================================
  // ---------- LỚP LƯU TRỮ ĐÁM MÂY (Firebase Realtime Database) ----------
  // Toàn bộ dữ liệu NGHIỆP VỤ CHUNG của một Xã (config, borrowers, expenses,
  // trash, activityLog, collaborators) được lưu dưới nhánh:
  //     data/{wardId}/...
  // Nhờ vậy nhiều Xã có thể dùng chung 1 đường link web mà dữ liệu tách biệt
  // hoàn toàn (mỗi Xã có một "Mã định danh cấp Xã" — wardId — riêng).
  // =====================================================================
  function wardId(){ return state.identity && state.identity.wardId; }
  function wref(sub){ return rtdb.ref(`data/${wardId()}/${sub}`); }

  function snapToArray(val){ return val ? Object.values(val) : []; }
  function byId(list){ const o={}; (list||[]).forEach(x=>{ if(x && x.id) o[x.id]=x; }); return o; }

  // Đọc 1 lần (dùng khi cần kiểm tra dữ liệu trước khi quyết định vào app/onboarding)
  async function cGetOnce(sub, fallback){
    try{ const snap = await wref(sub).get(); return snap.exists() ? snap.val() : fallback; }
    catch(e){ console.error('Firebase đọc lỗi:', sub, e); return fallback; }
  }
  // Ghi đè toàn bộ nhánh (dùng cho config, hoặc khôi phục sao lưu)
  async function cSet(sub, value){
    try{ await wref(sub).set(value); }catch(e){ console.error('Firebase set lỗi:', sub, e); alert('Không thể lưu dữ liệu lên máy chủ. Vui lòng kiểm tra kết nối mạng / cấu hình Firebase.'); }
  }
  // Cập nhật một phần của nhánh (merge, không ghi đè các trường khác)
  async function cUpdate(sub, partial){
    try{ await wref(sub).update(partial); }catch(e){ console.error('Firebase update lỗi:', sub, e); }
  }
  // Ghi/thêm 1 bản ghi trong 1 tập hợp (borrowers/{id}, expenses/{id}, trash/{id}...)
  async function cSetRecord(sub, id, record){
    try{ await wref(sub).child(id).set(record); }catch(e){ console.error('Firebase set record lỗi:', sub, id, e); }
  }
  // Xoá 1 bản ghi khỏi 1 tập hợp
  async function cRemoveRecord(sub, id){
    try{ await wref(sub).child(id).remove(); }catch(e){ console.error('Firebase remove lỗi:', sub, id, e); }
  }
  // Thêm bản ghi mới với key tự sinh bởi Firebase (dùng cho Nhật ký hoạt động)
  async function cPush(sub, value){
    try{ const ref = wref(sub).push(); await ref.set(value); return ref.key; }
    catch(e){ console.error('Firebase push lỗi:', sub, e); }
  }

  // ---------- LẮNG NGHE REALTIME (onValue) ----------
  // Thay cho polling — mọi thay đổi từ bất kỳ thiết bị nào (Xã/Ấp) sẽ đẩy
  // xuống ngay lập tức cho tất cả các thiết bị khác đang mở ứng dụng.
  let realtimeUnsubs = [];
  function attachRealtime(){
    detachRealtime();
    const bind = (sub, applyFn) => {
      const ref = wref(sub);
      const cb = snap => { applyFn(snap.val()); render(); };
      ref.on('value', cb);
      realtimeUnsubs.push(()=>ref.off('value', cb));
    };
    bind('config', v => { state.config = v; });
    bind('borrowers', v => { state.borrowers = snapToArray(v); });
    bind('expenses', v => { state.expenses = snapToArray(v); });
    bind('trash', v => { state.trash = snapToArray(v); });
    bind('collaborators', v => { state.collaborators = v || {}; });
    // Nhật ký: chỉ lấy 500 dòng gần nhất, sắp xếp mới nhất lên đầu
    const logRef = wref('activityLog').limitToLast(500);
    const logCb = snap => { state.log = snapToArray(snap.val()).sort((a,b)=> new Date(b.time)-new Date(a.time)); render(); };
    logRef.on('value', logCb);
    realtimeUnsubs.push(()=>logRef.off('value', logCb));
  }
  function detachRealtime(){ realtimeUnsubs.forEach(off=>off()); realtimeUnsubs = []; }

  // =====================================================================
  // ---------- LỚP LƯU TRỮ NỘI BỘ (chỉ trên máy — KHÔNG lên đám mây) -----
  // Dùng riêng cho module "Thu – Chi nội bộ" và cho "identity" (thông tin
  // đăng nhập của riêng thiết bị này). Dùng localStorage thật của trình
  // duyệt — không bao giờ gửi lên Firebase hay bất kỳ máy chủ nào.
  // =====================================================================
  function lget(key, fallback){
    try{ const v = localStorage.getItem(key); return v!==null ? JSON.parse(v) : fallback; }
    catch(e){ return fallback; }
  }
  function lset(key, value){
    try{
      if(value===null || value===undefined) localStorage.removeItem(key);
      else localStorage.setItem(key, JSON.stringify(value));
    }catch(e){ console.error('localStorage set lỗi', e); }
  }
  // Namespace theo wardId để nhiều Xã dùng chung 1 máy/trình duyệt không đụng dữ liệu của nhau
  function localKey(name){ return `hnd_local_${wardId()||'chung'}_${name}`; }

  // ---------- export / print / backup helpers ----------
  function downloadBlob(filename, content, mime){
    const blob = new Blob([content], {type: mime});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
  }

  function myRole(){
    if(!state.identity || !state.config) return null;
    if(state.identity.email === state.config.ownerEmail) return 'owner';
    const c = state.collaborators[emailToKey(state.identity.email)];

  async function pushLog(action, target){
    const entry = { id:uid(), time:new Date().toISOString(), user: state.identity.email, userName: state.identity.name, action, target };
    // Dùng push() để Firebase tự sinh key — mọi thiết bị đang mở sẽ nhận
    // ngay bản ghi mới qua listener onValue (không cần ghi đè cả mảng).
    await cPush('activityLog', entry);
  }

  const IDENTITY_KEY = 'hnd_identity'; // chỉ lưu trên máy này (localStorage), không đưa lên đám mây
  // Mỗi tài khoản Google (email) được gắn nhớ 1 "Mã định danh cấp Xã" trên máy này,
  // để lần đăng nhập sau không phải nhập lại. Đây chỉ là cache cục bộ cho tiện thao
  // tác — phân quyền thật (Owner/Editor/Viewer) luôn được kiểm tra lại theo email
  // thật của Google so với cấu hình (config.ownerEmail / collaborators) trên Firebase.
  function wardIdMapKey(email){ return `hnd_wardid_for_${emailToKey(email)}`; }

  async function boot(){
    state.view = 'boot'; render();
    // Lắng nghe trạng thái đăng nhập Google thật qua Firebase Auth.
    // Không còn cho phép gõ tay tên/email — email lấy trực tiếp từ tài khoản
    // Google đã xác thực, dùng để đối chiếu phân quyền Owner/Editor/Viewer.
    auth.onAuthStateChanged(async (user) => {
      if(!user){
        detachRealtime();
        state.identity = null; lset(IDENTITY_KEY, null);
        state.config = null; state.borrowers=[]; state.expenses=[]; state.trash=[]; state.log=[]; state.collaborators={};
        state.view = 'login';
        render();
        return;
      }
      const email = (user.email||'').toLowerCase().trim();
      if(!email){
        alert('Tài khoản Google này không trả về địa chỉ email công khai. Vui lòng đăng nhập bằng một tài khoản Google khác.');
        await auth.signOut();
        return;
      }
      const cachedWardId = lget(wardIdMapKey(email), '');
      const identity = { name: user.displayName || email, email, photo: user.photoURL || '', wardId: cachedWardId || '' };
      state.identity = identity;
      if(!cachedWardId){
        // Lần đầu đăng nhập Google trên máy này / email này -> hỏi Mã định danh cấp Xã
        state.view = 'wardid';
        render();
        return;
      }
      lset(IDENTITY_KEY, identity);
      await enterWorkspace();
    });
  }

  // Sau khi có identity (đã biết wardId) -> kiểm tra Xã này đã có cấu hình
  // trên Firebase chưa, rồi bật realtime sync hoặc chuyển sang onboarding.
  async function enterWorkspace(){
    state.config = await cGetOnce('config', null);
    if(!state.config){
      state.view = 'onboarding';
    } else {
      state.view = 'app';
      attachRealtime();

  // ---------- interest engine ----------
  function periodRange(){
    if(state.reportMode==='quarter'){
      const q = state.config.quarters[state.reportQuarter];
      return { from:q.start, to:q.end };
    }
    return { from: state.reportFrom, to: state.reportTo };
  }
  function calcInterest(b, from, to){
    if(!from || !to) return {days:0, interest:0, due:0};
    const days = Math.max(0, daysBetween(from, to));
    const rate = parseFloat(b.rate)||0;
    const principal = parseFloat(b.principal)||0;
    const interest = principal * (rate/100) * (days/365);
    const prev = parseFloat(b.prevBalance)||0;
    return { days, interest: Math.round(interest), due: Math.round(interest + prev) };
  }
  function interestStatus(b, due){
    const paid = parseFloat(b.interestPaid)||0;
    const diff = Math.round(paid - due);
    if(diff===0) return {label:'Đã đóng đủ', cls:'pill-green', diff:0};
    if(diff<0) return {label:`Còn thiếu ${money(-diff)}`, cls:'pill-red', diff};
    return {label:`Đóng thừa ${money(diff)}`, cls:'pill-orange', diff};
  }
  function principalStatus(b){
    const principal = parseFloat(b.principal)||0;
    const paid = parseFloat(b.principalPaid)||0;
    const diff = Math.round(paid - principal);
    if(diff===0) return {label:'Đã đóng đủ', cls:'pill-green'};
    if(diff<0) return {label:`Còn thiếu ${money(-diff)}`, cls:'pill-red'};
    return {label:`Đóng thừa ${money(diff)}`, cls:'pill-orange'};
  }

  // ---------- notifications engine ----------
  function computeAlerts(){
    const alerts = [];
    const today = new Date(todayStr());
    if(!state.config) return alerts;
    // quarter end reminder (interest)
    Object.entries(state.config.quarters||{}).forEach(([qk,q])=>{
      if(!q.end) return;
      const d = daysBetween(todayStr(), q.end);
      if(d===15 || (d>=0 && d<=15)){
        alerts.push({color:'orange', text:`Sắp hết ${q.label||qk.toUpperCase()} (còn ${d} ngày) — nhắc thu lãi định kỳ`, key:'q-'+qk});
      }
    });
    state.borrowers.forEach(b=>{
      if(b.dueDate){
        const d = daysBetween(todayStr(), b.dueDate);
        if(d>=0 && d<=15) alerts.push({color:'red', text:`Gốc của ${b.name} (${b.hamlet}) đến hạn còn ${d} ngày`, key:'p-'+b.id});
        else if(d>0 && d<=30) alerts.push({color:'orange', text:`Gốc của ${b.name} (${b.hamlet}) đến hạn còn ${d} ngày`, key:'p-'+b.id});
        else if(d>0 && d<=60) alerts.push({color:'yellow', text:`Gốc của ${b.name} (${b.hamlet}) đến hạn còn ${d} ngày`, key:'p-'+b.id});
      }
      if(b.isExtended && b.extensionDueDate){
        const d = daysBetween(todayStr(), b.extensionDueDate);
        if(d>=0 && d<=15) alerts.push({color:'red', text:`Gia hạn của ${b.name} sắp hết (còn ${d} ngày)`, key:'e-'+b.id});
        else if(d>0 && d<=30) alerts.push({color:'orange', text:`Gia hạn của ${b.name} sắp hết (còn ${d} ngày)`, key:'e-'+b.id});
      }
    });
    return alerts;
  }
  function dashboardCounts(alerts){
    // one borrower counted at its most severe color among principal/extension alerts
    const sevMap = {};
    alerts.forEach(a=>{
      if(!a.key.startsWith('p-') && !a.key.startsWith('e-')) return;
      const id = a.key.slice(2);
      const rank = {yellow:1, orange:2, red:3};
      if(!sevMap[id] || rank[a.color] > rank[sevMap[id]]) sevMap[id] = a.color;
    });
    const counts = {yellow:0, orange:0, red:0};
    Object.values(sevMap).forEach(c=>counts[c]++);
    return counts;
  }

  // ---------- accounting engine (Thu - Chi cấp Xã) ----------
  function acctPeriodRange(mode, quarterKey){
    mode = mode || state.acctMode; quarterKey = quarterKey || state.acctQuarter;
    const q = state.config.quarters;
    if(mode==='all') return { from:'2000-01-01', to: todayStr() };
    if(mode==='quarter') return { from:q[quarterKey].start, to:q[quarterKey].end };
    // year: từ đầu Quý 1 đến cuối Quý 4
    return { from:q.q1.start, to:q.q4.end };
  }
  function computeAcctTotals(from, to){
    const retain = state.config.retainPercent||0;
    const activeBorrowers = state.borrowers.filter(b=>!b.deleted);
    const thu = activeBorrowers.reduce((s,b)=> s + calcInterest(b, from, to).due, 0);
    const giuLaiAp = Math.round(thu*retain/100);
    const xaNhan = Math.round(thu - giuLaiAp);
    const activeExpenses = state.expenses.filter(e=>!e.deleted && e.date && e.date>=from && e.date<=to);
    const chiTotal = activeExpenses.reduce((s,e)=> s + (parseFloat(e.amount)||0), 0);
    const chiByCategory = {};
    const chiByHamlet = {};
    activeExpenses.forEach(e=>{
      const label = e.purpose===CAT_OTHER ? `${CAT_OTHER}: ${e.purposeOther||'(chưa ghi rõ)'}` : e.purpose;
      chiByCategory[label] = (chiByCategory[label]||0) + (parseFloat(e.amount)||0);
      if(e.purpose===CAT_HAMLET){
        const h = e.hamlet || '—';
        chiByHamlet[h] = (chiByHamlet[h]||0) + (parseFloat(e.amount)||0);
      }
    });
    return { thu, xaNhan, giuLaiAp, chiTotal, chiByCategory, chiByHamlet, tonQuy: Math.round(xaNhan - chiTotal), expenses: activeExpenses };
  }

  // ---------- báo cáo tổng quan toàn xã (theo phương án vay) ----------
  function computeProjectOverview(){
    const active = state.borrowers.filter(b=>!b.deleted);
    const byProject = {};
    active.forEach(b=>{
      const p = b.project || '—';
      if(!byProject[p]) byProject[p] = { name:p, hamlets:new Set(), disbursed:0, recovered:0 };
      byProject[p].hamlets.add(b.hamlet||'—');
      byProject[p].disbursed += parseFloat(b.principal)||0;
      byProject[p].recovered += parseFloat(b.principalPaid)||0;
    });
    const list = Object.values(byProject).map(p=>{
      const outstanding = Math.max(0, Math.round(p.disbursed - p.recovered));
      return {
        name: p.name,
        hamlets: [...p.hamlets].join(', '),
        disbursed: Math.round(p.disbursed),
        recovered: Math.round(p.recovered),
        outstanding,
        status: outstanding>0 ? 'Đang hoạt động' : 'Đã tất toán',
      };
    }).sort((a,b)=>a.name.localeCompare(b.name));
    const activeCount = list.filter(p=>p.status==='Đang hoạt động').length;
    const settledCount = list.filter(p=>p.status==='Đã tất toán').length;
    const totalBorrowers = active.filter(b=> ((parseFloat(b.principal)||0) - (parseFloat(b.principalPaid)||0)) > 0 ).length;
    const totalOutstanding = list.reduce((s,p)=>s+p.outstanding,0);
    return { list, activeCount, settledCount, totalBorrowers, totalOutstanding };
  }

        <div class="stat-card" style="background:linear-gradient(135deg,${acct.tonQuy>=0?'var(--green)':'var(--red)'},${acct.tonQuy>=0?'#2f4f34':'#7a231d'});">

  function renderExpenseModal(){
    const isNew = !state.modal.payload;
    const e0 = state.modal.payload ? {...state.modal.payload} : emptyExpense();
    const hamlets = state.config.hamlets||[];
    const readonly = !canEdit();
    const wrap = document.createElement('div');
    wrap.className = 'modal-bg';
    wrap.innerHTML = `
      <div class="modal">
        <div class="modal-head"><h3>${isNew?'Thêm khoản chi mới':'Chi tiết khoản chi'}</h3><button class="modal-close" id="em-close">✕</button></div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="field"><label>Ngày chi *</label><input type="date" id="em-date" value="${e0.date}" ${readonly?'disabled':''}></div>
            <div class="field"><label>Số tiền chi (đ) *</label><input type="number" id="em-amount" value="${e0.amount}" ${readonly?'disabled':''}></div>
            <div class="field full"><label>Nội dung công việc / Mục đích chi *</label>
              <select id="em-purpose" ${readonly?'disabled':''}>${EXPENSE_CATEGORIES.map(c=>`<option ${e0.purpose===c?'selected':''}>${c}</option>`).join('')}</select>
            </div>
            <div class="field full" id="em-hamlet-wrap" style="${e0.purpose===CAT_HAMLET?'':'display:none;'}">
              <label>Trích về cho khu dân cư (Ấp) nào *</label>
              <select id="em-hamlet" ${readonly?'disabled':''}>${hamlets.map(h=>`<option ${e0.hamlet===h?'selected':''}>${h}</option>`).join('')}</select>
            </div>
            <div class="field full" id="em-other-wrap" style="${e0.purpose===CAT_OTHER?'':'display:none;'}">
              <label>Nội dung mục chi khác (ghi rõ) *</label>
              <input id="em-other" value="${e0.purposeOther||''}" placeholder="Ví dụ: Sửa chữa trụ sở..." ${readonly?'disabled':''}>
            </div>
            <div class="field full"><label>Ghi chú chi tiết (người nhận tiền, số hoá đơn/biên nhận...)</label><textarea id="em-note" rows="2" ${readonly?'disabled':''}>${e0.note||''}</textarea></div>
          </div>
        </div>
        <div class="modal-foot">
          ${(!isNew && canEdit()) ? `<button class="btn btn-danger" id="em-delete" style="margin-right:auto;">Xoá (chuyển vào thùng rác)</button>` : ''}
          <button class="btn btn-ghost" id="em-cancel">Đóng</button>
          ${canEdit() ? `<button class="btn btn-primary" id="em-save">${isNew?'Thêm khoản chi':'Lưu thay đổi'}</button>` : ''}
        </div>
      </div>`;
    document.body.appendChild(wrap);
    const close = ()=>{ wrap.remove(); state.modal=null; };
    wrap.querySelector('#em-close').onclick = close;
    wrap.querySelector('#em-cancel').onclick = close;
    wrap.onclick = (ev)=>{ if(ev.target===wrap) close(); };

    const purposeSel = wrap.querySelector('#em-purpose');
    purposeSel.onchange = ()=>{
      wrap.querySelector('#em-hamlet-wrap').style.display = purposeSel.value===CAT_HAMLET ? '' : 'none';
      wrap.querySelector('#em-other-wrap').style.display = purposeSel.value===CAT_OTHER ? '' : 'none';
    };

    const delBtn = wrap.querySelector('#em-delete');
    if(delBtn) delBtn.onclick = async ()=>{
      if(!confirm('Chuyển khoản chi này vào thùng rác?')) return;
      state.expenses = state.expenses.filter(x=>x.id!==e0.id);
      const trashed = {...e0, _kind:'expense', deleted:true, deletedAt:new Date().toISOString(), deletedBy: state.identity.email, deletedByName: state.identity.name};
      state.trash.push(trashed);
      await cRemoveRecord('expenses', e0.id);
      await cSetRecord('trash', trashed.id, trashed);
      await pushLog('xoá khoản chi', `${money(e0.amount)} — ${e0.purpose}`);
      close(); render();
    };

    const saveBtn = wrap.querySelector('#em-save');
    if(saveBtn) saveBtn.onclick = async ()=>{
      const date = wrap.querySelector('#em-date').value;
      const amount = parseFloat(wrap.querySelector('#em-amount').value)||0;
      const purpose = wrap.querySelector('#em-purpose').value;
      const hamlet = wrap.querySelector('#em-hamlet').value;
      const purposeOther = wrap.querySelector('#em-other').value.trim();
      const note = wrap.querySelector('#em-note').value.trim();
      if(!date){ alert('Vui lòng chọn ngày chi.'); return; }
      if(!amount || amount<=0){ alert('Vui lòng nhập số tiền chi hợp lệ.'); return; }
      if(purpose===CAT_HAMLET && !hamlet){ alert('Vui lòng chọn ấp nhận tiền.'); return; }
      if(purpose===CAT_OTHER && !purposeOther){ alert('Vui lòng ghi rõ nội dung mục chi khác.'); return; }
      const updated = { ...e0, date, amount, purpose, hamlet: purpose===CAT_HAMLET?hamlet:'', purposeOther: purpose===CAT_OTHER?purposeOther:'', note };
      if(isNew){ state.expenses.push(updated); }
      else { state.expenses = state.expenses.map(x=>x.id===updated.id? updated : x); }
      await cSetRecord('expenses', updated.id, updated);
      await pushLog(isNew?'thêm khoản chi':'chỉnh sửa khoản chi', `${money(updated.amount)} — ${updated.purpose}`);
      close(); render();
    };
  }

  function trashLabel(item){
    const kind = item._kind || 'borrower'; // dữ liệu cũ chưa có _kind mặc định là hộ vay
    if(kind==='expense') return `${money(item.amount)} — ${item.purpose===CAT_OTHER? (item.purposeOther||CAT_OTHER) : item.purpose}`;
    return `${item.name} (${item.hamlet||'—'})`;
  }
  function renderTrashTab(el){
    el.innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr><th>Loại</th><th>Nội dung</th><th>Người xoá</th><th>Thời điểm xoá</th><th></th></tr></thead>
        <tbody>
          ${state.trash.length? state.trash.map(item=>{
            const kind = item._kind || 'borrower';
            return `
            <tr>
              <td><span class="pill ${kind==='expense'?'pill-orange':'pill-gray'}">${kind==='expense'?'Khoản chi':'Hộ vay'}</span></td>
              <td>${trashLabel(item)}</td>
              <td>${item.deletedByName||item.deletedBy}</td><td>${new Date(item.deletedAt).toLocaleString('vi-VN')}</td>
              <td style="display:flex; gap:6px;">
                ${(isOwner() || item.deletedBy===state.identity.email) ? `<button class="btn btn-ghost btn-sm" data-restore="${item.id}" data-kind="${kind}">↩ Khôi phục</button>`:''}
                ${isOwner() ? `<button class="btn btn-danger btn-sm" data-purge="${item.id}" data-kind="${kind}">Xoá vĩnh viễn</button>`:''}
              </td>
            </tr>`;
          }).join('') : `<tr><td colspan="5"><div class="empty-state"><div class="e-ico">🗑️</div>Thùng rác trống</div></td></tr>`}
        </tbody>
      </table></div>`;
    document.querySelectorAll('[data-restore]').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.dataset.restore;
        const kind = btn.dataset.kind;
        const idx = state.trash.findIndex(x=>x.id===id);
        const item = state.trash[idx];
        delete item.deleted; delete item.deletedAt; delete item.deletedBy; delete item.deletedByName; delete item._kind;
        state.trash.splice(idx,1);
        await cRemoveRecord('trash', id);
        if(kind==='expense'){
          state.expenses.push(item);
          await cSetRecord('expenses', item.id, item);
          await pushLog('khôi phục khoản chi', trashLabel({...item, _kind:'expense'}));
        } else {
          state.borrowers.push(item);
          await cSetRecord('borrowers', item.id, item);
          await pushLog('khôi phục', `hộ ${item.name}`);
        }
        renderTrashTab(el);
      };
    });
    document.querySelectorAll('[data-purge]').forEach(btn=>{
      btn.onclick = async ()=>{
        if(!confirm('Xoá vĩnh viễn dữ liệu này? Hành động không thể hoàn tác.')) return;
        const id = btn.dataset.purge;
        const kind = btn.dataset.kind;
        const item = state.trash.find(x=>x.id===id);
        state.trash = state.trash.filter(x=>x.id!==id);
        await cRemoveRecord('trash', id);
        await pushLog(kind==='expense'?'xoá vĩnh viễn khoản chi':'xoá vĩnh viễn', trashLabel(item));
        renderTrashTab(el);
      };
    });
  }

        <div class="modal-foot">
          ${(!isNew && canEdit()) ? `<button class="btn btn-danger" id="m-delete" style="margin-right:auto;">Xoá (chuyển vào thùng rác)</button>` : ''}
          <button class="btn btn-ghost" id="m-cancel">Đóng</button>
          ${canEdit() ? `<button class="btn btn-primary" id="m-save">${isNew?'Thêm hộ vay':'Lưu thay đổi'}</button>` : ''}
        </div>
      </div>`;
    document.body.appendChild(wrap);
    const close = ()=>{ wrap.remove(); state.modal=null; };
    wrap.querySelector('#md-close').onclick = close;
    wrap.querySelector('#m-cancel').onclick = close;
    wrap.onclick = (e)=>{ if(e.target===wrap) close(); };

    const delBtn = wrap.querySelector('#m-delete');
    if(delBtn) delBtn.onclick = async ()=>{
      if(!confirm('Chuyển hộ vay này vào thùng rác?')) return;
      state.borrowers = state.borrowers.filter(x=>x.id!==b.id);
      const trashed = {...b, _kind:'borrower', deleted:true, deletedAt:new Date().toISOString(), deletedBy: state.identity.email, deletedByName: state.identity.name};
      state.trash.push(trashed);
      await cRemoveRecord('borrowers', b.id);
      await cSetRecord('trash', trashed.id, trashed);
      await pushLog('xoá', `hộ ${b.name}`);
      close(); render();
    };

    const saveBtn = wrap.querySelector('#m-save');
    if(saveBtn) saveBtn.onclick = async ()=>{
      const name = wrap.querySelector('#m-name').value.trim();
      if(!name){ alert('Vui lòng nhập họ và tên.'); return; }
      const updated = {
        ...b,
        name,
        cccd: wrap.querySelector('#m-cccd').value.trim(),
        phone: wrap.querySelector('#m-phone').value.trim(),
        guarantor: wrap.querySelector('#m-guarantor').value.trim(),
        address: wrap.querySelector('#m-address').value.trim(),
        hamlet: wrap.querySelector('#m-hamlet').value,
        project: wrap.querySelector('#m-project').value,
        principal: parseFloat(wrap.querySelector('#m-principal').value) || 0,
        rate: parseFloat(wrap.querySelector('#m-rate').value) || 0,
        loanDate: wrap.querySelector('#m-loanDate').value,
        dueDate: wrap.querySelector('#m-dueDate').value,
        fundSource: wrap.querySelector('#m-fundSource').value.trim(),
        prevBalance: parseFloat(wrap.querySelector('#m-prevBalance').value) || 0,
        isExtended: wrap.querySelector('#m-isExtended').checked,
        extensionDueDate: wrap.querySelector('#m-extensionDueDate').value,
        interestPaid: parseFloat(wrap.querySelector('#m-interestPaid').value) || 0,
        principalPaid: parseFloat(wrap.querySelector('#m-principalPaid').value) || 0,
        checked: wrap.querySelector('#m-checked').checked,
        note: wrap.querySelector('#m-note').value.trim()
      };

      if (isNew) {
        state.borrowers.push(updated);
      } else {
        state.borrowers = state.borrowers.map(x => x.id === updated.id ? updated : x);
      }
      
      await cSetRecord('borrowers', updated.id, updated);
      await pushLog(isNew ? 'thêm hộ vay' : 'chỉnh sửa hộ vay', `hộ ${updated.name} — gốc ${money(updated.principal)}`);
      close(); 
      render();
    };
  }

  boot();
})();
</script>

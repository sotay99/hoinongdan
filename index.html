  async function purgeDeletedWardToSuperadmin(wid){
    if(!confirm('Xoá vĩnh viễn: mã này sẽ KHÔNG còn trong thùng rác của bạn nữa (chỉ Quản trị viên trang web mới khôi phục được cho bạn). Dữ liệu thật vẫn được "Mã ẩn" bảo lãnh an toàn tuyệt đối. Bạn có chắc chắn?')) return;
    const entry = state.myDeletedWards.find(x=>x.wardId===wid);
    // Chụp lại TOÀN BỘ "con trỏ" config (bao gồm Mã ẩn/secretId) NGAY LÚC NÀY — vì kể từ khi vào
    // Thùng rác hệ thống, chuỗi wid này được coi là "thả tự do" nên CÓ THỂ bị người khác xin lại để
    // tạo mã mới (ghi đè lên data/{wid}/config). Nhờ lưu sẵn snapshot này, sau này khôi phục vẫn luôn
    // dựng lại đúng con trỏ trỏ về ĐÚNG secretId cũ — dữ liệu thật không bao giờ bị ảnh hưởng.
    const cfgSnapshot = await cGetOnceFor(wid, 'config', null);
    await rtdb.ref(`superadmin/trashWards/${wid}`).set({
      wardId:wid, wardName:(entry&&entry.wardName)||(cfgSnapshot&&cfgSnapshot.wardName)||'',
      ownerEmail: state.identity.email, deletedAt:new Date().toISOString(),
      configSnapshot: cfgSnapshot || null,
    });
    await rtdb.ref(`users/${emailToKey(state.identity.email)}/deletedWards/${wid}`).remove();
    await loadWallet(); render();
  }
  // ---- Thùng rác hệ thống (chỉ Chủ trang web) ----
  async function superRestoreWard(wid){
    if(!isAdmin()) return;
    const entry = state.sysTrash.find(x=>x.wardId===wid);
    if(!entry) return;
    // Yêu cầu 1: mã trong Thùng rác hệ thống được coi là "đã thả tự do" nên rất có thể đã bị người
    // khác tạo trùng trong lúc chờ khôi phục. Trước khi khôi phục, phải dò xem có bị trùng không
    // (kể cả trong thùng rác cá nhân của bất kỳ ai); nếu trùng thì tự đổi tên "con trỏ" theo công
    // thức "tênmã + 001", nếu vẫn trùng thì tăng dần 002, 003... Nhờ dữ liệu thật luôn được "Mã ẩn"
    // (secretId) cố định bảo lãnh — hoàn toàn tách biệt khỏi chuỗi wardId — nên dù có bị đổi tên con
    // trỏ, dữ liệu gốc (hộ vay, chi tiêu, nhật ký...) vẫn nguyên vẹn 100%, không hề bị mất hay lẫn
    // với dữ liệu của người đang chiếm cái tên cũ.
    let finalWid = wid;
    let renamed = false;
    if(await isWardIdTaken(wid)){
      renamed = true;
      let n = 1;
      while(await isWardIdTaken(`${wid}${String(n).padStart(3,'0')}`)) n++;
      finalWid = `${wid}${String(n).padStart(3,'0')}`;
    }
    if(entry.configSnapshot){
      // Dựng lại đúng "con trỏ" trỏ về ĐÚNG Mã ẩn (secretId) cũ -> toàn bộ dữ liệu thật hiện ra
      // nguyên vẹn ngay lập tức, bất kể con trỏ dùng tên nào.
      const restoredCfg = { ...entry.configSnapshot, deleted:false };
      delete restoredCfg.deletedAt; delete restoredCfg.deletedBy;
      await rtdb.ref(`data/${finalWid}/config`).set(restoredCfg);
      syncWardIndex(finalWid, restoredCfg);
    }
    if(renamed){
      alert(`Lưu ý: mã "${wid}" hiện đã có người khác đang sử dụng (do đã được thả tự do khi đưa vào Thùng rác hệ thống), nên con trỏ khôi phục sẽ dùng tên mới "${finalWid}". Yên tâm: TOÀN BỘ dữ liệu gốc (hộ vay, chi tiêu, nhật ký...) vẫn còn nguyên vẹn 100% vì luôn được "Mã ẩn" cố định bảo lãnh — hoàn toàn không bị mất hay lẫn với mã đang hoạt động kia.`);
    }
    await rtdb.ref(`users/${emailToKey(entry.ownerEmail)}/deletedWards/${finalWid}`).set({wardId:finalWid, wardName:(entry.configSnapshot&&entry.configSnapshot.wardName)||entry.wardName||'', deletedAt: entry.deletedAt||new Date().toISOString()});
    await rtdb.ref(`superadmin/trashWards/${wid}`).remove();
    await loadWallet(); render();
  }
  async function superPurgeForever(wid){
    if(!isAdmin()) return;
    if(!confirm('XOÁ VĨNH VIỄN — TOÀN BỘ dữ liệu (hộ vay, chi tiêu, nhật ký, cộng tác viên...) của mã xã này trên đám mây sẽ bị xoá sạch, KHÔNG THỂ khôi phục. Bạn có chắc chắn tuyệt đối?')) return;
    // Dữ liệu thật nằm ở secretdata/{secretId}/... (không phải data/{wid}/...) — phải lấy đúng
    // Mã ẩn từ snapshot đã chụp lúc đưa vào Thùng rác hệ thống để xoá đúng chỗ.
    const entry = state.sysTrash.find(x=>x.wardId===wid);
    const sid = entry && entry.configSnapshot && entry.configSnapshot.secretId;
    if(sid) await rtdb.ref(`secretdata/${sid}`).remove();
    await rtdb.ref(`data/${wid}`).remove();
    removeWardIndex(wid);
    await rtdb.ref(`superadmin/trashWards/${wid}`).remove();
    await loadWallet(); render();
  }

  async function boot(){
    state.view = 'boot'; render();
    // Lắng nghe trạng thái đăng nhập Google thật qua Firebase Auth.
    // Không còn cho phép gõ tay tên/email — email lấy trực tiếp từ tài khoản
    // Google đã xác thực, dùng để đối chiếu phân quyền Owner/Editor/Viewer/Khách.
    auth.onAuthStateChanged(async (user) => {
      if(!user){
        detachRealtime();
        state.identity = null; lset(IDENTITY_KEY, null);
        state.config = null; state.borrowers=[]; state.expenses=[]; state.trash=[]; state.log=[]; state.collaborators={};
        state.myWards=[]; state.myDeletedWards=[]; state.sysTrash=[];
        state.admins={}; state.aiChats=[]; state.aiActiveChatId=null; state._aiChatOpen=false; state._adminViewingWard=false;
        state.view = 'login';
        render();
        return;
      }
      const email = (user.email||'').toLowerCase().trim();
      if(!email){
        alert('Tài khoản Google này không trả về địa chỉ email công khai. Vui lòng đăng nhập bằng một tài khoản Google khác.');
        await auth.signOut();
        return;
      }
      state.identity = { name: user.displayName || email, email, photo: user.photoURL || '', wardId:'' };
      lset(IDENTITY_KEY, state.identity);
      ensureAccountSecretId(); // không cần chờ — chạy nền, không ảnh hưởng luồng hiển thị
      await loadWallet();
      const cachedActive = lget(activeWardCacheKey(email), '');
      const stillHave = cachedActive && state.myWards.some(w=>w.wardId===cachedActive && !(w.live && w.live.deleted));
      if(stillHave){ await enterWard(cachedActive); return; }
      if(!lget(seenWelcomeKey(email), false) && state.myWards.length===0){
        state.view = 'welcome';
        render();
        return;
      }
      state.view = 'wallet';
      render();
    });
  }

  // ---------- interest engine ----------
  function periodRange(){
    if(state.reportMode==='quarter'){
      const q = state.config.quarters[state.reportQuarter];
      return { from:q.start, to:q.end };
    }
    return { from: state.reportFrom, to: state.reportTo };
  }
  function calcInterest(b, from, to){
    if(!from || !to) return {days:0, interest:0, due:0};
    const days = Math.max(0, daysBetween(from, to));
    const rate = parseFloat(b.rate)||0;
    const principal = parseFloat(b.principal)||0;
    const interest = principal * (rate/100) * (days/365);
    const prev = parseFloat(b.prevBalance)||0;
    return { days, interest: Math.round(interest), due: Math.round(interest + prev) };
  }
  function interestStatus(b, due){
    const paid = parseFloat(b.interestPaid)||0;
    const diff = Math.round(paid - due);
    if(diff===0) return {label:'Đã đóng đủ', cls:'pill-green', diff:0};
    if(diff<0) return {label:`Còn thiếu ${money(-diff)}`, cls:'pill-red', diff};
    return {label:`Đóng thừa ${money(diff)}`, cls:'pill-orange', diff};
  }
  function principalStatus(b){
    const principal = parseFloat(b.principal)||0;
    const paid = parseFloat(b.principalPaid)||0;
    const diff = Math.round(paid - principal);
    if(diff===0) return {label:'Đã đóng đủ', cls:'pill-green'};
    if(diff<0) return {label:`Còn thiếu ${money(-diff)}`, cls:'pill-red'};
    return {label:`Đóng thừa ${money(diff)}`, cls:'pill-orange'};
  }

  // ---------- notifications engine ----------
  function computeAlerts(){
    const alerts = [];
    const today = new Date(todayStr());
    if(!state.config) return alerts;
    // quarter end reminder (interest)
    Object.entries(state.config.quarters||{}).forEach(([qk,q])=>{
      if(!q.end) return;
      const d = daysBetween(todayStr(), q.end);
      if(d===15 || (d>=0 && d<=15)){
        alerts.push({color:'orange', text:`Sắp hết ${q.label||qk.toUpperCase()} (còn ${d} ngày) — nhắc thu lãi định kỳ`, key:'q-'+qk});
      }
    });
    state.borrowers.forEach(b=>{
      if(b.dueDate){
        const d = daysBetween(todayStr(), b.dueDate);
        if(d>=0 && d<=15) alerts.push({color:'red', text:`Gốc của ${b.name} (${b.hamlet}) đến hạn còn ${d} ngày`, key:'p-'+b.id});
        else if(d>0 && d<=30) alerts.push({color:'orange', text:`Gốc của ${b.name} (${b.hamlet}) đến hạn còn ${d} ngày`, key:'p-'+b.id});
        else if(d>0 && d<=60) alerts.push({color:'yellow', text:`Gốc của ${b.name} (${b.hamlet}) đến hạn còn ${d} ngày`, key:'p-'+b.id});
      }
      if(b.isExtended && b.extensionDueDate){
        const d = daysBetween(todayStr(), b.extensionDueDate);
        if(d>=0 && d<=15) alerts.push({color:'red', text:`Gia hạn của ${b.name} sắp hết (còn ${d} ngày)`, key:'e-'+b.id});
        else if(d>0 && d<=30) alerts.push({color:'orange', text:`Gia hạn của ${b.name} sắp hết (còn ${d} ngày)`, key:'e-'+b.id});
      }
    });
    return alerts;
  }
  function dashboardCounts(alerts){
    // one borrower counted at its most severe color among principal/extension alerts
    const sevMap = {};
    alerts.forEach(a=>{
      if(!a.key.startsWith('p-') && !a.key.startsWith('e-')) return;
      const id = a.key.slice(2);
      const rank = {yellow:1, orange:2, red:3};
      if(!sevMap[id] || rank[a.color] > rank[sevMap[id]]) sevMap[id] = a.color;
    });
    const counts = {yellow:0, orange:0, red:0};
    Object.values(sevMap).forEach(c=>counts[c]++);
    return counts;
  }

  // ---------- accounting engine (Thu - Chi cấp Xã) ----------
  function acctPeriodRange(mode, quarterKey){
    mode = mode || state.acctMode; quarterKey = quarterKey || state.acctQuarter;
    const q = state.config.quarters;
    if(mode==='all') return { from:'2000-01-01', to: todayStr() };
    if(mode==='quarter') return { from:q[quarterKey].start, to:q[quarterKey].end };
    // year: từ đầu Quý 1 đến cuối Quý 4
    return { from:q.q1.start, to:q.q4.end };
  }
  function computeAcctTotals(from, to){
    const retain = state.config.retainPercent||0;
    const activeBorrowers = state.borrowers.filter(b=>!b.deleted);
    const thu = activeBorrowers.reduce((s,b)=> s + calcInterest(b, from, to).due, 0);
    const giuLaiAp = Math.round(thu*retain/100);
    const xaNhan = Math.round(thu - giuLaiAp);
    const activeExpenses = state.expenses.filter(e=>!e.deleted && e.date && e.date>=from && e.date<=to);
    const chiTotal = activeExpenses.reduce((s,e)=> s + (parseFloat(e.amount)||0), 0);
    const chiByCategory = {};
    const chiByHamlet = {};
    activeExpenses.forEach(e=>{
      const label = e.purpose===CAT_OTHER ? `${CAT_OTHER}: ${e.purposeOther||'(chưa ghi rõ)'}` : (isCatHamlet(e.purpose) ? CAT_HAMLET : e.purpose);
      chiByCategory[label] = (chiByCategory[label]||0) + (parseFloat(e.amount)||0);
      if(isCatHamlet(e.purpose)){
        const h = e.hamlet || '—';
        chiByHamlet[h] = (chiByHamlet[h]||0) + (parseFloat(e.amount)||0);
      }
    });
    return { thu, xaNhan, giuLaiAp, chiTotal, chiByCategory, chiByHamlet, tonQuy: Math.round(xaNhan - chiTotal), expenses: activeExpenses };
  }

  // ---------- báo cáo tổng quan toàn xã (theo phương án vay) ----------
  function computeProjectOverview(){
    const active = state.borrowers.filter(b=>!b.deleted);
    const byProject = {};
    active.forEach(b=>{
      const p = b.project || '—';
      if(!byProject[p]) byProject[p] = { name:p, hamlets:new Set(), disbursed:0, recovered:0 };
      byProject[p].hamlets.add(b.hamlet||'—');
      byProject[p].disbursed += parseFloat(b.principal)||0;
      byProject[p].recovered += parseFloat(b.principalPaid)||0;
    });
    const list = Object.values(byProject).map(p=>{
      const outstanding = Math.max(0, Math.round(p.disbursed - p.recovered));
      return {
        name: p.name,
        hamlets: [...p.hamlets].join(', '),
        disbursed: Math.round(p.disbursed),
        recovered: Math.round(p.recovered),
        outstanding,
        status: outstanding>0 ? 'Đang hoạt động' : 'Đã tất toán',
      };
    }).sort((a,b)=>a.name.localeCompare(b.name));
    const activeCount = list.filter(p=>p.status==='Đang hoạt động').length;
    const settledCount = list.filter(p=>p.status==='Đã tất toán').length;
    const totalBorrowers = active.filter(b=> ((parseFloat(b.principal)||0) - (parseFloat(b.principalPaid)||0)) > 0 ).length;
    const totalOutstanding = list.reduce((s,p)=>s+p.outstanding,0);
    return { list, activeCount, settledCount, totalBorrowers, totalOutstanding };
  }

  // ---------- activity feed for bell (recent + alerts) ----------
  function bellItems(){
    const alerts = computeAlerts().map(a=>({type:'alert', ...a}));
    const recentLogs = state.log.slice(0,8).map(l=>({
      type:'log', color:'gray',
      text: `${l.userName||l.user} đã ${l.action} — ${l.target}`,
      time: l.time
    }));
    return [...alerts.map(a=>({...a,time:null})), ...recentLogs];
  }

  // ================= RENDER =================
  function render(){
    if(state.view==='login'){ renderLogin(); syncFloatingChat(); return; }
    if(state.view==='welcome'){ renderWelcome(); syncFloatingChat(); return; }
    if(state.view==='wallet'){ renderWallet(); syncFloatingChat(); return; }
    if(state.view==='onboarding'){ renderOnboarding(); syncFloatingChat(); return; }
    if(state.view==='app'){ (isPending() ? renderPendingScreen() : renderApp()); syncFloatingChat(); return; }
    root.innerHTML = '<div class="center-screen">Đang tải…</div>';
    syncFloatingChat();
  }

  // =====================================================================
  // ---------- TRỢ LÝ AI "ANH NÔNG DÂN THÔNG MINH" (Gemini) ----------
  // Nút chat tròn bập bềnh (góc dưới-phải) + không gian chat toàn màn hình kiểu Gemini, có
  // lịch sử các đoạn chat lưu theo tài khoản Google (users/{email}/aiChats/...).
  // =====================================================================
  // Chỉ hiển thị nút chat khi đang ở trong app (không hiện ở màn đăng nhập/welcome/onboarding).
  function syncFloatingChat(){
    let btn = document.getElementById('fab-chat-btn');
    const shouldShow = state.view === 'app';
    if(!shouldShow){
      if(btn) btn.remove();
      const overlay = document.getElementById('ai-chat-overlay');
      if(overlay) overlay.remove();
      if(aiOutsideClickHandler){ document.removeEventListener('click', aiOutsideClickHandler); aiOutsideClickHandler = null; }
      return;
    }
    if(!btn){
      btn = document.createElement('button');
      btn.id = 'fab-chat-btn';
      btn.className = 'fab-chat fab-intro'; // Yêu cầu 6: nhún nhảy 5 giây đầu để thu hút sự chú ý
      btn.title = 'Chàng Nông dân Thông minh — Trợ lý AI';
      btn.textContent = '🤖';
      btn.onclick = openAiChat;
      document.body.appendChild(btn);
      setTimeout(()=>{ const b = document.getElementById('fab-chat-btn'); if(b) b.classList.remove('fab-intro'); }, 5000);
    }
    if(state._aiChatOpen && !document.getElementById('ai-chat-overlay')){
      renderAiChatOverlay();
    } else if(!state._aiChatOpen){
      const overlay = document.getElementById('ai-chat-overlay');
      if(overlay) overlay.remove();
      if(aiOutsideClickHandler){ document.removeEventListener('click', aiOutsideClickHandler); aiOutsideClickHandler = null; }
    }
  }
  async function openAiChat(){
    state._aiChatOpen = true;
    await Promise.all([loadAiChats(), loadAiProviders()]);
    if(!state.aiActiveChatId && state.aiChats.length) state.aiActiveChatId = state.aiChats[0].id;
    if(!state.aiActiveProviderId || !state.aiProviders.some(p=>p.id===state.aiActiveProviderId)){
      const cached = lget('hnd_ai_active_provider', null);
      state.aiActiveProviderId = (cached && state.aiProviders.some(p=>p.id===cached)) ? cached : (state.aiProviders[0] ? state.aiProviders[0].id : null);
    }
    renderAiChatOverlay();
  }
  function getActiveAiProvider(){
    if(!state.aiProviders || !state.aiProviders.length) return null;
    return state.aiProviders.find(p=>p.id===state.aiActiveProviderId) || state.aiProviders[0];
  }
  function selectAiProvider(id){
    state.aiActiveProviderId = id;
    lset('hnd_ai_active_provider', id);
    state._aiModelMenuOpen = false;
    renderAiChatOverlay();
  }
  function closeAiChat(){
    state._aiChatOpen = false;
    state._aiModelMenuOpen = false; state._aiAddMenuOpen = false;
    const overlay = document.getElementById('ai-chat-overlay');
    if(overlay) overlay.remove();
    if(aiOutsideClickHandler){ document.removeEventListener('click', aiOutsideClickHandler); aiOutsideClickHandler = null; }
  }
  async function loadAiChats(){
    if(!state.identity || !state.identity.email){ state.aiChats = state.aiChats||[]; return; } // Khách/tham quan: chỉ lưu tạm trong phiên, không có tài khoản để lưu lâu dài
    try{
      const snap = await rtdb.ref(`users/${emailToKey(state.identity.email)}/aiChats`).get();
      state.aiChats = (snap && snap.exists()) ? Object.entries(snap.val()).map(([id,v])=>({id, ...v})).sort((a,b)=> new Date(b.updatedAt||0)-new Date(a.updatedAt||0)) : [];
    }catch(e){ state.aiChats = []; }
  }
  async function saveAiChatToCloud(chat){
    if(!state.identity || !state.identity.email) return;
    try{ await rtdb.ref(`users/${emailToKey(state.identity.email)}/aiChats/${chat.id}`).set(chat); }catch(e){ console.error('Lưu đoạn chat AI lỗi:', e); }
  }
  function newAiChat(){
    const chat = { id:'c_'+uid(), title:'Đoạn chat mới', messages:[], updatedAt:new Date().toISOString() };
    state.aiChats.unshift(chat);
    state.aiActiveChatId = chat.id;
    renderAiChatOverlay();
  }
  async function deleteAiChatById(chatId){
    state.aiChats = state.aiChats.filter(c=>c.id!==chatId);
    if(state.aiActiveChatId===chatId) state.aiActiveChatId = state.aiChats[0] ? state.aiChats[0].id : null;
    if(state.identity && state.identity.email){ try{ await rtdb.ref(`users/${emailToKey(state.identity.email)}/aiChats/${chatId}`).remove(); }catch(e){} }
    renderAiChatOverlay();
  }

  // ---------------------------------------------------------------------
  // Nút "➕ THÊM THÀNH PHẦN" — cho phép đính kèm ảnh/tài liệu hoặc bật chế độ Tìm kiếm web,
  // y hệt các lựa chọn ở nút dấu cộng trong khung chat của Gemini thực thụ.
  // ---------------------------------------------------------------------
  function toggleAiAddMenu(){
    state._aiAddMenuOpen = !state._aiAddMenuOpen;
    state._aiModelMenuOpen = false;
    renderAiChatOverlay();
  }
  function toggleAiModelMenu(){
    state._aiModelMenuOpen = !state._aiModelMenuOpen;
    state._aiAddMenuOpen = false;
    renderAiChatOverlay();
  }
  function triggerAiFileInput(kind){
    state._aiAddMenuOpen = false;
    renderAiChatOverlay();
    const input = document.createElement('input');
    input.type = 'file';
    input.multiple = true;
    input.accept = kind==='image' ? 'image/*' : '.pdf,.doc,.docx,.txt,.csv,.xlsx,.rtf';
    input.onchange = ()=> handleAiFiles(input.files);
    input.click();
  }
  function handleAiFiles(fileList){
    const files = Array.from(fileList||[]);
    if(!files.length) return;
    const MAX_MB = 8;
    files.forEach(file=>{
      if(file.size > MAX_MB*1024*1024){ alert(`Tệp "${file.name}" vượt quá ${MAX_MB}MB, vui lòng chọn tệp nhỏ hơn.`); return; }
      const reader = new FileReader();
      reader.onload = ()=>{
        const base64 = String(reader.result).split(',')[1] || '';
        state.aiPendingAttachments.push({ name:file.name, mimeType: file.type || 'application/octet-stream', base64 });
        renderAiChatOverlay();
      };
      reader.onerror = ()=> alert(`Không đọc được tệp "${file.name}".`);
      reader.readAsDataURL(file);
    });
  }
  function removeAiAttachment(idx){
    state.aiPendingAttachments.splice(idx,1);
    renderAiChatOverlay();
  }
  function toggleAiWebSearch(){
    state.aiWebSearchOn = !state.aiWebSearchOn;
    state._aiAddMenuOpen = false;
    renderAiChatOverlay();
  }
  // Micro — nhận dạng giọng nói (Web Speech API), điền thẳng vào ô nhập, y hệt icon micro của Gemini.
  let aiRecognition = null;
  let aiOutsideClickHandler = null; // tham chiếu handler "bấm ra ngoài để đóng dropdown" — dùng để gỡ đúng lúc đóng chat
  function toggleAiMic(){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){ alert('Trình duyệt này chưa hỗ trợ nhận dạng giọng nói. Vui lòng dùng Google Chrome trên máy tính hoặc Android.'); return; }
    if(state._aiMicListening){ if(aiRecognition) aiRecognition.stop(); return; }
    aiRecognition = new SR();
    aiRecognition.lang = 'vi-VN';
    aiRecognition.interimResults = false;
    aiRecognition.maxAlternatives = 1;
    aiRecognition.onstart = ()=>{ state._aiMicListening = true; renderAiChatOverlay(); };
    aiRecognition.onerror = ()=>{ state._aiMicListening = false; renderAiChatOverlay(); };
    aiRecognition.onend = ()=>{ state._aiMicListening = false; renderAiChatOverlay(); };
    aiRecognition.onresult = (e)=>{
      const text = e.results[0][0].transcript;
      const inputEl = document.getElementById('ai-input');
      if(inputEl) inputEl.value = (inputEl.value ? inputEl.value + ' ' : '') + text;
    };
    try{ aiRecognition.start(); }catch(e){ /* đã start rồi thì bỏ qua */ }
  }
  // Xây dựng System Instruction cho "Chàng Nông dân Thông minh" — gộp cả 4 vai trò yêu cầu,
  // kèm tóm tắt nhanh dữ liệu hộ vay của xã đang mở (phục vụ Vai trò 3: phân tích số liệu).
  function buildAiSystemPrompt(){
    let dataSummary = '';
    const list = (state.borrowers||[]).filter(x=>!x.deleted);
    if(list.length){
      const totalPrincipal = list.reduce((s,x)=> s + (parseFloat(x.principal)||0), 0);
      const today = new Date();
      const in30 = new Date(); in30.setDate(today.getDate()+30);
      const overdue = list.filter(x=> x.dueDate && new Date(x.dueDate) < today).length;
      const dueSoon = list.filter(x=> x.dueDate && new Date(x.dueDate) >= today && new Date(x.dueDate) <= in30).length;
      const byHamlet = {};
      list.forEach(x=>{ const h = x.hamlet||'(chưa rõ)'; byHamlet[h] = (byHamlet[h]||0) + (parseFloat(x.principal)||0); });
      const hamletLines = Object.entries(byHamlet).sort((a,b)=>b[1]-a[1]).slice(0,5)
        .map(([h,v])=>`  • ${h}: ${v.toLocaleString('vi-VN')} đồng`).join('\n');
      dataSummary = `\n\nDỮ LIỆU TÓM TẮT HIỆN TẠI của "${(state.config&&state.config.wardName)||wardId()||''}" (chỉ dùng khi người dùng hỏi về số liệu/dư nợ/hộ vay, không tự ý nhắc nếu không được hỏi):
- Tổng số hộ đang vay: ${list.length}
- Tổng dư nợ gốc: ${totalPrincipal.toLocaleString('vi-VN')} đồng
- Số hộ đã quá hạn trả nợ: ${overdue}
- Số hộ sắp đến hạn trong 30 ngày tới: ${dueSoon}
- Dư nợ theo địa bàn cao nhất (tối đa 5):\n${hamletLines}
(Đây là số liệu tóm tắt tức thời từ phần mềm, có thể không phản ánh 100% chi tiết từng hộ — khuyên người dùng đối chiếu lại Module "Sổ vay vốn" nếu cần độ chính xác tuyệt đối.)`;
    }
    return `Bạn tên là "Chàng Nông dân Thông minh" — trợ lý AI thân thiện, gần gũi, nói năng như một cán bộ Hội Nông dân giàu kinh nghiệm, xưng "Chàng" gọi người dùng là "bạn/đồng chí". Bạn đảm nhiệm 4 vai trò:
1) Trợ lý nghiệp vụ Hội Nông dân: giải đáp nhanh nghiệp vụ công tác hội, công tác hội viên, chính sách, quy chế cho vay, thủ tục gia hạn nợ, lãi suất, quỹ hỗ trợ nông dân.
2) Hướng dẫn sử dụng phần mềm quản lý này: giải thích tính năng, cách nhập liệu, cách thao tác trên các Module (Tổng quan, Sổ vay vốn, Chi tiêu & Hạch toán, Báo cáo lãi, Thùng rác, Thu-Chi nội bộ, Hồ sơ hội viên, Thực lực Hội, Biểu mẫu khảo sát, Cài đặt & Chia sẻ...).
3) Trợ lý phân tích số liệu: khi được hỏi về dư nợ/hộ vay/thống kê, hãy dựa vào phần "DỮ LIỆU TÓM TẮT HIỆN TẠI" bên dưới (nếu có); nếu không có hoặc không đủ, hãy nói rõ là chưa có dữ liệu và hướng dẫn xem trong Module tương ứng, không được bịa số liệu.
4) Trợ lý AI toàn năng: trả lời mọi câu hỏi kiến thức chung, viết/sửa văn bản, gợi ý code, dịch thuật, tư vấn... như một AI thông thường. Lưu ý: giao diện chat này hiện chỉ hỗ trợ văn bản, chưa hỗ trợ tạo/hiển thị hình ảnh.
Luôn trả lời bằng tiếng Việt (trừ khi được yêu cầu khác), ngắn gọn, dễ hiểu, đúng trọng tâm, có thể dùng gạch đầu dòng khi liệt kê.${dataSummary}`;
  }
  // Gọi Gemini API bằng ĐÚNG Cấu hình AI (model) mà người dùng đang chọn ở thanh model phía trên
  // ô nhập liệu. opts.attachments: tệp/ảnh đính kèm cho tin nhắn CUỐI CÙNG. opts.webSearch: bật
  // Google Search grounding (chế độ "Tìm kiếm web") cho lượt trả lời này.
  // ---------------------------------------------------------------------
  // Nhận diện "hãng" của 1 Cấu hình AI dựa trên tên model/tên gợi nhớ mà Admin đã nhập, để hệ
  // thống tự biết đâu là API Key Gemini, đâu là ChatGPT (OpenAI), đâu là Claude (Anthropic)...
  // ---------------------------------------------------------------------
  function aiVendorOf(p){
    const s = (((p&&p.model)||'') + ' ' + ((p&&p.label)||'')).toLowerCase();
    if(s.includes('gemini')) return 'gemini';
    if(s.includes('gpt') || s.includes('openai') || s.includes('chatgpt') || /\bo[134]\b/.test(s)) return 'openai';
    if(s.includes('claude') || s.includes('anthropic')) return 'anthropic';
    return 'unknown';
  }

  // Gọi 1 lượt Gemini duy nhất theo cơ chế STREAMING (:streamGenerateContent?alt=sse) — đọc từng
  // đoạn nhỏ ngay khi AI vừa xử lý xong, gọi onDelta(fullTextSoFar) liên tục để giao diện tuôn chữ
  // mượt mà. LƯU Ý: hàm này THROW lỗi (không tự bắt) để hàm điều phối bên ngoài quyết định có
  // chuyển sang tầng dự phòng tiếp theo hay không.
  async function callGeminiOnce(provider, model, messages, opts, onDelta){
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse&key=${provider.apiKey}`;
    const contents = messages.map((m,i)=>{
      const parts = [{text:m.text||''}];
      if(i===messages.length-1 && opts.attachments && opts.attachments.length){
        opts.attachments.forEach(a=> parts.push({ inline_data:{ mime_type:a.mimeType, data:a.base64 } }));
      }
      return { role: m.role==='assistant' ? 'model' : 'user', parts };
    });
    const body = { system_instruction:{ parts:[{text: buildAiSystemPrompt()}] }, contents };
    if(opts.webSearch) body.tools = [{ google_search:{} }]; // chế độ "Tìm kiếm web" — chỉ hoạt động với các model Gemini có hỗ trợ grounding
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if(!res.ok){
      let msg = `HTTP ${res.status}`;
      try{ const errData = await res.json(); msg = (errData && errData.error && errData.error.message) || (Array.isArray(errData) && errData[0] && errData[0].error && errData[0].error.message) || msg; }catch(e){}
      throw new Error(`[Gemini ${model}] ${msg}`);
    }
    let fullText = '';
    if(!res.body || !res.body.getReader){
      // Môi trường không hỗ trợ đọc luồng (hiếm gặp) -> rơi về đọc trọn gói 1 lần cho an toàn
      const data = await res.json();
      const arr = Array.isArray(data) ? data : [data];
      arr.forEach(obj=>{
        if(obj && obj.error) throw new Error(`[Gemini ${model}] ${obj.error.message || 'lỗi không xác định'}`);
        const parts = obj && obj.candidates && obj.candidates[0] && obj.candidates[0].content && obj.candidates[0].content.parts;
        if(parts) fullText += parts.map(p=>p.text||'').join('');
      });
      if(onDelta) onDelta(fullText);
      if(!fullText.trim()) throw new Error(`[Gemini ${model}] Không có nội dung trả về (có thể bị chặn an toàn hoặc quá tải).`);
      return { text: fullText.trim() };
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let buffer = '';
    while(true){
      const { done, value } = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, { stream:true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // giữ lại phần dòng còn dở dang cho lượt đọc kế tiếp
      for(const line of lines){
        const trimmed = line.trim();
        if(!trimmed.startsWith('data:')) continue;
        const jsonStr = trimmed.slice(5).trim();
        if(!jsonStr) continue;
        let obj;
        try{ obj = JSON.parse(jsonStr); }catch(e){ continue; /* dòng chưa trọn vẹn — đợi chunk sau */ }
        if(obj.error) throw new Error(`[Gemini ${model}] ${obj.error.message || 'lỗi không xác định'}`);
        const parts = obj.candidates && obj.candidates[0] && obj.candidates[0].content && obj.candidates[0].content.parts;
        if(parts){
          const deltaText = parts.map(p=>p.text||'').join('');
          if(deltaText){ fullText += deltaText; if(onDelta) onDelta(fullText); }
        }
      }
    }
    if(!fullText.trim()) throw new Error(`[Gemini ${model}] Không có nội dung trả về (có thể bị chặn an toàn hoặc quá tải).`);
    return { text: fullText.trim() };
  }

  // Gọi 1 lượt OpenAI (ChatGPT) — chuẩn Chat Completions, cũng hỗ trợ streaming SSE. THROW lỗi
  // khi thất bại, để hàm điều phối quyết định tầng kế tiếp.
  async function callOpenAIOnce(provider, messages, opts, onDelta){
    const model = provider.model || 'gpt-4o-mini';
    const oaMessages = [{ role:'system', content: buildAiSystemPrompt() }];
    messages.forEach((m,i)=>{
      if(i===messages.length-1 && opts.attachments && opts.attachments.length){
        const contentArr = [{ type:'text', text:m.text||'' }];
        opts.attachments.forEach(a=>{
          if((a.mimeType||'').startsWith('image/')) contentArr.push({ type:'image_url', image_url:{ url:`data:${a.mimeType};base64,${a.base64}` } });
        });
        oaMessages.push({ role: m.role==='assistant'?'assistant':'user', content: contentArr });
      } else {
        oaMessages.push({ role: m.role==='assistant'?'assistant':'user', content: m.text||'' });
      }
    });
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization': `Bearer ${provider.apiKey}` },
      body: JSON.stringify({ model, messages: oaMessages, stream:true }),
    });
    if(!res.ok){
      let msg = `HTTP ${res.status}`;
      try{ const errData = await res.json(); msg = (errData && errData.error && errData.error.message) || msg; }catch(e){}
      throw new Error(`[OpenAI ${model}] ${msg}`);
    }
    let fullText = '';
    if(!res.body || !res.body.getReader){
      const data = await res.json();
      fullText = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
      if(onDelta) onDelta(fullText);
      if(!fullText.trim()) throw new Error(`[OpenAI ${model}] Không có nội dung trả về.`);
      return { text: fullText.trim() };
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let buffer = '';
    while(true){
      const { done, value } = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, { stream:true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for(const line of lines){
        const trimmed = line.trim();
        if(!trimmed.startsWith('data:')) continue;
        const jsonStr = trimmed.slice(5).trim();
        if(!jsonStr || jsonStr==='[DONE]') continue;
        let obj;
        try{ obj = JSON.parse(jsonStr); }catch(e){ continue; }
        if(obj.error) throw new Error(`[OpenAI ${model}] ${obj.error.message || 'lỗi không xác định'}`);
        const deltaText = obj.choices && obj.choices[0] && obj.choices[0].delta && obj.choices[0].delta.content;
        if(deltaText){ fullText += deltaText; if(onDelta) onDelta(fullText); }
      }
    }
    if(!fullText.trim()) throw new Error(`[OpenAI ${model}] Không có nội dung trả về.`);
    return { text: fullText.trim() };
  }

  // Gọi 1 lượt Anthropic (Claude) — chuẩn Messages API, hỗ trợ streaming SSE. THROW lỗi khi thất bại.
  async function callAnthropicOnce(provider, messages, opts, onDelta){
    const model = provider.model || 'claude-3-5-sonnet-20241022';
    const anthMessages = messages.map((m,i)=>{
      if(i===messages.length-1 && opts.attachments && opts.attachments.length){
        const contentArr = [{ type:'text', text:m.text||'' }];
        opts.attachments.forEach(a=>{
          if((a.mimeType||'').startsWith('image/')) contentArr.push({ type:'image', source:{ type:'base64', media_type:a.mimeType, data:a.base64 } });
        });
        return { role: m.role==='assistant'?'assistant':'user', content: contentArr };
      }
      return { role: m.role==='assistant'?'assistant':'user', content: m.text||'' };
    });
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json', 'x-api-key': provider.apiKey,
        'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true',
      },
      body: JSON.stringify({ model, max_tokens:4096, system: buildAiSystemPrompt(), messages: anthMessages, stream:true }),
    });
    if(!res.ok){
      let msg = `HTTP ${res.status}`;
      try{ const errData = await res.json(); msg = (errData && errData.error && errData.error.message) || msg; }catch(e){}
      throw new Error(`[Claude ${model}] ${msg}`);
    }
    let fullText = '';
    if(!res.body || !res.body.getReader){
      const data = await res.json();
      fullText = (data.content||[]).map(c=>c.text||'').join('');
      if(onDelta) onDelta(fullText);
      if(!fullText.trim()) throw new Error(`[Claude ${model}] Không có nội dung trả về.`);
      return { text: fullText.trim() };
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let buffer = '';
    while(true){
      const { done, value } = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, { stream:true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for(const line of lines){
        const trimmed = line.trim();
        if(!trimmed.startsWith('data:')) continue;
        const jsonStr = trimmed.slice(5).trim();
        if(!jsonStr) continue;
        let obj;
        try{ obj = JSON.parse(jsonStr); }catch(e){ continue; }
        if(obj.type==='content_block_delta' && obj.delta && obj.delta.text){ fullText += obj.delta.text; if(onDelta) onDelta(fullText); }
        else if(obj.type==='error'){ throw new Error(`[Claude ${model}] ${(obj.error && obj.error.message) || 'lỗi không xác định'}`); }
      }
    }
    if(!fullText.trim()) throw new Error(`[Claude ${model}] Không có nội dung trả về.`);
    return { text: fullText.trim() };
  }

  // ---------------------------------------------------------------------
  // BỘ ĐIỀU PHỐI "DỰ PHÒNG TỰ ĐỘNG 3 TẦNG" — đây là hàm DUY NHẤT mà giao diện chat gọi tới.
  // TẦNG 1: gemini-1.5-pro (API Key Gemini trong Cấu hình AI).
  // TẦNG 2: nếu Tầng 1 lỗi bất kỳ kiểu gì (quá tải, 429, 503, mất mạng...) -> ÂM THẦM chuyển sang
  //         gemini-1.5-flash, dùng CHUNG API Key Gemini đó.
  // TẦNG 3: nếu Tầng 2 cũng lỗi -> kiểm tra trong Cấu hình AI có API Key của hãng khác không (vd
  //         ChatGPT/Claude); nếu có thì âm thầm gọi hãng đó để "cứu nguy"; nếu không có gì khác
  //         ngoài đúng 1 API Key Gemini thì mới báo lỗi thân thiện cho người dùng.
  // Toàn bộ quá trình chuyển tầng diễn ra NGẦM — người dùng không thấy bất kỳ cảnh báo lỗi đỏ nào,
  // chỉ thấy bong bóng "đang suy nghĩ" hơi lâu hơn bình thường rồi có câu trả lời bình thường.
  // Ngoại lệ: nếu người dùng tự tay CHỌN đích danh 1 model không phải Gemini ở thanh chọn model,
  // hệ thống tôn trọng đúng lựa chọn đó (không tự ý chuyển sang Gemini).
  // ---------------------------------------------------------------------
  async function callAIWithFallback(messages, opts, onDelta){
    opts = opts || {};
    if(!state.aiProviders || !state.aiProviders.length) await loadAiProviders();
    const providers = state.aiProviders || [];
    if(!providers.length){
      return { text:'Admin chưa cấu hình API AI nào. Vui lòng vào Module "CÀI ĐẶT ADMIN → Cấu hình AI" để thêm API Key.' };
    }
    const selected = getActiveAiProvider();
    const selectedVendor = selected ? aiVendorOf(selected) : null;

    // Người dùng tự chọn đích danh 1 model KHÔNG PHẢI Gemini -> tôn trọng lựa chọn, không áp dụng
    // cơ chế 3 tầng dành riêng cho Gemini (cơ chế này chỉ để chống nghẽn/quá tải của Gemini).
    if(selected && selectedVendor && selectedVendor !== 'gemini'){
      try{
        if(selectedVendor==='anthropic') return await callAnthropicOnce(selected, messages, opts, onDelta);
        return await callOpenAIOnce(selected, messages, opts, onDelta);
      }catch(e){
        console.error('[AI] Model đang chọn gặp lỗi:', e);
        return { text:'Xin lỗi, hệ thống AI đang gặp sự cố với model đang chọn. Bạn thử lại sau ít phút hoặc đổi sang model khác ở thanh chọn model phía trên nhé.' };
      }
    }

    const geminiProvider = (selected && selectedVendor==='gemini') ? selected : providers.find(p=> p.apiKey && aiVendorOf(p)==='gemini');

    if(geminiProvider && geminiProvider.apiKey){
      // ---- TẦNG 1: gemini-1.5-pro ----
      try{
        return await callGeminiOnce(geminiProvider, 'gemini-1.5-pro', messages, opts, onDelta);
      }catch(e1){
        console.warn('[AI Fallback] Tầng 1 (gemini-1.5-pro) lỗi -> âm thầm chuyển Tầng 2:', e1);
        if(onDelta) onDelta(''); // đưa bong bóng về lại trạng thái "đang suy nghĩ" trong lúc chuyển tầng
        // ---- TẦNG 2: gemini-1.5-flash (dùng chung API Key Gemini) ----
        try{
          return await callGeminiOnce(geminiProvider, 'gemini-1.5-flash', messages, opts, onDelta);
        }catch(e2){
          console.warn('[AI Fallback] Tầng 2 (gemini-1.5-flash) cũng lỗi -> âm thầm chuyển Tầng 3:', e2);
          if(onDelta) onDelta('');
        }
      }
    }

    // ---- TẦNG 3: hãng khác trong Cấu hình AI (nếu Admin có gắn thêm, vd ChatGPT/Claude) ----
    const otherProvider = providers.find(p=> p!==geminiProvider && p.apiKey && aiVendorOf(p)!=='gemini');
    if(otherProvider){
      try{
        const vendor = aiVendorOf(otherProvider);
        if(vendor==='anthropic') return await callAnthropicOnce(otherProvider, messages, opts, onDelta);
        return await callOpenAIOnce(otherProvider, messages, opts, onDelta);
      }catch(e3){
        console.error('[AI Fallback] Tầng 3 (hãng khác) cũng lỗi:', e3);
      }
    }

    if(!geminiProvider){
      return { text:'Admin chưa cấu hình API AI Gemini hợp lệ. Vui lòng vào Module "CÀI ĐẶT ADMIN → Cấu hình AI" để thêm API Key.' };
    }
    // Chỉ có ĐÚNG 1 API Key Gemini (không có hãng nào khác để cứu nguy) và cả 2 tầng Gemini đều lỗi.
    return { text:'Xin lỗi, hệ thống AI hiện đang quá tải, chưa thể trả lời ngay lúc này. Bạn vui lòng thử lại sau ít phút nhé!' };
  }
  async function sendAiMessage(text){
    const hasText = !!(text && text.trim());
    if(!hasText && !state.aiPendingAttachments.length) return;
    if(state.aiSending) return;
    let chat = state.aiChats.find(c=>c.id===state.aiActiveChatId);
    if(!chat){ chat = { id:'c_'+uid(), title:'Đoạn chat mới', messages:[], updatedAt:new Date().toISOString() }; state.aiChats.unshift(chat); state.aiActiveChatId = chat.id; }
    const attachmentsForApi = state.aiPendingAttachments.slice();
    // Chỉ lưu TÊN + LOẠI tệp vào lịch sử (không lưu base64) để tránh phình dung lượng Firebase —
    // nội dung thật chỉ dùng ngay cho lượt gọi AI này.
    const attachmentsForHistory = attachmentsForApi.map(a=>({ name:a.name, mimeType:a.mimeType }));
    chat.messages.push({ role:'user', text: (text||'').trim(), time:new Date().toISOString(), attachments: attachmentsForHistory });
    if(chat.messages.length===1) chat.title = (text||'').trim().slice(0,40) || (attachmentsForHistory[0] && attachmentsForHistory[0].name) || 'Đoạn chat mới';
    chat.updatedAt = new Date().toISOString();
    state.aiPendingAttachments = [];
    state.aiSending = true;
    // Thêm sẵn 1 bong bóng trợ lý (rỗng, đang "suy nghĩ") để tuôn chữ trực tiếp vào ngay khi có,
    // tạo cảm giác phản hồi tức thời thay vì phải chờ xong hết mới hiện "một cục".
    const assistantMsg = { role:'assistant', text:'', time:new Date().toISOString(), streaming:true };
    chat.messages.push(assistantMsg);
    renderAiChatOverlay();
    const result = await callAIWithFallback(chat.messages.slice(0,-1), { attachments: attachmentsForApi, webSearch: state.aiWebSearchOn }, (partial)=>{
      assistantMsg.text = partial;
      const bubbleEl = document.getElementById('ai-streaming-bubble');
      if(bubbleEl){
        if(partial){
          bubbleEl.classList.remove('thinking');
          bubbleEl.textContent = partial;
        } else {
          bubbleEl.classList.add('thinking');
          bubbleEl.textContent = 'Chàng đang suy nghĩ…';
        }
        const msgBox = document.getElementById('ai-messages');
        if(msgBox) msgBox.scrollTop = msgBox.scrollHeight;
      }
    });
    assistantMsg.text = result.text;
    delete assistantMsg.streaming;
    chat.updatedAt = new Date().toISOString();
    state.aiSending = false;
    renderAiChatOverlay();
    saveAiChatToCloud(chat);
  }
  // Dựng không gian chat toàn màn hình kiểu Gemini (sidebar lịch sử + khung chat + ô nhập).
  // Gắn TRỰC TIẾP vào document.body (ngoài #root) để không bị render() của app xoá mất.

    let overlay = document.getElementById('ai-chat-overlay');
    let firstCreate = false;
    if(!overlay){
      overlay = document.createElement('div'); overlay.id = 'ai-chat-overlay'; overlay.className = 'ai-overlay';
      document.body.appendChild(overlay);
      firstCreate = true;
    }
    const chat = state.aiChats.find(c=>c.id===state.aiActiveChatId);
    const provider = getActiveAiProvider();
    overlay.innerHTML = `
      <div class="ai-sidebar">
        <button class="ai-exit-btn" id="ai-exit-btn">✕ THOÁT</button>
        <button class="ai-newchat-btn" id="ai-newchat-btn">➕ Đoạn chat mới</button>
        <div class="ai-hist-label">Lịch sử đoạn chat</div>
        <div class="ai-hist-list">
          ${state.aiChats.length? state.aiChats.map(c=>`
            <div class="ai-hist-item ${c.id===state.aiActiveChatId?'active':''}" data-ai-hist="${c.id}">
              <span class="ai-hist-title">${escapeHtml(c.title||'Đoạn chat mới')}</span>
              <button class="ai-hist-del" data-ai-hist-del="${c.id}" title="Xoá đoạn chat">🗑️</button>
            </div>`).join('') : '<div class="sub" style="color:rgba(255,255,255,.6); padding:6px 10px;">Chưa có đoạn chat nào.</div>'}
        </div>
        ${!state.identity || !state.identity.email? '<div class="sub" style="color:rgba(255,255,255,.6); padding:8px 10px; font-size:11px;">Bạn đang dùng khách/tham quan — lịch sử chat chỉ lưu tạm trong phiên này.</div>' : ''}
      </div>
      <div class="ai-main">
        <div class="ai-header">🤖 Chàng Nông dân Thông minh</div>
        <div class="ai-messages" id="ai-messages">
          ${!chat || !chat.messages.length? `
            <div class="ai-bubble assistant">Chào bạn! Chàng là "Chàng Nông dân Thông minh" 🌾 — sẵn sàng hỗ trợ nghiệp vụ Hội Nông dân, hướng dẫn sử dụng phần mềm, phân tích số liệu hộ vay, hoặc trò chuyện bất cứ điều gì bạn cần. Bạn muốn hỏi gì nào?</div>`
            : chat.messages.map(m=> m.streaming
                ? `<div class="ai-bubble assistant ${m.text? '' : 'thinking'}" id="ai-streaming-bubble">${m.text? escapeHtml(m.text) : 'Chàng đang suy nghĩ…'}</div>`
                : `<div class="ai-bubble ${m.role}">${escapeHtml(m.text)}${m.attachments&&m.attachments.length? `<div class="ai-bubble-attach">${m.attachments.map(a=>`📎 ${escapeHtml(a.name)}`).join('&nbsp;&nbsp;')}</div>` : ''}</div>`
              ).join('')}
        </div>

        <div class="ai-model-bar">
          <div class="ai-model-select" id="ai-model-select">
            <span>${provider? `🧠 ${escapeHtml(provider.label||provider.model)}` : '⚠️ Chưa cấu hình AI'}</span><span class="ai-model-caret">▾</span>
            ${state._aiModelMenuOpen? `<div class="ai-model-dropdown">
              ${state.aiProviders.length? state.aiProviders.map(p=>`
                <div class="ai-model-opt ${provider&&p.id===provider.id?'active':''}" data-ai-select-provider="${p.id}">

      inputEl.addEventListener('keydown', (e)=>{

      });
    }
  }

              <button class="btn btn-ghost btn-sm" data-restore-ward="${d.wardId}">Khôi phục</button>
              <button class="btn btn-ghost btn-sm" data-purge-ward="${d.wardId}" style="color:var(--red);">Xoá vĩnh viễn</button>
            </span>
          </div>`).join('') : '<div class="sub" style="padding:6px 0 14px;">Trống.</div>'}
        <p class="sub" style="margin:6px 0 0; font-size:11.5px;">💬 Để khôi phục lại mã định danh đã bị xoá vĩnh viễn, vui lòng liên hệ với chủ website này!</p>
      </div>

      ${isSiteOwner() ? `
        <div class="divider-lbl">🛡️ Thùng rác hệ thống (Quản trị viên trang web)</div>
        ${state.sysTrash.length? state.sysTrash.map(d=>`
          <div class="kv-row"><span>${d.wardName||'(chưa đặt tên)'} <span class="sub">(${d.wardId} — chủ cũ: ${d.ownerEmail})</span></span>
            <span style="display:flex; gap:8px;">
              <button class="btn btn-ghost btn-sm" data-super-restore="${d.wardId}">Khôi phục cho chủ</button>
              <button class="btn btn-ghost btn-sm" data-super-purge="${d.wardId}" style="color:var(--red);">Xoá vĩnh viễn</button>
            </span>
          </div>`).join('') : '<div class="sub" style="padding:6px 0 14px;">Trống.</div>'}
      ` : ''}
    `;

    mountEl.querySelectorAll('.ward-row').forEach(rowEl=>{
      rowEl.addEventListener('click', async (e)=>{
        if(e.target.closest('[data-ward-remove]')) return;
        const wid = rowEl.dataset.ward;
        const w = state.myWards.find(x=>x.wardId===wid);
        if(!w) return;
        if(w.live && w.live.deleted){ alert('Mã xã này đã bị Chủ mã xoá.'); return; }
        const needsReauth = w.kind==='guest' && w.live && (w.live.accessVersion||0) !== (w.av||0);
        if(needsReauth){
          const pass = prompt('Chủ mã đã đổi mật khẩu mã xã. Vui lòng nhập mật khẩu MỚI để tiếp tục:');
          if(pass===null) return;
          await joinOrCreateWard(wid, pass);
          return;
        }
        await enterWard(wid);
      });
    });
    mountEl.querySelectorAll('[data-ward-remove]').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.stopPropagation();
        const wid = btn.dataset.wardRemove;
        const w = state.myWards.find(x=>x.wardId===wid);
        if(w && w.kind==='owner') await ownerDeleteWard(wid);
        else await guestRemoveWard(wid);
        if(embedded){ /* renderSettingsTab tự render lại thông qua các hàm trên khi cần */ }
      };
    });
    mountEl.querySelector('#ww-random').onclick = async ()=>{ await createRandomWardAndOnboard(); };
    // Yêu cầu 4: tách riêng "Tạo mã mới" và "Tham gia bằng mã này" — mỗi nút có logic RIÊNG,
    // dùng chung hàm createWardStrict/joinWardStrict (đã có cảnh báo lỗi tương ứng khi thất bại).
    mountEl.querySelector('#ww-create').onclick = async ()=>{
      const wid = mountEl.querySelector('#ww-wardid').value;
      const pass = mountEl.querySelector('#ww-pass').value;
      if(!wid.trim()){ alert('Vui lòng nhập mã xã.'); return; }
      await createWardStrict(wid, pass);
    };
    mountEl.querySelector('#ww-joinbtn').onclick = async ()=>{
      const wid = mountEl.querySelector('#ww-wardid').value;
      const pass = mountEl.querySelector('#ww-pass').value;
      if(!wid.trim()){ alert('Vui lòng nhập mã xã.'); return; }
      await joinWardStrict(wid, pass);
    };
    mountEl.querySelector('#ww-trash-toggle').onclick = ()=>{ state.walletTrashOpen = !state.walletTrashOpen; render(); };
    mountEl.querySelectorAll('[data-restore-ward]').forEach(btn=> btn.onclick = ()=> restoreDeletedWard(btn.dataset.restoreWard));
    mountEl.querySelectorAll('[data-purge-ward]').forEach(btn=> btn.onclick = ()=> purgeDeletedWardToSuperadmin(btn.dataset.purgeWard));
    mountEl.querySelectorAll('[data-super-restore]').forEach(btn=> btn.onclick = ()=> superRestoreWard(btn.dataset.superRestore));
    mountEl.querySelectorAll('[data-super-purge]').forEach(btn=> btn.onclick = ()=> superPurgeForever(btn.dataset.superPurge));
  }

  // Nhãn "Danh sách các ..." dùng ngay tại màn hình thiết lập lần đầu (trước khi state.config tồn tại)
  function subAdminListLabelLocal(subType, customVal){
    const t = SUB_ADMIN_OPTIONS.includes(subType) ? subType : 'Ấp';
    const label = t==='Khác' ? ((customVal||'').trim()||'Đơn vị') : t;
    return `Danh sách các ${label.toLowerCase()}`;
  }

  // Màn hình "Thiết lập ban đầu" — dùng cho MỌI trường hợp một mã định danh CHƯA từng thiết lập
  // (state.config === null) dù là: vừa tạo mã tự chọn, vừa được cấp mã ngẫu nhiên, hay chọn vào một
  // mã đã tạo trước đó nhưng chưa từng hoàn tất thiết lập (yêu cầu 6). Luôn có sẵn 1 Mã định danh
  // thật (wardId) — không còn khái niệm "mã rỗng" nữa (yêu cầu 1).
  // Yêu cầu 3 & 4: tách rõ "Thông tin cơ bản (bắt buộc)" và "Thiết lập nâng cao (có thể bỏ qua)";
  // cả 2 nút ở khối nâng cao đều dẫn tới cùng 1 kết quả — lưu dữ liệu bắt buộc + dữ liệu nâng cao (đã gõ
  // hoặc mặc định nếu bỏ trống) rồi vào thẳng giao diện chính.
  function renderOnboarding(){
    const cfg = state.config || { hamlets:[], projects:[], quarters:{
      q1:{label:'Quý 1', start:'2026-01-01', end:'2026-03-31'}, q2:{label:'Quý 2', start:'2026-04-01', end:'2026-06-30'},
      q3:{label:'Quý 3', start:'2026-07-01', end:'2026-09-30'}, q4:{label:'Quý 4', start:'2026-10-01', end:'2026-12-31'}
    }, retainPercent:30, wardName:'', adminLevel:'Xã', subAdminType:'Ấp', subAdminCustom:'', provinceType:'', provinceName:'',
      ownerEmail: state.identity.email, officerTitle:'' };
    const curLevel = ADMIN_LEVEL_OPTIONS.includes(cfg.adminLevel) ? cfg.adminLevel : 'Xã';
    const curSub = SUB_ADMIN_OPTIONS.includes(cfg.subAdminType) ? cfg.subAdminType : 'Ấp';
    const curProvinceType = PROVINCE_TYPE_OPTIONS.includes(cfg.provinceType) ? cfg.provinceType : 'Tỉnh';
    root.innerHTML = `
      <div class="center-screen">
        <div class="auth-card" style="max-width:640px; text-align:left;">
          <div class="rice-badge" style="margin:0 0 14px;">⚙️</div>
          <h1 style="text-align:left;">Thiết lập cơ sở dữ liệu lõi</h1>
          <p class="sub" style="text-align:left;">Thiết lập lần đầu cho địa phương — có thể chỉnh sửa lại sau trong mục Cài đặt.</p>

          <div class="divider-lbl" id="ob-required-anchor">📌 Thông tin cơ bản (bắt buộc)</div>
          <div class="form-grid">
            <div class="field"><label>Loại xã/phường *</label>
              <select id="ob-adminlevel">${ADMIN_LEVEL_OPTIONS.map(o=>`<option value="${o}" ${curLevel===o?'selected':''}>${o}</option>`).join('')}</select>
            </div>
            <div class="field"><label id="ob-ward-label">Tên riêng (${curLevel}) *</label><input id="ob-ward" placeholder="Ví dụ: Hưng Phước, Bình Minh..." value="${cfg.wardName||''}"></div>
            <div class="field"><label>Loại tỉnh/thành phố *</label>
              <select id="ob-provincetype">${PROVINCE_TYPE_OPTIONS.map(o=>`<option value="${o}" ${curProvinceType===o?'selected':''}>${o}</option>`).join('')}</select>
            </div>
            <div class="field"><label>Tên tỉnh/thành phố *</label><input id="ob-provincename" placeholder="Ví dụ: Bình Phước, Cần Thơ..." value="${cfg.provinceName||''}"></div>
            <div class="field"><label>Loại khu dân cư cấp dưới *</label>
              <select id="ob-subadmin">${SUB_ADMIN_OPTIONS.map(o=>`<option value="${o}" ${curSub===o?'selected':''}>${o}</option>`).join('')}</select>
            </div>
            <div class="field" id="ob-subadmin-custom-wrap" style="${curSub==='Khác'?'':'display:none;'}">
              <label>Tên gọi khác (tự điền) *</label>
              <input id="ob-subadmin-custom" placeholder="Ví dụ: Buôn, Bản, Sóc..." value="${cfg.subAdminCustom||''}">
            </div>
            <div class="field"><label>Chức vụ cán bộ</label><input id="ob-title" placeholder="Chủ tịch Hội Nông dân... (có thể để trống)" value="${cfg.officerTitle||''}"></div>
          </div>

          <div class="field full" style="margin-top:4px;">
            <label>Mã định danh cấp Xã/Phường đang sử dụng</label>
            <input value="${state.identity.wardId||''}" disabled style="text-transform:lowercase; opacity:.75;">
            <p class="sub" style="margin:4px 0 0; font-size:11.5px;">
              Dữ liệu sẽ lưu tại <span class="mono">data/${state.identity.wardId||'...'}/...</span> trên Firebase. Hãy cung cấp đúng mã này (và mật khẩu, nếu bạn đặt) cho các cán bộ khác để họ tham gia chung dữ liệu. Bạn có thể đổi sang tên khác bất cứ lúc nào trong mục Cài đặt.
            </p>
          </div>

          <div style="border:1px dashed var(--gold); border-radius:12px; padding:14px 16px; margin-top:20px; background:rgba(199,154,43,.06);">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:2px;">
              <b style="font-size:13.5px; color:var(--rice-dark);">⚙️ Thiết lập nâng cao</b>
            </div>
            <p class="sub" style="margin:0 0 12px; font-size:11.5px;">💡 Có thể bỏ qua và thiết lập sau trong phần Cài đặt. Các mục dưới đây có thể để trống hoặc để mặc định.</p>

            <div class="divider-lbl" id="ob-hamlets-divider">${subAdminListLabelLocal(curSub, cfg.subAdminCustom)}</div>
            <div class="field"><textarea id="ob-hamlets" rows="2" placeholder="${curSub} 1, ${curSub} 2, ${curSub} 3...">${(cfg.hamlets||[]).join(', ')}</textarea></div>
            <p class="sub" style="margin:-6px 0 0; font-size:11.5px;">Nhập cách nhau bởi dấu phẩy, hãy thêm dấu phẩy vào ạ</p>

            <div class="divider-lbl">Phương án vay vốn hiện hành</div>
            <div class="field"><textarea id="ob-projects" rows="2" placeholder="Phương án vay chăn nuôi bò, Phương án vay trồng rau sạch...">${(cfg.projects||[]).join(', ')}</textarea></div>
            <p class="sub" style="margin:-6px 0 0; font-size:11.5px;">Nhập cách nhau bởi dấu phẩy, hãy thêm dấu phẩy vào ạ</p>

            <div class="divider-lbl">Mốc thời gian 4 Quý trong năm</div>
            <div class="form-grid">
              ${['q1','q2','q3','q4'].map(q=>`
                <div style="border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:var(--white);">
                  <label style="font-size:12.5px; font-weight:700; color:var(--rice-dark);">${cfg.quarters[q].label}</label>
                  <div style="display:flex; gap:8px; margin-top:6px;">
                    <input type="date" id="ob-${q}-start" value="${cfg.quarters[q].start||''}">
                    <input type="date" id="ob-${q}-end" value="${cfg.quarters[q].end||''}">
                  </div>
                </div>`).join('')}
            </div>

            <div class="divider-lbl" id="ob-retain-divider">Tỷ lệ giữ lại tại ${curSub.toLowerCase()}</div>
            <div class="field"><input type="number" id="ob-retain" value="${cfg.retainPercent}" min="0" max="100"> <span class="sub" id="ob-retain-sub">% tổng lãi ${curSub.toLowerCase()} thu được — phần còn lại nộp lên ${curLevel.toLowerCase()}</span></div>

            <div style="display:flex; gap:10px; margin-top:14px;">
              <button class="btn btn-ghost" id="ob-skip" style="flex:1;">Bỏ qua, thiết lập sau</button>
              <button class="btn btn-primary" id="ob-save" style="flex:1;">Lưu và tiếp tục</button>
            </div>
          </div>
        </div>
      </div>`;

    // Ép trình duyệt cuộn xuống phần "Thông tin cơ bản (bắt buộc)" ngay khi vào màn hình này
    // (chỉ đến được đây sau khi bấm [Tạo mã định danh mới] / [Làm việc không cần mã] / chọn vào
    // một mã chưa từng thiết lập — yêu cầu 3 & 6).
    const anchorEl = document.getElementById('ob-required-anchor');
    if(anchorEl) setTimeout(()=> anchorEl.scrollIntoView({behavior:'smooth', block:'start'}), 60);

    // ---- cập nhật động các nhãn/placeholder khi người dùng đổi cấu hình danh xưng ----
    function currentSubLabel(){
      const t = document.getElementById('ob-subadmin').value;
      if(t==='Khác'){ const c=(document.getElementById('ob-subadmin-custom').value||'').trim(); return c || 'Đơn vị'; }
      return t;
    }
    function refreshAdminLabels(){
      const level = document.getElementById('ob-adminlevel').value;
      const sub = currentSubLabel();
      document.getElementById('ob-subadmin-custom-wrap').style.display = document.getElementById('ob-subadmin').value==='Khác' ? '' : 'none';
      document.getElementById('ob-ward-label').textContent = `Tên riêng (${level}) *`;
      document.getElementById('ob-hamlets-divider').textContent = `Danh sách các ${sub.toLowerCase()}`;
      document.getElementById('ob-hamlets').placeholder = `${sub} 1, ${sub} 2, ${sub} 3...`;
      document.getElementById('ob-retain-divider').textContent = `Tỷ lệ giữ lại tại ${sub.toLowerCase()}`;
      document.getElementById('ob-retain-sub').textContent = `% tổng lãi ${sub.toLowerCase()} thu được — phần còn lại nộp lên ${level.toLowerCase()}`;
    }
    document.getElementById('ob-adminlevel').onchange = refreshAdminLabels;
    document.getElementById('ob-subadmin').onchange = refreshAdminLabels;
    document.getElementById('ob-subadmin-custom').oninput = refreshAdminLabels;

    // ---- Yêu cầu 3: kiểm tra đầy đủ "Thông tin cơ bản bắt buộc" trước khi được đi tiếp ----
    // Dùng CHUNG cho cả 2 nút [Bỏ qua, thiết lập sau] / [Lưu và tiếp tục] — theo yêu cầu 4,
    // cả 2 nút phải bắt buộc đủ thông tin cơ bản như nhau, chỉ phần "nâng cao" là được phép trống.
    function validateRequired(){
      const wardNameVal = document.getElementById('ob-ward').value.trim();
      const provinceNameVal = document.getElementById('ob-provincename').value.trim();
      const subAdminType = document.getElementById('ob-subadmin').value;
      const subAdminCustom = document.getElementById('ob-subadmin-custom').value.trim();
      if(!wardNameVal){ alert(`Vui lòng nhập Tên riêng (${document.getElementById('ob-adminlevel').value}).`); document.getElementById('ob-ward').focus(); return null; }
      if(!provinceNameVal){ alert('Vui lòng nhập Tên tỉnh/thành phố.'); document.getElementById('ob-provincename').focus(); return null; }
      if(subAdminType==='Khác' && !subAdminCustom){ alert('Vui lòng nhập tên gọi khác cho cấp cơ sở trực thuộc.'); document.getElementById('ob-subadmin-custom').focus(); return null; }
      return { wardNameVal, provinceNameVal, subAdminType, subAdminCustom };
    }

    // ---- Yêu cầu 4: cả 2 nút cùng chung 1 kết quả — lưu dữ liệu bắt buộc + dữ liệu nâng cao
    // (đã gõ hoặc mặc định nếu để trống), rồi vào ngay giao diện chính ----
    async function finishOnboarding(){
      const req = validateRequired();
      if(!req) return;
      const baseFields = {
        wardName: req.wardNameVal,
        adminLevel: document.getElementById('ob-adminlevel').value,
        provinceType: document.getElementById('ob-provincetype').value,
        provinceName: req.provinceNameVal,
        subAdminType: req.subAdminType, subAdminCustom: req.subAdminCustom,
        officerTitle: document.getElementById('ob-title').value.trim(),
        hamlets: document.getElementById('ob-hamlets').value.split(',').map(s=>s.trim()).filter(Boolean),
        projects: document.getElementById('ob-projects').value.split(',').map(s=>s.trim()).filter(Boolean),
        quarters: {
          q1:{label:'Quý 1', start:document.getElementById('ob-q1-start').value, end:document.getElementById('ob-q1-end').value},
          q2:{label:'Quý 2', start:document.getElementById('ob-q2-start').value, end:document.getElementById('ob-q2-end').value},
          q3:{label:'Quý 3', start:document.getElementById('ob-q3-start').value, end:document.getElementById('ob-q3-end').value},
          q4:{label:'Quý 4', start:document.getElementById('ob-q4-start').value, end:document.getElementById('ob-q4-end').value},
        },
        retainPercent: parseFloat(document.getElementById('ob-retain').value)||0,
      };

      const newCfg = {
        ...baseFields,
        ownerEmail: cfg.ownerEmail,
        // ---- đa mã xã: mật khẩu mã (không bắt buộc) + trạng thái xoá ----
        accessCode: state._pendingAccessCode || '',
        accessVersion: 0,
        deleted: false,
        // ---- phân quyền chia sẻ (Loại 1 công khai / Loại 2 đích danh) — mặc định chưa chia sẻ gì ----
        publicPerms: {data:'none', members:'none', strength:'none', internal:'none'},
        grants: {},
        // ---- "Mã ẩn" cố định, không đổi dù đổi tên/mã định danh sau này — phục vụ quản lý VIP/PRO ----
        secretId: state._pendingSecretId || genSecretId(),
      };
      state.config = newCfg;
      await cSet('config', newCfg); // ghi lên data/{wardId}/config trên Firebase
      delete state._pendingAccessCode;
      delete state._pendingSecretId;
      // Cập nhật lại tên hiển thị của mã này trong Ví mã xã của Chủ mã
      await rtdb.ref(`users/${emailToKey(state.identity.email)}/wards/${wardId()}`).set({kind:'owner', wardName:req.wardNameVal, addedAt:new Date().toISOString()});
      state.view = 'app';
      state._showWardWelcome = true;
      attachRealtime();
      render();
    }

    document.getElementById('ob-save').onclick = finishOnboarding;
    document.getElementById('ob-skip').onclick = finishOnboarding;
  }

  function navItems(){
    const items = [];
    if(canViewModule('data')){
      items.push({id:'dashboard', ico:'📊', label:'Tổng quan'});
      items.push({id:'data', ico:'📋', label:'Sổ vay vốn'});
      items.push({id:'expenses', ico:'💰', label:`Chi tiêu & Hạch toán ${adminLevelLabel()}`});
      items.push({id:'reports', ico:'🧾', label:'Báo cáo lãi'});
      items.push({id:'trash', ico:'🗑️', label:'Thùng rác', badge: state.trash.length||null});
    }
    if(canViewModule('internal')) items.push({id:'internal', ico:'🔒', label:'Thu – Chi nội bộ'});
    if(canViewModule('members')) items.push({id:'members', ico:'🪪', label:'Hồ sơ hội viên'});
    if(canViewModule('strength')) items.push({id:'strength', ico:'💪', label:'Thực lực Hội'});
    if(isOwner()) items.push({id:'log', ico:'🕘', label:'Nhật ký hoạt động'});
    // Yêu cầu 7: Module mới "Biểu mẫu khảo sát" — nằm ngay phía trên "Cài đặt & Chia sẻ"
    items.push({id:'survey', ico:'📝', label:'Biểu mẫu khảo sát'});
    if(isOwner() || settingsPerm()!=='none') items.push({id:'settings', ico:'⚙️', label:'Cài đặt & Chia sẻ'});
    items.push({id:'guide', ico:'📖', label:'Hướng dẫn sử dụng'});
    items.push({id:'about', ico:'ℹ️', label:'Thông tin phần mềm'});
    // Chỉ Admin (2 Admin tối cao + Admin được thêm vào) mới nhìn thấy mục này — luôn ở cuối cùng.
    if(isAdmin()) items.push({id:'adminSettings', ico:'🛠️', label:'CÀI ĐẶT ADMIN'});
    return items;
  }

  function describeAccess(){
    if(state.previewMode) return 'Môi trường tham quan';
    if(!wardId()) return 'Chưa chọn mã xã';
    if(!state.identity.email) return 'Khách qua mã (không đăng nhập)';
    if(isOwner()) return 'Chủ mã (CHỦ MÃ)';
    if(isPending()) return 'Đang chờ Chủ mã duyệt';
    return 'Khách — đã được cấp quyền';
  }

  function renderApp(){
    const nav = navItems();
    if(!nav.some(n=>n.id===state.activeTab)) state.activeTab = nav.length? nav[0].id : 'guide';
    const roleLabel = describeAccess();
    const alerts = wardId() ? computeAlerts() : [];
    const hasIdentityEmail = !!(state.identity && state.identity.email);
    root.innerHTML = `
      <div class="app-title-banner"><span>Sổ tay Công tác Hội Nông dân cấp xã/phường</span></div>
      ${state.previewMode? `
      <div class="preview-banner">
        ⚠️ Bạn đang ở môi trường tham quan. Hãy chọn <button class="link-btn" id="pv-login">Đăng nhập hoặc Tham gia bằng mã</button> để sử dụng;
        hoặc <button class="link-btn" id="pv-guide">Xem hướng dẫn sử dụng website</button>.
      </div>` : ''}
      ${state._adminViewingWard? `
      <div class="admin-view-banner">🛡️ ADMIN đang XEM THỬ (chỉ đọc, không sửa được) dữ liệu của mã "${wardId()}". Bấm "Thoát khỏi mã định danh" để quay về mã của bạn.</div>` : ''}
      <div class="app-shell">
        <div class="sidebar">
          <div class="brand"><div class="ico">🌾</div><div class="txt">${wardProvinceHeaderLine()||'Chưa chọn mã xã'}<small>${wardId()||''}</small></div></div>
          ${nav.map(n=>`
            <button class="nav-item ${state.activeTab===n.id?'active':''}" data-tab="${n.id}">
              <span>${n.ico}</span><span>${n.label}</span>
              ${n.badge?`<span class="badge">${n.badge}</span>`:''}
            </button>`).join('')}
          <div class="foot">${state.identity.email?`Đăng nhập: ${state.identity.email}`:'Chưa đăng nhập Google'}<br>Vai trò: ${roleLabel}
            <div style="margin-top:8px; display:flex; flex-direction:column; gap:6px;">
              ${state.previewMode? '' : hasIdentityEmail
                ? (wardId()? `<button class="btn btn-ghost btn-sm" id="ward-logout-btn" style="color:#fff; border-color:rgba(255,255,255,.3);">🔁 Thoát khỏi mã định danh</button>` : `<button class="btn btn-ghost btn-sm" id="ward-goto-wallet" style="color:#fff; border-color:rgba(255,255,255,.3);">🗂️ Chọn / thêm mã xã</button>`)
                : `<button class="btn btn-ghost btn-sm" id="codeguest-logout-btn" style="color:#fff; border-color:rgba(255,255,255,.3);">↩ Rời mã xã này</button>`}
              ${state.previewMode
                ? `<button class="btn btn-ghost btn-sm" id="logout-btn" style="color:#fff; border-color:rgba(255,255,255,.3);">Thoát môi trường tham quan</button>`
                : hasIdentityEmail? `<button class="btn btn-ghost btn-sm" id="logout-btn" style="color:#fff; border-color:rgba(255,255,255,.3);">Đăng xuất tài khoản Google</button>` : ''}
            </div>
          </div>
        </div>
        <div class="main">
          <div class="topbar">
            <div><h2>${nav.find(n=>n.id===state.activeTab).label}</h2><div class="sub">${wardTitle()||`Chưa chọn mã xã · chỉ dùng được Thu–Chi nội bộ`} ${wardId()?`· ${state.borrowers.filter(b=>!b.deleted).length} hộ vay đang theo dõi`:''}</div></div>

              <button class="bell-btn" id="bell-btn">🔔${alerts.length?`<span class="bell-dot"></span>`:''}</button>
              <div class="avatar" ${state.identity.photo?`style="background-image:url('${state.identity.photo}'); background-size:cover; background-position:center;"`:''}>${state.identity.photo?'':(state.identity.name||'?')[0].toUpperCase()}</div>

          </div>
          <div class="content" id="content"></div>
        </div>
      </div>`;
    document.querySelectorAll('.nav-item').forEach(el=>{
      el.onclick = ()=>{ state.activeTab = el.dataset.tab; state.bellOpen=false; render(); };
    });
    document.getElementById('bell-btn').onclick = (e)=>{ e.stopPropagation(); state.bellOpen = !state.bellOpen; render(); };
    const pvLogin = document.getElementById('pv-login');
    if(pvLogin) pvLogin.onclick = exitPreviewMode;
    const pvGuide = document.getElementById('pv-guide');
    if(pvGuide) pvGuide.onclick = ()=>{ state.activeTab='guide'; render(); };
    const wardLogoutBtn = document.getElementById('ward-logout-btn');
    if(wardLogoutBtn) wardLogoutBtn.onclick = exitToWallet;
    const gotoWalletBtn = document.getElementById('ward-goto-wallet');
    if(gotoWalletBtn) gotoWalletBtn.onclick = async ()=>{ await loadWallet(); state.view='wallet'; render(); };
    const codeGuestLogoutBtn = document.getElementById('codeguest-logout-btn');
    if(codeGuestLogoutBtn) codeGuestLogoutBtn.onclick = ()=>{
      detachRealtime();
      state.identity = null;
      state.config=null; state.borrowers=[]; state.expenses=[]; state.trash=[]; state.log=[];
      state.view = 'login'; render();
    };
    const logoutBtn = document.getElementById('logout-btn');
    if(logoutBtn) logoutBtn.onclick = async ()=>{
      if(state.previewMode){ exitPreviewMode(); return; }
      detachRealtime();
      state.config = null; state.borrowers=[]; state.expenses=[]; state.trash=[]; state.log=[];
      await auth.signOut(); // auth.onAuthStateChanged (trong boot()) sẽ tự dọn identity & chuyển về màn hình đăng nhập
    };
    document.addEventListener('click', ()=>{ if(state.bellOpen){ state.bellOpen=false; render(); } }, {once:true});

    const content = document.getElementById('content');
    if(state.activeTab==='dashboard') renderDashboard(content, alerts);
    else if(state.activeTab==='data') renderDataTab(content);
    else if(state.activeTab==='expenses') renderExpensesTab(content);
    else if(state.activeTab==='reports') renderReportsTab(content);
    else if(state.activeTab==='internal') renderInternalTab(content);
    else if(state.activeTab==='members') renderMembersTab(content);
    else if(state.activeTab==='strength') renderStrengthTab(content);
    else if(state.activeTab==='trash') renderTrashTab(content);
    else if(state.activeTab==='log') renderLogTab(content);
    else if(state.activeTab==='survey') renderSurveyTab(content);
    else if(state.activeTab==='settings') renderSettingsTab(content);
    else if(state.activeTab==='guide') renderGuideTab(content);
    else if(state.activeTab==='about') renderAboutTab(content);
    else if(state.activeTab==='adminSettings') renderAdminSettingsTab(content);

    // Chỉ dựng modal khi chưa có modal nào đang mở trên màn hình — tránh bị
    // dựng chồng nhiều lớp modal mỗi khi có dữ liệu mới đẩy về qua realtime.
    if(state.modal && !document.querySelector('.modal-bg') && !state.previewMode){
      if(state.modal.type==='expense') renderExpenseModal();
      else renderModal();
    }

    // Môi trường THAM QUAN: mọi nút bấm/ô nhập bên trong nội dung module đều bị vô hiệu hoá —
    // người xem được phép chuyển tab thoải mái nhưng chỉ xem giao diện mẫu, không sửa được gì.
    if(state.previewMode){
      content.querySelectorAll('button, input, select, textarea').forEach(elx=>{ elx.disabled = true; });
    }

    // Yêu cầu 5: bảng phụ chào mừng khi vào môi trường tham quan (chỉ hiện 1 lần ngay khi vào)
    if(state.previewMode && state._showPreviewWelcome && !document.querySelector('.modal-bg')){
      renderPreviewWelcomePopup();
    }
    // Yêu cầu 1 (tài liệu mới): bảng chào mừng mỗi khi BẮT ĐẦU 1 PHIÊN LÀM VIỆC với 1 mã định danh
    // (đăng nhập xong, tự khôi phục phiên đã lưu, tham gia bằng mã không cần đăng nhập, hoặc
    // chuyển/đổi sang xem mã định danh khác) — không áp dụng cho môi trường tham quan (đã có popup
    // chào mừng riêng ở trên).
    if(!state.previewMode && state._showWardWelcome && !document.querySelector('.modal-bg')){
      renderWardWelcomePopup();
    }
  }

  // Yêu cầu 5: Popup chào mừng môi trường tham quan — 2 nút [Xem hướng dẫn] / [Bỏ qua]

          <h3 style="margin:0 0 10px;">Chúc đồng chí một ngày làm việc vui vẻ!</h3>
          <p class="sub" style="margin:0 0 20px; font-size:13.5px; line-height:1.6;">Đây là môi trường tham quan, đồng chí có muốn xem hướng dẫn cụ thể không?</p>
          <div style="display:flex; gap:10px;">

      ${items.length? items.map(it=>`

          <span class="dotc" style="background:${it.color==='gray'?'#C9C4AE':it.color==='red'?'var(--red)':it.color==='orange'?'var(--orange)':it.color==='yellow'?'var(--yellow)':'var(--moss)'}"></span>
          <div>${it.text}${it.time?`<div style="color:#9A9580; font-size:11px; margin-top:2px;">${new Date(it.time).toLocaleString('vi-VN')}</div>`:''}</div>
        </div>`).join('') : `<div class="bell-empty">Không có thông báo nào</div>`}

  function renderDashboard(el, alerts){
    const counts = dashboardCounts(alerts);
    const active = state.borrowers.filter(b=>!b.deleted);
    const totalPrincipal = active.reduce((s,b)=>s+ (parseFloat(b.principal)||0),0);
    el.innerHTML = `
      <div class="grid3">
        <div class="stat-card stat-yellow"><div class="num mono">${counts.yellow}</div><div class="lbl">🟡 Sắp đến hạn (≤60 ngày)</div><div class="sub">Cảnh báo sớm — cần chuẩn bị thu hồi vốn</div></div>

        <div class="stat-card stat-red"><div class="num mono">${counts.red}</div><div class="lbl">🔴 Khẩn cấp (≤15 ngày)</div><div class="sub">Ưu tiên xử lý ngay</div></div>

  function borrowerRowStatus(b){
    const {from,to} = periodRange();
    const calc = calcInterest(b, from, to);
    return {calc, iStatus: interestStatus(b, calc.due), pStatus: principalStatus(b)};
  }

  function renderDataTab(el){
    const hamlets = state.config.hamlets||[];
    const projects = state.config.projects||[];
    let list = state.borrowers.filter(b=>!b.deleted);
    if(state.search) list = list.filter(b=> (b.name+b.cccd+b.phone).toLowerCase().includes(state.search.toLowerCase()));
    if(state.filterHamlet) list = list.filter(b=>b.hamlet===state.filterHamlet);
    if(state.filterProject) list = list.filter(b=>b.project===state.filterProject);

    el.innerHTML = `
      <div class="toolbar">
        <input id="f-search" placeholder="🔎 Tìm theo tên, CCCD, SĐT..." value="${state.search}" style="min-width:220px;">
        <select id="f-hamlet"><option value="">Tất cả ${subAdminLabelLower()}</option>${hamlets.map(h=>`<option ${state.filterHamlet===h?'selected':''}>${h}</option>`).join('')}</select>
        <select id="f-project"><option value="">Tất cả phương án vay</option>${projects.map(p=>`<option ${state.filterProject===p?'selected':''}>${p}</option>`).join('')}</select>

        <button class="btn btn-ghost btn-sm" id="exp-excel-btn">⬇️ Xuất file Excel Sổ Vay Vốn</button>
        <button class="btn btn-ghost btn-sm" id="exp-word-btn">⬇️ Xuất file Word</button>
        ${canEditModule('data')? `<button class="btn btn-primary" id="add-btn">+ Thêm hộ vay</button>` : ''}
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th></th><th>Họ tên</th><th>${subAdminLabel()}</th><th>Phương án vay</th><th>Gốc</th><th>Lãi suất</th><th>Ngày vay</th><th>Đến hạn</th>
            <th>Trạng thái gốc</th><th>Trạng thái lãi (kỳ hiện chọn)</th><th></th>
          </tr></thead>
          <tbody>
            ${list.length? list.map(b=>{
              const st = borrowerRowStatus(b);
              return `<tr>
                <td><input type="checkbox" data-check="${b.id}" ${b.checked?'checked':''} ${canEditModule('data')?'':'disabled'}></td>
                <td><b>${b.name}</b><div class="sub" style="color:#9A9580;">${b.cccd||''}</div></td>
                <td>${b.hamlet||'—'}</td>
                <td>${b.project||'—'}</td>
                <td class="money">${money(b.principal)}</td>
                <td class="money">${b.rate||0}%/năm</td>
                <td>${fmtDate(b.loanDate)}</td>
                <td>${fmtDate(b.dueDate)}</td>
                <td><span class="pill ${b.status2||st.pStatus.cls}">${st.pStatus.label}</span></td>
                <td><span class="pill ${st.iStatus.cls}">${st.iStatus.label}</span></td>
                <td><button class="btn btn-ghost btn-sm" data-view="${b.id}">Xem/Sửa</button></td>
              </tr>`;
            }).join('') : `<tr><td colspan="11"><div class="empty-state"><div class="e-ico">🌾</div>Chưa có hộ vay nào — bấm "Thêm hộ vay" để bắt đầu</div></td></tr>`}
          </tbody>
        </table>
      </div>`;
    document.getElementById('f-search').oninput = e=>{ state.search=e.target.value; renderDataTab(el); };
    document.getElementById('f-hamlet').onchange = e=>{ state.filterHamlet=e.target.value; renderDataTab(el); };
    document.getElementById('f-project').onchange = e=>{ state.filterProject=e.target.value; renderDataTab(el); };
    document.getElementById('exp-excel-btn').onclick = ()=> exportBorrowersExcel(list);
    document.getElementById('exp-word-btn').onclick = ()=> exportBorrowersWord(list);
    const addBtn = document.getElementById('add-btn');
    if(addBtn) addBtn.onclick = ()=>{ state.modal={type:'borrower', payload:null}; render(); };
    document.querySelectorAll('[data-view]').forEach(b=>{
      b.onclick = ()=>{ state.modal={type:'borrower', payload: state.borrowers.find(x=>x.id===b.dataset.view)}; render(); };
    });
    document.querySelectorAll('[data-check]').forEach(cb=>{
      cb.onchange = async ()=>{
        const b = state.borrowers.find(x=>x.id===cb.dataset.check);
        b.checked = cb.checked;
        await cSetRecord('borrowers', b.id, b);
        await pushLog('cập nhật', `tích chọn hộ ${b.name}`);
      };
    });
  }

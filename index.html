        </div>
      </div>

      <div class="grid3">
        <div class="stat-card" style="background:linear-gradient(135deg,var(--rice),var(--rice-dark));">
          <div class="num mono">${money(acct.xaNhan)}</div>
          <div class="lbl">Tổng lãi trích về cho ${adminLevelLabel()}</div>
          <div class="sub">= Tổng lãi thu được × (100% − ${state.config.retainPercent||0}% ${subAdminLabelLower()} giữ lại)</div>
        </div>
        <div class="stat-card" style="background:linear-gradient(135deg,var(--clay),#7d3813);">
          <div class="num mono">${money(acct.chiTotal)}</div>
          <div class="lbl">Tổng số tiền ${adminLevelLabel()} đã chi</div>
          <div class="sub">Cộng dồn từ các khoản chi trong kỳ</div>
        </div>
        <div class="stat-card" style="background:linear-gradient(135deg,${acct.tonQuy>=0?'var(--green)':'var(--red)'},${acct.tonQuy>=0?'#2f4f34':'#7a231d'});">
          <div class="num mono">${money(acct.tonQuy)}</div>
          <div class="lbl">Tồn quỹ ${adminLevelLabel()}</div>
          <div class="sub">= Tổng nhận về − Tổng đã chi</div>
        </div>
      </div>

      <div class="toolbar">
        <input id="e-search" placeholder="🔎 Tìm theo ghi chú, ${subAdminLabelLower()}..." value="${state.expSearch}" style="min-width:220px;">
        <select id="e-cat"><option value="">Tất cả mục đích chi</option>${EXPENSE_CATEGORIES.map(c=>`<option value="${c}" ${state.expFilterCat===c?'selected':''}>${categoryLabel(c)}</option>`).join('')}</select>
        <div class="spacer"></div>
        ${canEditModule('data')? `<button class="btn btn-primary" id="add-exp-btn">+ Thêm khoản chi mới</button>` : ''}

      <div class="table-wrap">
        <table>
          <thead><tr><th>Ngày chi</th><th>Nội dung / Mục đích</th><th>Địa bàn (${subAdminLabel()})</th><th>Số tiền</th><th>Ghi chú</th><th></th></tr></thead>
          <tbody>
            ${list.length? list.map(e=>`
              <tr>
                <td>${fmtDate(e.date)}</td>
                <td>${e.purpose===CAT_OTHER? `${categoryLabel(CAT_OTHER)}: ${e.purposeOther||''}` : categoryLabel(e.purpose)}</td>
                <td>${isCatHamlet(e.purpose)? (e.hamlet||'—') : '—'}</td>
                <td class="money">${money(e.amount)}</td>
                <td>${e.note||'—'}</td>
                <td><button class="btn btn-ghost btn-sm" data-view-exp="${e.id}">Xem/Sửa</button></td>

    document.getElementById('e-cat').onchange = e=>{ state.expFilterCat=e.target.value; renderExpensesTab(el); };
    const addBtn = document.getElementById('add-exp-btn');
    if(addBtn) addBtn.onclick = ()=>{ state.modal={type:'expense', payload:null}; render(); };
    document.querySelectorAll('[data-view-exp]').forEach(b=>{
      b.onclick = ()=>{ state.modal={type:'expense', payload: state.expenses.find(x=>x.id===b.dataset.viewExp)}; render(); };

  function renderExpenseModal(){
    const isNew = !state.modal.payload;
    const e0 = state.modal.payload ? {...state.modal.payload} : emptyExpense();
    if(isCatHamlet(e0.purpose)) e0.purpose = CAT_HAMLET; // chuẩn hoá dữ liệu cũ (chữ Việt) về khoá nội bộ mới
    const hamlets = state.config.hamlets||[];
    const readonly = !canEditModule('data');
    const wrap = document.createElement('div');
    wrap.className = 'modal-bg';
    wrap.innerHTML = `
      <div class="modal">
        <div class="modal-head"><h3>${isNew?'Thêm khoản chi mới':'Chi tiết khoản chi'}</h3><button class="modal-close" id="em-close">✕</button></div>
        <div class="modal-body">
          <div class="form-grid">
            <div class="field"><label>Ngày chi *</label><input type="date" id="em-date" value="${e0.date}" ${readonly?'disabled':''}></div>
            <div class="field"><label>Số tiền chi (đ) *</label><input type="number" id="em-amount" value="${e0.amount}" ${readonly?'disabled':''}></div>
            <div class="field full"><label>Nội dung công việc / Mục đích chi *</label>
              <select id="em-purpose" ${readonly?'disabled':''}>${EXPENSE_CATEGORIES.map(c=>`<option value="${c}" ${e0.purpose===c?'selected':''}>${categoryLabel(c)}</option>`).join('')}</select>
            </div>
            <div class="field full" id="em-hamlet-wrap" style="${isCatHamlet(e0.purpose)?'':'display:none;'}">
              <label>Trích về cho ${subAdminLabelLower()} nào *</label>
              <select id="em-hamlet" ${readonly?'disabled':''}>${hamlets.map(h=>`<option ${e0.hamlet===h?'selected':''}>${h}</option>`).join('')}</select>
            </div>
            <div class="field full" id="em-other-wrap" style="${e0.purpose===CAT_OTHER?'':'display:none;'}">
              <label>Nội dung mục chi khác (ghi rõ) *</label>
              <input id="em-other" value="${e0.purposeOther||''}" placeholder="Ví dụ: Sửa chữa trụ sở..." ${readonly?'disabled':''}>
            </div>
            <div class="field full"><label>Ghi chú chi tiết (người nhận tiền, số hoá đơn/biên nhận...)</label><textarea id="em-note" rows="2" ${readonly?'disabled':''}>${e0.note||''}</textarea></div>
          </div>
        </div>
        <div class="modal-foot">
          ${(!isNew && canEditModule('data')) ? `<button class="btn btn-danger" id="em-delete" style="margin-right:auto;">Xoá (chuyển vào thùng rác)</button>` : ''}
          <button class="btn btn-ghost" id="em-cancel">Đóng</button>
          ${canEditModule('data') ? `<button class="btn btn-primary" id="em-save">${isNew?'Thêm khoản chi':'Lưu thay đổi'}</button>` : ''}
        </div>
      </div>`;
    document.body.appendChild(wrap);
    const close = ()=>{ wrap.remove(); state.modal=null; };
    wrap.querySelector('#em-close').onclick = close;
    wrap.querySelector('#em-cancel').onclick = close;
    wrap.onclick = (ev)=>{ if(ev.target===wrap) close(); };

    const purposeSel = wrap.querySelector('#em-purpose');
    purposeSel.onchange = ()=>{
      wrap.querySelector('#em-hamlet-wrap').style.display = isCatHamlet(purposeSel.value) ? '' : 'none';
      wrap.querySelector('#em-other-wrap').style.display = purposeSel.value===CAT_OTHER ? '' : 'none';
    };

    const delBtn = wrap.querySelector('#em-delete');
    if(delBtn) delBtn.onclick = async ()=>{
      if(!confirm('Chuyển khoản chi này vào thùng rác?')) return;
      state.expenses = state.expenses.filter(x=>x.id!==e0.id);
      const trashed = {...e0, _kind:'expense', deleted:true, deletedAt:new Date().toISOString(), deletedBy: state.identity.email, deletedByName: state.identity.name};
      state.trash.push(trashed);
      await cRemoveRecord('expenses', e0.id);
      await cSetRecord('trash', trashed.id, trashed);
      await pushLog('xoá khoản chi', `${money(e0.amount)} — ${categoryLabel(e0.purpose)}`);
      close(); render();
    };

    const saveBtn = wrap.querySelector('#em-save');
    if(saveBtn) saveBtn.onclick = async ()=>{
      const date = wrap.querySelector('#em-date').value;
      const amount = parseFloat(wrap.querySelector('#em-amount').value)||0;
      const purpose = wrap.querySelector('#em-purpose').value;
      const hamlet = wrap.querySelector('#em-hamlet').value;
      const purposeOther = wrap.querySelector('#em-other').value.trim();
      const note = wrap.querySelector('#em-note').value.trim();
      if(!date){ alert('Vui lòng chọn ngày chi.'); return; }
      if(!amount || amount<=0){ alert('Vui lòng nhập số tiền chi hợp lệ.'); return; }
      if(isCatHamlet(purpose) && !hamlet){ alert(`Vui lòng chọn ${subAdminLabelLower()} nhận tiền.`); return; }
      if(purpose===CAT_OTHER && !purposeOther){ alert('Vui lòng ghi rõ nội dung mục chi khác.'); return; }
      const updated = { ...e0, date, amount, purpose, hamlet: isCatHamlet(purpose)?hamlet:'', purposeOther: purpose===CAT_OTHER?purposeOther:'', note };
      if(isNew){ state.expenses.push(updated); }
      else { state.expenses = state.expenses.map(x=>x.id===updated.id? updated : x); }
      await cSetRecord('expenses', updated.id, updated);
      await pushLog(isNew?'thêm khoản chi':'chỉnh sửa khoản chi', `${money(updated.amount)} — ${categoryLabel(updated.purpose)}`);
      close(); render();
    };
  }

  // ---------------------------------------------------------------------
  // Module "Thu – Chi nội bộ": CHỦ Ý không đi qua lớp Firebase (cGet*/cSet*)

  function trashLabel(item){
    const kind = item._kind || 'borrower'; // dữ liệu cũ chưa có _kind mặc định là hộ vay
    if(kind==='expense') return `${money(item.amount)} — ${item.purpose===CAT_OTHER? (item.purposeOther||categoryLabel(CAT_OTHER)) : categoryLabel(item.purpose)}`;
    return `${item.name} (${item.hamlet||'—'})`;
  }
  function renderTrashTab(el){
    el.innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr><th>Loại</th><th>Nội dung</th><th>Người xoá</th><th>Thời điểm xoá</th><th></th></tr></thead>
        <tbody>
          ${state.trash.length? state.trash.map(item=>{
            const kind = item._kind || 'borrower';
            return `
            <tr>
              <td><span class="pill ${kind==='expense'?'pill-orange':'pill-gray'}">${kind==='expense'?'Khoản chi':'Hộ vay'}</span></td>
              <td>${trashLabel(item)}</td>
              <td>${item.deletedByName||item.deletedBy}</td><td>${new Date(item.deletedAt).toLocaleString('vi-VN')}</td>
              <td style="display:flex; gap:6px;">
                ${(isOwner() || canEditModule('data') || item.deletedBy===state.identity.email) ? `<button class="btn btn-ghost btn-sm" data-restore="${item.id}" data-kind="${kind}">↩ Khôi phục</button>`:''}
                ${isOwner() ? `<button class="btn btn-danger btn-sm" data-purge="${item.id}" data-kind="${kind}">Xoá vĩnh viễn</button>`:''}
              </td>
            </tr>`;
          }).join('') : `<tr><td colspan="5"><div class="empty-state"><div class="e-ico">🗑️</div>Thùng rác trống</div></td></tr>`}
        </tbody>
      </table></div>`;
    document.querySelectorAll('[data-restore]').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.dataset.restore;
        const kind = btn.dataset.kind;
        const idx = state.trash.findIndex(x=>x.id===id);
        const item = state.trash[idx];
        delete item.deleted; delete item.deletedAt; delete item.deletedBy; delete item.deletedByName; delete item._kind;
        state.trash.splice(idx,1);
        await cRemoveRecord('trash', id);
        if(kind==='expense'){
          state.expenses.push(item);
          await cSetRecord('expenses', item.id, item);
          await pushLog('khôi phục khoản chi', trashLabel({...item, _kind:'expense'}));
        } else {
          state.borrowers.push(item);
          await cSetRecord('borrowers', item.id, item);
          await pushLog('khôi phục', `hộ ${item.name}`);
        }
        renderTrashTab(el);
      };
    });
    document.querySelectorAll('[data-purge]').forEach(btn=>{
      btn.onclick = async ()=>{
        if(!confirm('Xoá vĩnh viễn dữ liệu này? Hành động không thể hoàn tác.')) return;
        const id = btn.dataset.purge;
        const kind = btn.dataset.kind;
        const item = state.trash.find(x=>x.id===id);
        state.trash = state.trash.filter(x=>x.id!==id);
        await cRemoveRecord('trash', id);
        await pushLog(kind==='expense'?'xoá vĩnh viễn khoản chi':'xoá vĩnh viễn', trashLabel(item));
        renderTrashTab(el);
      };
    });
  }

      if(!wardNameVal){ alert(`Vui lòng nhập Tên riêng (${document.getElementById('st-adminlevel').value}).`); return; }
      if(!provinceNameVal){ alert('Vui lòng nhập Tên tỉnh/thành phố.'); return; }
      if(subAdminType==='Khác' && !subAdminCustom){ alert('Vui lòng nhập tên gọi khác cho cấp cơ sở trực thuộc.'); return; }
      cfg.wardName = wardNameVal;
      cfg.adminLevel = document.getElementById('st-adminlevel').value;
      cfg.provinceType = document.getElementById('st-provincetype').value;
      cfg.provinceName = provinceNameVal;
      cfg.subAdminType = subAdminType;
      cfg.subAdminCustom = subAdminCustom;
      cfg.retainPercent = parseFloat(document.getElementById('st-retain').value)||0;
      cfg.hamlets = document.getElementById('st-hamlets').value.split(',').map(s=>s.trim()).filter(Boolean);
      cfg.projects = document.getElementById('st-projects').value.split(',').map(s=>s.trim()).filter(Boolean);
      ['q1','q2','q3','q4'].forEach(q=>{
        cfg.quarters[q].start = document.getElementById(`st-${q}-start`).value;
        cfg.quarters[q].end = document.getElementById(`st-${q}-end`).value;
      });
      await cSet('config', cfg);
      await pushLog('cập nhật', 'cấu hình hệ thống');
      renderSettingsTab(el);
    };

    // ---- Loại 1: chia sẻ chung theo Mã định danh (công khai) ----
    el.querySelectorAll('[data-public-perm]').forEach(sel=>{
      sel.onchange = async ()=>{
        cfg.publicPerms = cfg.publicPerms || {};
        cfg.publicPerms[sel.dataset.publicPerm] = sel.value;
        await cSet('config', cfg);
        await pushLog('cập nhật chia sẻ công khai', `${sel.dataset.publicPerm}: ${sel.value}`);
      };
    });
    // ---- Loại 2: chia sẻ đích danh theo email (đã có) ----
    el.querySelectorAll('[data-grant-perm]').forEach(sel=>{
      sel.onchange = async ()=>{
        const key = sel.dataset.grantPerm, mod = sel.dataset.grantModule;
        cfg.grants = cfg.grants || {};
        if(!cfg.grants[key]) return;
        cfg.grants[key][mod] = sel.value;
        await cSet('config', cfg);
        await pushLog('cập nhật chia sẻ đích danh', `${cfg.grants[key].email} — ${mod}: ${sel.value}`);
      };
    });
    el.querySelectorAll('[data-grant-remove]').forEach(btn=>{
      btn.onclick = async ()=>{
        const key = btn.dataset.grantRemove;
        const email = (cfg.grants && cfg.grants[key] && cfg.grants[key].email) || key;
        if(!confirm(`Gỡ hoàn toàn quyền chia sẻ đích danh cho "${email}"?`)) return;
        delete cfg.grants[key];
        await cSet('config', cfg);
        await pushLog('gỡ chia sẻ đích danh', email);
        renderSettingsTab(el);
      };
    });
    // ---- Loại 2: thêm chia sẻ đích danh mới ----
    const grantAddBtn = document.getElementById('grant-add-btn');
    if(grantAddBtn) grantAddBtn.onclick = async ()=>{
      const email = document.getElementById('grant-new-email').value.trim().toLowerCase();
      if(!email){ alert('Vui lòng nhập email tài khoản Google cần chia sẻ.'); return; }
      const key = emailToKey(email);
      const grant = {email};
      el.querySelectorAll('[data-new-grant-perm]').forEach(sel=>{ grant[sel.dataset.newGrantPerm] = sel.value; });
      cfg.grants = cfg.grants || {};
      cfg.grants[key] = grant;
      await cSet('config', cfg);
      await pushLog('thêm chia sẻ đích danh', email);
      renderSettingsTab(el);
    };
  }

  // ---------- borrower modal ----------
  function emptyBorrower(){
    return { id: uid(), name:'', cccd:'', phone:'', address:'', guarantor:'', project: (state.config.projects||[])[0]||'',
      hamlet:(state.config.hamlets||[])[0]||'', principal:0, rate:6.5, loanDate: todayStr(), dueDate:'', fundSource:'',
      checked:false, note:'', prevBalance:0, interestPaid:0, principalPaid:0, isExtended:false, extensionDueDate:'' };
  }

  function renderModal(){
    const isNew = !state.modal.payload;
    const b = state.modal.payload ? {...state.modal.payload} : emptyBorrower();
    const hamlets = state.config.hamlets||[]; const projects = state.config.projects||[];
    const readonly = !canEditModule('data');
    const wrap = document.createElement('div');
    wrap.className = 'modal-bg';
    wrap.innerHTML = `
      <div class="modal">
        <div class="modal-head"><h3>${isNew? 'Thêm hộ vay mới':'Chi tiết hộ vay'}</h3><button class="modal-close" id="md-close">✕</button></div>
        <div class="modal-body">
          <div class="divider-lbl">Thông tin cá nhân</div>
          <div class="form-grid">
            <div class="field"><label>Họ và tên *</label><input id="m-name" value="${b.name}" ${readonly?'disabled':''}></div>
            <div class="field"><label>CCCD</label><input id="m-cccd" value="${b.cccd}" ${readonly?'disabled':''}></div>
            <div class="field"><label>Số điện thoại</label><input id="m-phone" value="${b.phone}" ${readonly?'disabled':''}></div>
            <div class="field"><label>Người bảo lãnh</label><input id="m-guarantor" value="${b.guarantor}" ${readonly?'disabled':''}></div>
            <div class="field full"><label>Địa chỉ cụ thể</label><input id="m-address" value="${b.address}" ${readonly?'disabled':''}></div>
          </div>

          <div class="divider-lbl">Thông tin khoản vay</div>
          <div class="form-grid">
            <div class="field"><label>Thuộc ${subAdminLabel()}</label><select id="m-hamlet" ${readonly?'disabled':''}>${hamlets.map(h=>`<option ${b.hamlet===h?'selected':''}>${h}</option>`).join('')}</select></div>
            <div class="field"><label>Phương án vay vốn</label><select id="m-project" ${readonly?'disabled':''}>${projects.map(p=>`<option ${b.project===p?'selected':''}>${p}</option>`).join('')}</select></div>
            <div class="field"><label>Số tiền gốc (đ)</label><input type="number" id="m-principal" value="${b.principal}" ${readonly?'disabled':''}></div>
            <div class="field"><label>Lãi suất (%/năm)</label><input type="number" step="0.01" id="m-rate" value="${b.rate}" ${readonly?'disabled':''}></div>
            <div class="field"><label>Ngày vay</label><input type="date" id="m-loanDate" value="${b.loanDate}" ${readonly?'disabled':''}></div>
            <div class="field"><label>Ngày đến hạn (gốc)</label><input type="date" id="m-dueDate" value="${b.dueDate}" ${readonly?'disabled':''}></div>
            <div class="field"><label>Nguồn vốn</label><input id="m-fundSource" value="${b.fundSource}" ${readonly?'disabled':''}></div>
            <div class="field"><label>Tiền dư kỳ trước (+ thiếu / − thừa)</label><input type="number" id="m-prevBalance" value="${b.prevBalance}" ${readonly?'disabled':''}></div>
          </div>

          <div class="divider-lbl">Gia hạn (nếu có)</div>
          <div class="checkbox-row" style="margin-bottom:8px;"><input type="checkbox" id="m-isExtended" ${b.isExtended?'checked':''} ${readonly?'disabled':''}> <label style="margin:0;">Hộ này đang trong diện gia hạn</label></div>
          <div class="field"><label>Hạn gia hạn mới</label><input type="date" id="m-extensionDueDate" value="${b.extensionDueDate}" ${readonly?'disabled':''}></div>

          <div class="divider-lbl">Đóng tiền luỹ kế trong kỳ</div>
          <div class="form-grid">
            <div class="field"><label>Tiền lãi đã đóng</label><input type="number" id="m-interestPaid" value="${b.interestPaid}" ${readonly?'disabled':''}></div>
            <div class="field"><label>Tiền gốc đã đóng</label><input type="number" id="m-principalPaid" value="${b.principalPaid}" ${readonly?'disabled':''}></div>
          </div>

          <div class="checkbox-row" style="margin:10px 0;"><input type="checkbox" id="m-checked" ${b.checked?'checked':''} ${readonly?'disabled':''}> <label style="margin:0;">Ô tích chọn (đánh dấu theo dõi riêng)</label></div>

          <div class="field full"><label>Ghi chú riêng</label><textarea id="m-note" rows="2" ${readonly?'disabled':''}>${b.note}</textarea></div>

          ${!isNew? (()=>{ const st = borrowerRowStatus(b); return `
            <div class="divider-lbl">Tính lãi theo kỳ đang chọn ở tab Báo cáo</div>
            <div class="kv-row"><span>Số ngày trong kỳ</span><b>${st.calc.days}</b></div>
            <div class="kv-row"><span>Lãi tính được</span><b>${money(st.calc.interest)}</b></div>
            <div class="kv-row"><span>Tổng phải đóng (gồm dư kỳ trước)</span><b>${money(st.calc.due)}</b></div>
            <div class="kv-row"><span>Trạng thái lãi</span><span class="pill ${st.iStatus.cls}">${st.iStatus.label}</span></div>
            <div class="kv-row"><span>Trạng thái gốc</span><span class="pill ${st.pStatus.cls}">${st.pStatus.label}</span></div>
          `; })() : ''}
        </div>
        <div class="modal-foot">
          ${(!isNew && canEditModule('data')) ? `<button class="btn btn-danger" id="m-delete" style="margin-right:auto;">Xoá (chuyển vào thùng rác)</button>` : ''}
          <button class="btn btn-ghost" id="m-cancel">Đóng</button>
          ${canEditModule('data') ? `<button class="btn btn-primary" id="m-save">${isNew?'Thêm hộ vay':'Lưu thay đổi'}</button>` : ''}
        </div>
      </div>`;
    document.body.appendChild(wrap);
    const close = ()=>{ wrap.remove(); state.modal=null; };
    wrap.querySelector('#md-close').onclick = close;
    wrap.querySelector('#m-cancel').onclick = close;
    wrap.onclick = (e)=>{ if(e.target===wrap) close(); };

    const delBtn = wrap.querySelector('#m-delete');
    if(delBtn) delBtn.onclick = async ()=>{
      if(!confirm('Chuyển hộ vay này vào thùng rác?')) return;
      state.borrowers = state.borrowers.filter(x=>x.id!==b.id);
      const trashed = {...b, _kind:'borrower', deleted:true, deletedAt:new Date().toISOString(), deletedBy: state.identity.email, deletedByName: state.identity.name};
      state.trash.push(trashed);
      await cRemoveRecord('borrowers', b.id);
      await cSetRecord('trash', trashed.id, trashed);
      await pushLog('xoá', `hộ ${b.name}`);
      close(); render();
    };

    const saveBtn = wrap.querySelector('#m-save');
    if(saveBtn) saveBtn.onclick = async ()=>{
      const name = wrap.querySelector('#m-name').value.trim();
      if(!name){ alert('Vui lòng nhập họ và tên.'); return; }
      const updated = {
        ...b,
        name,
        cccd: wrap.querySelector('#m-cccd').value.trim(),
        phone: wrap.querySelector('#m-phone').value.trim(),
        guarantor: wrap.querySelector('#m-guarantor').value.trim(),
        address: wrap.querySelector('#m-address').value.trim(),
        hamlet: wrap.querySelector('#m-hamlet').value,
        project: wrap.querySelector('#m-project').value,
        principal: parseFloat(wrap.querySelector('#m-principal').value) || 0,
        rate: parseFloat(wrap.querySelector('#m-rate').value) || 0,
        loanDate: wrap.querySelector('#m-loanDate').value,
        dueDate: wrap.querySelector('#m-dueDate').value,
        fundSource: wrap.querySelector('#m-fundSource').value.trim(),
        prevBalance: parseFloat(wrap.querySelector('#m-prevBalance').value) || 0,
        isExtended: wrap.querySelector('#m-isExtended').checked,
        extensionDueDate: wrap.querySelector('#m-extensionDueDate').value,
        interestPaid: parseFloat(wrap.querySelector('#m-interestPaid').value) || 0,
        principalPaid: parseFloat(wrap.querySelector('#m-principalPaid').value) || 0,
        checked: wrap.querySelector('#m-checked').checked,
        note: wrap.querySelector('#m-note').value.trim()
      };

      if (isNew) {
        state.borrowers.push(updated);
      } else {
        state.borrowers = state.borrowers.map(x => x.id === updated.id ? updated : x);
      }
      
      await cSetRecord('borrowers', updated.id, updated);
      await pushLog(isNew ? 'thêm hộ vay' : 'chỉnh sửa hộ vay', `hộ ${updated.name} — gốc ${money(updated.principal)}`);
      close(); 
      render();
    };
  }

  boot();
})();
</script>
</body>
</html>
